<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="#ffffff" />
    <!-- Axes -->
    <line x1="60" y1="280" x2="420" y2="280" stroke="#333333" stroke-width="2" />
    <line x1="60" y1="280" x2="60" y2="40" stroke="#333333" stroke-width="2" />

    <!-- Labels for y-axis (Mass) -->
    <text x="50" y="65" font-family="sans-serif" font-size="14" text-anchor="end" fill="#333333">100 g</text>
    <text x="50" y="175" font-family="sans-serif" font-size="14" text-anchor="end" fill="#333333">50 g</text>
    <text x="50" y="230" font-family="sans-serif" font-size="14" text-anchor="end" fill="#333333">25 g</text>
    <text x="50" y="257.5" font-family="sans-serif" font-size="14" text-anchor="end" fill="#333333">12.5 g</text>

    <!-- Labels for x-axis (Time) -->
    <text x="160" y="300" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#333333">10 d</text>
    <text x="260" y="300" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#333333">20 d</text>
    <text x="360" y="300" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#333333">30 d</text>

    <!-- Grid lines -->
    <!-- t=10 -->
    <polyline points="60,170 160,170 160,280" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
    <!-- t=20 -->
    <polyline points="60,225 260,225 260,280" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
    <!-- t=30 -->
    <polyline points="60,252.5 360,252.5 360,280" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />

    <!-- Decay curve -->
    <path d="M 60,60 C 110,60 110,170 160,170 C 210,170 210,225 260,225 C 310,225 310,252.5 360,252.5" stroke="#0066cc" stroke-width="2.5" fill="none" />

    <!-- Points on curve -->
    <circle cx="60" cy="60" r="5" fill="#0066cc" />
    <circle cx="160" cy="170" r="5" fill="#0066cc" />
    <circle cx="260" cy="225" r="5" fill="#0066cc" />
    <circle cx="360" cy="252.5" r="5" fill="#0066cc" />

    <!-- Point on axes to represent one and two half-lives (time intervals) -->
    <circle cx="160" cy="280" r="5" fill="#000000" />
    <circle cx="260" cy="280" r="5" fill="#000000" />

    <!-- Axis titles -->
    <text x="240" y="315" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333333">Time (days)</text>
    <text x="35" y="160" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333333" transform="rotate(-90 35,160)">Mass</text>

    <!-- Hotspot targets for intervals explicitly drawn as markers to ensure near-ink validation -->
    <line x1="60" y1="280" x2="160" y2="280" stroke="#000000" stroke-width="3" />
    <line x1="160" y1="280" x2="260" y2="280" stroke="#000000" stroke-width="3" />
</svg>
