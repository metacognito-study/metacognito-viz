<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>

  <!-- Title -->
  <text x="240" y="30" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">Octahedral Complex</text>

  <!-- Energy Axis -->
  <line x1="60" y1="280" x2="60" y2="45" stroke="#333" stroke-width="2"/>
  <polygon points="60,35 55,45 65,45" fill="#333"/>
  <text x="40" y="160" font-family="sans-serif" font-size="16" fill="#333" transform="rotate(-90 40,160)" text-anchor="middle">Energy</text>

  <!-- Unsplit d-orbitals (Spherical Field) -->
  <g stroke="black" stroke-width="2.5">
    <line x1="110" y1="160" x2="130" y2="160"/>
    <line x1="135" y1="160" x2="155" y2="160"/>
    <line x1="160" y1="160" x2="180" y2="160"/>
    <line x1="185" y1="160" x2="205" y2="160"/>
    <line x1="210" y1="160" x2="230" y2="160"/>
  </g>

  <!-- Barycenter line -->
  <line x1="230" y1="160" x2="440" y2="160" stroke="#999" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Connecting lines -->
  <line x1="230" y1="160" x2="320" y2="100" stroke="#999" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="230" y1="160" x2="305" y2="200" stroke="#999" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Split d-orbitals -->
  <g stroke="black" stroke-width="2.5">
    <!-- top split -->
    <line x1="320" y1="100" x2="340" y2="100"/>
    <line x1="350" y1="100" x2="370" y2="100"/>
    
    <!-- bottom split -->
    <line x1="305" y1="200" x2="325" y2="200"/>
    <line x1="335" y1="200" x2="355" y2="200"/>
    <line x1="365" y1="200" x2="385" y2="200"/>
  </g>

  <!-- Hotspot indicators for orbitals -->
  <!-- top split -->
  <line x1="345" y1="92" x2="345" y2="70" stroke="#333" stroke-width="1.5"/>
  <!-- bottom split -->
  <line x1="345" y1="208" x2="345" y2="230" stroke="#333" stroke-width="1.5"/>

  <!-- Delta_oct gap arrow -->
  <line x1="440" y1="105" x2="440" y2="195" stroke="black" stroke-width="2"/>
  <polygon points="440,100 435,110 445,110" fill="black"/>
  <polygon points="440,200 435,190 445,190" fill="black"/>

</svg>