<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="white" />
    
    <!-- Axes -->
    <line x1="60" y1="40" x2="60" y2="280" stroke="#333" stroke-width="2" />
    <line x1="60" y1="280" x2="440" y2="280" stroke="#333" stroke-width="2" />
    
    <!-- Ticks Y -->
    <line x1="55" y1="40" x2="60" y2="40" stroke="#333" stroke-width="2" /> <!-- 100% -->
    <line x1="55" y1="160" x2="60" y2="160" stroke="#333" stroke-width="2" /> <!-- 50% -->
    <line x1="55" y1="220" x2="60" y2="220" stroke="#333" stroke-width="2" /> <!-- 25% -->
    <line x1="55" y1="250" x2="60" y2="250" stroke="#333" stroke-width="2" /> <!-- 12.5% -->
    
    <!-- Ticks X -->
    <line x1="150" y1="280" x2="150" y2="285" stroke="#333" stroke-width="2" /> <!-- 1 hl -->
    <line x1="240" y1="280" x2="240" y2="285" stroke="#333" stroke-width="2" /> <!-- 2 hl -->
    <line x1="330" y1="280" x2="330" y2="285" stroke="#333" stroke-width="2" /> <!-- 3 hl -->
    <line x1="420" y1="280" x2="420" y2="285" stroke="#333" stroke-width="2" /> <!-- 4 hl -->
    
    <!-- Dashed Guide Lines Y (100% is top) -->
