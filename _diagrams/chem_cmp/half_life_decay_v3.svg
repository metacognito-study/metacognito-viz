<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="white" />
    
    <!-- Axes -->
    <polyline points="80,30 80,270 440,270" stroke="#333" stroke-width="2" fill="none" />
    
    <!-- Axis Labels -->
    <text x="50" y="150" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle" transform="rotate(-90, 50, 150)">Amount</text>
    <text x="260" y="315" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Time (days)</text>
    
    <!-- Y-axis ticks -->
    <line x1="75" y1="30" x2="80" y2="30" stroke="#333" stroke-width="2" />
    <text x="70" y="35" font-family="sans-serif" font-size="12" fill="#333" text-anchor="end">100%</text>
    
    <line x1="75" y1="150" x2="80" y2="150" stroke="#333" stroke-width="2" />
    <line x1="75" y1="210" x2="80" y2="210" stroke="#333" stroke-width="2" />
    <line x1="75" y1="240" x2="80" y2="240" stroke="#333" stroke-width="2" />
    
    <!-- X-axis ticks (1, 2, 3 half lives -> 3, 6, 9 days) -->
    <line x1="160" y1="270" x2="160" y2="275" stroke="#333" stroke-width="2" />
    <text x="160" y="298" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">3</text>
    
    <line x1="240" y1="270" x2="240" y2="275" stroke="#333" stroke-width="2" />
    <text x="240" y="298" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">6</text>
    
    <line x1="320" y1="270" x2="320" y2="275" stroke="#333" stroke-width="2" />
    <text x="320" y="298" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">9</text>

    <!-- Dashed Guide Lines -->
    <!-- 1 half-life / 50% -->
    <line x1="80" y1="150" x2="160" y2="150" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="160" y1="150" x2="160" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />
    
    <!-- 2 half-lives / 25% -->
    <line x1="80" y1="210" x2="240" y2="210" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="240" y1="210" x2="240" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />
    
    <!-- 3 half-lives / 12.5% -->
    <line x1="80" y1="240" x2="320" y2="240" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="320" y1="240" x2="320" y2="270" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5" />

    <!-- Curve -->
    <!-- M 80.0,30.0 L ... -->
    <path d="M 80.0,30.0 L 85.0,40.2 L 90.0,49.9 L 95.0,59.2 L 100.0,68.2 L 105.0,76.7 L 110.0,84.9 L 115.0,92.8 L 120.0,100.3 L 125.0,107.5 L 130.0,114.4 L 135.0,121.0 L 140.0,127.3 L 145.0,133.3 L 150.0,139.1 L 155.0,144.7 L 160.0,150.0 L 165.0,155.1 L 170.0,160.0 L 175.0,164.6 L 180.0,169.1 L 185.0,173.4 L 190.0,177.5 L 195.0,181.4 L 200.0,185.1 L 205.0,188.7 L 210.0,192.2 L 215.0,195.5 L 220.0,198.6 L 225.0,201.7 L 230.0,204.6 L 235.0,207.3 L 240.0,210.0 L 245.0,212.5 L 250.0,215.0 L 255.0,217.3 L 260.0,219.5 L 265.0,221.7 L 270.0,223.7 L 275.0,225.7 L 280.0,227.6 L 285.0,229.4 L 290.0,231.1 L 295.0,232.7 L 300.0,234.3 L 305.0,235.8 L 310.0,237.3 L 315.0,238.7 L 320.0,240.0 L 325.0,241.3 L 330.0,242.5 L 335.0,243.7 L 340.0,244.8 L 345.0,245.8 L 350.0,246.9 L 355.0,247.8 L 360.0,248.8 L 365.0,249.7 L 370.0,250.5 L 375.0,251.4 L 380.0,252.2 L 385.0,252.9 L 390.0,253.6 L 395.0,254.3 L 400.0,255.0 L 405.0,255.6 L 410.0,256.2 L 415.0,256.8 L 420.0,257.4 L 425.0,257.9 L 430.0,258.4 L 435.0,258.9" stroke="#e74c3c" stroke-width="2.5" fill="none" />
    
    <!-- Interval indicator on X-axis (0 to 3 days) -->
    <polyline points="80,280 80,285 160,285 160,280" stroke="#333" stroke-width="1.5" fill="none" />
    <polyline points="85,282 80,285 85,288" stroke="#333" stroke-width="1.5" fill="none" />
    <polyline points="155,282 160,285 155,288" stroke="#333" stroke-width="1.5" fill="none" />

</svg>
