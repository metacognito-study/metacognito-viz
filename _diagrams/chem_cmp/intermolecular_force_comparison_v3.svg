<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="white" />
  
  <!-- Title -->
  <text x="240" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Intermolecular Forces Comparison</text>

  <!-- HF Molecule -->
  <g>
    <!-- Bond -->
    <line x1="100" y1="90" x2="130" y2="90" stroke="#333" stroke-width="4" />
    
    <!-- H Atom -->
    <circle cx="80" cy="90" r="20" fill="#e0e0e0" stroke="#333" stroke-width="2" />
    <text x="80" y="96" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">H</text>
    <text x="80" y="60" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d32f2f">δ+</text>

    <!-- F Atom -->
    <circle cx="160" cy="90" r="30" fill="#c8e6c9" stroke="#333" stroke-width="2" />
    <text x="160" y="96" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">F</text>
    <text x="160" y="50" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976d2">δ-</text>
  </g>

  <!-- HCl Molecule -->
  <g>
    <!-- Bond -->
    <line x1="340" y1="90" x2="365" y2="90" stroke="#333" stroke-width="4" />
    
    <!-- H Atom -->
    <circle cx="320" cy="90" r="20" fill="#e0e0e0" stroke="#333" stroke-width="2" />
    <text x="320" y="96" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">H</text>
    <text x="320" y="60" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#d32f2f">δ+</text>

    <!-- Cl Atom -->
    <circle cx="400" cy="90" r="35" fill="#a5d6a7" stroke="#333" stroke-width="2" />
    <text x="400" y="96" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Cl</text>
    <text x="400" y="45" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976d2">δ-</text>
  </g>

  <!-- Labels for HF -->
  <g>
    <text x="120" y="150" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#555">Molecule:</text>
    <!-- Box for "HF" center: 120, 175 -->
    <rect x="60" y="160" width="120" height="30" fill="#f8f9fa" stroke="#999" stroke-width="1.5" rx="4" ry="4" stroke-dasharray="4,2" />

    <text x="120" y="215" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#555">Dominant IMF:</text>
    <!-- Box for "Hydrogen bonding" center: 120, 240 -->
    <rect x="20" y="225" width="200" height="30" fill="#f8f9fa" stroke="#999" stroke-width="1.5" rx="4" ry="4" stroke-dasharray="4,2" />
  </g>

  <!-- Labels for HCl -->
  <g>
    <text x="360" y="150" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#555">Molecule:</text>
    <!-- Box for "HCl" center: 360, 175 -->
    <rect x="300" y="160" width="120" height="30" fill="#f8f9fa" stroke="#999" stroke-width="1.5" rx="4" ry="4" stroke-dasharray="4,2" />

    <text x="360" y="215" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#555">Dominant IMF:</text>
    <!-- Box for "Dipole-dipole forces" center: 360, 240 -->
    <rect x="260" y="225" width="200" height="30" fill="#f8f9fa" stroke="#999" stroke-width="1.5" rx="4" ry="4" stroke-dasharray="4,2" />
  </g>

  <!-- Boiling point hint to distinguish stronger from weaker without giving it away directly -->
  <!-- The prompt says: "The molecule with the stronger IMF has the higher boiling point." -->
  <g>
    <text x="120" y="280" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#666">Higher boiling point (19.5 °C)</text>
    <text x="360" y="280" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#666">Lower boiling point (-85.0 °C)</text>
  </g>

</svg>
