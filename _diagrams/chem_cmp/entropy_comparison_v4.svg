<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="white"/>
    
    <!-- System A: Lower Entropy -->
    <text x="100" y="60" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">System A</text>
    <rect x="40" y="90" width="120" height="140" fill="none" stroke="black" stroke-width="2"/>
    
    <!-- Particles in A -->
    <circle cx="60" cy="110" r="5" fill="#333"/>
    <line x1="60" y1="110" x2="75" y2="100" stroke="#333" stroke-width="2"/>
    
    <circle cx="110" cy="130" r="5" fill="#333"/>
    <line x1="110" y1="130" x2="95" y2="140" stroke="#333" stroke-width="2"/>
    
    <circle cx="70" cy="170" r="5" fill="#333"/>
    <line x1="70" y1="170" x2="60" y2="185" stroke="#333" stroke-width="2"/>
    
    <circle cx="130" cy="180" r="5" fill="#333"/>
    <line x1="130" y1="180" x2="145" y2="190" stroke="#333" stroke-width="2"/>
    
    <circle cx="100" cy="200" r="5" fill="#333"/>
    <line x1="100" y1="200" x2="115" y2="215" stroke="#333" stroke-width="2"/>

    <circle cx="140" cy="115" r="5" fill="#333"/>
    <line x1="140" y1="115" x2="135" y2="95" stroke="#333" stroke-width="2"/>
    
    <text x="100" y="260" font-family="sans-serif" font-size="16" text-anchor="middle">Volume = V</text>
    <text x="100" y="285" font-family="sans-serif" font-size="16" text-anchor="middle">T = 300 K</text>

    <!-- System B: Higher Entropy -->
    <text x="330" y="60" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold">System B</text>
    <rect x="220" y="90" width="220" height="140" fill="none" stroke="black" stroke-width="2"/>
    
    <!-- Particles in B -->
    <circle cx="260" cy="120" r="5" fill="#333"/>
    <line x1="260" y1="120" x2="275" y2="110" stroke="#333" stroke-width="2"/>
    
    <circle cx="310" cy="190" r="5" fill="#333"/>
    <line x1="310" y1="190" x2="295" y2="200" stroke="#333" stroke-width="2"/>
    
    <circle cx="360" cy="140" r="5" fill="#333"/>
    <line x1="360" y1="140" x2="350" y2="155" stroke="#333" stroke-width="2"/>
    
    <circle cx="410" cy="110" r="5" fill="#333"/>
    <line x1="410" y1="110" x2="425" y2="120" stroke="#333" stroke-width="2"/>
    
    <circle cx="270" cy="210" r="5" fill="#333"/>
    <line x1="270" y1="210" x2="285" y2="225" stroke="#333" stroke-width="2"/>

    <circle cx="400" cy="200" r="5" fill="#333"/>
    <line x1="400" y1="200" x2="395" y2="180" stroke="#333" stroke-width="2"/>
    
    <text x="330" y="260" font-family="sans-serif" font-size="16" text-anchor="middle">Volume = 2V</text>
    <text x="330" y="285" font-family="sans-serif" font-size="16" text-anchor="middle">T = 300 K</text>
    
</svg>
