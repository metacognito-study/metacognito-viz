<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
<rect x="0" y="0" width="480" height="320" fill="white"/>
<!-- Structure A -->
<text x="35" y="80" font-size="24" font-family="sans-serif" font-weight="bold">A</text>
<text x="120" y="100" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">N</text>
<text x="50" y="170" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">O</text>
<text x="190" y="170" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">O</text>
<!-- A bonds -->
<line x1="108.7" y1="116.9" x2="66.9" y2="158.7" stroke="black" stroke-width="2"/>
<line x1="103.1" y1="111.3" x2="61.3" y2="153.1" stroke="black" stroke-width="2"/>
<line x1="134.1" y1="114.1" x2="175.9" y2="155.9" stroke="black" stroke-width="2"/>
<!-- A Lone pairs -->
<circle cx="114" cy="80" r="2.5" fill="black"/>
<circle cx="126" cy="80" r="2.5" fill="black"/>
<!-- O1 lone pairs -->
<circle cx="26" cy="166" r="2.5" fill="black"/>
<circle cx="26" cy="174" r="2.5" fill="black"/>
<circle cx="46" cy="194" r="2.5" fill="black"/>
<circle cx="54" cy="194" r="2.5" fill="black"/>
<!-- O2 lone pairs -->
<circle cx="186" cy="146" r="2.5" fill="black"/>
<circle cx="194" cy="146" r="2.5" fill="black"/>
<circle cx="214" cy="166" r="2.5" fill="black"/>
<circle cx="214" cy="174" r="2.5" fill="black"/>
<circle cx="186" cy="194" r="2.5" fill="black"/>
<circle cx="194" cy="194" r="2.5" fill="black"/>
<!-- Formal charge O2 -->
<circle cx="225" cy="145" r="10" fill="none" stroke="black" stroke-width="1.5"/>
<line x1="219" y1="145" x2="231" y2="145" stroke="black" stroke-width="1.5"/>
<!-- Bracket A -->
<polyline points="40,215 40,225 200,225 200,215" fill="none" stroke="black" stroke-width="2"/>
<line x1="120" y1="225" x2="120" y2="235" stroke="black" stroke-width="2"/>

<!-- Structure B -->
<text x="275" y="80" font-size="24" font-family="sans-serif" font-weight="bold">B</text>
<text x="360" y="100" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">N</text>
<text x="290" y="170" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">O</text>
<text x="430" y="170" font-size="28" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">O</text>
<!-- B bonds -->
<line x1="345.9" y1="114.1" x2="304.1" y2="155.9" stroke="black" stroke-width="2"/>
<line x1="371.3" y1="116.9" x2="413.1" y2="158.7" stroke="black" stroke-width="2"/>
<line x1="376.9" y1="111.3" x2="418.7" y2="153.1" stroke="black" stroke-width="2"/>
<!-- B Lone pairs -->
<circle cx="354" cy="80" r="2.5" fill="black"/>
<circle cx="366" cy="80" r="2.5" fill="black"/>
<!-- O1 lone pairs -->
<circle cx="286" cy="146" r="2.5" fill="black"/>
<circle cx="294" cy="146" r="2.5" fill="black"/>
<circle cx="266" cy="166" r="2.5" fill="black"/>
<circle cx="266" cy="174" r="2.5" fill="black"/>
<circle cx="286" cy="194" r="2.5" fill="black"/>
<circle cx="294" cy="194" r="2.5" fill="black"/>
<!-- O2 lone pairs -->
<circle cx="454" cy="166" r="2.5" fill="black"/>
<circle cx="454" cy="174" r="2.5" fill="black"/>
<circle cx="426" cy="194" r="2.5" fill="black"/>
<circle cx="434" cy="194" r="2.5" fill="black"/>
<!-- Formal charge O1 -->
<circle cx="255" cy="145" r="10" fill="none" stroke="black" stroke-width="1.5"/>
<line x1="249" y1="145" x2="261" y2="145" stroke="black" stroke-width="1.5"/>
<!-- Bracket B -->
<polyline points="280,215 280,225 440,225 440,215" fill="none" stroke="black" stroke-width="2"/>
<line x1="360" y1="225" x2="360" y2="235" stroke="black" stroke-width="2"/>

<!-- Resonance arrow -->
<line x1="205" y1="140" x2="275" y2="140" stroke="black" stroke-width="2"/>
<polygon points="205,140 215,135 215,145" fill="black"/>
<polygon points="275,140 265,135 265,145" fill="black"/>
</svg>
