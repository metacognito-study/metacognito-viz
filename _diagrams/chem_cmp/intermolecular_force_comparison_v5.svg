<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <!-- White background -->
  <rect x="0" y="0" width="480" height="320" fill="white" />

  <!-- Left Molecule -->
  <!-- Central Atoms -->
  <text x="90" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">C</text>
  <text x="150" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">C</text>
  
  <!-- Outer Atoms -->
  <text x="90" y="45" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="50" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="90" y="145" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="150" y="45" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="190" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="150" y="145" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>

  <!-- Bonds -->
  <line x1="102" y1="90" x2="138" y2="90" stroke="#000" stroke-width="2" />
  <line x1="90" y1="78" x2="90" y2="52" stroke="#000" stroke-width="2" />
  <line x1="78" y1="90" x2="62" y2="90" stroke="#000" stroke-width="2" />
  <line x1="90" y1="102" x2="90" y2="128" stroke="#000" stroke-width="2" />
