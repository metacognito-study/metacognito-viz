  <line x1="162" y1="90" x2="178" y2="90" stroke="#000" stroke-width="2" />
  <line x1="150" y1="102" x2="150" y2="128" stroke="#000" stroke-width="2" />


  <!-- Right Molecule -->
  <!-- Central Atoms -->
  <text x="330" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">C</text>
  <text x="390" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">O</text>
  
  <!-- Outer Atoms -->
  <text x="290" y="95" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="330" y="45" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="330" y="145" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>
  <text x="430" y="60" font-family="sans-serif" font-size="20" fill="#000" text-anchor="middle">H</text>

  <!-- Bonds -->
  <line x1="342" y1="90" x2="378" y2="90" stroke="#000" stroke-width="2" />
  <line x1="330" y1="78" x2="330" y2="52" stroke="#000" stroke-width="2" />
  <line x1="330" y1="102" x2="330" y2="128" stroke="#000" stroke-width="2" />
  <line x1="318" y1="90" x2="302" y2="90" stroke="#000" stroke-width="2" />
  <line x1="398" y1="84" x2="418" y2="68" stroke="#000" stroke-width="2" />

  <!-- Partial Charges -->
  <text x="390" y="60" font-family="sans-serif" font-size="16" fill="#e74c3c" text-anchor="middle">δ-</text>
  <text x="445" y="75" font-family="sans-serif" font-size="16" fill="#3498db" text-anchor="middle">δ+</text>

  <!-- Left Side Label Boxes -->
  <text x="120" y="165" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Molecule</text>
  <polyline points="60,175 180,175 180,205 60,205 60,175" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4" />
  
  <text x="120" y="235" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Dominant IMF</text>
  <polyline points="30,245 210,245 210,275 30,275 30,245" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4" />


  <!-- Right Side Label Boxes -->
  <text x="360" y="165" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Molecule</text>
  <polyline points="300,175 420,175 420,205 300,205 300,175" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4" />
  
  <text x="360" y="235" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Dominant IMF</text>
  <polyline points="270,245 450,245 450,275 270,275 270,245" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,4" />

