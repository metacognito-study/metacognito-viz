<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Axes -->
  <line x1="40" y1="280" x2="450" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="280" x2="40" y2="40" stroke="#333" stroke-width="2"/>
  <polygon points="450,275 460,280 450,285" fill="#333"/>
  <polygon points="35,40 40,30 45,40" fill="#333"/>

  <!-- Axis Labels -->
  <text x="20" y="180" font-family="sans-serif" font-size="14" fill="#333" transform="rotate(-90 20,180)" text-anchor="middle">Energy</text>
  <text x="240" y="310" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Reaction Progress</text>

  <!-- Dashed extension of Reactant level -->
  <line x1="120" y1="150" x2="440" y2="150" stroke="#888" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Solid Reactant and Product lines -->
  <line x1="60" y1="150" x2="120" y2="150" stroke="#333" stroke-width="2.5"/>
  <line x1="360" y1="250" x2="440" y2="250" stroke="#333" stroke-width="2.5"/>

  <!-- Uncatalysed Pathway -->
  <path d="M 120 150 Q 180 40 240 40 T 360 250" fill="none" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- Catalysed Pathway -->
  <path d="M 120 150 Q 180 100 240 100 T 360 250" fill="none" stroke="#3498db" stroke-width="2.5"/>

  <!-- Lower activation energy arrow -->
  <line x1="240" y1="150" x2="240" y2="100" stroke="#333" stroke-width="2"/>
  <polygon points="235,145 240,150 245,145" fill="#333"/>
  <polygon points="235,105 240,100 245,105" fill="#333"/>

  <!-- Enthalpy change arrow -->
  <line x1="400" y1="150" x2="400" y2="250" stroke="#333" stroke-width="2"/>
  <polygon points="395,155 400,150 405,155" fill="#333"/>
  <polygon points="395,245 400,250 405,245" fill="#333"/>
</svg>
