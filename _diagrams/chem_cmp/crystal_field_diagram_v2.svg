<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="white" />
    
    <g stroke="#333" stroke-width="2">
        <line x1="40" y1="280" x2="40" y2="40" />
        <polygon points="40,30 35,45 45,45" fill="#333" stroke="none" />
    </g>
    <text x="-180" y="25" transform="rotate(-90)" font-family="sans-serif" font-size="16" fill="#333">Energy</text>
    
    <g stroke="#333" stroke-width="3">
        <line x1="60" y1="160" x2="90" y2="160" />
        <line x1="100" y1="160" x2="130" y2="160" />
        <line x1="140" y1="160" x2="170" y2="160" />
        <line x1="180" y1="160" x2="210" y2="160" />
        <line x1="220" y1="160" x2="250" y2="160" />
    </g>
    <text x="155" y="190" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Spherical field</text>
    <text x="155" y="210" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">(degenerate d orbitals)</text>
    
    <g stroke="#999" stroke-width="1.5" stroke-dasharray="4,4">
        <line x1="260" y1="160" x2="420" y2="160" />
        <line x1="260" y1="160" x2="295" y2="120" />
        <line x1="260" y1="160" x2="315" y2="220" />
        
        <line x1="420" y1="120" x2="450" y2="120" />
        <line x1="400" y1="220" x2="450" y2="220" />
    </g>
    
    <g stroke="#333" stroke-width="3">
        <line x1="305" y1="120" x2="335" y2="120" />
        <line x1="345" y1="120" x2="375" y2="120" />
        <line x1="385" y1="120" x2="415" y2="120" />
        
        <line x1="325" y1="220" x2="355" y2="220" />
        <line x1="365" y1="220" x2="395" y2="220" />
    </g>
    
    <text x="360" y="270" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Tetrahedral field</text>
    
    <g stroke="#333" stroke-width="2">
        <line x1="440" y1="130" x2="440" y2="210" />
        <polygon points="440,120 435,130 445,130" fill="#333" stroke="none" />
        <polygon points="440,220 435,210 445,210" fill="#333" stroke="none" />
    </g>
</svg>
