<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff" />
  <text x="240" y="30" font-family="sans-serif" font-size="16px" font-weight="bold" text-anchor="middle" fill="#333">Buffer Contamination</text>
  <text x="240" y="60" font-family="sans-serif" font-size="14px" text-anchor="middle" fill="#cc0000" font-weight="bold">Error: contaminated with strong acid</text>
  <text x="97.5" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Moles A⁻</text>
  <rect x="57.5" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="192.5" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Moles HA</text>
  <rect x="152.5" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="287.5" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Ratio [A⁻]/[HA]</text>
  <rect x="247.5" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="382.5" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">pH</text>
  <rect x="342.5" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="130.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Overall capacity</text>
  <rect x="85.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="240.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Capacity against acid</text>
  <rect x="195.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="350.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Capacity against base</text>
  <rect x="305.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
</svg>