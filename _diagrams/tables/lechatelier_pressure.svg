  <line x1="16" y1="252" x2="464" y2="252" stroke="#333333" stroke-width="2" />
  
  <!-- Vertical lines -->
  <line x1="16" y1="120" x2="16" y2="252" stroke="#333333" stroke-width="2" />
  <line x1="160" y1="120" x2="160" y2="252" stroke="#333333" stroke-width="2" />
  <line x1="236" y1="120" x2="236" y2="252" stroke="#333333" stroke-width="2" />
  <line x1="312" y1="120" x2="312" y2="252" stroke="#333333" stroke-width="2" />
  <line x1="388" y1="120" x2="388" y2="252" stroke="#333333" stroke-width="2" />
  <line x1="464" y1="120" x2="464" y2="252" stroke="#333333" stroke-width="2" />

  <!-- Headers (Row 1) -->
  <text x="198" y="145" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">Total</text>
  <text x="198" y="165" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">pressure</text>

