<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff" />
  <text x="240" y="30" font-family="sans-serif" font-size="16px" font-weight="bold" text-anchor="middle" fill="#333">Reaction: N₂(g) + 3H₂(g) ⇌ 2NH₃(g) + Heat</text>
  <text x="240" y="60" font-family="sans-serif" font-size="14px" text-anchor="middle" fill="#cc0000" font-weight="bold">Stress: temperature increased</text>
  <text x="145.0" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Value of K</text>
  <rect x="105.0" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="240.0" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Total Pressure</text>
  <rect x="200.0" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="335.0" y="100" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Rate (forward)</text>
  <rect x="295.0" y="110" width="80" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="130.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Rate (reverse)</text>
  <rect x="85.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="240.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Moles Products</text>
  <rect x="195.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
  <text x="350.0" y="210" font-family="sans-serif" font-size="12px" text-anchor="middle" fill="#333">Moles Reactants</text>
  <rect x="305.0" y="220" width="90" height="40" fill="none" stroke="#333" stroke-width="2" rx="4" />
</svg>