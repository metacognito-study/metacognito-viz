<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>
  <rect x="60" y="40" width="390" height="220" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  
  <line x1="55" y1="260" x2="60" y2="260" stroke="#334155" stroke-width="1.5"/>
  <text x="48" y="264" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">0</text>
  
  <line x1="55" y1="200" x2="60" y2="200" stroke="#334155" stroke-width="1.5"/>
  <text x="48" y="204" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">2</text>
  
  <line x1="55" y1="140" x2="60" y2="140" stroke="#334155" stroke-width="1.5"/>
  <text x="48" y="144" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">4</text>
  
  <line x1="55" y1="80" x2="60" y2="80" stroke="#334155" stroke-width="1.5"/>
  <text x="48" y="84" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">6</text>

  <line x1="110" y1="260" x2="110" y2="265" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="280" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">100</text>
  
  <line x1="215" y1="260" x2="215" y2="265" stroke="#334155" stroke-width="1.5"/>
  <text x="215" y="280" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">10</text>
  
  <line x1="320" y1="260" x2="320" y2="265" stroke="#334155" stroke-width="1.5"/>
  <text x="320" y="280" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">1</text>
  
  <line x1="425" y1="260" x2="425" y2="265" stroke="#334155" stroke-width="1.5"/>
  <text x="425" y="280" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">0.1</text>

  <line x1="60" y1="40" x2="60" y2="260" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="60" y1="260" x2="450" y2="260" stroke="#1e293b" stroke-width="2.5"/>

  <!-- 1s peak -->
  <path d="M60,260 L100,260 L110,200 L120,260 L220,260" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 2s and 2p peaks -->
  <path d="M220,260 L225,260 L235,200 L245,260 L255,260 L265,80 L275,260 L330,260" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 3s peak -->
  <path d="M330,260 L340,260 L350,200 L360,260 L450,260" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dashed drop lines -->
  <line x1="110" y1="200" x2="110" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="235" y1="200" x2="235" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="265" y1="80" x2="265" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="350" y1="200" x2="350" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
