<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>

  <rect x="15" y="15" width="220" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <g transform="translate(125, 85)">
    <!-- Na+ -->
    <circle cx="-60" cy="0" r="24" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="-60" y="6" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Na⁺</text>

    <!-- Water -->
    <circle cx="55" cy="0" r="22" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="71" cy="-18" r="11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="71" cy="18" r="11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="49" y="5" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">δ⁻</text>
    <text x="80" y="-14" font-family="sans-serif" font-size="11" fill="#1e293b">δ⁺</text>
    <text x="80" y="23" font-family="sans-serif" font-size="11" fill="#1e293b">δ⁺</text>

    <!-- Interaction line -->
    <line x1="-36" y1="0" x2="33" y2="0" stroke="#dc2626" stroke-width="3" stroke-dasharray="5,4"/>
  </g>

  <rect x="245" y="15" width="220" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <g transform="translate(355, 85)">
    <!-- Water cluster showing 4 H-bonds -->
    <circle cx="0.0" cy="0.0" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="11.0" cy="14.2" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="11.0" cy="-14.2" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="-2.0" y="4.0" font-family="sans-serif" font-size="11" fill="#ffffff">δ⁻</text>
    <text x="16.5" y="25.3" font-family="sans-serif" font-size="9" fill="#1e293b">δ⁺</text>
    <text x="16.5" y="-17.3" font-family="sans-serif" font-size="9" fill="#1e293b">δ⁺</text>
    <circle cx="38.0" cy="38.0" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="40.3" cy="20.1" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="20.1" cy="40.3" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
<line x1="16.0" y1="19.2" x2="26" y2="26" stroke="#2563eb" stroke-width="3" stroke-dasharray="4,3"/>
    <circle cx="38.0" cy="-38.0" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="20.1" cy="-40.3" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="40.3" cy="-20.1" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
<line x1="16.0" y1="-19.2" x2="26" y2="-26" stroke="#2563eb" stroke-width="3" stroke-dasharray="4,3"/>
    <circle cx="-38.0" cy="-30.0" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="-35.6" cy="-12.2" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="-21.3" cy="-36.8" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
<line x1="-10" y1="-8" x2="-22" y2="-17" stroke="#2563eb" stroke-width="3" stroke-dasharray="4,3"/>
    <circle cx="-38.0" cy="30.0" r="15" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="-21.3" cy="36.8" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="-35.6" cy="12.2" r="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
<line x1="-10" y1="8" x2="-22" y2="17" stroke="#2563eb" stroke-width="3" stroke-dasharray="4,3"/>
  </g>

  <rect x="15" y="165" width="220" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <g transform="translate(125, 235)">
    <!-- Cl- -->
    <circle cx="0" cy="0" r="22" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
    <text x="0" y="7" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Cl⁻</text>

    <!-- Top water -->
    <circle cx="0" cy="-52" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="-10" cy="-38" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="10" cy="-38" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>

    <!-- Bottom water -->
    <circle cx="0" cy="52" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="-10" cy="38" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="10" cy="38" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>

    <!-- Left water -->
    <circle cx="-52" cy="0" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="-38" cy="-10" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="-38" cy="10" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>

    <!-- Right water -->
    <circle cx="52" cy="0" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
    <circle cx="38" cy="-10" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="38" cy="10" r="7" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>

    <!-- Hydration sphere line -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,5"/>
  </g>

  <rect x="245" y="165" width="220" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <g transform="translate(355, 235)">
    <!-- Left Ar -->
    <circle cx="-48" cy="0" r="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="-48" y="-5" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Ar</text>

    <!-- Right Ar -->
    <circle cx="48" cy="0" r="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="48" y="-5" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Ar</text>


  </g>
</svg>
