<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>
  
  <!-- Left Panel: Process A -->
  <rect x="20" y="20" width="215" height="280" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  
  <!-- Reaction Box (endo) -->
  <rect x="30" y="25" width="195" height="140" rx="6" fill="#ffffff" stroke="#4ade80" stroke-width="1"/>
  <text x="127.5" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">Process A</text>
  <text x="127.5" y="65" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">NH₄NO₃(s) →</text>
  <text x="127.5" y="82" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">NH₄⁺(aq) + NO₃⁻(aq)</text>
  <text x="127.5" y="103" font-family="sans-serif" font-size="14" fill="#047857" text-anchor="middle">Temp drops: 25°C → 18°C</text>
  <rect x="42.5" y="115" width="170" height="40" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="127.5" y="140" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Process Type</text>

  <!-- Value Box (plus) -->
  <rect x="30" y="175" width="195" height="115" rx="6" fill="#ffffff" stroke="#4ade80" stroke-width="1"/>
  <text x="127.5" y="200" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">Enthalpy Change</text>
  <text x="127.5" y="225" font-family="sans-serif" font-size="15" fill="#1e293b" text-anchor="middle">|ΔH| = 25.7 kJ</text>
  <rect x="42.5" y="240" width="170" height="40" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="127.5" y="265" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Enthalpy Sign</text>

  <!-- Right Panel: Process B -->
  <rect x="245" y="20" width="215" height="280" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  
  <!-- Reaction Box (exo) -->
  <rect x="255" y="25" width="195" height="140" rx="6" fill="#ffffff" stroke="#fb923c" stroke-width="1"/>
  <text x="352.5" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle">Process B</text>
  <text x="352.5" y="65" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">CaCl₂(s) →</text>
  <text x="352.5" y="82" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">Ca²⁺(aq) + 2Cl⁻(aq)</text>
  <text x="352.5" y="103" font-family="sans-serif" font-size="14" fill="#c2410c" text-anchor="middle">Temp rises: 25°C → 42°C</text>
  <rect x="267.5" y="115" width="170" height="40" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="352.5" y="140" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Process Type</text>

  <!-- Value Box (neg) -->
  <rect x="255" y="175" width="195" height="115" rx="6" fill="#ffffff" stroke="#fb923c" stroke-width="1"/>
  <text x="352.5" y="200" font-family="sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle">Enthalpy Change</text>
  <text x="352.5" y="225" font-family="sans-serif" font-size="15" fill="#1e293b" text-anchor="middle">|ΔH| = 82.8 kJ</text>
  <rect x="267.5" y="240" width="170" height="40" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="352.5" y="265" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Enthalpy Sign</text>
</svg>
