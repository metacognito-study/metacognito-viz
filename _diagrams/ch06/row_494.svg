<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>
  
  <!-- Left Panel: Process A -->
  <rect x="20" y="20" width="215" height="280" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  
  <!-- Reaction Box (endo) -->
  <rect x="30" y="35" width="195" height="110" rx="6" fill="#ffffff" stroke="#4ade80" stroke-width="1"/>
  <text x="127.5" y="65" font-family="sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="middle">Process A</text>
  <text x="127.5" y="90" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">NH₄NO₃(s) →</text>
  <text x="127.5" y="108" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">NH₄⁺(aq) + NO₃⁻(aq)</text>
  <text x="127.5" y="130" font-family="sans-serif" font-size="14" fill="#047857" text-anchor="middle">Temp drops: 25°C → 18°C</text>

  <!-- Value Box (plus) -->
  <rect x="30" y="165" width="195" height="110" rx="6" fill="#ffffff" stroke="#4ade80" stroke-width="1"/>
  <text x="127.5" y="215" font-family="sans-serif" font-size="20" font-weight="bold" fill="#047857" text-anchor="middle">ΔH = +25.7 kJ</text>
  <text x="127.5" y="250" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">[ Sign: + ]</text>

  <!-- Right Panel: Process B -->
  <rect x="245" y="20" width="215" height="280" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  
  <!-- Reaction Box (exo) -->
  <rect x="255" y="35" width="195" height="110" rx="6" fill="#ffffff" stroke="#fb923c" stroke-width="1"/>
  <text x="352.5" y="65" font-family="sans-serif" font-size="16" font-weight="bold" fill="#9a3412" text-anchor="middle">Process B</text>
  <text x="352.5" y="90" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">CaCl₂(s) →</text>
  <text x="352.5" y="108" font-family="sans-serif" font-size="13.5" fill="#1e293b" text-anchor="middle">Ca²⁺(aq) + 2Cl⁻(aq)</text>
  <text x="352.5" y="130" font-family="sans-serif" font-size="14" fill="#c2410c" text-anchor="middle">Temp rises: 25°C → 42°C</text>

  <!-- Value Box (neg) -->
  <rect x="255" y="165" width="195" height="110" rx="6" fill="#ffffff" stroke="#fb923c" stroke-width="1"/>
  <text x="352.5" y="215" font-family="sans-serif" font-size="20" font-weight="bold" fill="#c2410c" text-anchor="middle">ΔH = -82.8 kJ</text>
  <text x="352.5" y="250" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c2410c" text-anchor="middle">[ Sign: - ]</text>
</svg>