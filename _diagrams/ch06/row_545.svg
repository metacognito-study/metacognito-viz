<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="#ffffff"/>
  
  <g stroke="#f1f5f9" stroke-width="1.5">
    <line x1="50" y1="200" x2="440" y2="200" stroke-dasharray="4,4" stroke="#cbd5e1"/>
    <line x1="50" y1="80" x2="440" y2="80" stroke-dasharray="4,4" stroke="#cbd5e1"/>
  </g>

  <!-- Curve Background Regions for clarity -->
  <path d="M60,260 L120,200 L120,270 L60,270 Z" fill="#eff6ff" opacity="0.5"/>
  <path d="M120,200 L200,200 L200,270 L120,270 Z" fill="#f0fdf4" opacity="0.5"/>
  <path d="M200,200 L280,80 L280,270 L200,270 Z" fill="#fffbeb" opacity="0.5"/>
  <path d="M280,80 L400,80 L400,270 L280,270 Z" fill="#fef2f2" opacity="0.5"/>

  <!-- Axes -->
  <line x1="50" y1="270" x2="440" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="50" y1="270" x2="50" y2="30" stroke="#334155" stroke-width="2"/>
  <path d="M435,266 L442,270 L435,274" fill="none" stroke="#334155" stroke-width="2"/>
  <path d="M46,35 L50,28 L54,35" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Tick Numbers -->
  <text x="40" y="265" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">-20</text>
  <text x="40" y="204" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">0</text>
  <text x="40" y="84" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="end">100</text>
  
  <text x="50" y="288" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">0</text>
  <text x="120" y="288" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">q₁</text>
  <text x="200" y="288" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">q₂</text>
  <text x="280" y="288" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">q₃</text>
  <text x="400" y="288" font-family="sans-serif" font-size="11" fill="#475569" text-anchor="middle">q₄</text>
  
  <text x="445" y="305" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155" text-anchor="end">q (kJ)</text>
  <text x="30" y="22" font-family="sans-serif" font-size="11" font-weight="bold" fill="#334155">T (°C)</text>

  <!-- Curve Line Segments -->
  <line x1="60" y1="260" x2="120" y2="200" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="120" y1="200" x2="200" y2="200" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="280" y2="80" stroke="#d97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="280" y1="80" x2="400" y2="80" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>
</svg>