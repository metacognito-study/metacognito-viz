<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="#ffffff" />
    
    <!-- Axes -->
    <!-- Price Level axis -->
    <line x1="60" y1="280" x2="60" y2="40" stroke="#333333" stroke-width="2.5" />
    <!-- Real GDP axis -->
    <line x1="60" y1="280" x2="440" y2="280" stroke="#333333" stroke-width="2.5" />
    
    <!-- AD (downward-sloping) -->
    <line x1="80" y1="60" x2="380" y2="260" stroke="#333333" stroke-width="2.5" />
    
    <!-- LRAS (vertical) -->
    <line x1="230" y1="40" x2="230" y2="280" stroke="#333333" stroke-width="2.5" />
    
    <!-- SRAS1 (original, upward-sloping) -->
    <line x1="80" y1="260" x2="380" y2="60" stroke="#333333" stroke-width="2.5" />
    
    <!-- SRAS2 (new, shifted left) -->
    <line x1="20" y1="260" x2="320" y2="60" stroke="#333333" stroke-width="2.5" stroke-dasharray="5,5" />
    
    <!-- Direction arrow (Shift left) -->
    <g fill="none" stroke="#333333" stroke-width="2">
        <line x1="215" y1="160" x2="185" y2="160" />
        <polygon points="185,160 195,155 195,165" fill="#333333" />
    </g>
</svg>
