<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="#ffffff" />
    
    <!-- Axes -->
    <line x1="80" y1="280" x2="80" y2="40" stroke="#333333" stroke-width="2.5" />
    <line x1="80" y1="280" x2="440" y2="280" stroke="#333333" stroke-width="2.5" />
    
    <!-- LRAS Curve (Vertical) -->
    <line x1="240" y1="280" x2="240" y2="40" stroke="#5555ff" stroke-width="2.5" />
    
    <!-- SRAS Curve (Upward sloping) -->
    <line x1="100" y1="230" x2="380" y2="90" stroke="#ff5555" stroke-width="2.5" />
    
    <!-- AD1 Curve (Downward sloping) -->
    <line x1="100" y1="60" x2="380" y2="260" stroke="#22aa22" stroke-width="2.5" />
    
    <!-- AD2 Curve (Downward sloping, shifted right) -->
    <line x1="180" y1="60" x2="460" y2="260" stroke="#22aa22" stroke-width="2.5" stroke-dasharray="6 4" />
    
    <!-- Shift arrow (direction right) -->
    <line x1="260" y1="160" x2="310" y2="160" stroke="#333333" stroke-width="2" />
    <polygon points="310,160 300,155 300,165" fill="#333333" />
    
</svg>