<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Axes -->
  <polyline points="80,40 80,260 400,260" fill="none" stroke="#333" stroke-width="2"/>
  <!-- CS Fill -->
  <polygon points="80,150 240,150 80,50" fill="#aaccff" opacity="0.6"/>
  <!-- PS Fill -->
  <polygon points="80,150 240,150 80,250" fill="#ffccaa" opacity="0.6"/>
  <!-- Demand -->
  <line x1="80" y1="50" x2="380" y2="237.5" stroke="#0055cc" stroke-width="2.5"/>
  <!-- Supply -->
  <line x1="80" y1="250" x2="380" y2="62.5" stroke="#cc0000" stroke-width="2.5"/>
  <!-- Equilibrium dashed lines -->
  <line x1="80" y1="150" x2="240" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="240" y1="150" x2="240" y2="260" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>

</svg>