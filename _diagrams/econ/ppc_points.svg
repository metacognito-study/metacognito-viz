<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Axes -->
  <polyline points="80,40 80,260 400,260" fill="none" stroke="#333" stroke-width="2"/>
  <!-- PPC Curve -->
  <path d="M 80 80 Q 320 80 320 260" fill="none" stroke="#0055cc" stroke-width="2.5"/>

  <!-- Efficient point -->
  <circle cx="270" cy="110" r="4" fill="#333"/>
  <!-- Inefficient point -->
  <circle cx="160" cy="200" r="4" fill="#333"/>
  <!-- Unattainable point -->
  <circle cx="350" cy="100" r="4" fill="#333"/>

  <!-- Opportunity Cost -->
  <circle cx="210" cy="90" r="4" fill="#333"/>
  <circle cx="295" cy="160" r="4" fill="#333"/>
  <path d="M 210 90 L 295 90 L 295 160" fill="none" stroke="#cc0000" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="295,160 291,150 299,150" fill="#cc0000"/>
  <polygon points="295,90 285,86 285,94" fill="#cc0000"/>

</svg>