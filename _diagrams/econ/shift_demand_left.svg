<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Axes -->
  <polyline points="60,40 60,256 460,256" stroke="#333" stroke-width="2.5" fill="none"/>
  
  <!-- Equilibrium lines for D1 -->
  <!-- S intersects D1: y=210-(x-100)*140/280 = 260 - 0.5x, D1: y=60+(x-160)*180/180 = x - 100 -->
  <!-- 260 - 0.5x = x - 100 => 1.5x = 360 => x=240, y=140 -->
  <polyline points="60,140 240,140 240,256" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4" fill="none"/>
  
  <!-- Equilibrium lines for D2 -->
  <!-- S intersects D2: 260 - 0.5x = y, D2: y=60+(x-100)*180/180 = x - 40 -->
  <!-- 260 - 0.5x = x - 40 => 1.5x = 300 => x=200, y=160 -->
  <polyline points="60,160 200,160 200,256" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4" fill="none"/>

  <!-- Supply curve (S) -->
  <line x1="100" y1="210" x2="380" y2="70" stroke="#333" stroke-width="2.5"/>
  <text x="385" y="70" font-family="sans-serif" font-size="16" fill="#333">S</text>

  <!-- Demand curve 1 (D1) -->
  <line x1="160" y1="60" x2="340" y2="240" stroke="#111" stroke-width="2.5"/>
  
  <!-- Demand curve 2 (D2) -->
  <line x1="100" y1="60" x2="280" y2="240" stroke="#111" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Arrow -->
  <path d="M 190,96 L 142,96 L 148,90 M 142,96 L 148,102" stroke="#333" stroke-width="2" fill="none"/>
</svg>
