<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect x="0" y="0" width="480" height="320" fill="#ffffff" />
  
  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="280" stroke="#333333" stroke-width="2.5" />
  <line x1="60" y1="280" x2="440" y2="280" stroke="#333333" stroke-width="2.5" />

  <!-- Grid lines for equilibrium -->
  <!-- Old Equilibrium -->
  <line x1="60" y1="200" x2="280" y2="200" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,5" />
  <line x1="280" y1="280" x2="280" y2="200" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- New Equilibrium -->
  <line x1="60" y1="160" x2="220" y2="160" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,5" />
  <line x1="220" y1="280" x2="220" y2="160" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,5" />

  <!-- Demand -->
  <line x1="100" y1="80" x2="400" y2="280" stroke="#1f77b4" stroke-width="2.5" />

  <!-- Supply 1 -->
  <line x1="200" y1="280" x2="400" y2="80" stroke="#ff7f0e" stroke-width="2.5" />

  <!-- Supply 2 -->
  <line x1="100" y1="280" x2="300" y2="80" stroke="#ff7f0e" stroke-width="2.5" />

  <!-- Shift arrow -->
  <line x1="270" y1="190" x2="210" y2="190" stroke="#d62728" stroke-width="2.5" />
  <polyline points="220,184 210,190 220,196" fill="none" stroke="#d62728" stroke-width="2.5" />
</svg>
