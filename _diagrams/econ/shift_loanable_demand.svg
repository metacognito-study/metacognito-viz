<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white" />
  
  <!-- Axes -->
  <polyline points="60,40 60,280 440,280" stroke="#333" stroke-width="2.5" fill="none" />
  <!-- Arrows for axes -->
  <polygon points="55,50 60,40 65,50" fill="#333" />
  <polygon points="430,275 440,280 430,285" fill="#333" />

  <!-- Labels on SVG: just S, origin. DO NOT include exact correct labels -->
  <text x="45" y="295" font-family="sans-serif" font-size="14" fill="#333">0</text>
  <text x="310" y="55" font-family="sans-serif" font-size="16" fill="#333">S</text>

  <!-- Supply Curve -->
  <line x1="100" y1="260" x2="300" y2="60" stroke="#007bff" stroke-width="2.5" />

  <!-- D1 Curve -->
  <line x1="100" y1="60" x2="300" y2="260" stroke="#ff4136" stroke-width="2.5" />
  
  <!-- D2 Curve (shifted right by 60) -->
  <line x1="160" y1="60" x2="360" y2="260" stroke="#ff4136" stroke-width="2.5" stroke-dasharray="5,5" />
  
  <!-- Intersections -->
  <!-- D1 and S: x=200, y=160 -->
  <circle cx="200" cy="160" r="4" fill="#333" />
  <polyline points="60,160 200,160 200,280" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
  
  <!-- D2 and S: x=230, y=130 -->
  <circle cx="230" cy="130" r="4" fill="#333" />
  <polyline points="60,130 230,130 230,280" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />

  <!-- Arrow in the gap -->
  <polyline points="135,80 165,80" stroke="#333" stroke-width="2.5" fill="none" />
  <polygon points="160,75 165,80 160,85" fill="#333" />

</svg>
