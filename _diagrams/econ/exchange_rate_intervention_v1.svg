<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>
  
  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="280" x2="440" y2="280" stroke="#333" stroke-width="2"/>
  
  <!-- Axis Labels -->
  <text x="250" y="310" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Quantity of Dollars</text>
  <text x="40" y="160" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle" transform="rotate(-90, 40, 160)">Yen per Dollar</text>
  
  <!-- Guidelines for equilibrium -->
  <line x1="60" y1="160" x2="240" y2="160" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="240" y1="280" x2="240" y2="160" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Supply Curve -->
  <line x1="100" y1="280" x2="380" y2="40" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="390" y="45" font-family="sans-serif" font-size="14" fill="#e74c3c">S</text>
  
  <!-- Demand Curve 1 -->
  <line x1="100" y1="40" x2="380" y2="280" stroke="#3498db" stroke-width="2.5"/>
  <text x="390" y="275" font-family="sans-serif" font-size="14" fill="#3498db">D&#x2081;</text>
  
  <!-- Demand Curve 2 (Shifted Right) -->
  <line x1="240" y1="40" x2="440" y2="211.4" stroke="#3498db" stroke-width="2.5" stroke-dasharray="5,5"/>
  <text x="445" y="220" font-family="sans-serif" font-size="14" fill="#3498db">D&#x2082;</text>
  
  <!-- Equilibrium Point -->
  <circle cx="240" cy="160" r="4" fill="#333"/>
  
  <!-- Fixed Line -->
  <line x1="60" y1="100" x2="400" y2="100" stroke="#2ecc71" stroke-width="2"/>
  
  <!-- ED Line -->
  <line x1="60" y1="220" x2="400" y2="220" stroke="#95a5a6" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- ES Bracket (at y=100, drawn at y=85) -->
  <line x1="170" y1="85" x2="310" y2="85" stroke="#333" stroke-width="1.5"/>
  <polygon points="170,85 178,81 178,89" fill="#333"/>
  <polygon points="310,85 302,81 302,89" fill="#333"/>
  <line x1="170" y1="80" x2="170" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="310" y1="80" x2="310" y2="100" stroke="#333" stroke-width="1"/>
  
  <!-- ED Bracket (at y=220, drawn at y=235) -->
  <line x1="170" y1="235" x2="310" y2="235" stroke="#333" stroke-width="1.5"/>
  <polygon points="170,235 178,231 178,239" fill="#333"/>
  <polygon points="310,235 302,231 302,239" fill="#333"/>
  <line x1="170" y1="220" x2="170" y2="240" stroke="#333" stroke-width="1"/>
  <line x1="310" y1="220" x2="310" y2="240" stroke="#333" stroke-width="1"/>
  
  <!-- SFR Arrow (Shifting D1 to D2) -->
  <line x1="280" y1="180" x2="375" y2="180" stroke="#9b59b6" stroke-width="2"/>
  <polygon points="380,180 370,175 370,185" fill="#9b59b6"/>
  
</svg>
