<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Axes -->
  <polyline points="60,20 60,260 440,260" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Demand -->
  <line x1="80" y1="40" x2="420" y2="240" stroke="#0055cc" stroke-width="2.5"/>
  <!-- Supply -->
  <line x1="80" y1="240" x2="420" y2="40" stroke="#cc0000" stroke-width="2.5"/>
  <!-- Equilibrium dashed lines -->
  <line x1="60" y1="140" x2="250" y2="140" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="250" y1="140" x2="250" y2="260" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Equilibrium Point -->
  <circle cx="250" cy="140" r="4" fill="#333"/>

</svg>