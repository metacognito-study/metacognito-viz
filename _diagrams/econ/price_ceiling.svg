<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Axes -->
  <polyline points="80,20 80,260 440,260" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Demand -->
  <line x1="80" y1="40" x2="420" y2="260" stroke="#0055cc" stroke-width="2.5"/>
  <!-- Supply -->
  <line x1="80" y1="260" x2="420" y2="40" stroke="#cc0000" stroke-width="2.5"/>

  <!-- Price ceiling line -->
  <line x1="80" y1="200" x2="420" y2="200" stroke="#333" stroke-width="2"/>

  <!-- PC at y=200 -->
  <!-- S slope: (40-260)/(420-80) = -220/340 = -11/17 -->
  <!-- y = 260 - 11/17 (x-80) -> 200 = 260 - 11/17 (x-80) -> -60 = -11/17 (x-80) -> x-80 = 1020/11 = 92.7 -> x = 172.7 -->
  <!-- D slope: (260-40)/(420-80) = 220/340 = 11/17 -->
  <!-- y = 40 + 11/17 (x-80) -> 200 = 40 + 11/17 (x-80) -> 160 = 11/17 (x-80) -> x-80 = 2720/11 = 247.3 -> x = 327.3 -->
  <line x1="172.7" y1="200" x2="172.7" y2="260" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="172.7" cy="200" r="4" fill="#cc0000"/>

  <line x1="327.3" y1="200" x2="327.3" y2="260" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="327.3" cy="200" r="4" fill="#0055cc"/>

  <!-- Shortage arrow -->
  <line x1="182.7" y1="220" x2="317.3" y2="220" stroke="#333" stroke-width="2"/>
  <polygon points="317.3,220 307.3,215 307.3,225" fill="#333"/>
  <polygon points="182.7,220 192.7,215 192.7,225" fill="#333"/>

</svg>
