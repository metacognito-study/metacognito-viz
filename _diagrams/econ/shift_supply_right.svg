<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
    <rect width="480" height="320" fill="#ffffff" />
    
    <!-- Axes -->
    <line x1="40" y1="280" x2="40" y2="40" stroke="#333333" stroke-width="2.5" />
    <line x1="40" y1="280" x2="440" y2="280" stroke="#333333" stroke-width="2.5" />
    
    <!-- Demand curve (D) -->
    <line x1="60" y1="50" x2="420" y2="230" stroke="#333333" stroke-width="2.5" />
    
    <!-- Supply curve 1 (S1) -->
    <line x1="60" y1="230" x2="420" y2="50" stroke="#333333" stroke-width="2.5" />
    
    <!-- Supply curve 2 (S2) -->
    <line x1="180" y1="230" x2="440" y2="100" stroke="#333333" stroke-width="2.5" stroke-dasharray="5,5" />
    
    <!-- Direction arrow -->
    <g stroke="#333333" stroke-width="2">
        <line x1="100" y1="210" x2="210" y2="210" fill="none" />
        <polygon points="220,210 210,205 210,215" fill="#333333" stroke="none" />
    </g>
</svg>
