<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <rect width="480" height="320" fill="white"/>

  <!-- Top Panel: Demand Curve -->
  <!-- Axes -->
  <polyline points="60,10 60,140 420,140" fill="none" stroke="#333" stroke-width="2"/>
  <text x="45" y="20" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">P</text>
  <text x="410" y="155" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Q</text>

  <!-- Demand Curve -->
  <line x1="60" y1="20" x2="380" y2="140" stroke="#0072B2" stroke-width="2.5"/>
  <text x="390" y="145" font-family="sans-serif" font-size="14" fill="#0072B2" font-style="italic">D</text>

  <!-- Bottom Panel: Total Revenue -->
  <!-- Axes -->
  <polyline points="60,170 60,290 420,290" fill="none" stroke="#333" stroke-width="2"/>
  <text x="40" y="180" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">TR</text>
  <text x="410" y="305" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">Q</text>

  <!-- Total Revenue Curve -->
  <path d="M 60 290 Q 220 90 380 290" fill="none" stroke="#D55E00" stroke-width="2.5"/>
  <text x="390" y="295" font-family="sans-serif" font-size="14" fill="#D55E00" font-style="italic">TR</text>

  <!-- Connecting Dashed Lines -->
  <line x1="220" y1="80" x2="220" y2="290" stroke="#777" stroke-dasharray="4,4" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="220" y2="80" stroke="#777" stroke-dasharray="4,4" stroke-width="1.5"/>
  <line x1="60" y1="190" x2="220" y2="190" stroke="#777" stroke-dasharray="4,4" stroke-width="1.5"/>

  <!-- Key Points -->
  <circle cx="140" cy="50" r="4" fill="#0072B2"/>
  <circle cx="220" cy="80" r="4" fill="#0072B2"/>
  <circle cx="300" cy="110" r="4" fill="#0072B2"/>
  <circle cx="220" cy="190" r="4" fill="#D55E00"/>
</svg>
