  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A strong acid and a weak acid at the same concentration and volume need the same amount of base to reach equivalence. Can you say why?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"242\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equal equivalence <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1451</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">A <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> and a <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan></tspan><tspan x=\"24\" y=\"190\">at the same <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> and</tspan><tspan x=\"24\" y=\"230\">volume need the same amount of</tspan><tspan x=\"24\" y=\"270\"><tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> to reach equivalence. Can</tspan><tspan x=\"24\" y=\"310\">you say why?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:09</text></svg>"},{"at":20.32,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>It is because the equivalence volume depends only on the moles of acid, and the two have the same moles. Equivalence means the base moles equal the acid moles, whatever the strength. And the moles come from concentration times volume, which are equal for both.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">IT IS ABOUT MOLES</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">It is because the equivalence <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">depends only on the moles of <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>, and the</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">two have the same moles.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Equivalence means the <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> moles equal the</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">acid moles, whatever the strength.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">And the moles come from <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> times</text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">volume, which are equal for both.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The equivalence volume depends only on the moles of acid, not on its strength</text></svg>"},{"at":40.06,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Equal Moles Need Equal Base</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Equal Moles Need Equal <tspan class=\"vocab-term\" data-vocab-key=\"base\">Base</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='16' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>The <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan> to reach equivalence is set by counting particles</text><rect x='40' y='34' width='270' height='80' rx='12' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='175' y='56' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan></text><text x='175' y='84' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>moles = <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> x volume</text><text x='175' y='104' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>same moles of <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan></text><rect x='330' y='34' width='270' height='80' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><text x='465' y='56' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan></text><text x='465' y='84' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>moles = concentration x volume</text><text x='465' y='104' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>same moles of acid</text><text x='320' y='80' text-anchor='middle' font-size='22' font-weight='800' fill='var(--ink,#18213a)'>=</text><rect x='90' y='128' width='460' height='44' rx='10' fill='var(--amber,#f5b526)' fill-opacity='0.18' stroke='var(--amber,#f5b526)' stroke-width='1.6'/><text x='320' y='156' text-anchor='middle' font-size='14' font-weight='800' fill='var(--ink,#18213a)'>moles of base = moles of acid, so the same volume of base</text><rect x='90' y='184' width='460' height='40' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.4'/><text x='320' y='209' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--muted,#606b84)'>strength changes only how the pH behaves on the way</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Equivalence is reached when the moles of base equal the moles of acid. Since both acids have the</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">same concentration and volume, they hold equal moles, so both need the same volume of base.</text></svg>"},{"at":45.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>So strength does not change the moles, only how the pH behaves along the way. The titrant amount is set by counting particles, not by how strong the acid is. Same moles of acid means the same moles of base needed to reach equivalence.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">STRENGTH DOES NOT COUNT</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So strength does not change the moles,</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">only how the pH behaves along the way.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"titrant\">titrant</tspan> amount is set by counting</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">particles, not by how strong the <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan> is.</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Same moles of acid means the same moles</text><text class=\"ln\" data-g=\"2\" data-w=\"36\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">of <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> needed to reach equivalence.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The titrant amount is set by counting particles, not by acid strength</text></svg>"},{"at":65,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why the Equivalence Volume Can Match</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Why the Equivalence</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"volume\">Volume</tspan> Can Match</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The equivalence volume tracks the moles of <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>, not the</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">strength.</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Equivalence means the moles of <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> equal the moles of</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">acid, and moles come from <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> times volume.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">So a <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> and a <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan> with the same</text><text class=\"ln\" data-g=\"2\" data-w=\"54\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">concentration and volume have equal moles and need the</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">same volume of base.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAG0AAACTCAYAAACEYJc/AAAC3ElEQVR4nO2d0W7CMBAEnfz/P19VRCVUQRtCnNvdzLyX2BnmZCi0YwAAAAAAAAAAAAAAAAAAAAAAAAAAQCt1J1HDOgKpB1mJ4iKlpRMnrZ6UlVZbnLQrECWt/igqqbYoaY8sd0YgMdJqQ0kptcVIe0VibRHS6ldBf4lKqC1C2n/C0mqzl1Y7ynGvzV7a1qKSarOWVh8U41ybtbR3S0qpzVZaHVCKa2220vYWlFCbpbQ6sBDH2iylfVqOe2120mpCGW61ralvVyXXZiVtJmVU23rFyl49hos4G2lgJm1GZc61WUgDM2kzK3OtTV4amEk7ozLH2qSlgZm0Mytzq01WGphJ66jMqTZJaWAmrbMyl9rkpIGZNIXKHGqTkgZm0pQqU69NRhqYSVOsTLk2CWlgJk25MtXa2qWBmTSHyhRrozRD2qQ5VaZWG6UZIiHNoTKltbZI6z4yu++lvTSFZ67bmk+XllRZ157aSwNxaY7HfMXjP6UZ0ibNubLuPZwmLfEA0rVHxqMhLdISRmPnXlaFsZE0OuuEvawqm0wSFyctaTR27am9tERq8tSYLu0q/5XiTCjNEKQZcqq0xENIx94ozRCkGYI0Q5BmCNIMaf24QRLFxw1Adjwmv26zlvaOmJTxuUx+MnIQMaT9E8YJI7Ku/gnjlBFpLy2hJqW9SnzVSeUblnu45FedXuEkLlbafzU5jtBq2oNUac5j8jK/uX4mxUVcdf6d5SG64S1Cu+ge7VLjcY/IK7KoP1tfiVqaquuu7HbN0cin4s6+aQrCbtcdzRwh7jczbqaKsNu1hwDv3JDaKO/Im6ok7Hb9IcKe02JNHpuqJ9j2BRx1k+rhZ5OFfSOxCKXTYomdVp8hs5Du02KJnFC3ILWYdw8dy4c3c/bjz0JyUbOO+tX8suEoZBfW9RbWIizrB/kFniFwMRD1iNVij5K4mEkCAAAAAAAAAAAAAAAAAAAAAAAAgPHNF5kszJjtkmHeAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"165.0\" width=\"92.0\" height=\"124.1\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"165.0\" width=\"92.0\" height=\"124.1\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equival   function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"volume":{"t":"Volume","ar":"الحجم","def":"The amount of three-dimensional space occupied by a substance. SI unit: cubic metre (m³). Common chemistry units: litre (L), millilitre (mL), cm³. Measured with graduated cylinders, pipettes, burettes, and volumetric flasks."},"strong acid":{"t":"Strong acid","ar":"حمض قوي","def":"An acid that completely dissociates into ions in aqueous solution."},"weak acid":{"t":"Weak acid","ar":"حمض ضعيف","def":"An acid that partially dissociates into ions in aqueous solution."},"concentration":{"t":"Concentration","ar":"التركيز","def":"The amount of solute present in a given quantity of solvent or solution which can be expressed in many units, e.g.  mol/cm³, even g/cm³ or g/kg"},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"titrant":{"t":"Titrant","ar":"المادة المُعايِرة (المحلول المُضاف)","def":"The solution of known concentration that is added during a titration."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
</body>
</html>
