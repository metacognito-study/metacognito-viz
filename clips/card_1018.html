<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Reading a Cooling Curve</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>On a cooling curve the higher plateau is condensation, gas turning to liquid. The lower plateau is freezing, liquid turning to solid. As the gas cools, it condenses first at the higher temperature.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHICH FLAT IS WHICH</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"98\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">On a cooling curve the higher <tspan class=\"vocab-term\" data-vocab-key=\"plateau\">plateau</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"129\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">is <tspan class=\"vocab-term\" data-vocab-key=\"condensation\">condensation</tspan>, <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> turning to <tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"160\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The lower plateau is freezing, liquid</text><text class=\"ln\" data-g=\"1\" data-w=\"17\" x=\"24\" y=\"191\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">turning to <tspan class=\"vocab-term\" data-vocab-key=\"solid\">solid</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"222\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">As the gas cools, it condenses first at</text><text class=\"ln\" data-g=\"2\" data-w=\"23\" x=\"24\" y=\"253\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the higher <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Higher plateau = condensation; lower plateau = freezing</text></svg>"},{"at":47.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Cooling Curve Plateaus</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Cooling Curve <tspan class=\"vocab-term\" data-vocab-key=\"plateaus\">Plateaus</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>Cooling runs downhill: condense high, freeze low</text><line x1='90' y1='30' x2='90' y2='168' stroke='var(--line,#e5eaf2)' stroke-width='1.6'/><line x1='90' y1='168' x2='560' y2='168' stroke='var(--line,#e5eaf2)' stroke-width='1.6'/><path d='M90 50 L160 84 L280 84 L350 124 L460 124 L530 150' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3' stroke-linejoin='round' stroke-linecap='round'/><line x1='160' y1='84' x2='280' y2='84' stroke='var(--rose,#e0476b)' stroke-width='4' stroke-linecap='round'/><line x1='350' y1='124' x2='460' y2='124' stroke='var(--correct,#0e8f86)' stroke-width='4' stroke-linecap='round'/><line x1='86' y1='84' x2='90' y2='84' stroke='var(--line,#e5eaf2)' stroke-width='1.4'/><text x='82' y='88' text-anchor='end' font-size='9' font-weight='800' fill='var(--rose,#e0476b)'>150°C</text><line x1='86' y1='124' x2='90' y2='124' stroke='var(--line,#e5eaf2)' stroke-width='1.4'/><text x='82' y='128' text-anchor='end' font-size='9' font-weight='800' fill='var(--correct,#0e8f86)'>42°C</text><text x='220' y='76' text-anchor='middle' font-size='8.5' font-weight='800' fill='var(--rose,#e0476b)'><tspan class=\"vocab-term\" data-vocab-key=\"condensation\">condensation</tspan></text><text x='405' y='116' text-anchor='middle' font-size='8.5' font-weight='800' fill='var(--correct,#0e8f86)'>freezing</text><text x='40' y='100' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)' transform='rotate(-90 40 100)'><tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan></text><text x='325' y='186' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>heat removed</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">On a cooling curve the higher flat is condensation, <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> to <tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan>; the lower flat</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">is freezing, liquid to <tspan class=\"vocab-term\" data-vocab-key=\"solid\">solid</tspan>. Here 150°C condenses and 42°C freezes.</text></svg>"},{"at":63.3,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why does condensation happen at a higher temperature than freezing? Because a gas has more energy than a liquid, so it gives up energy and condenses while still quite warm. Freezing comes later, at a lower temperature.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY <tspan class=\"vocab-term\" data-vocab-key=\"condensation\">CONDENSATION</tspan> IS HIGHER</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Why does condensation happen at a higher</text><text class=\"ln\" data-g=\"0\" data-w=\"26\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan> than freezing?</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Because a <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> has more energy than a</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan>, so it gives up energy and condenses</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">while still quite warm.</text><text class=\"ln\" data-g=\"2\" data-w=\"32\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Freezing comes later, at a lower</text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">temperature.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A gas holds more energy, so it condenses first while still warm</text></svg>"},{"at":81.12,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Condensation releases the heat of vaporization at the higher temperature, and freezing releases the heat of fusion at the lower one. So gas to liquid always occurs above liquid to solid for the same substance.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE ENERGY RELEASED</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"98\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"condensation\">Condensation</tspan> releases the heat of</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"129\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">vaporization at the higher <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan>,</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"160\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and freezing releases the heat of</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"24\" y=\"191\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fusion at the lower one.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"222\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> to <tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan> always occurs above</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"253\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">liquid to <tspan class=\"vocab-term\" data-vocab-key=\"solid\">solid</tspan> for the same substance.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Condensation releases <tspan class=\"vocab-term\" data-vocab-key=\"heat of vaporization\">heat of vaporization</tspan>; freezing releases <tspan class=\"vocab-term\" data-vocab-key=\"heat of fusion\">heat of fusion</tspan></text></svg>"},{"at":95.12,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Condensation and Freezing Points</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"condensation\">Condensation</tspan> and</tspan><tspan x=\"48\" y=\"110\">Freezing Points</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">On a cooling curve the higher <tspan class=\"vocab-term\" data-vocab-key=\"plateau\">plateau</tspan> is condensation,</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> turning to <tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan>, and the lower plateau is</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">freezing, liquid turning to <tspan class=\"vocab-term\" data-vocab-key=\"solid\">solid</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A gas holds more energy, so it condenses first while</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">warm; freezing follows at a lower <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Condensation releases the <tspan class=\"vocab-term\" data-vocab-key=\"heat of vaporization\">heat of vaporization</tspan>, freezing</text><text class=\"ln\" data-g=\"2\" data-w=\"19\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the <tspan class=\"vocab-term\" data-vocab-key=\"heat of fusion\">heat of fusion</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKkAAAC4CAYAAACYX8wRAAAFgElEQVR4nO3d2XLcNhBAUcGV///lTsGVh6kJRRJLL+i+59G2NHJy3SRBDOfnBwAAAAAAAAAAAAAAAAAAAAAAAAAAAACAupr3D4AYRES+f621FqKPED8E4oT5G89gibQgGYgzQqhEWohMHNIjnAYQaRHyFdtoaKtfv+KP1QvBj2wI7PtrZk8ZZhBpMW1hAnqdkxJpcvIx8XZE9vk9rKYpkSYmmwPV+F5vEGlSohTo3etoIdKExCBQru4xTQyvuq0wSRNrRueO2v8wiDQRMToPtUakSUjSQDsiTUC+DrfZzkuJNOkElf9Y/Azak5tIkwXaHO+xayHSQ8lNfBahssEEQ4G0i8Ot1US1uEhjkh6u3UTSf09jQ4j1KQSRFlhqahtD9VjqSrWelp0sBrJzdz737qESSFs4T/VcJeBwfwDZOMFmQvV8f1NHpMGJwiF2ZaJ63HIl0sA0D7HtZagR9gRw4RSU5SFWbm6tWrz+EybpAZpyIFdhRgn07+t7vjiueQUiAZ5WcoVJGoznBGtfrxch0I5IA/E+xErQHVNEemCgYrCrKcoU7Yj00EBFcVNzpEA7InW2emtSNoTqfZrxhEgdjRxi5SaklVCjB9oRaRBvA90Z6gmBdkTqZDaQ9vFnVzY1nxJoR6QHXcm3X/7saKgnBdoR6eGBnrQvdBaRHh7ot5GYT5iiHZEeHqgoxBwNkRrQuqARg5gjIFJjGueWLXGgHZEqm734mV3YzxZoR6SKtC9+WoFAOyI9aFeTJF2sf0KkAQN982tt07ntCYh0s12H45Gn5mVYC71DpBut3vn5LVQpsBZ6J8VfIorV25hP9+BbkQulb0zSQEtNn7vtR98UJ0kD7VL9ZU4+D509B80eaMckdbySH92GVzHQjkgDTdBTnhdqjUidAn1zqK+0Fnon7b++yIv1uwNtiadoxyQdtGMX/FPkFddC7xDpgpGNIG/fNMeF0v+l/1cYcdsdgY5hkr60ehW+eoiXIlfyV4g0yKaRXa+fUbm/cLS7SU/fV4oH2jFJje4mzdxRqrQWeodIFXfBP11AsdT0TsnDx5Mdb4q7+h4V35+0A5P0wezh+O6iiUDHEOkXlpriIVLDpSYm6JzS5zqfWGqKi0m6cYLefS1rofPKR6rxQNuReFkLfVY60mgPCKu+1PSb0pF6P3+JtdB3ykY6s+2OQH2UjHR2gt2dHjBB9ZSLdDTQN2ugBKqrVKS7Lmg+v0/VxzFaKvMfalcgPO3OXolJunMtcvZJI7N/FgUi1XiPOg8Ts5U+Uq0JdvUkkiuch65LfdjxDsT79bNIO0m9A/F+/UxSRuodiPfrZ5MyUk/satovXaSeU6za0+6spIs0CgLdJ22knlOUQPdKFanX+SCB6koVqQcC1UekCwjUBpFOIlA7KSPVvnBhLdRWykg1sRZqj0gXsNRkg0gHcB7qI02k2ueJBOonTaSaCNRXukh3nycSqL8UkWod6gk0hn9+Etk1RVlmiuX4SHdN0dmnM0Pf0f8Dnj6me+brZ74PdB07SXd8BOIV4oznyGkxc2hmap7r2Em6GigT8xzHTdKR4Igzh1YlUCbnuY5ZzCfQuo6IdPZBtR0T9Hx/Ml3JE2hOoSNduQvEBM0jdKRX3lwoEWguf7JdKBFoPiEjJVCEjpSPnEHoSFeu5JFXmEhZC0XoSK/WNz+nZ/99NiXXFeLe/d3VOVvs4D5Jn5aPdnwCHc7mGunb9c3RT6BDLm6R8vHbCB0pgSJ0pNzCROhIRxfgCRqu56R8ujHCRcp5KEJHSqA45nDPIR4hI317scSuJoS9LdrxBjq4Rjp6C5Nbngi3TspaKJ6YbdTgkYsIP0lHdjkBAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPBj41/vagVruX8YTgAAAABJRU5ErkJggg==\" x=\"520.0\" y=\"176.9\" width=\"92.0\" height=\"100.2\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"176.9\" width=\"92.0\" height=\"100.2\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">higher plateau = condensation; lower plateau = freezing</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"gas":{"t":"Gas","ar":"غاز","def":"A state of matter in which particles are far apart, move rapidly and randomly, and have negligible intermolecular forces compared to their kinetic energy. A gas takes the shape and volume of its container and is highly compressible."},"solid":{"t":"Solid","ar":"صلب","def":"A state of matter in which particles are packed closely in a fixed arrangement, vibrate in place, and have strong intermolecular forces. Solids have a definite shape and definite volume. They are nearly incompressible."},"plateaus":{"t":"Plateau","ar":"مستوى ثابت","def":"a flat, level stretch where the value barely changes"},"condensation":{"t":"Condensation","ar":"التكثيف","def":"Condensation is the change of state from gas to liquid. It occurs when the temperature of a gas is lowered or the pressure is increased. When the temperature of a gas is lowered, the average kinetic energy of the molecules decreases, and the molecules are more likely to stick together when they collide. When the pressure is increased, the molecules are forced closer together, which also makes them more likely to stick together."},"freezing point":{"t":"Freezing Point","ar":"درجة التجمد","def":"The temperature at which a liquid turns into a solid."},"plateau":{"t":"Plateau","ar":"مستوى ثابت","def":"a flat, level stretch where the value barely changes"},"liquid":{"t":"Liquid","ar":"سائل","def":"A state of matter in which particles are close together with some intermolecular forces, can slide past each other, and take the shape of their container while maintaining a definite volume. Liquids are nearly incompressible."},"temperature":{"t":"Temperature","ar":"درجة الحرارة","def":"A measure of the average kinetic energy of the particles in a substance. Higher temperature = more particle motion. Measured in Celsius (°C) or Kelvin (K) in chemistry. Temperature determines the direction of heat flow (heat flows from high T to low T)."},"heat of vaporization":{"t":"Heat of Vaporization","ar":"حرارة التبخير","def":"The heat of vaporization (ΔHvap) is the amount of heat energy required to vaporize one mole of a liquid at its boiling point. For example, the heat of vaporization of water is 40.7 kJ/mol. This means that it takes 40.7 kJ of heat energy to vaporize one mole of water at 100°C."},"heat of fusion":{"t":"Heat of Fusion","ar":"حرارة الانصهار","def":"The heat of fusion (ΔHfus) is the amount of heat energy required to melt one mole of a solid at its melting point. For example, the heat of fusion of water is 6.01 kJ/mol. This means that it takes 6.01 kJ of heat energy to melt one mole of ice at 0°C."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
