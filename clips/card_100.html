<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · After Trade Consumption</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you calculate what each country consumes after it specializes and trades?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"215\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"comparative advantage\">Comparative advantage</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#100</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you calculate what each</tspan><tspan x=\"24\" y=\"190\">country consumes after it</tspan><tspan x=\"24\" y=\"230\">specializes and trades?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:29</text></svg>"},{"at":28.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Use = Output - Exports + Imports</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Use = Output - <tspan class=\"vocab-term\" data-vocab-key=\"exports\">Exports</tspan> + <tspan class=\"vocab-term\" data-vocab-key=\"imports\">Imports</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='42' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>work each good on its OWN line: output, minus what leaves, plus what arrives</text><text x='96' y='74' text-anchor='end' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'>computers:</text><text x='110' y='74' text-anchor='start' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>15 made &#8722; 4 exported</text><rect x='320' y='58' width='150' height='26' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='395' y='75' text-anchor='middle' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'>= 11 to use</text><text x='96' y='120' text-anchor='end' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'>grain:</text><text x='110' y='120' text-anchor='start' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>0 made + 2 imported</text><rect x='320' y='104' width='150' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='395' y='121' text-anchor='middle' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'>= 2 to use</text><text x='482' y='74' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>exports leave home</text><text x='482' y='114' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>never made here:</text><text x='482' y='127' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>arrives by import</text><rect x='140' y='152' width='360' height='26' rx='9' fill='var(--amber,#f5b526)' fill-opacity='0.12' stroke='var(--amber,#f5b526)' stroke-width='1.5'/><text x='320' y='169' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>USE = OUTPUT &#8722; EXPORTS + IMPORTS, one good at a time</text><text x='320' y='196' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>the trap: mixing two goods on one line; each good keeps its own books</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Each good is worked on its own: start from home output,</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">subtract what is exported, then add what is imported.</text></svg>"},{"at":51.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>After trade use equals home output minus exports plus imports. Apply that rule for each good on its own and for each country on its own. A good a country does not make has a making term of zero, and arrives fully through imports.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ONE RULE, EVERY GOOD</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">After <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> use equals home output minus</text><text class=\"ln\" data-g=\"0\" data-w=\"21\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"exports\">exports</tspan> plus <tspan class=\"vocab-term\" data-vocab-key=\"imports\">imports</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Apply that rule for each good on its own</text><text class=\"ln\" data-g=\"1\" data-w=\"32\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and for each country on its own.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A good a country does not make has a making</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">term of zero, and arrives fully through</text><text class=\"ln\" data-g=\"2\" data-w=\"8\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">imports.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Use = output - exports + imports, applied good by good</text></svg>"},{"at":90.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student added the 6 exported oats to the 15 made and reported 21 oats used. That is wrong. Exported goods leave the country, so you take them away from output to find what is left for home use. The right rule for the export good is output minus exports, never output plus exports.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: <tspan class=\"vocab-term\" data-vocab-key=\"exports\">EXPORTS</tspan> ARE SUBTRACTED</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student added the 6 exported oats to the 15 made</text><text class=\"ln\" data-g=\"0\" data-w=\"26\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and reported 21 oats used.</text><text class=\"ln\" data-g=\"1\" data-w=\"14\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is wrong.</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Exported goods leave the country, so you take them</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">away from output to find what is left for home</text><text class=\"ln\" data-g=\"2\" data-w=\"6\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">use.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The right rule for the export good is output minus</text><text class=\"ln\" data-g=\"3\" data-w=\"35\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">exports, never output plus exports.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Exports leave, so subtract them; do not add them back</text></svg>"},{"at":116.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The signs are easy to remember. Output is what you make. Exports take away from what you keep. Imports add to what you have. Goods made and kept take away zero. Goods partly exported take away the exported amount. Goods not made but imported add the imported amount.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SIGN MEMORY</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"105.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The signs are easy to remember.</text><text class=\"ln\" data-g=\"1\" data-w=\"24\" x=\"24\" y=\"128.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Output is what you make.</text><text class=\"ln\" data-g=\"2\" data-w=\"37\" x=\"24\" y=\"151.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"exports\">Exports</tspan> take away from what you keep.</text><text class=\"ln\" data-g=\"3\" data-w=\"29\" x=\"24\" y=\"174.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"imports\">Imports</tspan> add to what you have.</text><text class=\"ln\" data-g=\"4\" data-w=\"35\" x=\"24\" y=\"197.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Goods made and kept take away zero.</text><text class=\"ln\" data-g=\"5\" data-w=\"52\" x=\"24\" y=\"220.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Goods partly exported take away the exported amount.</text><text class=\"ln\" data-g=\"6\" data-w=\"52\" x=\"24\" y=\"243.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Goods not made but imported add the imported amount.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Make: plus. Export: minus. Import: plus</text></svg>"},{"at":143.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>After Trade Consumption</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">After <tspan class=\"vocab-term\" data-vocab-key=\"trade\">Trade</tspan> Consumption</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">After trade use is what a country actually consumes</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">once it specializes and trades, found good by good</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">as output minus <tspan class=\"vocab-term\" data-vocab-key=\"exports\">exports</tspan> plus <tspan class=\"vocab-term\" data-vocab-key=\"imports\">imports</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The result is the after trade use point, which can</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">lie outside the country's own production</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">possibilities curve.</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">That outside reach is the gain from trade.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALMAAACECAYAAADbaxrmAAAFFUlEQVR4nO3c6a6kOAyGYTLq+79lj0qtjJiIJYtJbOd9frX6VFEhfJgQluMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgOBERA6j/jmMs9x5uxHj28J8mHMnWu/I6MRB/6fDWUemlFy0OQpx1PcuKvO5Ez1UiCjEUZDdhPmHQM8lzoL846KR3jvZEymOfJ762E1DS4SaPnU7zCgx7NAlAY54Lhsd5bBogQQIcea68VE3yiwSrM/cr8AZVXrvfgqxEtErjhYJGuIs1Mqs2HA1O87bhZ4ZoZINdvCQK/XlRpx1BVIrcBK8Gp+FXTHNDfoU4JopwqffG9k5Wo4EKXCIs/Ar2LORa8P79hsjAdI6AqQNQpxts6IjQakJxIox6chOF9F2K1zqGRo8LWPHEFlBxw/Y6eTKAzq/AyG2iTA3IMS2ub1rbjaCbB+VuQIneD5QmRtwgmcbYUYYhHkyni7/DmPmyvCNDjF2vV9ipj9Tf22z8N8FOP+/1o6CvxhmTJzKy6E9//vqs+hDmD9WBrf8W/4379Mbx+HtQeswYGTYEH0uWyYMqT6vzLnicCh9FnXYIRO3/ZL7br1UnpmV+Wo5GstaZcU2n9pRnjbSqiCXy9NcZvTCNfUEMOoJzxfr4bGvZPEReNkeb7nytLbt65Ob2vbIonnr1SH+73ePhax0wkgoZgWopTKnRc8grt5+psJjoUNqA2rtAdadQ5yZaITFDqqthCvaufIyuBjbTmdmGmKxSlt+lH92P4nhEGfmGuSl4yyYFWgxVGCemG3YD6FeGzRxVlRMN85bZVhJuGjjI8w/BHpeH4nT4uGmoRk3tNf1z+jbTj2FOHPX4AidbrF/JECfurw532tnW72dVAIE+cdtw38YctT3Uc27qD0H2W1lLjvfwx1l1qt0ch7kH/cr0FKhvc2bapKLChztyBZiJd42jJUbdFaT4O/uCLMid4G+GxPWVmlr1VyjmkqwihxizFwqD59PJzdPrwDI372qZF6e+tjxXCPUntlbTctK9bQTWDj7135wNgWp0KEq8xXtq2Dnir6qsp1/X6MNEqRChwvzLpdzNd6zkYyv47F7mEcu47Z+d7WoL47pxVtACyPVfGQ5vcq3iiYnO+IXQlXm3he3ZJpBmPpaqmIcP+t3rdm2Mo8Euea7KwKVNq/SoSrzCm+vq50d6tTwJqT8tyih37Iya1Xlr99g1Lv8dHPxaPWU4tdCVeaajWU9yHe/1yNdXPAZWX/rwqzIW+CugtE7czHrzaBaO48EDnDYynw3ZtQ4rK46odP8/fRyP4p34cL8tNHO//f18ELr5ErzSp8EHStvcQKoXYVWVbVyym1lWyzbqkN6gjBSlUsaAVx5lLAu5DBDi2aQy7+NDhnyMqIPHVqE3lNHqlTvTELNbMp52NC6/NY2yiZV+Sf8CvZs3N6prLdwPV280Aj0nR2CvPUw4y4EXwX5qyHD22+lTYIcfjajdmZAe/k9n9e4QShtFNwrW1bmp4sHPXPRWhc0NJe3o+0qs4Wpsrf2nIccrQ/j7mzLylxLs0K2hK62SlPB/2/7vVlr1uOLClobVqryX1TmG0+PIbXOPGhcIBn5zC7oiIEgnmdGWuat3z5/9V1C+47K/OLtRTA18ueZsfjW1rMZtb58PKqmolOV6zDMGFR7Eth62Xn2I1oR0EkKWk/wWoYbBLkeYZ54stjyXUIMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABwPPkX+N98r+l2JfAAAAAASUVORK5CYII=\" x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">use = output - exports + imports → point can sit beyond the <tspan class=\"vocab-term\" data-vocab-key=\"ppc\">PPC</tspan></text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"comparative advantage":{"t":"Comparative advantage","ar":"الميزة النسبية: تنتج بتكلفة فرصة أقل من غيرك.","def":"The ability to produce a good at a lower opportunity cost than another producer."},"exports":{"t":"Exports","ar":"الصادرات: سلع وخدمات تبيعها دولة لدول أخرى.","def":"Goods and services sent out of a country to another country."},"imports":{"t":"Imports","ar":"الواردات: سلع وخدمات تشتريها دولة من دول أخرى.","def":"Goods and services brought into a country from another country."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"ppc":{"t":"Production possibilities frontier","ar":"منحنى إمكانات الإنتاج: أقصى ما يمكن إنتاجه بموارد معينة.","def":"The production possibilities frontier is a graph showing the maximum combinations of two goods an economy can produce given its resources and technology."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
