  *{ box-sizing:border-box; } html,body{ margin:0; }

  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */

       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }

  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }

  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Silver chloride has the larger solubility product, yet it is the less soluble of the two. Can you explain that surprise?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"278\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Different ratio, calculate s</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1496</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Silver chloride has the larger</tspan><tspan x=\"24\" y=\"190\"><tspan class=\"vocab-term\" data-vocab-key=\"solubility\">solubility</tspan> product, yet it is</tspan><tspan x=\"24\" y=\"230\">the less <tspan class=\"vocab-term\" data-vocab-key=\"soluble\">soluble</tspan> of the two.</tspan><tspan x=\"24\" y=\"270\">Can you explain that surprise?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:36</text></svg>"},{"at":23.22,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Their shapes differ: silver chloride gives one and one, but silver chromate gives two silver ions and one chromate. So you cannot just compare the constants. For different ion ratios the constants cannot be compared directly, so you must turn each constant into a molar solubility first.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SHAPES DIFFER</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Their shapes differ: silver chloride gives</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">one and one, but silver chromate gives two</text><text class=\"ln\" data-g=\"0\" data-w=\"29\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">silver ions and one chromate.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So you cannot just compare the constants.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">For different <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> ratios the constants cannot</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">be compared directly, so you must turn each</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">constant into a <tspan class=\"vocab-term\" data-vocab-key=\"molar solubility\">molar solubility</tspan> first.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Different shapes mean the raw constants cannot be compared directly</text></svg>"},{"at":51.84,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Convert to s, Then Compare</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Convert to s, Then Compare</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='170' y='50' text-anchor='middle' font-size='12' font-weight='800' fill='var(--correct,#0e8f86)'>AgCl</text><text x='470' y='50' text-anchor='middle' font-size='12' font-weight='800' fill='var(--indigo,#5545e8)'>Ag&#8322;CrO&#8324;</text><text x='170' y='74' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>LARGER Ksp</text><text x='470' y='74' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>smaller Ksp</text><line x1='170' y1='84' x2='170' y2='102' stroke='var(--muted,#606b84)' stroke-width='1.8'/><polygon points='170,108 166,101 174,101' fill='var(--muted,#606b84)'/><line x1='470' y1='84' x2='470' y2='102' stroke='var(--muted,#606b84)' stroke-width='1.8'/><polygon points='470,108 466,101 474,101' fill='var(--muted,#606b84)'/><text x='184' y='98' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--correct,#0e8f86)'>1:1 shape</text><text x='484' y='98' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--indigo,#5545e8)'>2:1 shape</text><rect x='92' y='116' width='156' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='170' y='133' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>s &#8776; 1.3 &#215; 10&#8315;&#8309; mol/L</text><rect x='384' y='116' width='172' height='26' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='470' y='133' text-anchor='middle' font-size='9' font-weight='800' fill='var(--indigo,#5545e8)'>s &#8776; 6.5 &#215; 10&#8315;&#8309; mol/L: LARGER</text><line x1='320' y1='60' x2='320' y2='150' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><rect x='150' y='160' width='340' height='26' rx='9' fill='var(--amber,#f5b526)' fill-opacity='0.12' stroke='var(--amber,#f5b526)' stroke-width='1.5'/><text x='320' y='177' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>different shapes: NEVER compare the constants directly</text><text x='320' y='198' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>convert each Ksp to its own s first; the bigger s wins, not the bigger Ksp</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Their shapes differ, so the raw constants mislead. Convert each constant to a <tspan class=\"vocab-term\" data-vocab-key=\"molar solubility\">molar solubility</tspan> first:</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">silver chromate turns out more <tspan class=\"vocab-term\" data-vocab-key=\"soluble\">soluble</tspan>, even though its <tspan class=\"vocab-term\" data-vocab-key=\"solubility\">solubility</tspan> product is the smaller one.</text></svg>"},{"at":68.8,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Silver chloride comes out near one times ten to the minus five moles per liter, and silver chromate about six times ten to the minus five, which is the larger s. So silver chromate is more soluble, even though its solubility product is smaller. The shapes are different, so the raw constants mislead.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SURPRISE RESOLVED</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Silver chloride comes out near one times ten to</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the minus five moles per liter, and silver</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">chromate about six times ten to the minus five,</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which is the larger s.</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So silver chromate is more <tspan class=\"vocab-term\" data-vocab-key=\"soluble\">soluble</tspan>, even though</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">its <tspan class=\"vocab-term\" data-vocab-key=\"solubility\">solubility</tspan> product is smaller.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The shapes are different, so the raw constants</text><text class=\"ln\" data-g=\"2\" data-w=\"8\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">mislead.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Silver chromate has the larger s, so it is</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">more soluble despite the smaller constant</text></svg>"},{"at":90.2,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Different Ratios Need a Solubility First</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Different Ratios Need a</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"solubility\">Solubility</tspan> First</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For salts with different <tspan class=\"vocab-term\" data-vocab-key=\"cation\">cation</tspan> to <tspan class=\"vocab-term\" data-vocab-key=\"anion\">anion</tspan> ratios, the</text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">constants cannot be compared directly, because each</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">shape links the constant to s differently.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">So convert each constant into a <tspan class=\"vocab-term\" data-vocab-key=\"molar solubility\">molar solubility</tspan> first,</text><text class=\"ln\" data-g=\"1\" data-w=\"26\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">then compare the s values.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Silver chromate ends up more <tspan class=\"vocab-term\" data-vocab-key=\"soluble\">soluble</tspan> than silver</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">chloride, even with the smaller constant.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHcAAADDCAYAAAC4Yo7pAAADHElEQVR4nO3c4Y6iMBiGUbrx/m+5G5IxMcZxiiJ8fT3n52Z2qDwUKJJZFgAAAAAAAAAAAACAz2rLwXrvfflirbXD9vlhG/r2qGdE/rccQNhz9skhcTnHx+Oateftm8sSflNRydEHutNyMHGDiRtM3GDiBrtUuWtMu4PuBZaAH5+5o9Eq7Iy9jH6WTx/QpU7LCYF7oc9wSNy0U+4eYr44WAl8/L64nPmhKp3CEg/sUtdc9iVuMHGDnfIQY9T9NdlN2TZmbrCp4n7L3fVXxmUbcYOJG0zcYOIGEzeYuMHEDSZuMHGDiRtM3GDiBhM3mLjBxA0mbjBxg4kbTNxg4gYTN1jpl9Krvz7bir8kb+a+8V70+vOV36UW90flSK8Sd5JT7CvEDeaGauPsnen0beYGEzeYuMHEDSZuMHGDWQpNvtx5RtzAqFdOy8HEDSZuMNfcG54tMw1xg4kbTNxg4gYTN5i4waxzJ13DjjBzg4kbTNxgrrk3PFtmGuIGEzeYuMHEDSZuMHGDWedOuoYdYeYGEzeYuMFccx88W16vvffPma//NtN12cwd/AJhxj9lJG4wcYOJG0zcYOIGEzeYde6NmdawI8zcYOIGEzeYuJM/YnzGDdXGwDPddJm5wcQNJm4wcYOJG0zcYJZCky5zRpi5wcQNnbUrcUMfPa7EDQ7shuqOZ8tMQdxg4gYTN5i4wcQNJm4wcYOJG0zcYOIGEzeYuMHEDSZuMHGDTRf3zC/L+0Rf1JePO8NrL63wGMvFHZkdZ8ygXnRcZeOOHPW//cyRO7L/sq13xv+VM3eLIwL3YrNxi9OvF6OzYmQn7zVL+gvbemd2x8bdO/Bv//cv7/zuimGne295yx+z7h86nZ4dbIsyA9169B99LWwbx1HhIChzQ1V557XCY3umxCBGZ+Oznbb3TG5vbEvcD++4vjH2Xr+3SthVmYGcteyZeUx/KTWYo5Y9e4+hWtSrkoPa41raXtjhr2yrathV2YHN8AiwFQ67Kj24qpFb8ahXUwyy8kOMyqYb8CMeNT429eDPWOcCAAAAAAAAAAAAAMtW/wH8qTklmPR+yQAAAABJRU5ErkJggg==\" x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Different <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> ratios: convert each Ksp to s first, then compare the solubilities</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"solubility":{"t":"Solubility","ar":"الذائبية","def":"The maximum amount of solute that can dissolve in a specific amount of solvent at a given temperature."},"soluble":{"t":"Soluble","ar":"ذائب","def":"A substance that dissolves significantly in a solvent."},"ion":{"t":"Ion","ar":"أيون","def":"An atom or molecule with a net electric charge due to the loss or gain of one or more electrons."},"molar solubility":{"t":"Molar Solubility","ar":"الذوبانية المولية (مقدار المذاب بالمولات الذي يذوب في لتر واحد من المحلول حتى يصل إلى التشبع)","def":"The number of moles of a sparingly soluble salt that dissolve in 1 litre of solution to form a saturated solution. Symbol: s, units: mol/L. Related to Ksp via the ICE table and stoichiometric coefficients."},"cation":{"t":"Cation","ar":"أيون موجب","def":"A positively charged ion."},"anion":{"t":"Anion","ar":"أيون سالب","def":"A negatively charged ion."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
