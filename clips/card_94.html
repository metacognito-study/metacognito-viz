<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Metacognito · Terms of Trade Between Two Costs</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

ont-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='12' font-weight='800' fill='var(--ink,#18213a)'>Price of a pair, measured in apples</text><line x1='60' y1='80' x2='540' y2='80' stroke='var(--ink,#18213a)' stroke-width='2'/><rect x='200' y='66' width='200' height='28' rx='6' fill='var(--correct,#0e8f86)' opacity='0.85'/><line x1='200' y1='58' x2='200' y2='102' stroke='var(--muted,#606b84)' stroke-width='1.6'/><line x1='400' y1='58' x2='400' y2='102' stroke='var(--muted,#606b84)' stroke-width='1.6'/><text x='200' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--ink,#18213a)'>0.75</text><text x='200' y='118' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>exporter floor</text><text x='400' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--ink,#18213a)'>0.80</text><text x='400' y='118' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>importer ceiling</text><circle cx='300' cy='80' r='6' fill='#fff' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='300' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>0.78 ✓ both gain</text><circle cx='480' cy='80' r='6' fill='var(--rose,#f43f61)'/><text x='480' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>0.82 ✗</text><text x='480' y='118' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--rose,#f43f61)'>importer refuses</text><rect x='60' y='138' width='480' height='62' rx='11' fill='var(--amber,#f5b526)'/><text x='300' y='160' text-anchor='middle' font-size='11.5' font-weight='800' fill='#18213a'>Inside the band, Southland earns 0.03 apples above its <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan>,</text><text x='300' y='178' text-anchor='middle' font-size='11.5' font-weight='800' fill='#18213a'>Northland pays 0.02 apples below its cost.</text><text x='300' y='195' text-anchor='middle' font-size='11' font-weight='700' fill='#18213a'>Both real gains at once are the base of voluntary <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan>.</text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The price must beat the exporter's home cost and stay under the importer's</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">home cost; only a price inside the range is accepted by both.</text></svg>"},{"at":58.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Terms of trade must lie between the two opportunity costs. The exporter must get more than its home opportunity cost to gain, and the importer must pay less than its home opportunity cost to gain. Both conditions have to hold at the same time, or one side walks away.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TWO CONDITIONS AT ONCE</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"terms of trade\">Terms of trade</tspan> must lie between the two</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">opportunity costs.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The exporter must get more than its home</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">opportunity cost</tspan> to gain, and the importer must</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pay less than its home opportunity cost to gain.</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Both conditions have to hold at the same time, or</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">one side walks away.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Exporter beats its <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan>, importer stays under its cost, together</text></svg>"},{"at":102.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student saw a price of 0.82 apples and said the exporter gains, so the deal is fine. But Northland's home cost of a pair is 0.80 apples. At 0.82, Northland pays more through trade than growing pairs itself, so it sensibly refuses. The importer's opportunity cost is the ceiling for the trade price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: ONE GAIN IS NOT ENOUGH</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"91\" fon -serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At 0.78, Southland gains 0.03 apples above its home cost and Northland pays 0.02 apples below its home cost. Both gains are real and positive. Southland in effect gets apples at a lower resource cost than growing them, and Northland gets pairs the same way. Those two gains at once are the base of voluntary trade.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TWO GAINS AT THE SAME TIME</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">At 0.78, Southland gains 0.03 apples above its home <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and Northland pays 0.02 apples below its home cost.</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Both gains are real and positive.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Southland in effect gets apples at a lower resource cost</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">than growing them, and Northland gets pairs the same</text><text class=\"ln\" data-g=\"2\" data-w=\"6\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">way.</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Those two gains at once are the base of voluntary <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A price inside the range gives both sides a real, positive gain</text></svg>"},{"at":165.18,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Terms of Trade Range</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"terms of trade\">Terms of Trade</tspan> Range</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> price must be more than the exporter's</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">opportunity cost</tspan> and fall short of the importer's</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">opportunity cost.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Those two limits set the mutually beneficial range</text><text class=\"ln\" data-g=\"1\" data-w=\"8\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">exactly.</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Terms of trade lying between the two costs is not a</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">bargaining choice, it is the requirement for trade</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">to be accepted willingly by both sides.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALMAAACECAYAAADbaxrmAAAFFUlEQVR4nO3c6a6kOAyGYTLq+79lj0qtjJiIJYtJbOd9frX6VFEhfJgQluMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgOBERA6j/jmMs9x5uxHj28J8mHMnWu/I6MRB/6fDWUemlFy0OQpx1PcuKvO5Ez1UiCjEUZDdhPmHQM8lzoL846KR3jvZEymOfJ762E1DS4SaPnU7zCgx7NAlAY54Lhsd5bBogQQIcea68VE3yiwSrM/cr8AZVXrvfgqxEtErjhYJGuIs1Mqs2HA1O87bhZ4ZoZINdvCQK/XlRpx1BVIrcBK8Gp+FXTHNDfoU4JopwqffG9k5Wo4EKXCIs/Ar2LORa8P79hsjAdI6AqQNQpxts6IjQakJxIox6chOF9F2K1zqGRo8LWPHEFlBxw/Y6eTKAzq/AyG2iTA3IMS2ub1rbjaCbB+VuQIneD5QmRtwgmcbYUYYhHkyni7/DmPmyvCNDjF2vV9ipj9Tf22z8N8FOP+/1o6CvxhmTJzKy6E9//vqs+hDmD9WBrf8W/4379Mbx+HtQeswYGTYEH0uWyYMqT6vzLnicCh9FnXYIRO3/ZL7br1UnpmV+Wo5GstaZcU2n9pRnjbSqiCXy9NcZvTCNfUEMOoJzxfr4bGvZPEReNkeb7nytLbt65Ob2vbIonnr1SH+73ePhax0wkgoZgWopTKnRc8grt5+psJjoUNqA2rtAdadQ5yZaITFDqqthCvaufIyuBjbTmdmGmKxSlt+lH92P4nhEGfmGuSl4yyYFWgxVGCemG3YD6FeGzRxVlRMN85bZVhJuGjjI8w/BHpeH4nT4uGmoRk3tNf1z+jbTj2FOHPX4AidbrF/JECfurw532tnW72dVAIE+cdtw38YctT3Uc27qD0H2W1lLjvfwx1l1qt0ch7kH/cr0FKhvc2bapKLChztyBZiJd42jJUbdFaT4O/uCLMid4G+GxPWVmlr1VyjmkqwihxizFwqD59PJzdPrwDI372qZF6e+tjxXCPUntlbTctK9bQTWDj7135wNgWp0KEq8xXtq2Dnir6qsp1/X6MNEqRChwvzLpdzNd6zkYyv47F7mEcu47Z+d7WoL47pxVtACyPVfGQ5vcq3iiYnO+IXQlXm3he3ZJpBmPpaqmIcP+t3rdm2Mo8Euea7KwKVNq/SoSrzCm+vq50d6tTwJqT8tyih37Iya1Xlr99g1Lv8dHPxaPWU4tdCVeaajWU9yHe/1yNdXPAZWX/rwqzIW+CugtE7czHrzaBaO48EDnDYynw3ZtQ4rK46odP8/fRyP4p34cL8tNHO//f18ELr5ErzSp8EHStvcQKoXYVWVbVyym1lWyzbqkN6gjBSlUsaAVx5lLAu5DBDi2aQy7+NDhnyMqIPHVqE3lNHqlTvTELNbMp52NC6/NY2yiZV+Sf8CvZs3N6prLdwPV280Aj0nR2CvPUw4y4EXwX5qyHD22+lTYIcfjajdmZAe/k9n9e4QShtFNwrW1bmp4sHPXPRWhc0NJe3o+0qs4Wpsrf2nIccrQ/j7mzLylxLs0K2hK62SlPB/2/7vVlr1uOLClobVqryX1TmG0+PIbXOPGhcIBn5zC7oiIEgnmdGWuat3z5/9V1C+47K/OLtRTA18ueZsfjW1rMZtb58PKqmolOV6zDMGFR7Eth62Xn2I1oR0EkKWk/wWoYbBLkeYZ54stjyXUIMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABwPPkX+N98r+l2JfAAAAAASUVORK5CYII=\" x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">above exporter <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> · below importer cost = both gain</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"terms of trade":{"t":"Terms of trade","ar":"شروط التبادل التجاري: سعر سلعة دولة مقابل سلعة دولة أخرى.","def":"The rate at which one country's goods can be exchanged for another country's goods."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"opportunity cost":{"t":"Opportunity cost","ar":"تكلفة الفرصة البديلة: قيمة أفضل بديل تم التنازل عنه","def":"The value of the best alternative that was not chosen when a decision was made."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
