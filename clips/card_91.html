\"44\">Same Worker, Different Costs</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='40' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>Northland out-produces Southland in BOTH goods, and yet...</text><text x='160' y='66' text-anchor='middle' font-size='11' font-weight='800' fill='var(--indigo,#5545e8)'>Northland</text><text x='480' y='66' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>Southland</text><rect x='70' y='78' width='180' height='26' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='160' y='95' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--indigo,#5545e8)'>1 grain costs 3 computers</text><rect x='390' y='78' width='180' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='480' y='95' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>1 grain costs 1 computer</text><text x='160' y='122' text-anchor='middle' font-size='9' font-weight='700' fill='var(--muted,#606b84)'>15 &#247; 5: expensive grain</text><text x='480' y='122' text-anchor='middle' font-size='9' font-weight='700' fill='var(--muted,#606b84)'>4 &#247; 4: cheap grain</text><line x1='320' y1='72' x2='320' y2='128' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><rect x='170' y='140' width='300' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='320' y='157' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>the CHEAPER grain maker wins grain: Southland</text><text x='320' y='192' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>absolute strength sets the totals; <tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">OPPORTUNITY COST</tspan> assigns the jobs</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Northland is more productive in both goods, yet its opportunity cost of grain is</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">higher, so each country has <tspan class=\"vocab-term\" data-vocab-key=\"comparative advantage\">comparative advantage</tspan> in a different good.</text></svg>"},{"at":65.95,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Absolute advantage alone does not set the gains from trade, because trade gains depend fully on the difference in opportunity costs. Northland is more productive in both goods, but its cost of grain is 3 computers per ton, while Southland grows the same ton for only 1 computer.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">COSTS, NOT OUTPUT, DECIDE</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"absolute advantage\">Absolute advantage</tspan> alone does not set the</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"gains from trade\">gains from trade</tspan>, because <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> gains depend</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fully on the difference in opportunity costs.</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Northland is more productive in both goods,</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">but its <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> of grain is 3 computers per ton,</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">while Southland grows the same ton for only 1</text><text class=\"ln\" data-g=\"1\" data-w=\"9\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">computer.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Trade gains come from the difference in opportunity costs</text></svg>"},{"at":96.64,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student said Northland should refuse trade because it makes more of everything. What does Northland give up by not trading? Without trade it must grow its own grain at 3 computers per ton. By specializing fully in computers, making 15, and swapping some for grain at a lower cost, Northland ends with more grain than it could grow itself.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: REFUSE <tspan class=\"vocab-term\" tem,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The case of equal opportunity costs also matters. If both give up two computers for each ton of grain, there is no difference in cost and no basis for specialization. Neither country has comparative advantage, total output does not rise, and neither country gains. Gains from trade need opportunity costs to differ.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHEN THERE IS NOTHING TO GAIN</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The case of equal opportunity costs also matters.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">If both give up two computers for each ton of</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">grain, there is no difference in <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> and no basis</text><text class=\"ln\" data-g=\"1\" data-w=\"19\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">for <tspan class=\"vocab-term\" data-vocab-key=\"specialization\">specialization</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Neither country has <tspan class=\"vocab-term\" data-vocab-key=\"comparative advantage\">comparative advantage</tspan>, total</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">output does not rise, and neither country gains.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"gains from trade\">Gains from trade</tspan> need opportunity costs to differ.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equal opportunity costs mean no comparative advantage and no gain</text></svg>"},{"at":167.78,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Absolute vs Comparative Advantage</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Absolute vs Comparative</tspan><tspan x=\"48\" y=\"110\">Advantage</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"gains from trade\">Gains from trade</tspan> rest fully on <tspan class=\"vocab-term\" data-vocab-key=\"comparative advantage\">comparative advantage</tspan> and</text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">different opportunity costs, not on <tspan class=\"vocab-term\" data-vocab-key=\"absolute advantage\">absolute advantage</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Absolute advantage tells you who is more productive.</text><text class=\"ln\" data-g=\"2\" data-w=\"54\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Comparative advantage tells you whether <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> can make</text><text class=\"ln\" data-g=\"2\" data-w=\"22\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">both sides better off.</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">They are different questions with different answers.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALMAAACECAYAAADbaxrmAAAFFUlEQVR4nO3c6a6kOAyGYTLq+79lj0qtjJiIJYtJbOd9frX6VFEhfJgQluMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgOBERA6j/jmMs9x5uxHj28J8mHMnWu/I6MRB/6fDWUemlFy0OQpx1PcuKvO5Ez1UiCjEUZDdhPmHQM8lzoL846KR3jvZEymOfJ762E1DS4SaPnU7zCgx7NAlAY54Lhsd5bBogQQIcea68VE3yiwSrM/cr8AZVXrvfgqxEtErjhYJGuIs1Mqs2HA1O87bhZ4ZoZINdvCQK/XlRpx1BVIrcBK8Gp+FXTHNDfoU4JopwqffG9k5Wo4EKXCIs/Ar2LORa8P79hsjAdI6AqQNQpxts6IjQakJxIox6chOF9F2K1zqGRo8LWPHEFlBxw/Y6eTKAzq/AyG2iTA3IMS2ub1rbjaCbB+VuQIneD5QmRtwgmcbYUYYhHkyni7/DmPmyvCNDjF2vV9ipj9Tf22z8N8FOP+/1o6CvxhmTJzKy6E9//vqs+hDmD9WBrf8W/4379Mbx+HtQeswYGTYEH0uWyYMqT6vzLnicCh9FnXYIRO3/ZL7br1UnpmV+Wo5GstaZcU2n9pRnjbSqiCXy9NcZvTCNfUEMOoJzxfr4bGvZPEReNkeb7nytLbt65Ob2vbIonnr1SH+73ePhax0wkgoZgWopTKnRc8grt5+psJjoUNqA2rtAdadQ5yZaITFDqqthCvaufIyuBjbTmdmGmKxSlt+lH92P4nhEGfmGuSl4yyYFWgxVGCemG3YD6FeGzRxVlRMN85bZVhJuGjjI8w/BHpeH4nT4uGmoRk3tNf1z+jbTj2FOHPX4AidbrF/JECfurw532tnW72dVAIE+cdtw38YctT3Uc27qD0H2W1lLjvfwx1l1qt0ch7kH/cr0FKhvc2bapKLChztyBZiJd42jJUbdFaT4O/uCLMid4G+GxPWVmlr1VyjmkqwihxizFwqD59PJzdPrwDI372qZF6e+tjxXCPUntlbTctK9bQTWDj7135wNgWp0KEq8xXtq2Dnir6qsp1/X6MNEqRChwvzLpdzNd6zkYyv47F7mEcu47Z+d7WoL47pxVtACyPVfGQ5vcq3iiYnO+IXQlXm3he3ZJpBmPpaqmIcP+t3rdm2Mo8Euea7KwKVNq/SoSrzCm+vq50d6tTwJqT8tyih37Iya1Xlr99g1Lv8dHPxaPWU4tdCVeaajWU9yHe/1yNdXPAZWX/rwqzIW+CugtE7czHrzaBaO4   var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"comparative advantage":{"t":"Comparative advantage","ar":"الميزة النسبية: تنتج بتكلفة فرصة أقل من غيرك.","def":"The ability to produce a good at a lower opportunity cost than another producer."},"determine":{"t":"Determine","ar":"يُحدِّد","def":"to find out or decide"},"gains from trade":{"t":"Gains from trade","ar":"مكاسب التجارة: زيادة الإنتاج والاستهلاك بسبب التجارة.","def":"The benefits that result from trade, allowing countries to consume more than they could produce alone."},"opportunity cost":{"t":"Opportunity cost","ar":"تكلفة الفرصة البديلة: قيمة أفضل بديل تم التنازل عنه","def":"The value of the best alternative that was not chosen when a decision was made."},"absolute advantage":{"t":"Absolute advantage","ar":"الميزة المطلقة: تنتج أكثر بنفس الموارد أو تنتج نفس الكمية بموارد أقل.","def":"The ability to produce a good using fewer inputs or produce more output with the same inputs than another producer."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"specialization":{"t":"Specialization","ar":"التخصص / تقسيم العمل: التركيز على إنتاج شيء واحد بكفاءة.","def":"Focusing production on a specific good or task where one has an advantage, leading to greater efficiency."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
</body>
</html>
