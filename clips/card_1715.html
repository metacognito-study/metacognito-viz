otential. Removing a reactant ion from the cathode side raises the quotient, which lowers the cell potential.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">REMOVING SHIFTS Q</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Removing an <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> shifts the <tspan class=\"vocab-term\" data-vocab-key=\"reaction quotient\">reaction quotient</tspan>,</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which then changes the cell potential.</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Removing a product ion from the <tspan class=\"vocab-term\" data-vocab-key=\"anode\">anode</tspan> side lowers</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the <tspan class=\"vocab-term\" data-vocab-key=\"quotient\">quotient</tspan>, which raises the cell potential.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Removing a reactant ion from the <tspan class=\"vocab-term\" data-vocab-key=\"cathode\">cathode</tspan> side</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">raises the quotient, which lowers the cell</text><text class=\"ln\" data-g=\"2\" data-w=\"10\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">potential.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Removing an ion shifts Q: take a product away and</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">E rises; take a reactant away and E falls</text></svg>"},{"at":49.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Tie up Copper, Drop the Potential</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Tie up Copper, Drop the Potential</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='42' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>tie up an <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> in the cell, and the <tspan class=\"vocab-term\" data-vocab-key=\"quotient\">quotient</tspan> drags the potential with it</text><rect x='48' y='62' width='176' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='136' y='79' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>remove a PRODUCT ion</text><line x1='228' y1='75' x2='246' y2='75' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='254,75 246,71 246,79' fill='var(--muted,#606b84)'/><rect x='258' y='62' width='110' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='313' y='79' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>Q falls</text><line x1='372' y1='75' x2='390' y2='75' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='398,75 390,71 390,79' fill='var(--muted,#606b84)'/><rect x='402' y='62' width='150' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='477' y='79' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--correct,#0e8f86)'>E RISES &#8593;</text><rect x='48' y='116' width='176' height='26' rx='9' fill='var(--rose,#f43f61)' fill-opacity='0.12' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='136' y='133' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>remove a REACTANT ion</text><line x1='228' y1='129' x2='246' y2='129' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='254,129 246,125 246,133' fill='var(--muted,#606b84)'/><rect x='258' y='116' width='110' height='26' rx='9' fill='var(--rose,#f43f61)' fill-opacity='0.12' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='313' y='133' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>Q rises</text><line x1='372' y1='129' x2='390' y2='129' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='398,129 390,125 390,133' fill='var(--muted,#606b84)'/><rect x='402' y='116' width='150' height='26' rx='9' fill='var(--rose,#f43f61)' fill-opacity='0.12' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='477' y='133' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--rose,#f43f61)'>E FALLS &#8595;</text><text x='320' y='172' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>tying up copper ions at the <tspan class=\"vocab-term\" data-vocab-key=\"cathode\">cathode</tspan> starves the reaction: the potential drops</text><text x='320' y='194' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>the Nernst logic: E follows Q, and Q follows what you add or remove</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Removing an ion shifts the quotient. Pulling out a product raises the potential; pulling out a reactant lowers</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">it. Adding ammonia ties up copper ions, a reactant, so the quotient rises and the potential falls.</text></svg>"},{"at":53.92,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Take copper ions tied up by adding ammonia. The copper ions are a reactant, so removing them raises the quotient and lowers the potential. So a reagent that grabs a reactant ion pulls the cell potential down.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE AMMONIA CASE</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"102\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Take copper ions tied up by adding ammonia.</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"131\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The copper ions are a reactant, so removing</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"160\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">them raises the <tspan class=\"vocab-term\" data-vocab-key=\"quotient\">quotient</tspan> and lowers the</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"189\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">potential.</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"218\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So a reagent that grabs a reactant <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan></text><text class=\"ln\" data-g=\"2\" data-w=\"30\" x=\"24\" y=\"247\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pulls the cell potential down.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Copper ions are a reactant, so tying them up with</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">ammonia raises the quotient and lowers the potential</text></svg>"},{"at":63.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Removing an Ion Shifts E</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Removing an <tspan class=\"vocab-term\" data-vocab-key=\"ion\">Ion</tspan> Shifts E</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"128\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Adding a reagent that reacts with a cell ion removes</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"147\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">that ion and shifts the <tspan class=\"vocab-term\" data-vocab-key=\"reaction quotient\">reaction quotient</tspan>, which changes</text><text class=\"ln\" data-g=\"0\" data-w=\"14\" x=\"48\" y=\"166\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the potential.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"185\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Removing a product lowers the <tspan class=\"vocab-term\" data-vocab-key=\"quotient\">quotient</tspan> and raises the</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"204\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">potential; removing a reactant raises the quotient and</text><text class=\"ln\" data-g=\"1\" data-w=\"21\" x=\"48\" y=\"223\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">lowers the potential.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"48\" y=\"242\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Tying up copper ions with ammonia removes a reactant, so</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"48\" y=\"261\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the quotient rises and the potential falls.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIMAAADTCAYAAACiE6CRAAAEBElEQVR4nO3cUW/aMBiGUTz1//9lT73gFaqAQmqcL/E5V1u1jjh+cJzQ7XIBAAAAAAAAAAAAAAA4p3ZZWO+93/t6a23J89JWnvR3tZNH0laO4NHk9o3fd3RflwW8O3ltYyRHt0QM10nc+o7uJ49gqRhWm9StTnHte/UavzWG9uL3H30vcbiD3zKhoyap7/jaM5S/TLwyAbM3fO2N1/v5tcpxlI3hiA+E2p1j+zmOv25ml4vh9gRWPGnvuD3+23F9/7ra2MrFUPmdMzqMakH8uxRy5hBG3+EssTJ8G/2OuXfCf/v7+4cnqVIEV22FTWOlD6r6hjBnKXEQ9y4Tn76bmPUAqT8ZR7XLYsnLxLNr6qhIRk9Af3H1qTLxh4rh0cl7dNJHPh3sA6/nlSf/cDF8cgJXnfTTxDBqMp6F0E4wsUvH8K5VJ/wwD51W0gs+ZxADIQZCDIQYCDHcfJx8WfxuRgyEGAgxEGIgxECIgfU+qHrl1rEv/kmmlYH1VoZn7+xqP4u4FysDIQZCDIQYCDEQYiDEwHrPGZ5Z/fnClZWBEAMhBkIMhBh20v3zOiqzMhBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIYadtII/dykGQgw76X64hcqsDIQYCDEQYiDEQIiBEAMhBkIMhBgIMRBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIQZCDIQYCDEQYthJ80/yqczKQIiBEAMhBkIMhBgIMRBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIQZCDIQYCDEQYiDEQIiBEAMhBkIMhBgIMRBiIMRAiIEQw0567/1SjBgIMRBflwWMWJJbwf+qbzQrw4Gv8aMtsTKs8K4ewcpAiGFnrdCq1SpejyudoJXGveueYYVN2ZbzsVcUX1UiuJ6A1QJpd8a9VxSt0rK49ztjtkfj3evyMW0DeTvA78GtMuFb/Dw/s1bLf3uEMOM1q+svTPDsIKbeWv4Wwor7hvbiOZlyLJ9+gS37gDOvJH3j2Gbsp0o+jv4e8HXwZwijP7l7qqRkDL/dct37c1X0Xy5x1Y53l8vEiBPx7l7iUye+Tz6OWavj1BhGD6bqRrN9cIyniOF2H3D9/azXHq1NPvbbc3eaDeS9jeFHSy98fa744dXX3hvDM9wtfGoFO+VnE89WgSonYrZ3xj3rM5upMfw2oCPflo189Pzoe08Rw5Zr4TubvyqR9IHHvMfeYfpJ3DrIT9wZvPJuHGXrOE/12cQ9o58kVnne0AaP4ZQbyGf23ECu+tplYzj75vFI49v9AP669Fc4iWc47m/lDmjGvmDrz1b8RcXJ/6n8AR5l83ikSX/ksAc+M5524AkGAAAAAAAAAAAAAIDLuv4D0oAhg/y+2NsAAAAASUVORK5CYII=\" x=\"522.5\" y=\"137.0\" width=\"86.9\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"522.5\" y=\"137.0\" width=\"86.9\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Remove a product -&gt; Q lower -&gt; E higher; remove a reactant (e.g. Cu²⁺ via ammonia) -&gt; Q higher -&gt; E lower</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"ion":{"t":"Ion","ar":"أيون","def":"An atom or molecule with a net electric charge due to the loss or gain of one or more electrons."},"solution":{"t":"Solution","ar":"محلول","def":"A homogeneous mixture of two or more substances."},"reaction quotient":{"t":"Reaction Quotient","ar":"خارج التفاعل","def":"The ratio (Q) of product to reactant concentrations at any moment; comparing Q with K predicts which way the reaction will shift."},"anode":{"t":"Anode","ar":"الأنود / المصعد (القطب الذي تحدث عليه الأكسدة «فقدان الإلكترونات»، يكون القطب السالب في الخلية الجلفانية)","def":"The electrode at which oxidation occurs (electrons are produced). In a galvanic cell the anode is the negative terminal; in an electrolytic cell the anode is the positive terminal (connected to the + side of the power supply)."},"quotient":{"t":"Quotient","ar":"خارج القسمة","def":"the result of dividing one number by another"},"cathode":{"t":"Cathode","ar":"الكاثود / المهبط (القطب الذي يحدث عليه الاختزال «كسب الإلكترونات»، يكون القطب الموجب في الخلية الجلفانية)","def":"The electrode at which reduction occurs (electrons are consumed). In a galvanic cell the cathode is the positive terminal; in an electrolytic cell the cathode is the negative terminal."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
