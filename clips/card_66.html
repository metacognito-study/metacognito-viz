<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Real Flows vs Money Flows</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you label the real flows and money flows in the two sector model?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"143\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Circular flow</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#66</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you label the real flows</tspan><tspan x=\"24\" y=\"190\">and money flows in the two</tspan><tspan x=\"24\" y=\"230\">sector model?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:36</text></svg>"},{"at":29.62,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Two Markets, Paired Arrows</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Two Markets, Paired Arrows</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><rect x='14' y='40' width='150' height='130' rx='12' fill='var(--surface-2,#eef1f8)'/><text x='89' y='100' text-anchor='middle' font-size='13' font-weight='800' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"households\">Households</tspan></text><text x='89' y='120' text-anchor='middle' font-size='10' font-weight='600' fill='var(--muted,#606b84)'>own labor, buy goods</text><rect x='436' y='40' width='150' height='130' rx='12' fill='var(--surface-2,#eef1f8)'/><text x='511' y='100' text-anchor='middle' font-size='13' font-weight='800' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"firms\">Firms</tspan></text><text x='511' y='120' text-anchor='middle' font-size='10' font-weight='600' fill='var(--muted,#606b84)'>hire, make goods</text><text x='300' y='24' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"factor market\">Factor market</tspan></text><line x1='168' y1='52' x2='432' y2='52' stroke='var(--indigo,#5545e8)' stroke-width='2.5' marker-end='url(#ah)'/><text x='300' y='48' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--indigo,#5545e8)'>real: 160 hours of labor →</text><line x1='432' y1='78' x2='168' y2='78' stroke='var(--rose,#f43f61)' stroke-width='2.5' marker-end='url(#ah2)'/><text x='300' y='95' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--rose,#f43f61)'>← money: 5,000 wage</text><text x='300' y='130' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--muted,#606b84)'>Product market</text><line x1='432' y1='142' x2='168' y2='142' stroke='var(--indigo,#5545e8)' stroke-width='2.5' marker-end='url(#ah2)'/><text x='300' y='138' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--indigo,#5545e8)'>← real: the made good</text><line x1='168' y1='166' x2='432' y2='166' stroke='var(--rose,#f43f61)' stroke-width='2.5' marker-end='url(#ah)'/><text x='300' y='183' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--rose,#f43f61)'>money: 8,000 spending →</text><defs><marker id='ah' markerWidth='7' markerHeight='7' refX='5' refY='3' orient='auto'><path d='M0 0 L6 3 L0 6 z' fill='var(--indigo,#5545e8)'/></marker><marker id='ah2' markerWidth='7' markerHeight='7' refX='5' refY='3' orient='auto'><path d='M0 0 L6 3 L0 6 z' fill='var(--rose,#f43f61)'/></marker></defs><text x='300' y='205' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--ink,#18213a)'>real flow = blue · money flow = red · always opposite</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">In each market the real flow and the money flow point opposite ways: the</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">physical thing moves one way, the payment moves back the other way.</text></svg>"},{"at":60.28,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Real flows are goods, services, and factors of production, the physical things that move. Money flows are spending, revenue, wages, rent, interest, and profit, the payments that travel with each physical flow. Every real flow has a money flow running back to pay for it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">NAME EACH KIND</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Real flows are goods, services, and factors</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">of production, the physical things that move.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Money flows are spending, <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan>, wages,</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">rent, interest, and <tspan class=\"vocab-term\" data-vocab-key=\"profit\">profit</tspan>, the payments that</text><text class=\"ln\" data-g=\"1\" data-w=\"31\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">travel with each physical flow.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Every real flow has a money flow running back</text><text class=\"ln\" data-g=\"2\" data-w=\"14\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to pay for it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Real = physical things · money = the payments that travel with them</text></svg>"},{"at":75.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Someone might label wages a real flow because labor is real and wages come from labor. That is the error. Wages are a money flow, not a real flow. The real flow is the labor itself, the hours of human effort. Wages are the payment made in return for that labor.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: LABOR IS REAL, WAGES ARE NOT</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Someone might label wages a real flow because</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">labor is real and wages come from labor.</text><text class=\"ln\" data-g=\"1\" data-w=\"18\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is the error.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Wages are a money flow, not a real flow.</text><text class=\"ln\" data-g=\"3\" data-w=\"47\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The real flow is the labor itself, the hours of</text><text class=\"ln\" data-g=\"3\" data-w=\"13\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">human effort.</text><text class=\"ln\" data-g=\"4\" data-w=\"45\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Wages are the payment made in return for that</text><text class=\"ln\" data-g=\"4\" data-w=\"6\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">labor.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The labor is the real flow; the wage paying for it is the money flow</text></svg>"},{"at":115.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Every factor of production makes a matching pair of flows: the real flow of the factor runs one way and the money payment runs the opposite way. Wage for labor, rent for land, interest for capital, and profit for entrepreneurship. On the product side, goods flow from firms to households while spending flows back from households to firms.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ONE RULE, EVERY MARKET</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Every factor of production makes a matching pair</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">of flows: the real flow of the factor runs one way</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and the money payment runs the opposite way.</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Wage for labor, rent for land, interest for</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">capital, and <tspan class=\"vocab-term\" data-vocab-key=\"profit\">profit</tspan> for entrepreneurship.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">On the product side, goods flow from <tspan class=\"vocab-term\" data-vocab-key=\"firms\">firms</tspan> to</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"households\">households</tspan> while spending flows back from</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">households to firms.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Wage for labor, rent for land, interest for capital, profit for enterprise</text></svg>"},{"at":142.4,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Real Flow vs Money Flow</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Real Flow vs Money Flow</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"128\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A real flow is a physical input, output, or service</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"48\" y=\"147\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">moving between <tspan class=\"vocab-term\" data-vocab-key=\"households\">households</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"firms\">firms</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"166\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A money flow is the payment that moves the opposite way.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"48\" y=\"185\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Label every arrow by asking one thing: is this a</text><text class=\"ln\" data-g=\"2\" data-w=\"28\" x=\"48\" y=\"204\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">physical thing or a payment?</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"48\" y=\"223\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Physical things are real flows, payments are money</text><text class=\"ln\" data-g=\"3\" data-w=\"54\" x=\"48\" y=\"242\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">flows, and the paired flows in one market always point</text><text class=\"ln\" data-g=\"3\" data-w=\"14\" x=\"48\" y=\"261\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">opposite ways.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALkAAACvCAYAAAChIn/aAAAEZklEQVR4nO3d227bOhRFUTPo//8yiwAtahSJY1sX7r00xtMBTsxY1BTN+NbbDQAAAAAAAAAAAAAAAAAAAADgWsatoTnn/PvfY4yWx8B5RufAWWc0Wlw+bo0IvI7Z6Fy0ibzTpF7FbHJO2kQO7xpdV4xn9oRdbneVY1yl/Ere5SGRuspH/pWzV5zqK9VexzSfWFDevd1KpSNfMXnVT1jV6GbheSsd+VdS943dV/PKykYu1NpGkUeQtpFXmiwXVn8lI//K0U/FfXfbsy6QLRfTllV1LLrtpSOvOEn0PoflIl+1il/Z2Hk1r6ZU5NUi7XACKxjFty2lIl95gWw9KatP6tbQRvFQIyKvtopX0CmyUfgiKRF5lckg89yWiPwrW7caWx8FOj6KHHHMc+OWp4LlkVfYplRYbVKObRTctiyPPOEiSTIKRto6coFmGsUulGWR73HQR10knS+0o45/HnS+LrddWRFX94fiqsc4Ci0USyK/wjblneO5whzMBRfc6ZHvdZBXuFBSA50nh15iu1Ipzkr3JeEYRoH78nHlVfwK+/Etx5qymi9fyStc6Vtd6WLpeI5Pi/zI1Xf1JCZfQGOn1XzlH6EfVzhR1HVGG6esgCLnkaMfiQ9fyQXOasv/8IR58EIocuL96rQH2/OZFWPVGutIVnLiiZx4IieeyIkncuKJnHgiJ97hkSe/Q5B9tH/vytEvBnhvTK85nlf4jGfliX7nd1Qd69XfkbzAnBL51jfM//Szxnr/Z1ePdcZ2ttw3aL3zM8Z6/WcqjnWUMl+s+f8VvWVSjNVjrHHSkxJlIn/F5+QY6/yxxp8o97xfe4zz4++5nWzrBN1PjLGeH6fyWEdb9hz2q5P0aGKMtWasudOn9o+29IWaZydpz39s9uyxKt6nymMdYfmrkf9PkFdIM8xC57XNi0HwLpETT+TEEznxRE48kRNvyZcLcY6fnr8eF3m6VuRhXnkVct79bHLwLSNf+bbNPRwR1NY5mX9unxh7uz1598D3PoZn38+9arwK2kXOP0fGOINCb7ldYb8/KueDcT7/X8L2JSLy6idi71Vxz0/bjB8+CJEQuu1KM9/F+BnilhjHg9t337qIPCTwvX7HCAxd5E2cEXhq6CL/5im0Dif0yL3yaL4PvyfyO1XD/up+rYpwFp2jR0RO/Gou8obOjG8EhC7y4ipuD2bB+/SIyIkncuKJvJkl30A1eu/LRU48kRNP5MQTOfFETjyRE0/kxBM58UROPJETT+TEEznxRE68iC8XurKrfDPtFlbyIN0+sXMWkTcm6ufYrtzxcJ/JSk48kRNP5MSL2JP7A4xHrOTEE3ljng0KjTzhxB51DAlzc4SWe3In8x9zEbiSw6tETjyRE0/kxBM58UROPJETT+TEEznxRE48kRNP5MQTOfFETjyRE0/kxBM58UROPJET77TPB/puFFZ9RvWUlVzgrGzDdoV4Iifeqd/ZYdvCPd8ZAwAAAAAAAAAAAAAAAAAAAMBtjd+3mWRiDkARHwAAAABJRU5ErkJggg==\" x=\"520.0\" y=\"163.5\" width=\"92.0\" height=\"87.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"163.5\" width=\"92.0\" height=\"87.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">physical thing = real flow · payment = money flow · always opposite</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"households":{"t":"Households","ar":"الأسر: الأفراد الذين يستهلكون السلع والخدمات.","def":"Households are individuals or groups of people living together who consume goods and services."},"firms":{"t":"Firms","ar":"الشركات: المنظمات التي تنتج وتبيع السلع والخدمات.","def":"Firms are organizations that produce and sell goods and services."},"factor market":{"t":"Factor market","ar":"","def":"A market where factors of production (land, labor, capital, entrepreneurship) are bought and sold."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."},"profit":{"t":"Profit","ar":"","def":"Total revenue minus total cost; the return to the entrepreneur."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
