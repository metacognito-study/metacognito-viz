ygon points='272,90 304,104 272,118' fill='var(--indigo,#5545e8)'/><rect x='322' y='58' width='250' height='98' rx='14' fill='var(--rose,#f43f61)' fill-opacity='0.1' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='447' y='84' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>whole economy (macro)</text><text x='447' y='126' text-anchor='middle' font-size='32' font-weight='800' fill='var(--rose,#f43f61)'>2,000</text><text x='447' y='148' text-anchor='middle' font-size='14' font-weight='600' fill='var(--ink,#18213a)'>jobs lost</text><text x='296' y='198' text-anchor='middle' font-size='13' font-weight='700' fill='var(--indigo,#5545e8)'>the macro outcome is the sum of many single micro choices</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">100 firms each laying off 20 workers is 2,000 jobs economy-wide: the macro figure is the sum of many single micro choices</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#38 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Positive or normative? Sort by the test</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Positive or normative? Sort by the test</tspan></text><g transform="translate(24,64)"><text x='296' y='30' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>sorting test: can evidence settle it, or does it need a value judgment?</text><rect x='12' y='46' width='280' height='206' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.06' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='152' y='76' text-anchor='middle' font-size='18' font-weight='800' fill='v  font-weight='600' fill='var(--ink,#18213a)'>the minimum wage</text><text x='440' y='222' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'><tspan font-weight='800' fill='var(--rose,#f43f61)'>SHOULD</tspan> be raised</text></g><text x="24" y="342" font-size="9" font-weight="500" fill="var(--muted,#606b84)">can evidence settle it -&gt; positive (what is); does it need a value judgment -&gt; normative (what should be)</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#44 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Same fact, different values</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Same fact, different values</tspan></text><g transform="translate(24,64)"><rect x='146' y='24' width='300' height='52' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='296' y='44' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>agreed fact (positive)</text><text x='296' y='65' text-anchor='middle' font-size='14' font-weight='800' fill='var(--ink,#18213a)'>a cigarette tax cuts smoking 12%</text><line x1='296' y1='76' x2='150' y2='115' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='296' y1='76' x2='442' y2='115' stroke='var(--muted,#606b84)' stroke-width='2'/><rect x='30' y='118' width='240' height='46' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='150' y='146' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>values public health first</text><line x1='150' y1='166' x2='150' y2='182' stroke='var(--muted,#606b84)' stroke-width='2.5'/><polygon points='150,188 144,178 156,178' fill='var(--muted,#606b84)'/><rect x='30' y='190' width='240' height='44' rx='10' fill='var(--surface,#ffffff)' stroke='var(--indigo,#5545e8)' stroke-width='2'/><text x='150' y='217' text-anchor='middle' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>backs the tax</text><rect x='322' y='118' width='240' height='46' rx='10' fill='var(--amber,#f5b526)' fill-opacity='0.12' stroke='var(--amber,#f5b526)' stroke-width='1.5'/><text x='442' y='146' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>values personal freedom first</text><line x1='442' y1='166' x2='442' y2='182' stroke='var(--muted,#606b84)' stroke-width='2.5'/><polygon points='442,188 436,178 448,178' fill='var(--muted,#606b84)'/><rect x='322' y='190' width='240' height='44' rx='10' fill='var(--surface,#ffffff)' stroke='var(--amber,#f5b526)' stroke-width='2'/><text x='442' y='217' text-anchor='middle' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>opposes the tax</text><text x='296' y='251' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>same fact, different values: a normative split, not a positive one</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">they accept the same positive fact but split on values: economics can name value questions, not settle them</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#53 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Comparing three economic systems</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Comparing three economic systems</tspan></text><g transform="translate(24,64)"><text x='100' y='42' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>Traditional</text><text x='292' y='42' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>Command</text><text x='484' y='42' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>Market</text><rect x='12' y='54' width='176' height='92' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.08' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='100' y='78' text-anchor='middle' font-size='10' font-weight='700' letter-spacing='1' fill='var(--correct,#0e8f86)'>STRENGTH</text><text x='100' y='104' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>steady through</text><text x='100' y='124' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>customs</text><rect x='204' y='54' width='176' height='92' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.08' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='292' y='78' text-anchor='middle' font-size='10' font-weight='700' letter-spacing='1' fill='var(--correct,#0e8f86)'>STRENGTH</text><text x='292' y='104' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>gathers resources</text><text x='292' y='124' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>fast</text><rect x='396' y='54' width='176' height='92' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.08' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='484' y='78' text-anchor='middle' font-size='10' font-weight='700' letter-spacing='1' fill='var(--correct,#0e8f86)'>STRENGTH</text><text x='484' y='104' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>adapts through</text><text x='484' y='124' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>prices</text><rect x='12' y='154' wi ddle' font-size='17' font-weight='800' fill='var(--correct,#0e8f86)'>POSITIVE</text><text x='440' y='92' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>benefit given to outsiders</text><rect x='324' y='102' width='232' height='38' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='440' y='126' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>school plus student</text><line x1='440' y1='146' x2='440' y2='168' stroke='var(--correct,#0e8f86)' stroke-width='3'/><polygon points='440,174 434,164 446,164' fill='var(--correct,#0e8f86)'/><text x='486' y='163' font-size='11' font-weight='700' fill='var(--correct,#0e8f86)'>+$40 benefit</text><rect x='324' y='178' width='232' height='38' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='440' y='202' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>firms that hire grads</text><rect x='324' y='224' width='232' height='30' rx='8' fill='var(--correct,#0e8f86)' fill-opacity='0.12'/><text x='440' y='243' text-anchor='middle' font-size='12' font-weight='800' fill='var(--correct,#0e8f86)'>benefit uncounted: TOO LITTLE</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">a spillover hits a third party: a cost pushes the market to make too much; a benefit leaves it making too little</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#63 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Two tests, four kinds of good</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Two tests, four kinds of good</tspan></text><g transform="translate(24,64)"><text x='215' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>can block non-payers</text><text x='215' y='54' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(excludable)</text><text x='451' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>cannot block</text><text x='451' y='54' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-excludable)</text><text x='52' y='100' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>gets used up</text><text x='52' y='116' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(rival)</text><text x='52' y='192' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>no using-up</text><text x='52' y='208' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-rival)</text><rect x='100' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Private good</text><text x='215' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a slice of pizza</text><rect x='336' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='451' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Common resource</text><text x='451' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a shared fishing ground</text><rect x='100' y='154' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='192' text-anchor='middle' font- always move in opposite directions around the loop</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#89 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Comparative advantage: lower cost wins</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Comparative advantage: lower cost wins</tspan></text><g transform="translate(24,64)"><rect x='16' y='20' width='560' height='180' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='167' y='63' width='200' height='64' rx='8' fill='var(--correct,#0e8f86)' fill-opacity='0.13' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><rect x='373' y='133' width='200' height='64' rx='8' fill='var(--correct,#0e8f86)' fill-opacity='0.13' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><line x1='164' y1='20' x2='164' y2='200' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><line x1='370' y1='20' x2='370' y2='200' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><line x1='16' y1='60' x2='576' y2='60' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><line x1='16' y1='130' x2='576' y2='130' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='90' y='45' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>Maker</text><text x='267' y='45' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>opp cost of 1 cloth</text><text x='473' y='45' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>opp cost of 1 rice</text><text x='90' y='90' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Northland</text><text x='90' y='110' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>6 cloth or 4 rice</text><text x='267' y='101' text-anchor='middle' font-size='18' font-weight='800' fill='var(--correct,#0e8f86)'>2/3 rice</text><text x='473' y='101' text-anchor='middle' font-size='18' font-weight='700' fill='var(--ink,#18213a)'>1.5 cloth</text><text x='90' y='160' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Southland</text><text x='90' y='180' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>5 cloth or 5 rice</text><text x='267' y='171' text-anchor='middle' font-size='18' font-weight='700' fill='var(--ink,#18213a)'>1 rice</text><text x='473' y='171' text-anchor='middle' font-size='18' font-weight='800' fill='var(--correct,#0e8f86)'>1 cloth</text><rect x='16' y='210' width='560' height='40' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.1' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='296' y='235' text-anchor='middle' font-size='14' font-weight='700' fill='var(--correct,#0e8f86)'>lower opportunity cost wins: Northland makes cloth, Southland makes rice</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">each maker's opportunity costs side by side: the lower cost in each column (teal) is that maker's comparative advantage</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#90 econ</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Specialize where the sacrifice is least</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Specialize where the sacrifice is least</tspan></text><g transform="translate(24,64)"><text x='296' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>opportunity cost of 1 fish: wheat given up</text><text x='24' y='110' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>Northland</text><rect x='150' y='94' width='300' height='26' rx='7' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='150' y='94' width='12' height='26' rx='7' fill='var(--correct,#0e8f86)'/><text x='172' y='112' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>0.2 wheat</text><text x='462' y='112' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>&#8594; makes FISH</text><text x='24' y='184' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>Southland</text><rect x='150' y='168' width='300' height='26' rx='7' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='150' y='168' width='300' height='26' rx='7' fill='var(--rose,#f43f61)'/><text x='300' y='186' text-anchor='middle' font-size='13' font-weight='800' fill='#fff'>5 wheat</text><text x='462' y='186' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>&#8594; makes WHEAT</text><text x='296' y='236' text-anchor='middle' font-size='13' font-weight='700' fill='var(--indigo,#5545e8)'>lowest sacrifice wins: focus there for the most total output</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">specialize in the good you give up least to make: Northland sacrifices only 0.2 wheat per fish, Southland 5, so Northland takes fish</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#270 chem</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Mass spectrum: count the peaks</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Mass spectrum: count the peaks</tspan></text><g transform="translate(24,64)"><text x='74' y='26' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>relative abundance</text><line x1='70' y1='32' x2='70' y2='232' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='70' y1='232' x2='566' y2='232' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='318' y='254' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>mass (m/z)</text><rect x='150' y='98' width='16' height='134' rx='3' fill='var(--indigo,#5545e8)'/><text x='158' y='90' text-anchor='middle' font-size='11' font-weight='700' fill='var(--indigo,#5545e8)'>isotope 1</text><rect x='292' y='60' width='16' height='172' rx='3' fill='var(--indigo,#5545e8)'/><text x='300' y='52' text-anchor='middle' font-size='11' font-weight='700' fill='var(--indigo,#5545e8)'>isotope 2</text><rect x='434' y='150' width='16' height='82' rx='3' fill='var(--indigo,#5545e8)'/><text x='442' y='142' text-anchor='middle' font-size='11' font-weight='700' fill='var(--indigo,#5545e8)'>isotope 3</text><rect x='372' y='74' width='188' height='30' rx='15' fill='var(--correct,#0e8f86)' fill-opacity='0.12'/><text x='466' y='94' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>3 peaks = 3 isotopes</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">the number of peaks is the number of isotopes; a peak's height shows how common that isotope is, but you count peaks, not heights</text></svg></div><div style="width:460px;margin:5px"><b style="color:var(--muted)">#300 chem</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Conservation of mass</title><rect x="1" y="1" width="638" height=
