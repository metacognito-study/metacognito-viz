<!doctype html><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}body{background:#fff;margin:0}svg{width:100%}</style><div style="width:900px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Why you can't be cheapest at both</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Why you can't be cheapest at both</tspan></text><g transform="translate(24,64)"><text x='296' y='34' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>for one maker, the two opportunity costs are reciprocals (they multiply to 1)</text><rect x='96' y='48' width='400' height='42' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='296' y='75' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>cost of A  x  cost of B  =  1</text><rect x='40' y='112' width='200' height='62' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.1' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='140' y='140' text-anchor='middle' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)'>LOWER cost in A</text><text x='140' y='162' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>you win good A</text><text x='296' y='148' text-anchor='middle' font-size='26' font-weight='800' fill='var(--muted,#606b84)'>&#8594;</text><text x='296' y='168' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>forces</text><rect x='352' y='112' width='200' height='62' rx='10' fill='var(--rose,#f43f61)' fill-opacity='0.1' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='452' y='140' text-anchor='middle' font-size='14' font-weight='800' fill='var(--rose,#f43f61)'>HIGHER cost in B</text><text x='452' y='162' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>you lose good B</text><rect x='46' y='190' width='500' height='44' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='296' y='217' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>advantages SPLIT (one each) or TIE, never both to one maker</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">for one maker the two opportunity costs are reciprocals, so a low cost in one good forces a high cost in the other: no one is cheapest at both</text></svg></div>
