<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you write the net ionic equation for an acid base neutralization? Take a strong acid like hydrochloric acid reacting with a strong base like sodium hydroxide.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"242\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Neutralization net ionic</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#589</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you write the net ionic</tspan><tspan x=\"24\" y=\"190\">equation for an <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan> <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan></tspan><tspan x=\"24\" y=\"230\">neutralization? Take a strong</tspan><tspan x=\"24\" y=\"270\">acid like hydrochloric acid</tspan><tspan x=\"24\" y=\"310\">reacting with a <tspan class=\"vocab-term\" data-vocab-key=\"strong base\">strong base</tspan></tspan><tspan x=\"24\" y=\"350\">like sodium hydroxide.</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:25</text></svg>"},{"at":17.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>First split the strong acid and base into their ions in water, then cancel the spectator ions. Spectators are the ions that float through unchanged, the same before and after.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">STEP ONE</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">First split the <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">into their ions in water, then</text><text class=\"ln\" data-g=\"0\" data-w=\"26\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">cancel the <tspan class=\"vocab-term\" data-vocab-key=\"spectator\">spectator</tspan> ions.</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"spectators\">Spectators</tspan> are the ions that float</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">through unchanged, the same before</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and after.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Split into ions, then cancel the spectators</text></svg>"},{"at":26.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The spectators are the sodium ion, charge 1 plus, and the chloride ion, charge 1 minus. Both start and end as free ions in water, so neither one truly takes part in the reaction.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE <tspan class=\"vocab-term\" data-vocab-key=\"spectators\">SPECTATORS</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The spectators are the sodium <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan>,</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">charge 1 plus, and the chloride ion,</text><text class=\"ln\" data-g=\"0\" data-w=\"15\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">charge 1 minus.</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Both start and end as free ions in</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">water, so neither one truly takes</text><text class=\"ln\" data-g=\"1\" data-w=\"21\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">part in the reaction.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Spectators: Na⁺ and Cl⁻, free ions before and after</text></svg>"},{"at":42.14,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Cancel the Spectators</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Cancel the <tspan class=\"vocab-term\" data-vocab-key=\"spectators\">Spectators</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>Spectators struck out, only the real reaction remains</text><rect x='40' y='34' width='240' height='40' rx='9' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='160' y='59' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)'>Na⁺</text><line x1='118' y1='54' x2='202' y2='54' stroke='var(--rose,#f43f61)' stroke-width='2.4'/><rect x='320' y='34' width='240' height='40' rx='9' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='440' y='59' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)'>Cl⁻</text><line x1='398' y1='54' x2='482' y2='54' stroke='var(--rose,#f43f61)' stroke-width='2.4'/><text x='300' y='98' text-anchor='middle' font-size='10' font-weight='800' fill='var(--rose,#f43f61)'>spectators cancel out</text><rect x='70' y='114' width='460' height='62' rx='12' fill='var(--indigo,#5545e8)' fill-opacity='0.14' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='300' y='136' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"net ionic equation\">net ionic equation</tspan></text><text x='300' y='162' text-anchor='middle' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>H⁺ + OH⁻ → H₂O (<tspan class=\"vocab-term\" data-vocab-key=\"liquid\">liquid</tspan>)</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Strike out the sodium and chloride ions, since they pass through unchanged. What is</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">left is the hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> joining the <tspan class=\"vocab-term\" data-vocab-key=\"hydroxide ion\">hydroxide ion</tspan> to form liquid water.</text></svg>"},{"at":64.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Does this change for other strong acids and bases? No. For any strong acid with any strong base, the same hydrogen ion plus hydroxide ion makes water. The spectators just differ.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ALWAYS THE SAME</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Does this change for other strong acids and</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">bases?</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">No.</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">For any <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> with any <tspan class=\"vocab-term\" data-vocab-key=\"strong base\">strong base</tspan>,</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the same hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> plus <tspan class=\"vocab-term\" data-vocab-key=\"hydroxide ion\">hydroxide ion</tspan></text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">makes water.</text><text class=\"ln\" data-g=\"3\" data-w=\"27\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"spectators\">spectators</tspan> just differ.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Same H⁺ + OH⁻ → water for every strong acid and <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan></text></svg>"},{"at":75.9,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Neutralization Net Ionic Equation</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Neutralization Net Ionic</tspan><tspan x=\"48\" y=\"110\">Equation</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Split the <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> into ions, cancel the</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"spectator\">spectator</tspan> ions like sodium and chloride, and what</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">remains is the hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> joining the hydroxide</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">ion to form water.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">This holds for every strong acid with <tspan class=\"vocab-term\" data-vocab-key=\"strong base\">strong base</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHcAAADDCAYAAAC4Yo7pAAADHElEQVR4nO3c4Y6iMBiGUbrx/m+5G5IxMcZxiiJ8fT3n52Z2qDwUKJJZFgAAAAAAAAAAAACAz2rLwXrvfflirbXD9vlhG/r2qGdE/rccQNhz9skhcTnHx+Oateftm8sSflNRydEHutNyMHGDiRtM3GDiBrtUuWtMu4PuBZaAH5+5o9Eq7Iy9jH6WTx/QpU7LCYF7oc9wSNy0U+4eYr44WAl8/L64nPmhKp3CEg/sUtdc9iVuMHGDnfIQY9T9NdlN2TZmbrCp4n7L3fVXxmUbcYOJG0zcYOIGEzeYuMHEDSZuMHGDiRtM3GDiBhM3mLjBxA0mbjBxg4kbTNxg4gYTN1jpl9Krvz7bir8kb+a+8V70+vOV36UW90flSK8Sd5JT7CvEDeaGauPsnen0beYGEzeYuMHEDSZuMHGDWQpNvtx5RtzAqFdOy8HEDSZuMNfcG54tMw1xg4kbTNxg4gYTN5i4waxzJ13DjjBzg4kbTNxgrrk3PFtmGuIGEzeYuMHEDSZuMHGDWedOuoYdYeYGEzeYuMFccx88W16vvffPma//NtN12cwd/AJhxj9lJG4wcYOJG0zcYOIGEzeYde6NmdawI8zcYOIGEzeYuJM/YnzGDdXGwDPddJm5wcQNJm4wcYOJG0zcYJZCky5zRpi5wcQNnbUrcUMfPa7EDQ7shuqOZ8tMQdxg4gYTN5i4wcQNJm4wcYOJG0zcYOIGEzeYuMHEDSZuMHGDTRf3zC/L+0Rf1JePO8NrL63wGMvFHZkdZ8ygXnRcZeOOHPW//cyRO7L/sq13xv+VM3eLIwL3YrNxi9OvF6OzYmQn7zVL+gvbemd2x8bdO/Bv//cv7/zuimGne295yx+z7h86nZ4dbIsyA9169B99LWwbx1HhIChzQ1V557XCY3umxCBGZ+Oznbb3TG5vbEvcD++4vjH2Xr+3SthVmYGcteyZeUx/KTWYo5Y9e4+hWtSrkoPa41raXtjhr2yrathV2YHN8AiwFQ67Kj24qpFb8ahXUwyy8kOMyqYb8CMeNT429eDPWOcCAAAAAAAAAAAAAMtW/wH8qTklmPR+yQAAAABJRU5ErkJggg==\" x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">H⁺ + OH⁻ → H₂O</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"strong base":{"t":"Strong base","ar":"قاعدة قوية","def":"A base that completely dissociates into ions in aqueous solution."},"strong acid":{"t":"Strong acid","ar":"حمض قوي","def":"An acid that completely dissociates into ions in aqueous solution."},"spectator":{"t":"Spectator","ar":"متفرِّج","def":"present but takes no part in the reaction"},"spectators":{"t":"Spectator","ar":"متفرِّج","def":"present but takes no part in the reaction"},"ion":{"t":"Ion","ar":"أيون","def":"An atom or molecule with a net electric charge due to the loss or gain of one or more electrons."},"net ionic equation":{"t":"Net ionic equation","ar":"معادلة أيونية نهائية","def":"A chemical equation that shows only the ions and molecules directly involved in the chemical reaction, excluding spectator ions."},"liquid":{"t":"Liquid","ar":"سائل","def":"A state of matter in which particles are close together with some intermolecular forces, can slide past each other, and take the shape of their container while maintaining a definite volume. Liquids are nearly incompressible."},"hydroxide ion":{"t":"Hydroxide ion","ar":"أيون الهيدروكسيد","def":"The OH⁻ ion, which is responsible for the basic properties of a solution."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
