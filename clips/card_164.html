        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }

dth='1' stroke-dasharray='4 4'/><circle cx='242.1' cy='100' r='4.5' fill='var(--ink,#18213a)'/><circle cx='242.1' cy='145' r='4.5' fill='var(--ink,#18213a)'/><text x='86' y='103' text-anchor='end' font-size='9' font-weight='800' fill='var(--correct,#0e8f86)'>11.00</text><text x='86' y='148' text-anchor='end' font-size='9' font-weight='800' fill='var(--indigo,#5545e8)'>9.50</text><line x1='258' y1='100' x2='258' y2='145' stroke='var(--rose,#f43f61)' stroke-width='6' stroke-linecap='round' opacity='0.55'/><text x='268' y='126' text-anchor='start' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>wedge 1.50</text><text x='242.1' y='177' text-anchor='middle' font-size='8.5' font-weight='800' fill='var(--muted,#606b84)'>new quantity</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A 1.50 <tspan class=\"vocab-term\" data-vocab-key=\"tax on sellers\">tax on sellers</tspan> shifts supply up by 1.50. The new price splits: <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> pay</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">11.00, sellers keep 9.50, and the wedge between them is exactly the 1.50 tax.</text></svg>"},{"at":49.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>When a per unit tax lands on sellers, the supply curve shifts up by the amount of the tax. The shift shows that sellers now need a higher market price to supply any given quantity. That is because 1.50 of each sale goes to the government, so sellers must collect 1.50 more per pizza just to keep their old take home.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHICH CURVE, WHICH WAY</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When a per unit <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> lands on <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan>, the <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">curve shifts up by the amount of the tax.</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The shift shows that sellers now need a higher</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">market price to supply any given quantity.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is because 1.50 of each sale goes to the</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">government, so sellers must collect 1.50 more per</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pizza just to keep their old take home.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"tax on sellers\">Tax on sellers</tspan> shifts supply UP by the tax:</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">1.50 of each sale goes to the government</text></svg>"},{"at":66.26,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student shifted the demand curve left when the tax landed on sellers. But the demand curve shows buyer behavior. A tax on sellers raises seller costs, not buyer willingness to pay, so the supply curve shifts, not the demand curve. The demand curve stays fixed because buyers willingness to pay for pizza has not changed. Demand shifts only when something changes on the buyers side.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: <tspan class=\"vocab-term\" data-vocab-key=\"demand\">DEMAND</tspan> DOES NOT MOVE</text><text class=\"ln\" data-g=\"0\" data-w=\"59\" x=\"24\" y=\"94\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student shifted the <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> left when the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> landed</text><text class=\"ln\" data-g=\"0\" data-w=\"11\" x=\"24\" y=\"114\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">on <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"134\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But the demand curve shows buyer behavior.</text><text class=\"ln\" data-g=\"2\" data-w=\"59\" x=\"24\" y=\"154\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A <tspan class=\"vocab-term\" data-vocab-key=\"tax on sellers\">tax on sellers</tspan> raises seller costs, not buyer willingness</text><text class=\"ln\" data-g=\"2\" data-w=\"57\" x=\"24\" y=\"174\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to pay, so the <tspan class=\"vocab-term\" data-vocab-key=\"supply curve\">supply curve</tspan> shifts, not the demand curve.</text><text class=\"ln\" data-g=\"3\" data-w=\"58\" x=\"24\" y=\"194\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The demand curve stays fixed because <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> willingness to</text><text class=\"ln\" data-g=\"3\" data-w=\"30\" x=\"24\" y=\"214\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pay for pizza has not changed.</text><text class=\"ln\" data-g=\"4\" data-w=\"55\" x=\"24\" y=\"234\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Demand shifts only when something changes on the buyers</text><text class=\"ln\" data-g=\"4\" data-w=\"6\" x=\"24\" y=\"254\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">side.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Sellers tax raises sellers costs, so <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> shifts; demand stays fixed</text></svg>"},{"at":99.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Another student said sellers bear the whole tax because sellers send it to the government. But sellers get only 9.50 instead of the old 10, so sellers bear just 0.50. Buyers pay 11 instead of 10, so buyers bear 1.00. The 0.50 seller burden plus the 1.00 buyer burden add up to 1.50, the full per unit tax. Who sends the tax is a legal question; who really bears it depends on how much each side's price changes.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: WHO REMITS IS NOT WHO BEARS</text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Another student said <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> bear the whole <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> because</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sellers send it to the government.</text><text class=\"ln\" data-g=\"1\" data-w=\"51\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But sellers get only 9.50 instead of the old 10, so</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sellers bear just 0.50.</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"buyers\">Buyers</tspan> pay 11 instead of 10, so buyers bear 1.00.</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The 0.50 seller burden plus the 1.00 buyer burden add up</text><text class=\"ln\" data-g=\"3\" data-w=\"31\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to 1.50, the full per unit tax.</text><text class=\"ln\" data-g=\"4\" data-w=\"55\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Who sends the tax is a legal question; who really bears</text><text class=\"ln\" data-g=\"4\" data-w=\"49\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it depends on how much each side's price changes.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Seller burden 0.50 + buyer burden 1.00 = 1.50; remitting is not bearing</text></svg>"},{"at":148.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Per Unit Tax on Sellers</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Per Unit <tspan class=\"vocab-term\" data-vocab-key=\"tax on sellers\">Tax on Sellers</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"128\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A per unit tax on sellers shifts the <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"27\" x=\"48\" y=\"151\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">curve up by the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> amount.</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"48\" y=\"174\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">It drives a price wedge between what <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan></text><text class=\"ln\" data-g=\"1\" data-w=\"26\" x=\"48\" y=\"197\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">pay and what <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> keep.</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"48\" y=\"220\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The burden splits between the two sides by</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"48\" y=\"243\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">their price responses, not by who hands over</text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"48\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the payment.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIgAAACrCAYAAAC9gtTKAAAFkUlEQVR4nO2c65LbMAiFTWff/5XpZKdp02wS2zKXA5zvd2wDPpElBNo2QgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYQQQuoh2zBUVa/eQ0TGxK2VoxYv3wppIqKSTiAJobtwShhbWRDVBQNrXKQoPr0kBbEjCyiDOkwg1UhQ2X7cgTBiNajWQXy0w/PelYRS5t/mFagjNkjis71t2H1uxkOPBsYzKGj/aAWIycvnbcHsBcI7AFfnCBLwgrJj9MivLZBPjt+czv7eoiA7sQhdWUU96J1TkaJYsUGfrskQcWbsZIo4kOyoZHuaQLJeCupkEDWOX1sCiMFH/LQ8c7Mhetvh17R9lNUXrX/YhhG6ikFbJayIRcFE4m1PyicGiVciQRNBpl1pSR+Eb3qlSbbu5JDajSB3hxECjZKUQrQhPW0cKZKKW/GaHD+IOUjUaJKxTFwByUaIEWT6Ti6yXSkCWfknT68H+RS3lp+Yu1NHg+SV2Xy8j2dFGeoIAT8HOSsUz+Wz5YvQBvW13zZEPOTsvz9qknb2BWiAXWdjM343F2lG78WVWLQVyPfDG+yFrGDpdwuBRDiIKhwx8G9sRVmFHAO6zS1GkAr9H0goULxgM6nTxKKgOZLxmdRqI4Uyk1qnRrTLKDEqk/p4zyzUqayAFWU710xA3sQl6w+RPklFSbtnIQdebmavbrpAUPdEvBAHX9sLxMJRRNFIkD9jBIJeUYZWQNRWIGfzINmrEk/OxoF5kBd4V3pFogujBPMgFxJmz/dBQkE/ZaUEcjVhlr0U1ORd4vJ7MVfS5IgrE7R8SMvzQW6OHnEMIdXsBcLnY0RFWQXRiJOPYyrKKs0P0HxoOQepPux6g5QjGplJRUUBcyTMpCajzKTaZlIfr62IAo4S0ImylQRZhWyqOvTmsqJs5xorkMsKZCEu7XZzLaupOiAXq+raCmTFwQ6CEWN/2wvkqqPIopEAn8YIBPF0n2hbUeL1994beB4EaWXixZlYjMqDTMuB3KnUdvrVIQeCLBot3ryenij7dNJglTZMNZ7fsKKMFWU/WI1JS4FM66bzPKesrUCmVJNVryqDKBiqlPdA82OEQJBm7SgoSMwgZ/hThaKAsYLPpN5/vzVFWVH2GlaUHSfTX5iCoQ59rM9Y+8SCIefVh2UgNdhOnlG2cG0n5EIcWgtkavmhGPo7QiCdU/Di7NMogVg7HiEgSbaznUBW6kAQVylXWfF/TB7kbMKsei5Ei/Yof1UtFkLurlOHr   var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"tax on sellers":{"t":"Tax on sellers","ar":"ضريبة على البائعين: تُجبى مباشرة من البائع","def":"A tax legally imposed on the seller of a good or service."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"supply curve":{"t":"Supply curve","ar":"منحنى العرض: رسم بياني للسعر والكمية المعروضة","def":"A graph showing the relationship between the price of a good and the quantity producers are willing and able to sell."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
