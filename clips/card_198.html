  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }

  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }

  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }

  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }

  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you calculate deadweight loss from the tax and the lost quantity?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"143\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"cost\">Cost</tspan> of a <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#198</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you calculate deadweight</tspan><tspan x=\"24\" y=\"190\">loss from the tax and the lost</tspan><tspan x=\"24\" y=\"230\">quantity?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 3:24</text></svg>"},{"at":20.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Deadweight loss equals one half times the tax gap times the drop in quantity. That is one half times 5 times 300 bags, which equals 750. The 300 bag drop is the number of trades that helped both sides and now no longer happen because of the tax. The lost quantity equals the old equilibrium quantity minus the after tax quantity, and the one half appears because the deadweight loss region is a triangle, not a rectangle.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRIANGLE FORMULA</text><text class=\"ln\" data-g=\"0\" data-w=\"59\" x=\"24\" y=\"104\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">Deadweight loss</tspan> equals one half times the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> gap times the</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"24\" y=\"124\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">drop in quantity.</text><text class=\"ln\" data-g=\"1\" data-w=\"58\" x=\"24\" y=\"144\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is one half times 5 times 300 bags, which equals 750.</text><text class=\"ln\" data-g=\"2\" data-w=\"57\" x=\"24\" y=\"164\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The 300 bag drop is the number of trades that helped both</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"24\" y=\"184\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sides and now no longer happen because of the tax.</text><text class=\"ln\" data-g=\"3\" data-w=\"59\" x=\"24\" y=\"204\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The lost quantity equals the old <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium quantity\">equilibrium quantity</tspan> minus</text><text class=\"ln\" data-g=\"3\" data-w=\"60\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the after tax quantity, and the one half appears because the</text><text class=\"ln\" data-g=\"3\" data-w=\"54\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">deadweight loss region is a triangle, not a rectangle.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> = ½ × tax gap × drop in quantity = ½ × 5 × 300 = 750</text></svg>"},{"at":55.92,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student worked out the deadweight loss as 5 times 900, getting 4500. He said deadweight loss equals the tax gap times the quantity sold. But that gives the area of a rectangle using the traded quantity, and that rectangle is revenue. Deadweight loss is a triangle over the lost trades, not over the trades that remain. The formula needs one half times the gap times the drop in quantity, not the after tax quantity.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: THAT IS <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">REVENUE</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"84\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student worked out the <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> as 5 times 900,</text><text class=\"ln\" data-g=\"0\" data-w=\"13\" x=\"24\" y=\"104\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">getting 4500.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"124\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">He said deadweight loss equals the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> gap times the</text><text class=\"ln\" data-g=\"1\" data-w=\"14\" x=\"24\" y=\"144\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity sold.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"24\" y=\"164\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But that gives the area of a rectangle using the traded</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"184\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity, and that rectangle is revenue.</text><text class=\"ln\" data-g=\"3\" data-w=\"60\" x=\"24\" y=\"204\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Deadweight loss is a triangle over the lost trades, not over</text><text class=\"ln\" data-g=\"3\" data-w=\"23\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the trades that remain.</text><text class=\"ln\" data-g=\"4\" data-w=\"58\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The formula needs one half times the gap times the drop in</text><text class=\"ln\" data-g=\"4\" data-w=\"37\" x=\"24\" y=\"264\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity, not the after tax quantity.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">5 × 900 = 4500 is revenue; <tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> is the triangle over the lost 300</text></svg>"},{"at":98.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Two Quantities, Two Formulas</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Two Quantities, Two Formulas</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='70' y1='28' x2='70' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='70' y1='190' x2='560' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='300' y='208' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>quantity (bags)</text><text x='30' y='108' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 30 108)'>price ($)</text><rect x='70' y='86' width='263' height='30' fill='var(--amber,#f5b526)' opacity='0.28'/><polygon points='333,86 333,116 420,100' fill='var(--rose,#f43f61)' opacity='0.36'/><line x1='70' y1='45' x2='420' y2='100' stroke='var(--correct,#0e8f86)' stroke-width='2.6'/><text x='426' y='102' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'><tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan></text><line x1='70' y1='165' x2='420' y2='100' stroke='var(--indigo,#5545e8)' stroke-width='2.6'/><text x='426' y='150' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><line x1='333' y1='86' x2='333' y2='190' stroke='var(--muted,#606b84)' stroke-width='1.1' stroke-dasharray='4 3'/><line x1='420' y1='100' x2='420' y2='190' stroke='var(--muted,#606b84)' stroke-width='1.1' stroke-dasharray='4 3'/><circle cx='420' cy='100' r='4.2' fill='var(--ink,#18213a)'/><text x='333' y='204' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>900</text><text x='420' y='204' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>1200</text><text x='185' y='105' text-anchor='middle' font-size='9' font-weight='800' fill='#18213a'><tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan>: 5 × 900</text><text x='474' y='80' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'><tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> 750</text><text x='474' y='94' text-anchor='middle' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>½ × 5 × 300</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> gap is 5; the market still clears at 900 bags. Revenue is the rectangle on the 900 traded</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">bags; <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> is the rose triangle over the 300 lost bags, out to the old 1200.</text></svg>"},{"at":113.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student noted that under a price ceiling with a shortage of 300 units, the deadweight loss formula looks the same: one half times the gap times 300. But under this tax, quantity demanded equals quantity supplied at 900, so there is no shortage. The 300 unit loss is a drop from equilibrium, not a gap between quantity demanded and quantity supplied. Under a tax the market still clears at the new equilibrium.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"tax\">TAX</tspan> VERSUS CEILING: SAME FORMULA, DIFFERENT CAUSE</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student noted that under a <tspan class=\"vocab-term\" data-vocab-key=\"price ceiling\">price ceiling</tspan> with a</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan> of 300 units, the <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> formula looks</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the same: one half times the gap times 300.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But under this tax, <tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> equals quantity</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">supplied at 900, so there is no shortage.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The 300 unit loss is a drop from <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan>, not a gap</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">between quantity demanded and <tspan class=\"vocab-term\" data-vocab-key=\"quantity supplied\">quantity supplied</tspan>.</text><text class=\"ln\" data-g=\"3\" data-w=\"46\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Under a tax the market still clears at the new</text><text class=\"ln\" data-g=\"3\" data-w=\"12\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">equilibrium.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Under a tax Qd = Qs at the new equilibrium; the 300 is a drop, not a shortage</text></svg>"},{"at":161.8,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The cause of the lost trades differs even when the numbers match. Under a tax the deadweight loss base is the distance from the after tax quantity to the original equilibrium. Under a price ceiling the base can equal the shortage, but only because the shortage happens to equal the quantity drop. Deadweight loss rises with both the size of the gap and the number of lost trades.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY THE BASE MATTERS</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The cause of the lost trades differs even when the</text><text class=\"ln\" data-g=\"0\" data-w=\"14\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">numbers match.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Under a <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> the <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> base is the distance</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">from the after tax quantity to the original <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"54\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Under a <tspan class=\"vocab-term\" data-vocab-key=\"price ceiling\">price ceiling</tspan> the base can equal the <tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan>,</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">but only because the shortage happens to equal the</text><text class=\"ln\" data-g=\"2\" data-w=\"14\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity drop.</text><text class=\"ln\" data-g=\"3\" data-w=\"55\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Deadweight loss rises with both the size of the gap and</text><text class=\"ln\" data-g=\"3\" data-w=\"26\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the number of lost trades.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Tax base = drop to equilibrium; ceiling</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">base = shortage; they can match by coincidence</text></svg>"},{"at":186.04,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Deadweight Loss from a Tax</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">Deadweight Loss</tspan> from a</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"tax\">Tax</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Deadweight loss from a tax equals one half times the tax</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">gap times the drop in quantity traded.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The after tax quantity is used for <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan>, while the</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">drop from <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> is used for deadweight loss: they</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">are two different quantities for two different formulas.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">It is the total welfare loss from trades that would have</text><text class=\"ln\" data-g=\"2\" data-w=\"31\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">helped both <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIgAAACrCAYAAAC9gtTKAAAFkUlEQVR4nO2c65LbMAiFTWff/5XpZKdp02wS2zKXA5zvd2wDPpElBNo2QgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYQQQuoh2zBUVa/eQ0TGxK2VoxYv3wppIqKSTiAJobtwShhbWRDVBQNrXKQoPr0kBbEjCyiDOkwg1UhQ2X7cgTBiNajWQXy0w/PelYRS5t/mFagjNkjis71t2H1uxkOPBsYzKGj/aAWIycvnbcHsBcI7AFfnCBLwgrJj9MivLZBPjt+czv7eoiA7sQhdWUU96J1TkaJYsUGfrskQcWbsZIo4kOyoZHuaQLJeCupkEDWOX1sCiMFH/LQ8c7Mhetvh17R9lNUXrX/YhhG6ikFbJayIRcFE4m1PyicGiVciQRNBpl1pSR+Eb3qlSbbu5JDajSB3hxECjZKUQrQhPW0cKZKKW/GaHD+IOUjUaJKxTFwByUaIEWT6Ti6yXSkCWfknT68H+RS3lp+Yu1NHg+SV2Xy8j2dFGeoIAT8HOSsUz+Wz5YvQBvW13zZEPOTsvz9qknb2BWiAXWdjM343F2lG78WVWLQVyPfDG+yFrGDpdwuBRDiIKhwx8G9sRVmFHAO6zS1GkAr9H0goULxgM6nTxKKgOZLxmdRqI4Uyk1qnRrTLKDEqk/p4zyzUqayAFWU710xA3sQl6w+RPklFSbtnIQdebmavbrpAUPdEvBAHX9sLxMJRRNFIkD9jBIJeUYZWQNRWIGfzINmrEk/OxoF5kBd4V3pFogujBPMgFxJmz/dBQkE/ZaUEcjVhlr0U1ORd4vJ7MVfS5IgrE7R8SMvzQW6OHnEMIdXsBcLnY0RFWQXRiJOPYyrKKs0P0HxoOQepPux6g5QjGplJRUUBcyTMpCajzKTaZlIfr62IAo4S0ImylQRZhWyqOvTmsqJs5xorkMsKZCEu7XZzLaupOiAXq+raCmTFwQ6CEWN/2wvkqqPIopEAn8YIBPF0n2hbUeL1994beB4EaWXixZlYjMqDTMuB3KnUdvrVIQeCLBot3ryenij7dNJglTZMNZ7fsKKMFWU/WI1JS4FM66bzPKesrUCmVJNVryqDKBiqlPdA82OEQJBm7SgoSMwgZ/hThaKAsYLPpN5/vzVFWVH2GlaUHSfTX5iCoQ59rM9Y+8SCIefVh2UgNdhOnlG2cG0n5EIcWgtkavmhGPo7QiCdU/Di7NMogVg7HiEgSbaznUBW6kAQVylXWfF/TB7kbMKsei5Ei/Yof1UtFkLurlOHrrqxArE8p2z12ncvQ4MnwCuiaLkXM7FZ6h0WcWg3Se3cKLWHh89tBVIp/X2WSL9aCyR6UlZpAqkAsYMRCNrsPRMFihnUKuY5OJPEokCfR2iBdEqOVRQEhEDOlhx2EIwazX2ihQXfvI3ccln1iIlSezFega0yhO+RPUq2aN7uhgA1b7sL5EqLwySxCOh8is3biYhBDMpv1t1g8/bm4mvEqAORMkY4CM4KCfal9QhS5TucAUrM4PZipgtFgfZhvu+/OcNjMPfhMZgv4DGY58jyG6LksFKNxhms/cooOWyTSe10zJUEN7V/tMX7AWzePgabtz8ZMfDcVDH0ub1ArM8ORUPYvI3ZchgpHkm0t51AeIjdP3iI3Rt4iN1xxlaUrVaVZe1snqFLbiddIFblh5GpewU6aK/8XszVT0SFVUrmkrelQDovaY9g6XsLgXg7iCwccfSvTUVZZg9LlUPsUPt+QmfJ2WnjKmhymeF/z9oSoFB+glpAlfYSkPYbstACMUgPOuL+gxda0FeYIFtNJhGEo418STegwi6sgtkTCZQx1XIcXUXxCKxhnQUjwIJ4poyhFYUjhYTwjvIOZIlIGrx8QgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYSQrS6/AWx7eTb+IAM2AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"169.2\" width=\"92.0\" height=\"115.7\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"169.2\" width=\"92.0\" height=\"115.7\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> = ½ × tax gap × drop in quantity (use the drop, not the traded quantity)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"equilibrium quantity":{"t":"Equilibrium quantity","ar":"كمية التوازن: الكمية التي تتساوى عندها الكمية المطلوبة والمعروضة.","def":"The equilibrium quantity is the specific quantity demanded and supplied at the equilibrium price."},"dwl":{"t":"Deadweight loss","ar":"","def":"The loss of economic efficiency when equilibrium is not achieved. The loss in total surplus (consumer + producer) due to market distortions."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"price ceiling":{"t":"Price ceiling","ar":"سقف سعري: أقصى سعر قانوني يمكن بيع سلعة به","def":"A price ceiling is a legal maximum price at which a good or service can be sold."},"shortage":{"t":"Shortage","ar":"نقص/عجز: الكمية المطلوبة أكثر من المعروضة.","def":"A market situation where the quantity demanded for a good or service is greater than the quantity supplied at a given price."},"quantity demanded":{"t":"Quantity demanded","ar":"الكمية المطلوبة: مقدار ما يشتريه المستهلكون بسعر معين","def":"The specific amount of a good that consumers are willing and able to buy at a particular price."},"equilibrium":{"t":"Equilibrium","ar":"التوازن: النقطة التي تتساوى فيها الكمية المطلوبة والمعروضة.","def":"Equilibrium is the state where the quantity demanded equals the quantity supplied, with no tendency for change."},"quantity supplied":{"t":"Quantity supplied","ar":"الكمية المعروضة: مقدار ما يبيعه المنتجون بسعر معين","def":"The specific amount of a good that producers are willing and able to sell at a particular price."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
