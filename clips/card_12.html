<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Four factors of production</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

rotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='28' y='72' font-size='13.5' font-weight='700' fill='var(--ink,#18213a)'>The river beside the site</text><line x1='300' y1='68' x2='342' y2='68' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='348,68 338,63 338,73' fill='var(--muted,#606b84)'/><rect x='360' y='53' width='210' height='27' rx='13.5' fill='var(--correct,#0e8f86)'/><text x='465' y='71' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>LAND</text><text x='28' y='103' font-size='13.5' font-weight='700' fill='var(--ink,#18213a)'>Three assembly-line workers</text><line x1='300' y1='99' x2='342' y2='99' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='348,99 338,94 338,104' fill='var(--muted,#606b84)'/><rect x='360' y='84' width='210' height='27' rx='13.5' fill='var(--indigo,#5545e8)'/><text x='465' y='102' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>LABOR</text><text x='28' y='134' font-size='13.5' font-weight='700' fill='var(--ink,#18213a)'>A conveyor belt</text><line x1='300' y1='130' x2='342' y2='130' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='348,130 338,125 338,135' fill='var(--muted,#606b84)'/><rect x='360' y='115' width='210' height='27' rx='13.5' fill='var(--amber,#f5b526)'/><text x='465' y='133' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>CAPITAL</text><text x='28' y='165' font-size='13.5' font-weight='700' fill='var(--ink,#18213a)'>A database server</text><line x1='300' y1='161' x2='342' y2='161' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='348,161 338,156 338,166' fill='var(--muted,#606b84)'/><rect x='360' y='146' width='210' height='27' rx='13.5' fill='var(--amber,#f5b526)'/><text x='465' y='164' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>CAPITAL</text><text x='28' y='196' font-size='13.5' font-weight='700' fill='var(--ink,#18213a)'>The founder who set it up</text><line x1='300' y1='192' x2='342' y2='192' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='348,192 338,187 338,197' fill='var(--muted,#606b84)'/><rect x='360' y='177' width='210' height='27' rx='13.5' fill='var(--rose,#f43f61)'/><text x='465' y='195' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>ENTREPRENEURSHIP</text><line x1='28' y1='216' x2='570' y2='216' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='28' y='236' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>Belt and server are both capital: produced tools used to make output.</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Each resource is sorted by where it comes from and whether it is used in</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">production, so the belt and the server both land in capital</text></svg>"},{"at":56.22,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>How can a database server be capital? Capital is any produced tool used to make output, machine or digital. The server was built by people and used as a productive tool, so it counts, even though it works with data, not physical materials.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">CAPITAL CAN BE DIGITAL</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">How can a database server be capital?</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Capital is any produced tool used to make</text><text class=\"ln\" data-g=\"1\" data-w=\"27\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">output, machine or digital.</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The server was built by people and used as</text><text class=\"ln\" data-g=\"2\" data-w=\"37\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">a productive tool, so it counts, even</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">though it works with data, not physical</text><text class=\"ln\" data-g=\"2\" data-w=\"10\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">materials.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">If people made it and it helps produce, it is capital</text></svg>"},{"at":89.76,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Try a harder list: a truck, a road, a buried mineral deposit, and an electrician. The truck and the road were both produced by people and used in production, so both are capital. The mineral is given by nature, so it is land, and the electrician is labor.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHERE IT COMES FROM DECIDES</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Try a harder list: a truck, a road, a</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">buried mineral deposit, and an electrician.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The truck and the road were both produced</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">by people and used in production, so both</text><text class=\"ln\" data-g=\"1\" data-w=\"12\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">are capital.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The mineral is given by nature, so it is</text><text class=\"ln\" data-g=\"2\" data-w=\"35\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">land, and the electrician is labor.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A road is capital; the buried gold beneath it is land</text></svg>"},{"at":112.36,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The line between land and capital is where the resource comes from. Land comes from nature; capital is made by human effort. Cost and size never decide it, so the ocean and buried minerals are land, even when huge and valuable, because people did not make them.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SOURCE DECIDES</text><text class=\"ln\" data-g=\"0\" data-w=\"46\" x=\"24\" y=\"97\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The line between land and capital is where the</text><text class=\"ln\" data-g=\"0\" data-w=\"20\" x=\"24\" y=\"123\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">resource comes from.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"149\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Land comes from nature; capital is made by</text><text class=\"ln\" data-g=\"1\" data-w=\"13\" x=\"24\" y=\"175\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">human effort.</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"201\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"cost\">Cost</tspan> and size never decide it, so the ocean and</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"227\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">buried minerals are land, even when huge and</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"253\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">valuable, because people did not make them.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Nature gives land; human effort makes capital</text></svg>"},{"at":142.18,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Four Factors of Production</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Four Factors of</tspan><tspan x=\"48\" y=\"110\">Production</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The four factors are land, the natural resources from</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">nature; labor, human effort; capital, the produced tools</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">used in production, machine or digital; and</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">entrepreneurship, organizing the factors and carrying</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the risk.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Ask where a resource comes from, then whether it is used</text><text class=\"ln\" data-g=\"1\" data-w=\"14\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">in production.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIwAAAChCAYAAAAV8lfWAAACuklEQVR4nO3dUW7bMBBFUbPw/rfMwkANtEGT6DkSOaTP+epHKwXhxYiS0vh2AwAAAAAAAAAAAAAAAMi08O9TRO+9P//cWhu2jr9GnYg9CIaIYIgIZqP9S//jynMLZjH94iC+c595cn4Wyci7oyfBLDpB2odYRk0ewRTSDyz6jKnyz/lnnpyvYzkax8iHeCZMwVjagUWftfkVTDHtP7G8uq+5gkvSZP2Ly0mlUJ5MmKL6F7HM3PgKZgFt8p3R3zzpLahP+tGFIwQDq+sDXiK+yoQBrlNqQ/VO+ouXnNmbYJekCXrR/ckRgiHiwd1k7YU30jOZMIvpk8MRDBHBEBEMEZveN9+TpEwYIoIh4pI0UQse81e5dJkwg/UiC/8qwSyiFfnJO8EQEcyC+sTLmmCICIaIYIgIhohgiAjmzZ+rpARDRDBEBDNQX/w90oNgFtIK7HsEQ0Qwi+qTLm+CISIYIoIhIhgigmH//zXwvEM447nE2b+xsh84XoXnKW8xYT7+ssCf3lp+/PdnH29HS0yYsxdixvH6JjGVnzA7xLKT+4qfH/TKIlU/3lGPc8yM9L775xuOOF5beBO7dDBnL0b14/3U4+sZff4SwVRf2GqhzDQ9mDMXo/rlbAfTgqk+BUyVIsFU3oR+dgfyzhNlajAjFsNU2SCY6qGMON4u0+ryYFaLZfUF3erVwGMxzliQ5zGuON7tAn2j1wfl3yV9pvKUutrMr7W98yekXqVPmigjvr/LThjmhCoY1no1sKM2+NI78hJowhARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBsNbnJbEWEwYAAAAAAAAAAAAAAAC4hX4DChhI83mK//oAAAAASUVORK5CYII=\" x=\"520.0\" y=\"174.1\" width=\"92.0\" height=\"105.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"174.1\" width=\"92.0\" height=\"105.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">land · labor · capital · entrepreneurship</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"factors of production":{"t":"Factors of production","ar":"عوامل الإنتاج: الموارد المستخدمة لإنتاج السلع والخدمات.","def":"Factors of production are the basic resources—land, labor, capital, and entrepreneurship—used to produce goods and services."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
