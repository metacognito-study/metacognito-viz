<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Checking a Terms of Trade Rate</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you evaluate whether a proposed terms of trade rate benefits each country?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"152\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"terms of trade\">Terms of trade</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#95</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you evaluate whether a</tspan><tspan x=\"24\" y=\"190\">proposed terms of trade rate</tspan><tspan x=\"24\" y=\"230\">benefits each country?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:42</text></svg>"},{"at":35.92,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Two Deals, One Test</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Two Deals, One Test</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><rect x='20' y='24' width='270' height='190' rx='13' fill='var(--surface-2,#f7f9fc)' stroke='var(--correct,#0e8f86)' stroke-width='2'/><text x='155' y='46' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>Deal A: 8 pairs for 6.2 apples</text><text x='155' y='72' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>6.2 ÷ 8 = 0.775 per pair</text><rect x='38' y='86' width='234' height='34' rx='8' fill='#fff' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='155' y='108' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--ink,#18213a)'>0.775 above floor 0.75 ✓</text><rect x='38' y='126' width='234' height='34' rx='8' fill='#fff' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='155' y='148' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--ink,#18213a)'>0.775 below ceiling 0.80 ✓</text><rect x='38' y='170' width='234' height='30' rx='8' fill='var(--correct,#0e8f86)'/><text x='155' y='190' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>Both accept</text><rect x='310' y='24' width='270' height='190' rx='13' fill='var(--surface-2,#f7f9fc)' stroke='var(--rose,#f43f61)' stroke-width='2'/><text x='445' y='46' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>Deal B: 8 pairs for 7 apples</text><text x='445' y='72' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>7 ÷ 8 = 0.875 per pair</text><rect x='328' y='86' width='234' height='34' rx='8' fill='#fff' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='445' y='108' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--ink,#18213a)'>0.875 above floor 0.75 ✓</text><rect x='328' y='126' width='234' height='34' rx='8' fill='#fff' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='445' y='148' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--rose,#f43f61)'>0.875 above ceiling 0.80 ✗</text><rect x='328' y='170' width='234' height='30' rx='8' fill='var(--rose,#f43f61)'/><text x='445' y='190' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>Importer refuses</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Turn each bundle into a price per pair, then check it against the</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">exporter's floor and the importer's ceiling; both limits must hold.</text></svg>"},{"at":59.52,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A proposed trade helps both sides only if the price for each unit lies strictly inside the range: above the exporter's opportunity cost and below the importer's. Deal A works out to 0.775 apples per pair, which sits between 0.75 and 0.80, so Southland and Northland both accept.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE PER UNIT RULE</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A proposed <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> helps both sides only if</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the price for each unit lies strictly</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">inside the range: above the exporter's</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">opportunity cost</tspan> and below the importer's.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Deal A works out to 0.775 apples per pair,</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which sits between 0.75 and 0.80, so</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Southland and Northland both accept.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A price strictly inside the range means both countries accept</text></svg>"},{"at":71.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Now Southland sells 8 pairs for 7 apples. That is 0.875 apples per pair. Northland's upper bound is 0.80, and 0.875 is above it, so Northland would pay more than its home cost of growing pairs. Southland gains, but Northland refuses. A student thought the deal was fine because the exporter's gain looks large.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: A BROKEN BOUND</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Now Southland sells 8 pairs for 7 apples.</text><text class=\"ln\" data-g=\"1\" data-w=\"30\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is 0.875 apples per pair.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Northland's upper bound is 0.80, and 0.875 is</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">above it, so Northland would pay more than its</text><text class=\"ln\" data-g=\"2\" data-w=\"27\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">home <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> of growing pairs.</text><text class=\"ln\" data-g=\"3\" data-w=\"39\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Southland gains, but Northland refuses.</text><text class=\"ln\" data-g=\"4\" data-w=\"47\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student thought the deal was fine because the</text><text class=\"ln\" data-g=\"4\" data-w=\"28\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">exporter's gain looks large.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A price above the importer's ceiling breaks the deal for them</text></svg>"},{"at":117.06,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Trade needs willing acceptance by both parties. The upper bound protects the importer: if the price is more than the importer's home opportunity cost, the importer is better off making the good itself. Large exporter gains do not matter if the importer faces a price that makes trade not worth it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY THE CEILING MATTERS</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"trade\">Trade</tspan> needs willing acceptance by both parties.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The upper bound protects the importer: if the</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price is more than the importer's home opportunity</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan>, the importer is better off making the good</text><text class=\"ln\" data-g=\"1\" data-w=\"7\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">itself.</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Large exporter gains do not matter if the importer</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">faces a price that makes trade not worth it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The ceiling guards the importer, no matter how big the exporter's gain</text></svg>"},{"at":146.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Evaluating a Trade Rate</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Evaluating a <tspan class=\"vocab-term\" data-vocab-key=\"trade\">Trade</tspan> Rate</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A proposed <tspan class=\"vocab-term\" data-vocab-key=\"terms of trade\">terms of trade</tspan> rate is mutually</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">beneficial only on two conditions: the price for</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">each unit must be more than the exporter's</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">opportunity cost</tspan> and less than the importer's</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">opportunity cost.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Turn the whole exchange into a price per unit, check</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">it against both bounds, and report which limits hold</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">before calling the trade beneficial.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALMAAACECAYAAADbaxrmAAAFFUlEQVR4nO3c6a6kOAyGYTLq+79lj0qtjJiIJYtJbOd9frX6VFEhfJgQluMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgOBERA6j/jmMs9x5uxHj28J8mHMnWu/I6MRB/6fDWUemlFy0OQpx1PcuKvO5Ez1UiCjEUZDdhPmHQM8lzoL846KR3jvZEymOfJ762E1DS4SaPnU7zCgx7NAlAY54Lhsd5bBogQQIcea68VE3yiwSrM/cr8AZVXrvfgqxEtErjhYJGuIs1Mqs2HA1O87bhZ4ZoZINdvCQK/XlRpx1BVIrcBK8Gp+FXTHNDfoU4JopwqffG9k5Wo4EKXCIs/Ar2LORa8P79hsjAdI6AqQNQpxts6IjQakJxIox6chOF9F2K1zqGRo8LWPHEFlBxw/Y6eTKAzq/AyG2iTA3IMS2ub1rbjaCbB+VuQIneD5QmRtwgmcbYUYYhHkyni7/DmPmyvCNDjF2vV9ipj9Tf22z8N8FOP+/1o6CvxhmTJzKy6E9//vqs+hDmD9WBrf8W/4379Mbx+HtQeswYGTYEH0uWyYMqT6vzLnicCh9FnXYIRO3/ZL7br1UnpmV+Wo5GstaZcU2n9pRnjbSqiCXy9NcZvTCNfUEMOoJzxfr4bGvZPEReNkeb7nytLbt65Ob2vbIonnr1SH+73ePhax0wkgoZgWopTKnRc8grt5+psJjoUNqA2rtAdadQ5yZaITFDqqthCvaufIyuBjbTmdmGmKxSlt+lH92P4nhEGfmGuSl4yyYFWgxVGCemG3YD6FeGzRxVlRMN85bZVhJuGjjI8w/BHpeH4nT4uGmoRk3tNf1z+jbTj2FOHPX4AidbrF/JECfurw532tnW72dVAIE+cdtw38YctT3Uc27qD0H2W1lLjvfwx1l1qt0ch7kH/cr0FKhvc2bapKLChztyBZiJd42jJUbdFaT4O/uCLMid4G+GxPWVmlr1VyjmkqwihxizFwqD59PJzdPrwDI372qZF6e+tjxXCPUntlbTctK9bQTWDj7135wNgWp0KEq8xXtq2Dnir6qsp1/X6MNEqRChwvzLpdzNd6zkYyv47F7mEcu47Z+d7WoL47pxVtACyPVfGQ5vcq3iiYnO+IXQlXm3he3ZJpBmPpaqmIcP+t3rdm2Mo8Euea7KwKVNq/SoSrzCm+vq50d6tTwJqT8tyih37Iya1Xlr99g1Lv8dHPxaPWU4tdCVeaajWU9yHe/1yNdXPAZWX/rwqzIW+CugtE7czHrzaBaO48EDnDYynw3ZtQ4rK46odP8/fRyP4p34cL8tNHO//f18ELr5ErzSp8EHStvcQKoXYVWVbVyym1lWyzbqkN6gjBSlUsaAVx5lLAu5DBDi2aQy7+NDhnyMqIPHVqE3lNHqlTvTELNbMp52NC6/NY2yiZV+Sf8CvZs3N6prLdwPV280Aj0nR2CvPUw4y4EXwX5qyHD22+lTYIcfjajdmZAe/k9n9e4QShtFNwrW1bmp4sHPXPRWhc0NJe3o+0qs4Wpsrf2nIccrQ/j7mzLylxLs0K2hK62SlPB/2/7vVlr1uOLClobVqryX1TmG0+PIbXOPGhcIBn5zC7oiIEgnmdGWuat3z5/9V1C+47K/OLtRTA18ueZsfjW1rMZtb58PKqmolOV6zDMGFR7Eth62Xn2I1oR0EkKWk/wWoYbBLkeYZ54stjyXUIMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABwPPkX+N98r+l2JfAAAAAASUVORK5CYII=\" x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"173.1\" width=\"92.0\" height=\"67.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">price per unit · above exporter <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> · below importer cost</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"terms of trade":{"t":"Terms of trade","ar":"شروط التبادل التجاري: سعر سلعة دولة مقابل سلعة دولة أخرى.","def":"The rate at which one country's goods can be exchanged for another country's goods."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"opportunity cost":{"t":"Opportunity cost","ar":"تكلفة الفرصة البديلة: قيمة أفضل بديل تم التنازل عنه","def":"The value of the best alternative that was not chosen when a decision was made."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
