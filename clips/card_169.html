<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you calculate the tax burden borne by buyers and check that the burdens add to the tax?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"71\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Taxes</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#169</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you calculate the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan></tspan><tspan x=\"24\" y=\"190\">burden borne by <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> and</tspan><tspan x=\"24\" y=\"230\">check that the burdens add to</tspan><tspan x=\"24\" y=\"270\">the tax?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:40</text></svg>"},{"at":20.7,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Splitting the Tax Burden</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Splitting the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">Tax</tspan> Burden</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='120' y1='40' x2='120' y2='200' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='112' y='38' text-anchor='end' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>price</text><line x1='114' y1='70' x2='126' y2='70' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='114' y1='94' x2='126' y2='94' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='114' y1='166' x2='126' y2='166' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='110' y='74' text-anchor='end' font-size='10.5' font-weight='800' fill='var(--correct,#0e8f86)'>7 <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> pay</text><text x='110' y='98' text-anchor='end' font-size='10.5' font-weight='800' fill='var(--muted,#606b84)'>6 old price</text><text x='110' y='170' text-anchor='end' font-size='10.5' font-weight='800' fill='var(--indigo,#5545e8)'>3 <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> get</text><line x1='120' y1='70' x2='430' y2='70' stroke='var(--correct,#0e8f86)' stroke-width='1.4' stroke-dasharray='5 4'/><line x1='120' y1='94' x2='430' y2='94' stroke='var(--muted,#606b84)' stroke-width='1.4' stroke-dasharray='5 4'/><line x1='120' y1='166' x2='430' y2='166' stroke='var(--indigo,#5545e8)' stroke-width='1.4' stroke-dasharray='5 4'/><rect x='250' y='70' width='52' height='24' rx='4' fill='var(--correct,#0e8f86)' opacity='0.85'/><text x='276' y='86' text-anchor='middle' font-size='9.5' font-weight='800' fill='#fff'>buyer 1</text><rect x='250' y='94' width='52' height='72' rx='4' fill='var(--indigo,#5545e8)' opacity='0.85'/><text x='276' y='134' text-anchor='middle' font-size='9.5' font-weight='800' fill='#fff'>seller 3</text><line x1='360' y1='70' x2='360' y2='166' stroke='var(--rose,#f43f61)' stroke-width='6' stroke-linecap='round' opacity='0.55'/><text x='372' y='114' text-anchor='start' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>tax = 4</text><text x='372' y='130' text-anchor='start' font-size='9' font-weight='700' fill='var(--rose,#f43f61)'>1 plus 3</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Buyers pay 7, the old price was 6, sellers get 3. The buyer burden is the small rise of 1 above</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">6; the seller burden is the larger fall of 3 below it; together they make the 4 tax.</text></svg>"},{"at":50.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The buyer burden is always the after tax buyer price minus the pre tax equilibrium price. That captures the extra cost the tax puts on buyers. It is measured as the rise in the price buyers face. In the pizza case, the equilibrium price is 10 and after a tax buyers pay 11, so the buyer burden per pizza is 11 minus 10, which equals 1. Each buyer pays 1 more than before the tax.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHAT BUYER BURDEN MEASURES</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"24\" y=\"94\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The buyer burden is always the after <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> buyer price</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"117\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">minus the pre tax <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"140\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That captures the extra <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> the tax puts on <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"163\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">It is measured as the rise in the price buyers face.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"186\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">In the pizza case, the equilibrium price is 10 and</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"209\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">after a tax buyers pay 11, so the buyer burden per</text><text class=\"ln\" data-g=\"3\" data-w=\"37\" x=\"24\" y=\"232\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pizza is 11 minus 10, which equals 1.</text><text class=\"ln\" data-g=\"4\" data-w=\"43\" x=\"24\" y=\"255\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Each buyer pays 1 more than before the tax.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Buyer burden = after tax buyer price minus</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">pre tax price = the rise buyers face</text></svg>"},{"at":97.8,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student used the buyer price minus the seller price, which gives 4, and called that the buyer burden. But that formula gives the full tax wedge, not the buyers share alone. The tax wedge of 4 is the total tax per unit. The buyer burden of 1 is only the part that falls on buyers. The seller burden of 3 is the part that falls on sellers. All three numbers must be kept apart.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: THAT IS THE WHOLE <tspan class=\"vocab-term\" data-vocab-key=\"tax\">TAX</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"60\" x=\"24\" y=\"104\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student used the buyer price minus the seller price, which</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"124\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">gives 4, and called that the buyer burden.</text><text class=\"ln\" data-g=\"1\" data-w=\"57\" x=\"24\" y=\"144\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But that formula gives the full <tspan class=\"vocab-term\" data-vocab-key=\"tax wedge\">tax wedge</tspan>, not the <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan></text><text class=\"ln\" data-g=\"1\" data-w=\"12\" x=\"24\" y=\"164\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">share alone.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"24\" y=\"184\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The tax wedge of 4 is the total tax per unit.</text><text class=\"ln\" data-g=\"3\" data-w=\"60\" x=\"24\" y=\"204\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The buyer burden of 1 is only the part that falls on buyers.</text><text class=\"ln\" data-g=\"4\" data-w=\"57\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The seller burden of 3 is the part that falls on <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan>.</text><text class=\"ln\" data-g=\"5\" data-w=\"37\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">All three numbers must be kept apart.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Wedge 4 = total tax; buyer burden 1 and seller burden 3 are the two shares</text></svg>"},{"at":126.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student said buyers bear no burden if buyers do not send the tax to the government. But the buyer burden is the rise in the price buyers pay, no matter who hands it over. In the pizza case, buyers pay 1 more per pizza whether or not they are the ones filing the tax. The burden follows the price change, not the paperwork.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: REMITTING IS NOT BEARING</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student said <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> bear no burden if buyers do</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">not send the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> to the government.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But the buyer burden is the rise in the price</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">buyers pay, no matter who hands it over.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">In the pizza case, buyers pay 1 more per pizza</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">whether or not they are the ones filing the tax.</text><text class=\"ln\" data-g=\"3\" data-w=\"44\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The burden follows the price change, not the</text><text class=\"ln\" data-g=\"3\" data-w=\"10\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">paperwork.</text><rect x=\"24\" y=\"287\" width=\"592\" height=\"49\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"306\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Buyer burden is the price rise buyers face,</text><text x=\"320\" y=\"325\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">no matter who legally remits the tax</text></svg>"},{"at":145.84,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Tax Burden on Buyers</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#1   // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.

  // bg sets the clip surface to the app's chosen background colour.

  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;

  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }

  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines

  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"equilibrium price":{"t":"Equilibrium price","ar":"سعر التوازن: السعر الذي تتساوى عنده الكمية المطلوبة والمعروضة.","def":"The equilibrium price is the specific price at which the quantity demanded equals the quantity supplied."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"tax wedge":{"t":"Tax wedge","ar":"الفجوة الضريبية: الفرق بين ما يدفعه المشتري وما يقبضه البائع","def":"The difference between the price buyers pay and the price sellers receive, caused by a tax."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned

    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place

  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
