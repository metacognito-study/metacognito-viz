<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }

=\"800\" fill=\"var(--ink,#18213a)\">priced out by the tariff wall.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Buyers willing to pay 20 to 30 are blocked from trades worth making</text></svg>"},{"at":43.96,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The underconsumption deadweight loss equals one half times the tariff times the fall in home buying, which is one half times 10 times 10, or 50. Its base is the 10 units of buying lost, from the after tariff demand of 70 to the free trade demand of 80. Its height is the 10 tariff. The triangle measures the surplus on trades the tariff prevents.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE FORMULA FOR THE LOSS</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"24\" y=\"97\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The underconsumption <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> equals one half</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"119\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">times the <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> times the fall in home buying, which is</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"141\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">one half times 10 times 10, or 50.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"24\" y=\"1 oss,</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">since <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> freely choose not to buy at 30.</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The choice is free, but it is forced by a price</text><text class=\"ln\" data-g=\"1\" data-w=\"44\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">that does not match the true <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> of <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The world cost of those shirts is 20, well under</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the 30 <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> price.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Buyers willing to pay between 20 and 30 are priced</text><text class=\"ln\" data-g=\"3\" data-w=\"39\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">out by a wall that should not be there.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The choice is free, but forced by a price above the true world cost of 20</text></svg>"},{"at":102.56,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Another student used the after tariff import quantity of 30 shirts as the base. The right base is the buying lost, 10 units from 70 to 80. The import quantity of 30 belongs to the tariff revenue rectangle, not to this triangle. The two deadweight loss bases measure different things: overproduction uses the 15 unit rise in home production, underconsumption uses the 10 unit fall in home buying.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: USE THE BUYING LOST, NOT <tspan class=\"vocab-term\" data-vocab-key=\"imports\">IMPORTS</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Another student used the after <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> import quantity of</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">30 shirts as the base.</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The right base is the buying lost, 10 units from 70 to</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">80.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The import quantity of 30 belongs to the tariff <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan></text><text class=\"ln\" data-g=\"2\" data-w=\"32\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">rectangle, not to this triangle.</text><text class=\"ln\" data-g=\"3\" data-w=\"55\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The two <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> bases measure different things:</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">overproduction uses the 15 unit rise in home production,</text><text class=\"ln\" data-g=\"3\" data-w=\"54\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">underconsumption uses the 10 unit fall in home buying.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Base is the 10 units of buying lost, not the 30 still imported</text></svg>"},{"at":163.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Tariff Loss from Underconsumption</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"tariff\">Tariff</tspan> Loss from</tspan><tspan x=\"48\" y=\"110\">Underconsumption</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Tariff underconsumption <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> arises because</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the tariff lifts the home price above the <tspan class=\"vocab-term\" data-vocab-key=\"world price\">world price</tspan>,</text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">pricing out <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> willing to pay more than the <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan> of</text><text class=\"ln\" data-g=\"0\" data-w=\"10\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">importing.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The triangle sits between the <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> and the world</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price line, over the units of buying lost.</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Added to the overproduction triangle, the two capture</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the full deadweight loss of the tariff.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKMAAABpCAYAAABWH5NSAAAC9klEQVR4nO3c626DMAyGYVz1/m85E9UqIcSpkMSfnff516mDkDjOgWzTBAAAAAAAAAAAAAAAAAAAAAAAAAAAAABopvw7+xlyeE2itgKOIMzNJjF3A87M5J4FgTPjk8xH1oxPKhgxtvck6jvsHmW8+TtPM2LPjMpUInBmPAsUhuZcpIMRY0kTjDWGwPU1an9G0Dnj2rJhl8MzDZ5HmGBkfphfmmEa59RfpUoH4zwEMwzXpxqQr2g9meDMFYBLUg27XphEqEBVttFp1Rd+LplRfe6SUQlQ32/lStnrvREqVo0FGGmk54xqm9Y1P1/57uyXz1Nw0vuM6j259fOUjVPuve7tIVVmVOeZvSxA5pTOjHuVGqGXt372cpI1W5x4ah3Q0sEYoTf/ItLZy737t2yTLsG4V4lHletd8WpZvSSsj7XmmWeESsw8epSOG+XSwzTyT13cgrF2RY6Wda1zIPau33fGxmoxtPS6ZtkIgCf3+15veY2tnyl0BNdgPDqRc+W0znpBcGehdEeN662fp+xcs0YgXrnP3e+l2PTutZJWHcqvlMuc5odex/bCv4FZv6PNwCo9095ocvQ7nudHu27t9Hgw1Ux4xgQ6lPdB5lQLGJVGjagInKhPF4z4Te3Vu/Sc8WiFDF9FKBBTLGCQIxBdgnHvCBR86947ED9l6HUjgk+TCQRh98yo9NDQbJPXyA8/MhNsC/fXTYqVklURr3eX1TTbPdjC1s6ATDAryryBITtiRmYcUBHt/G7/+MnjvtAeprsXqsUpaY8y1CiLSjlUuG7tXKnAswa72gg1rtOjLOZUDoVgdi+A5/B+twFaTDPMuSwE401PG6DFX/dFL4sRjH0boGWF1/gnqNnqBAjLrVeoZBKlshSRcngJt7WTcY6lVBZP4YJRZfX5tBxqZVEgv8+4/P4WlWtE26ucsc/4gFImUXl7Uthn9KU0x1IpSxEpx6MyTMFdbYRRVuRKdQIAAAAAAAAAAAAAAAAAAAAAAAAAAABMffwBLx8sn7B4daYAAAAASUVORK5CYII=\" x=\"520.0\" y=\"197.4\" width=\"92.0\" height=\"59.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"197.4\" width=\"92.0\" height=\"59.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">underconsumption loss = ½ × tariff × fall in home buying below <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan></text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"international trade":{"t":"International trade","ar":"التجارة الدولية: تبادل السلع والخدمات بين الدول","def":"International trade is the exchange of goods and services across national borders."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"tariff":{"t":"Tariff","ar":"التعرفة الجمركية: ضريبة على السلع المستوردة","def":"A tariff is a tax imposed by a government on imported goods and services."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"free trade":{"t":"Free trade","ar":"التجارة الحرة: تبادل السلع بدون قيود حكومية","def":"Free trade is an international trade policy that allows goods and services to be bought and sold across national borders without tariffs or other barriers."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"world price":{"t":"World price","ar":"السعر العالمي: سعر السلعة في السوق الدولية","def":"The world price is the price of a good or service in the global market, outside of any domestic taxes or subsidies."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"imports":{"t":"Imports","ar":"الواردات: سلع وخدمات تشتريها دولة من دول أخرى.","def":"Goods and services brought into a country from another country."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
