<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · The Five Shifters of Demand</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

45e8)'/><text x='26' y='190' font-size='12' font-weight='800' fill='#fff'>Expectations</text><rect x='282' y='170' width='304' height='30' rx='8' fill='var(--indigo-soft,#eef0ff)' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='294' y='190' font-size='11' font-weight='700' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"buyers\">Buyers</tspan> expect prices to rise next term</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Each coffee headline maps onto one of the five non-price</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">factors that shift the whole <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan>.</text></svg>"},{"at":48.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The five shifters of demand are the number of buyers, income, prices of related goods, tastes, and expectations. These are the only non-price factors that shift the whole demand curve. Any situation you meet will turn on one of these five.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE ONLY FIVE</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The five shifters of <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> are the number</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">of <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>, income, prices of related font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>An exam option says better production technology shifts the demand curve rightward. That is a supply-side change, not a demand-side one. Technology changes what sellers can make at each cost level, so it is a supply shifter. None of the demand shifters touch the production side, they are all about what makes buyers want more or less at every price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: <tspan class=\"vocab-term\" data-vocab-key=\"technology\">TECHNOLOGY</tspan> IS <tspan class=\"vocab-term\" data-vocab-key=\"supply\">SUPPLY</tspan> SIDE</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"24\" y=\"94\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">An exam option says better production technology</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"117\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">shifts the <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> rightward.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"140\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is a supply-side change, not a <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan>-side one.</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"24\" y=\"163\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Technology changes what <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> can make at each <tspan class=\"vocab-term\" data-vocab-key=\"cost\">cost</tspan></text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"186\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">level, so it is a supply shifter.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"24\" y=\"209\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">None of the demand shifters touch the production</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"24\" y=\"232\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">side, they are all about what makes <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> want more</text><text class=\"ln\" data-g=\"3\" data-w=\"23\" x=\"24\" y=\"255\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">or less at every price.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Technology shifts supply, not demand; demand shifters are buyer side</text></svg>"},{"at":133.14,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Shifters of Demand</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Shifters of <tspan class=\"vocab-term\" data-vocab-key=\"demand\">Demand</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"48\" y=\"128\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The shifters of demand are the five non-price</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"48\" y=\"150\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">factors that move the whole <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan>: number</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"172\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">of <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>, income, prices of related goods,</text><text class=\"ln\" data-g=\"0\" data-w=\"25\" x=\"48\" y=\"194\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"tastes\">tastes</tspan>, and expectations.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"216\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Change any of these and the demand curve shifts.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"48\" y=\"238\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Change only the good's own price and you get a</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"48\" y=\"260\" font-size=\"15\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">movement along the curve, not a shift.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJEAAACTCAYAAACOEPsoAAAD/0lEQVR4nO3d7Y7qIBSF4WLm/m95T8w5ZkyjLbD5WBve59ckYxU2qxRtq8cBAAAAAAAAAAAAAAAAAAAAAAAAAMCf9PY3/jMzuypGSom6vaEYBeE5I0z/EKKK8JylzWemx7G5nEPXXUjMGcLott6Dvg1+bWjSpjPSlp3+FoTSELR4jhX8HAHkHC68g1ez/XMbcx7KRvStN+nG1QxQTsHPz+sdJKt4vl59m0F2YV27h0dY5NpifZNMdslao2aR+75Nq73bMp+ztL0R1l1yM1Fp0b69Bf82WCP2Zit47buPEEr6NotUiD6tLXL3OrW9M0dJ386PVQqSVIi8lAttjRfzSh6rFTnC4KTF+iYTIpRTmWmXD9GMw0gSPqxuE6KR03aLAbbFQxIyRIhFMkS99+yWhxtb+F1X6BC1lDuoNUHK3SYtHiyZEPU4/VD6eiVB8pyOsEYzrUo4ZS8FeRa6d5E+XcpxdQ7savDTgAFVXcBLJLnVGqN221HXWNuEvm11OPMOsKfIJefoWmzn7ZsamTTXXC7R6/DS874zy2zz7ENnCanGtNr71Iq8et/kGuQpuGKBd+ibbMPOWkzvo9cWqUG7lMPzIt/AFmYvTFOAIHhIda71W+3Z4endPpVwTm9Ey4HOfXdzfmxLVvC6vfo+2rQXbj1L5AzO6EJbRjt61mHpEI0O0Oxp327aFD1Iw4vbc5ZQDFDvtinMukNPe9Tcd+WhEqCnnn2cfW/atMtQWxdV+QTlqHbOmonlT8DWUA1Q77bN6vdjxVkoEuu8qB5Rm+EzkfIssYo0uMbdQ6R6vmqmJPJ5VStLrokw1iP6Hhh5PdSzD8t+ToQ1yYRo1JdPvUR+DbVZWCJEr2KoFCUCE6qZRIgQGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyFCrK8gVrj2ZUU2ua7hZ6IId3fcGfF93aFnok9fOL7yXqnalvCHs9eesEtRd5ulh66JSn62u/R5owY0NRjo2Yd02d/2WH22Swus5ZYLUc7gcEt3H+FCdPUrQNFZ0L6FC1HEATGhtvQQ/nOi3kbdzRoZIbrwHh6C9B0hghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshwnohuroM9fy/lS5ZtYK+qfVb8m6PkiKpFXTHvknMRCv+zPdO/ZMIUWkxch+rUOCebVbp30+U++nPBSt5rIqU2eb3vyP0TypEkffGnfsnczgb7W7R+un/NdvsQD7lLfGtIH1sNRONPDSkAIehVrYKUc3gPh9fs82xka06W3p4O4eh9PEAAAAAAAAAAAAAAAAAAAAAAAAAcMTzC+bYiQQP8Gt4AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"160.4\" width=\"92.0\" height=\"93.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"160.4\" width=\"92.0\" height=\"93.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">buyers · income · related prices · tastes · expectations → curve shifts</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"number of buyers":{"t":"Number of buyers","ar":"عدد المشترين: يؤثر على إجمالي الطلب في السوق.","def":"The number of buyers refers to the total count of consumers in a market, which affects overall market demand."},"tastes":{"t":"Tastes","ar":"الأذواق: تفضيلات المستهلكين للمنتجات.","def":"Tastes refer to the personal preferences of consumers for certain goods or services."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"technology":{"t":"Technology","ar":"التقنية: المعرفة والأساليب المستخدمة لإنتاج السلع.","def":"Technology refers to the methods and processes used to produce goods and services, affecting efficiency and cost."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
