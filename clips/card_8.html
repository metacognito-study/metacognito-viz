<style>

  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

troke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='16' y='56' width='286' height='5' rx='2.5' fill='var(--correct,#0e8f86)'/><text x='159' y='86' text-anchor='middle' font-size='15' font-weight='800' fill='var(--correct,#0e8f86)'>NEEDS</text><text x='159' y='104' text-anchor='middle' font-size='11.5' font-weight='600' fill='var(--muted,#606b84)'>required for survival</text><rect x='32' y='124' width='254' height='34' rx='17' fill='var(--surface,#fff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='159' y='146' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Medicine for a sick child</text><rect x='32' y='168' width='254' height='34' rx='17' fill='var(--surface,#fff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='159' y='190' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Drinking water</text><rect x='314' y='56' width='270' height='158' rx='12' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='314' y='56' width='270' height='5' rx='2.5' fill='var(--indigo,#5545e8)'/><text x='449' y='86' text-anchor='middle' font-size='15' font-weight='800' fill='var(--indigo,#5545e8)'>WANTS</text><text x='449' y='104' text-anchor='middle' font-size='11.5' font-weight='600' fill='var(--muted,#606b84)'>desired, not essential</text><rect x='330' y='124' width='238' height='34' rx='17' fill='var(--surface,#fff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='449' y='146' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Expensive trainers</text><rect x='330' y='168' width='238' height='34' rx='17' fill='var(--surface,#fff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='449' y='190' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Streaming service</text><text x='300' y='236' text-anchor='middle' font-size='12.5' font-weight='700' fill='var(--muted,#606b84)'>The test is survival or basic functioning, not the price or the quantity.</text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A need is required for survival or basic functioning; a want is desired but not</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">essential, and the line is about what you truly need, not the price</text></svg>"},{"at":33.64,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A need is required for survival or basic functioning. A want is desired but not essential. The line is about what you truly need, not the price or the quantity.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">SURVIVAL IS THE TEST</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"108\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A need is required for survival or</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"24\" y=\"142\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">basic functioning.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"176\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A want is desired but not essential.</text><text class=\"ln\" data-g=\"2\" data-w=\"32\" x=\"24\" y=\"210\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The line is about what you truly</text><text class=\"ln\" data-g=\"2\" data-w=\"36\" x=\"24\" y=\"244\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">need, not the price or the quantity.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Sort by survival, not by how much it costs</text></svg>"},{"at":64.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student calls a laptop a need because an online exam requires one. But the core definition stays tied to survival and basic functioning, and a laptop is not needed to stay alive. That argument stretches need into very useful, which is a different thing.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">USEFUL IS NOT NEEDED</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student calls a laptop a need because an</text><text class=\"ln\" data-g=\"0\" data-w=\"25\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">online exam requires one.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But the core definition stays tied to</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">survival and basic functioning, and a</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">laptop is not needed to stay alive.</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That argumen     system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"distinguish":{"t":"Distinguish","ar":"يُميّز","def":"to tell two things apart"},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
</body>
</html>
