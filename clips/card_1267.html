<!DOCTYPE html>

<head>

<title>Metacognito · Finding Equilibrium Products from the Base Constant</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.

  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

us x while ammonium and hydroxide each rise by plus x. The equilibrium row is then ammonia 0.100 minus x, with each product equal to x.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">BUILD THE ROWS</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Start ammonia at 0.100 with ammonium and</text><text class=\"ln\" data-g=\"0\" data-w=\"23\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydroxide both at zero.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">In the change row, ammonia changes by</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">minus x while ammonium and hydroxide each</text><text class=\"ln\" data-g=\"1\" data-w=\"15\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">rise by plus x.</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The equilibrium row is then ammonia 0.100</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">minus x, with each product equal to x.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equilibrium: NH₃ = 0.100 minus x, NH₄⁺ = x, OH⁻ = x</text></svg>"},{"at":49.9,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Solve the Base Constant for x</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Solve the <tspan class=\"vocab-term\" data-vocab-key=\"base\">Base</tspan> Constant for x</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='13' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"ice table\">ICE table</tspan> for NH₃(aq) + H₂O(l) ⇌ NH₄⁺(aq) + OH⁻(aq)</text><rect x='40' y='24' width='520' height='66' rx='9' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><line x1='190' y1='24' x2='190' y2='90' stroke='var(--line,#e5eaf2)' stroke-width='1'/><line x1='340' y1='24' x2='340' y2='90' stroke='var(--line,#e5eaf2)' stroke-width='1'/><line x1='450' y1='24' x2='450' y2='90' stroke='var(--line,#e5eaf2)' stroke-width='1'/><line x1='40' y1='46' x2='560' y2='46' stroke='var(--line,#e5eaf2)' stroke-width='1'/><line x1='40' y1='68' x2='560' y2='68' stroke='var(--line,#e5eaf2)' stroke-width='1'/><text x='115' y='39' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--muted,#606b84)'>row</text><text x='265' y='39' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>NH₃</text><text x='395' y='39' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>NH₄⁺</text><text x='505' y='39' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>OH⁻</text><text x='115' y='61' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>initial</text><text x='265' y='61' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>0.100</text><text x='395' y='61' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>0</text><text x='505' y='61' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>0</text><text x='115' y='83' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>equilibrium</text><text x='265' y='83' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>0.100 - x</text><text x='395' y='83' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>x</text><text x='505' y='83' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>x</text><rect x='40' y='100' width='520' height='30' rx='8' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.4'/><text x='300' y='120' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>x² / (0.100 - x) = 1.8 × 10⁻⁵ ; take bottom ≈ 0.100</text><rect x='100' y='140' width='400' height='34' rx='9' fill='var(--correct,#16a36a)' fill-opacity='0.13' stroke='var(--correct,#16a36a)' stroke-width='1.5'/><text x='300' y='162' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>x² = 1.8 × 10⁻⁶, so x = [OH⁻] = 1.34 × 10⁻³ mol/L</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Put the equilibrium row into Kb: x² / (0.100 minus x) = 1.8 × 10⁻⁵. Take the bottom</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">as 0.100, so x² = 1.8 × 10⁻⁶ and x = 1.34 × 10⁻³ mol/L, the hydroxide.</text></svg>"},{"at":63.94,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Both the hydroxide and the ammonium are 1.34 × 10⁻³ mol/L at equilibrium. The steps are the same as for a weak acid, but here x is the hydroxide, because this is a base reacting with water.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE PRODUCTS</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"93\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Both the hydroxide and the ammonium</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"126\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">are 1.34 × 10⁻³ mol/L at equilibrium.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"159\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The steps are the same as for a weak</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"192\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>, but here x is the hydroxide,</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"225\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">because this is a <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> reacting with</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"258\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">water.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">[OH⁻] = [NH₄⁺] = 1.34 × 10⁻³ mol/L</text></svg>"},{"at":87.92,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Finding Equilibrium Products from the Base Constant</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Finding Equilibrium</tspan><tspan x=\"48\" y=\"110\">Products from the <tspan class=\"vocab-term\" data-vocab-key=\"base\">Base</tspan></tspan><tspan x=\"48\" y=\"150\">Constant</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"208\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Build an initial, change, equilibrium table, then put</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"227\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the equilibrium row into the base constant.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"48\" y=\"246\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For ammonia at 0.100 with Kb = 1.8 × 10⁻⁵,</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"265\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">x² / 0.100 = 1.8 × 10⁻⁵ gives x = 1.34 × 10⁻³ mol/L.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"48\" y=\"284\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Here x is the hydroxide and the <tspan class=\"vocab-term\" data-vocab-key=\"conjugate acid\">conjugate acid</tspan>, not the</text><text class=\"ln\" data-g=\"2\" data-w=\"10\" x=\"48\" y=\"303\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">hydronium.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJUAAACtCAYAAAC5iz2PAAAE2klEQVR4nO3d247bMAyEYTPo+78yi71YoEjtxAdKGpL/d1l0dx1pNFYcJ9k2AAAAAAAAAAAAAAAAAAAAAAAAAACgwrbC3N03YWZWcvxfW1HqgcpyjHeUDFWmyfJEx9o6VFjrz9aA2t7FC7bTv2gqhCNUCEeoEK7FnkqBF99HtQvV3oTO2rx7ozD94vSHcCVDpXYJocqxbt1Pf7+TpXr6sYJhKh8q1XBZ4TCVPv1hLUKFcIQK4QgVwhEqhCNUCEeoEI5QDeQi18ZmI1QIR6gQjlANZA1ektlDqAZy9lSIZjQVojlNBcQgVAhHqBCOUA1kbNSBGIQK4QgVwhEqhCNUCFf+fX8jr5J3fXb3DU314GWXri/DfEOoTjoK0KdgedPQESqEI1QnHe2f2Ff9j1A9QKD28ezvAkJ0Dk01kDUNIaFCOE5/B7jIeV+Lprpyvejn/+5d5Iy65uQNrl21CNW7o+b5NuF3AmENW658qBSbwQWPKVL5UD1pjqiWsWZtVTpUTxthZKN44bYqHSqlxrBGbVU2VCM21dHB8KJtVTZUik1hAscwQ8lQPWmAn4l/n/y9f4viBduq5Mp5nyi1hnDx43uq3Ms0M1b+p79hNwLy8/sqBavk6W/l5tpPhLpSgMqHanRLnf39fuM4Ku2tSoVqZCNcnXT/8v8rt1WZPdXslf4eioi/70X2VmWbanZL3fl7ViBAZUNVaT/iBR5LiVBlbgBLdKxtQjVjZZ+Z+Mjj8ORtVWajfmfl703e2Z+PnHgzs+xBKtNUdyfi0z3nUfej28PTWuaQpQ7VyNPUk9fnrPkzwbShWnHV+szdCrbwgquKtKGKmszfoOz9/NGkjro9xoq01atzS+0FIyqQndsqZaiqrvAqjyVdqDKu3G6POVWonlxXysSSP6ZUoXrizEZcuRFc+NjeWaeWujoxqxvDk97L3qapMk1K9rZ6ddtLnf05hQDahWtnSsq9oHxlsrps/GeTH0Amfks3BilOf8hFOlTZVugolmxv1XJPNZrfnPAqC0b2QWRpqZGNYSfeBqY4JiWaamYzzDzteNL3AUoe8JkVGT25nyZv9f7F/jm2DG2VsqlGTPL7h/FH/Q2b/E4cBVIJP7MSFSdgxifLWKK2StlUR2a+vWrkJFryt2zJpHvlCr0ygbMawRO3VeqmGvHh+Vc+1ExlEtXIDIraylRoLxcbk/JNNXrwPt3JMONmOmdP1WNFjrzI6jebUWVs0jfVqkG70l5VWidlU2VpKbXAmPAYpWsqpUCNvjBr4hd9j0i9W0R9Ba780iVPNFapmipToKKPN9NV9mV3fmZ8jU+Nf7kQu2oMpW8nztxSncdgSahoqdptlaKpsqzQGWzyt6emCBUtFS/im71KNVWGlafGxMfs1XlFVeJCY7u0qdRXnDITHrtXx5VUlYuM8bKmUl5pWZjoGE4JFS2kY8ZcLGmq0W8Mxdq2Gh6qUd/qiftGL+LpTUWA5ps95n/UVxMh3Ke8ZZAJ1dH9QsqDp8ZEFuDyl2lQj1SoVFZaNjb4m7xSh0pxgNSZ4FgNPyClG/K78slzMLypVO5G7MoXLOplz/64ZDDWyoU7bUJpJw0zFvG0jTqNtN6sOZj67I9grTNz7OXe9o44LGIAAAAAAAAAAAAAAAAAAAAAAAAA2LL5C+b67Whi54GcAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"193.6\" width=\"92.0\" height=\"106.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"193.6\" width=\"92.0\" height=\"106.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">x² / 0.100 = 1.8 × 10⁻⁵ ; x = [OH⁻] = 1.34 × 10⁻³ mol/L</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"ice table":{"t":"ICE Table","ar":"طريقة لإيجاد التركيز أو الضغط عند الاتزان","def":"Method for equilibrium calculations using Initial, Change, and Equilibrium concentrations. Helps solve for unknown concentrations or equilibrium constants."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"conjugate acid":{"t":"Conjugate acid","ar":"الحمض المرافق","def":"The species formed when a proton is added to a base."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
