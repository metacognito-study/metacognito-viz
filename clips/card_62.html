  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */

'/><circle cx='507.8' cy='132.6' r='12' fill='var(--indigo,#5545e8)'/><circle cx='538.2' cy='127.9' r='12' fill='var(--indigo,#5545e8)'/><circle cx='453' cy='118.3' r='12' fill='var(--indigo,#5545e8)'/><circle cx='480.7' cy='114.1' r='12' fill='var(--indigo,#5545e8)'/><circle cx='519.7' cy='108.2' r='12' fill='var(--indigo,#5545e8)'/><circle cx='550' cy='103.6' r='12' fill='var(--indigo,#5545e8)'/><circle cx='438' cy='95.8' r='12' fill='var(--indigo,#5545e8)'/><line x1='188' y1='74' x2='398' y2='74' stroke='var(--rose,#f43f61)' stroke-width='5'/><polygon points='404,74 392,68 392,80' fill='var(--rose,#f43f61)'/><text x='294' y='62' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)'>Heating</text><line x1='398' y1='106' x2='194' y2='106' stroke='var(--muted,#606b84)' stroke-width='5'/><polygon points='188,106 200,100 200,112' fill='var(--muted,#606b84)'/><text x='294' y='124' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)'>Cooling</text><text x='294' y='156' text-anchor='middle' font-size='12' font-weight='700' fill='var(--ink,#18213a)'>Same <tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan></text><text x='99' y='202' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>Higher density</text><text x='99' y='220' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>~1.000 g/mL</text><text x='489' y='202' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)'>Lower density</text><text x='489' y='220' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>~0.998 g/mL</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Same mass and the same container: heating spreads the water particles only SLIGHTLY, so</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">density drops just a little (1.000 -&gt; 0.998 g/mL); cooling does the reverse</text></svg>"},{"at":29.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Heating makes a pure substance expand: the particles move faster and spread out, taking up more room.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">HEATING EXPANDS IT</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"118\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Heating makes a <tspan class=\"vocab-term\" data-vocab-key=\"pure substance\">pure substance</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"26\" x=\"24\" y=\"157\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">expand: the particles move</text><text class=\"ln\" data-g=\"0\" data-w=\"29\" x=\"24\" y=\"196\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">faster and spread out, taking</text><text class=\"ln\" data-g=\"0\" data-w=\"13\" x=\"24\" y=\"235\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">up more room.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Faster particles need more space</text></svg>"},{"at":53.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The mass does not change, but the same mass now fills a LARGER volume. Density is mass / volume, so same mass in more space means the density falls.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"mass\">MASS</tspan> STAYS, <tspan class=\"vocab-term\" data-vocab-key=\"volume\">VOLUME</tspan> GROWS</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"108\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The mass does not change, but the</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"142\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">same mass now fills a LARGER volume.</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"176\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"density\">Density</tspan> is mass / volume, so same</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"210\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">mass in more space means the density</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"244\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">falls.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">More volume under the same mass = lower density</text></svg>"},{"at":62.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Cooling pulls the particles closer, so the volume shrinks and the density rises.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">COOLING REVERSES IT</text><text class=\"ln\" data-g=\"0\" data-w=\"27\" x=\"24\" y=\"137.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Cooling pulls the particles</text><text class=\"ln\" data-g=\"0\" data-w=\"29\" x=\"24\" y=\"176.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">closer, so the <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan> shrinks</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"215.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and the <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> rises.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The opposite of heating</text></svg>"},{"at":71.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Temperature and Density</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"temperature\">Temperature</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"density\">Density</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"48\" y=\"128\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Density falls when a <tspan class=\"vocab-term\" data-vocab-key=\"pure substance\">pure substance</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"48\" y=\"157\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">is heated and rises when it is</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"48\" y=\"186\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">cooled: heating expands the same</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"48\" y=\"215\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan> into more space, so</text><text class=\"ln\" data-g=\"0\" data-w=\"20\" x=\"48\" y=\"244\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">mass / <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan> drops.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKkAAAC4CAYAAACYX8wRAAAFgElEQVR4nO3d2XLcNhBAUcGV///lTsGVh6kJRRJLL+i+59G2NHJy3SRBDOfnBwAAAAAAAAAAAAAAAAAAAAAAAAAAAACAupr3D4AYRES+f621FqKPED8E4oT5G89gibQgGYgzQqhEWohMHNIjnAYQaRHyFdtoaKtfv+KP1QvBj2wI7PtrZk8ZZhBpMW1hAnqdkxJpcvIx8XZE9vk9rKYpkSYmmwPV+F5vEGlSohTo3etoIdKExCBQru4xTQyvuq0wSRNrRueO2v8wiDQRMToPtUakSUjSQDsiTUC+DrfZzkuJNOkElf9Y/Azak5tIkwXaHO+xayHSQ8lNfBahssEEQ4G0i8Ot1US1uEhjkh6u3UTSf09jQ4j1KQSRFlhqahtD9VjqSrWelp0sBrJzdz737qESSFs4T/VcJeBwfwDZOMFmQvV8f1NHpMGJwiF2ZaJ63HIl0sA0D7HtZagR9gRw4RSU5SFWbm6tWrz+EybpAZpyIFdhRgn07+t7vjiueQUiAZ5WcoVJGoznBGtfrxch0I5IA/E+xErQHVNEemCgYrCrKcoU7Yj00EBFcVNzpEA7InW2emtSNoTqfZrxhEgdjRxi5SaklVCjB9oRaRBvA90Z6gmBdkTqZDaQ9vFnVzY1nxJoR6QHXcm3X/7saKgnBdoR6eGBnrQvdBaRHh7ot5GYT5iiHZEeHqgoxBwNkRrQuqARg5gjIFJjGueWLXGgHZEqm734mV3YzxZoR6SKtC9+WoFAOyI9aFeTJF2sf0KkAQN982tt07ntCYh0s12H45Gn5mVYC71DpBut3vn5LVQpsBZ6J8VfIorV25hP9+BbkQulb0zSQEtNn7vtR98UJ0kD7VL9ZU4+D509B80eaMckdbySH92GVzHQjkgDTdBTnhdqjUidAn1zqK+0Fnon7b++yIv1uwNtiadoxyQdtGMX/FPkFddC7xDpgpGNIG/fNMeF0v+l/1cYcdsdgY5hkr60ehW+eoiXIlfyV4g0yKaRXa+fUbm/cLS7SU/fV4oH2jFJje4mzdxRqrQWeodIFXfBP11AsdT0TsnDx5Mdb4q7+h4V35+0A5P0wezh+O6iiUDHEOkXlpriIVLDpSYm6JzS5zqfWGqKi0m6cYLefS1rofPKR6rxQNuReFkLfVY60mgPCKu+1PSb0pF6P3+JtdB3ykY6s+2OQH2UjHR2gt2dHjBB9ZSLdDTQN2ugBKqrVKS7Lmg+v0/VxzFaKvMfalcgPO3OXolJunMtcvZJI7N/FgUi1XiPOg8Ts5U+Uq0JdvUkkiuch65LfdjxDsT79bNIO0m9A/F+/UxSRuodiPfrZ5MyUk/satovXaSeU6za0+6spIs0CgLdJ22knlOUQPdKFanX+SCB6koVqQcC1UekCwjUBpFOIlA7KSPVvnBhLdRWykg1sRZqj0gXsNRkg0gHcB7qI02k2ueJBOonTaSaCNRXukh3nycSqL8UkWod6gk0hn9+Etk1RVlmiuX4SHdN0dmnM0Pf0f8Dnj6me+brZ74PdB07SXd8BOIV4oznyGkxc2hmap7r2Em6GigT8xzHTdKR4Igzh1YlUCbnuY5ZzCfQuo6IdPZBtR0T9Hx/Ml3JE2hOoSNduQvEBM0jdKRX3lwoEWguf7JdKBFoPiEjJVCEjpSPnEHoSFeu5JFXmEhZC0XoSK/WNz+nZ/99NiXXFeLe/d3VOVvs4D5Jn5aPdnwCHc7mGunb9c3RT6BDLm6R8vHbCB0pgSJ0pNzCROhIRxfgCRqu56R8ujHCRcp5KEJHSqA45nDPIR4hI317scSuJoS9LdrxBjq4Rjp6C5Nbngi3TspaKJ6YbdTgkYsIP0lHdjkBAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPBj41/vagVruX8YTgAAAABJRU5ErkJggg==\" x=\"520.0\" y=\"156.9\" width=\"92.0\" height=\"100.2\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"156.9\" width=\"92.0\" height=\"100.2\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Heat -&gt; volume up -&gt; density down (mass fixed)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"density":{"t":"Density","ar":"الكثافة","def":"The mass per unit volume of a substance: ρ = m/V. SI unit: kg/m³; common in chemistry: g/mL or g/cm³. An intensive property - does not depend on sample size. Used to identify substances and convert between mass and volume."},"temperature":{"t":"Temperature","ar":"درجة الحرارة","def":"A measure of the average kinetic energy of the particles in a substance. Higher temperature = more particle motion. Measured in Celsius (°C) or Kelvin (K) in chemistry. Temperature determines the direction of heat flow (heat flows from high T to low T)."},"mass":{"t":"Mass","ar":"الكتلة","def":"The amount of matter in an object. SI unit: kilogram (kg). Measured with a balance. Mass is a scalar quantity that does not change with location (unlike weight, which depends on gravitational field strength). In chemistry, g and kg are most common."},"pure substance":{"t":"Pure Substance","ar":"مادة نقية","def":"Matter with a fixed and uniform composition throughout; cannot be separated into different components by physical means without destroying the substance. Examples: elements (Fe, O₂) and compounds (H₂O, NaCl). Each has characteristic, fixed properties."},"volume":{"t":"Volume","ar":"الحجم","def":"The amount of three-dimensional space occupied by a substance. SI unit: cubic metre (m³). Common chemistry units: litre (L), millilitre (mL), cm³. Measured with graduated cylinders, pipettes, burettes, and volumetric flasks."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
