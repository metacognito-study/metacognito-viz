  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you determine the tariff or quota that maximizes total surplus for a small open economy?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"197\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"international trade\">International trade</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#227</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you <tspan class=\"vocab-term\" data-vocab-key=\"determine\">determine</tspan> the <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan></tspan><tspan x=\"24\" y=\"190\">or <tspan class=\"vocab-term\" data-vocab-key=\"quota\">quota</tspan> that maximizes total</tspan><tspan x=\"24\" y=\"230\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> for a small open</tspan><tspan x=\"24\" y=\"270\">economy?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 3:12</text></svg>"},{"at":27.2,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A Tariff Carves out Two Losses</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">A <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">Tariff</tspan> Carves out Two Losses</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='70' y1='28' x2='70' y2='185' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='70' y1='185' x2='560' y2='185' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='300' y='205' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>quantity (sugar)</text><text x='30' y='106' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 30 106)'>price ($)</text><line x1='80' y1='170' x2='360' y2='38' stroke='var(--indigo,#5545e8)' stroke-width='2.6'/><text x='364' y='38' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><line x1='360' y1='38' x2='545' y2='172' stroke='var(--correct,#0e8f86)' stroke-width='2.6'/><text x='502' y='180' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'><tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan></text><polygon points='180,118 215,75 215,118' fill='var(--rose,#f43f61)' opacity='0.4'/><polygon points='435,118 400,75 435,75' fill='var(--rose,#f43f61)' opacity='0.4'/><line x1='70' y1='118' x2='545' y2='118' stroke='var(--muted,#606b84)' stroke-width='2' stroke-dasharray='6 4'/><text x='64' y='122' text-anchor='end' font-size='9.5' font-weight='800' fill='var(--muted,#606b84)'>2</text><text x='550' y='121' font-size='9' font-weight='800' fill='var(--muted,#606b84)'>world</text><line x1='70' y1='75' x2='460' y2='75' stroke='var(--rose,#f43f61)' stroke-width='2.4'/><text x='64' y='79' text-anchor='end' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>4</text><text x='466' y='72' font-size='9' font-weight='800' fill='var(--rose,#f43f61)'>tariff price</text><text x='197' y='140' text-anchor='middle' font-size='8' font-weight='800' fill='var(--rose,#f43f61)'>over</text><text x='197' y='150' text-anchor='middle' font-size='8' font-weight='800' fill='var(--rose,#f43f61)'>produce</text><text x='418' y='140' text-anchor='middle' font-size='8' font-weight='800' fill='var(--rose,#f43f61)'>under</text><text x='418' y='150' text-anchor='middle' font-size='8' font-weight='800' fill='var(--rose,#f43f61)'>consume</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A 2 tariff lifts the home price to 4. The two shaded triangles, from overproduction and</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">underconsumption, are pure <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan>: 22.5 million destroyed versus <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan>.</text></svg>"},{"at":61.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Free trade gives Northland a total surplus of 200 million. The 2 tariff drops total surplus to 177.5 million, because it destroys 22.5 million through the two triangles. Deadweight loss from the 2 tariff equals the area of those two triangles. A zero tariff, which is free trade, keeps the full 200 million in total surplus, so free trade plainly gives more.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE MATH: <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">FREE TRADE</tspan> WINS</text><text class=\"ln\" data-g=\"0\" data-w=\"58\" x=\"24\" y=\"114\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Free trade gives Northland a <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan> of 200 million.</text><text class=\"ln\" data-g=\"1\" data-w=\"58\" x=\"24\" y=\"134\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The 2 <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> drops total surplus to 177.5 million, because</text><text class=\"ln\" data-g=\"1\" data-w=\"51\" x=\"24\" y=\"154\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it destroys 22.5 million through the two triangles.</text><text class=\"ln\" data-g=\"2\" data-w=\"58\" x=\"24\" y=\"174\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">Deadweight loss</tspan> from the 2 tariff equals the area of those</text><text class=\"ln\" data-g=\"2\" data-w=\"14\" x=\"24\" y=\"194\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">two triangles.</text><text class=\"ln\" data-g=\"3\" data-w=\"54\" x=\"24\" y=\"214\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A zero tariff, which is free trade, keeps the full 200</text><text class=\"ln\" data-g=\"3\" data-w=\"59\" x=\"24\" y=\"234\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">million in total surplus, so free trade plainly gives more.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Free trade keeps 200 million; the 2 tariff destroys 22.5 million</text></svg>"},{"at":91.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student said the best tariff brings in the most tariff revenue, but maximum revenue is not maximum total surplus. A high tariff collects plenty of revenue while stacking up large deadweight losses. Total surplus is consumer surplus plus producer surplus plus government revenue, and that sum peaks at a zero tariff. Another student equated maximum producer surplus with maximum total surplus, but a higher tariff cuts consumer surplus by more than producer surplus and revenue combined.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAPS: <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">REVENUE</tspan> AND <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">PRODUCER SURPLUS</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"94\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student said the best <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> brings in the most tariff</text><text class=\"ln\" data-g=\"0\" data-w=\"58\" x=\"24\" y=\"114\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">revenue, but maximum revenue is not maximum <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"58\" x=\"24\" y=\"134\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A high tariff collects plenty of revenue while stacking up</text><text class=\"ln\" data-g=\"1\" data-w=\"24\" x=\"24\" y=\"154\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">large deadweight losses.</text><text class=\"ln\" data-g=\"2\" data-w=\"60\" x=\"24\" y=\"174\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Total surplus is <tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan> plus producer surplus plus</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"24\" y=\"194\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">government revenue, and that sum peaks at a zero tariff.</text><text class=\"ln\" data-g=\"3\" data-w=\"53\" x=\"24\" y=\"214\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Another student equated maximum producer surplus with</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"24\" y=\"234\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">maximum total surplus, but a higher tariff cuts consumer</text><text class=\"ln\" data-g=\"3\" data-w=\"59\" x=\"24\" y=\"254\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> by more than producer surplus and revenue combined.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Max revenue and max producer surplus both differ from max total surplus</text></svg>"},{"at":154.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The small country assumption is the heart of this. A large country that can sway world prices through its trade policy might use a positive best tariff to pull surplus from foreign producers. But Northland cannot touch the world price, so every tariff or quota only harms Northland itself. The same logic carries over to quotas: a zero quota, which is free trade, lifts total surplus the most.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY SMALL COUNTRY MATTERS</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"94\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The small country assumption is the heart of this.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"117\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A large country that can sway world prices through</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"140\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">its <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> policy might use a positive best <tspan class=\"vocab-term\" data-vocab-key=\"tariff\">tariff</tspan> to</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"163\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pull <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> from foreign <tspan class=\"vocab-term\" data-vocab-key=\"producers\">producers</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"186\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But Northland cannot touch the <tspan class=\"vocab-term\" data-vocab-key=\"world price\">world price</tspan>, so every</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"209\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">tariff or <tspan class=\"vocab-term\" data-vocab-key=\"quota\">quota</tspan> only harms Northland itself.</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"24\" y=\"232\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The same logic carries over to quotas: a zero quota,</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"255\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which is <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan>, lifts <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan> the most.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A small country cannot move the world price, so any trade limit only hurts it</text></svg>"},{"at":177.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The Surplus Maximizing Tariff</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">The <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">Surplus</tspan> Maximizing</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"tariff\">Tariff</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For a small open economy with no externalities or market</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">failures, the tariff or <tspan class=\"vocab-term\" data-vocab-key=\"quota\">quota</tspan> that lifts <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the most is zero, which simply means <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Any <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> limit above zero pins the home price above the</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"world price\">world price</tspan> and stacks up two <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan> triangles,</text><text class=\"ln\" data-g=\"1\" data-w=\"51\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">from overproduction and underconsumption, that drag</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">total surplus below the free trade level.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKMAAABpCAYAAABWH5NSAAAC9klEQVR4nO3c626DMAyGYVz1/m85E9UqIcSpkMSfnff516mDkDjOgWzTBAAAAAAAAAAAAAAAAAAAAAAAAAAAAABopvw7+xlyeE2itgKOIMzNJjF3A87M5J4FgTPjk8xH1oxPKhgxtvck6jvsHmW8+TtPM2LPjMpUInBmPAsUhuZcpIMRY0kTjDWGwPU1an9G0Dnj2rJhl8MzDZ5HmGBkfphfmmEa59RfpUoH4zwEMwzXpxqQr2g9meDMFYBLUg27XphEqEBVttFp1Rd+LplRfe6SUQlQ32/lStnrvREqVo0FGGmk54xqm9Y1P1/57uyXz1Nw0vuM6j259fOUjVPuve7tIVVmVOeZvSxA5pTOjHuVGqGXt372cpI1W5x4ah3Q0sEYoTf/ItLZy737t2yTLsG4V4lHletd8WpZvSSsj7XmmWeESsw8epSOG+XSwzTyT13cgrF2RY6Wda1zIPau33fGxmoxtPS6ZtkIgCf3+15veY2tnyl0BNdgPDqRc+W0znpBcGehdEeN662fp+xcs0YgXrnP3e+l2PTutZJWHcqvlMuc5odex/bCv4FZv6PNwCo9095ocvQ7nudHu27t9Hgw1Ux4xgQ6lPdB5lQLGJVGjagInKhPF4z4Te3Vu/Sc8WiFDF9FKBBTLGCQIxBdgnHvCBR86947ED9l6HUjgk+TCQRh98yo9NDQbJPXyA8/MhNsC/fXTYqVklURr3eX1TTbPdjC1s6ATDAryryBITtiRmYcUBHt/G7/+MnjvtAeprsXqsUpaY8y1CiLSjlUuG7tXKnAswa72gg1rtOjLOZUDoVgdi+A5/B+twFaTDPMuSwE401PG6DFX/dFL4sRjH0boGWF1/gnqNnqBAjLrVeoZBKlshSRcngJt7WTcY6lVBZP4YJRZfX5tBxqZVEgv8+4/P4WlWtE26ucsc/4gFImUXl7Uthn9KU0x1IpSxEpx6MyTMFdbYRRVuRKdQIAAAAAAAAAAAAAAAAAAAAAAAAAAABMffwBLx8sn7B4daYAAAAASUVORK5CYII=\" x=\"520.0\" y=\"197.4\" width=\"92.0\" height=\"59.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"197.4\" width=\"92.0\" height=\"59.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">total surplus = <tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan> + <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">producer surplus</tspan> + <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan> → peaks at a zero tariff</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"international trade":{"t":"International trade","ar":"التجارة الدولية: تبادل السلع والخدمات بين الدول","def":"International trade is the exchange of goods and services across national borders."},"determine":{"t":"Determine","ar":"يُحدِّد","def":"to find out or decide"},"tariff":{"t":"Tariff","ar":"التعرفة الجمركية: ضريبة على السلع المستوردة","def":"A tariff is a tax imposed by a government on imported goods and services."},"quota":{"t":"Import quota","ar":"حصة الاستيراد: تحديد كمية السلع المستوردة","def":"An import quota is a government limit on the quantity of a specific good that can be imported into a country."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"free trade":{"t":"Free trade","ar":"التجارة الحرة: تبادل السلع بدون قيود حكومية","def":"Free trade is an international trade policy that allows goods and services to be bought and sold across national borders without tariffs or other barriers."},"total surplus":{"t":"Total surplus","ar":"إجمالي الفائض: مكاسب المشترين والبائعين معًا","def":"The sum of consumer surplus and producer surplus, representing the total benefits to buyers and sellers from a market."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."},"producer surplus":{"t":"Producer surplus","ar":"فائض المنتج: ربح البائع فوق تكلفته","def":"The benefit a producer receives from selling a good, measured as the difference between the price received and the minimum price they would have accepted."},"consumer surplus":{"t":"Consumer surplus","ar":"فائض المستهلك: توفير المشتري من السعر","def":"The benefit a consumer receives from buying a good, measured as the difference between the maximum price they would pay and the actual price paid."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"producers":{"t":"Producers","ar":"المنتجون: الشركات التي تصنع وتبيع السلع والخدمات.","def":"Individuals or firms that create and supply goods and services."},"world price":{"t":"World price","ar":"السعر العالمي: سعر السلعة في السوق الدولية","def":"The world price is the price of a good or service in the global market, outside of any domestic taxes or subsidies."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
