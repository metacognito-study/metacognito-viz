<!doctype html><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}body{background:#fff;margin:0}svg{width:100%}</style><div style="width:900px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Specialize where the sacrifice is least</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Specialize where the sacrifice is least</tspan></text><g transform="translate(24,64)"><text x='296' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>opportunity cost of 1 fish: wheat given up</text><text x='24' y='110' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>Northland</text><rect x='150' y='94' width='300' height='26' rx='7' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='150' y='94' width='12' height='26' rx='7' fill='var(--correct,#0e8f86)'/><text x='172' y='112' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>0.2 wheat</text><text x='462' y='112' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>&#8594; makes FISH</text><text x='24' y='184' font-size='15' font-weight='800' fill='var(--ink,#18213a)'>Southland</text><rect x='150' y='168' width='300' height='26' rx='7' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><rect x='150' y='168' width='300' height='26' rx='7' fill='var(--rose,#f43f61)'/><text x='300' y='186' text-anchor='middle' font-size='13' font-weight='800' fill='#fff'>5 wheat</text><text x='462' y='186' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>&#8594; makes WHEAT</text><text x='296' y='236' text-anchor='middle' font-size='13' font-weight='700' fill='var(--indigo,#5545e8)'>lowest sacrifice wins: focus there for the most total output</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">specialize in the good you give up least to make: Northland sacrifices only 0.2 wheat per fish, Southland 5, so Northland takes fish</text></svg></div>
