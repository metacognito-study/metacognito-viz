<!doctype html><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}body{background:#fff;font-family:Inter}svg{width:100%}</style><div style="width:430px;display:inline-block;margin:4px"><b>#10 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Storefront land = land; baristas = labor; espresso machines = capital; the owner who bears risk = entrepreneurship.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">MAPPING THE INPUTS</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Storefront land = land;</tspan><tspan x="24" y="150">baristas = labor; espresso</tspan><tspan x="24" y="192">machines = capital; the</tspan><tspan x="24" y="234">owner who bears risk</tspan><tspan x="24" y="276">= entrepreneurship.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">the four limited resources, now named precisely</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#10 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Money is NOT a factor: it makes nothing by itself, it just buys the real factors. Swap money for entrepreneurship.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">THE TRAP</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Money is NOT a factor: it</tspan><tspan x="24" y="150">makes nothing by itself,</tspan><tspan x="24" y="192">it just buys the real</tspan><tspan x="24" y="234">factors. Swap money for</tspan><tspan x="24" y="276">entrepreneurship.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">entrepreneurship = organizing and bearing risk</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#10 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Entrepreneurship needs a human who decides, combines the other three factors, and accepts the loss if it fails.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">ENTREPRENEURSHIP</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Entrepreneurship needs a</tspan><tspan x="24" y="150">human who decides,</tspan><tspan x="24" y="192">combines the other three</tspan><tspan x="24" y="234">factors, and accepts the</tspan><tspan x="24" y="276">loss if it fails.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">a bank account paying bills cannot do that</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#10 definition</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Factors of production</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><rect x="24" y="36" width="8" height="250" rx="4" fill="var(--indigo,#5545e8)"/><text font-size="34" font-weight="800" fill="var(--ink,#18213a)"><tspan x="48" y="70">Factors of production</tspan></text><text font-size="20" font-weight="500" fill="var(--muted,#606b84)"><tspan x="48" y="128">Land (natural base), labor (human effort),</tspan><tspan x="48" y="158">capital (produced tools), and</tspan><tspan x="48" y="188">entrepreneurship (organizing and risk). Not</tspan><tspan x="48" y="218">money.</tspan></text><rect x="24" y="296" width="592" height="46" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="324" text-anchor="middle" font-size="19" font-weight="700" fill="var(--indigo,#5545e8)">land   ·   labor   ·   capital   ·   entrepreneurship</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#1427 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>pH = pKa + log(base/acid): start from the pKa, and the base-to-acid ratio nudges it up or down.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">THE RULE</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">pH = pKa + log(base/acid):</tspan><tspan x="24" y="150">start from the pKa, and</tspan><tspan x="24" y="192">the base-to-acid ratio</tspan><tspan x="24" y="234">nudges it up or down.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">more conjugate base raises pH; more acid lowers it</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#1427 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>When base and acid are equal, the ratio is 1 and the log is 0, so pH equals the pKa exactly.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">EQUAL AMOUNTS</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">When base and acid are</tspan><tspan x="24" y="150">equal, the ratio is 1 and</tspan><tspan x="24" y="192">the log is 0, so pH equals</tspan><tspan x="24" y="234">the pKa exactly.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">this happens at the half-equivalence point</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#1427 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>pH = pKa is at the half-equivalence point, NOT the start. Before any base, the pH is below the pKa.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">THE TRAP</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">pH = pKa is at the</tspan><tspan x="24" y="150">half-equivalence point,</tspan><tspan x="24" y="192">NOT the start. Before any</tspan><tspan x="24" y="234">base, the pH is below the</tspan><tspan x="24" y="276">pKa.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">at the start only the weak acid's own dissociation sets the pH</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#1427 definition</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Buffer region</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><rect x="24" y="36" width="8" height="250" rx="4" fill="var(--indigo,#5545e8)"/><text font-size="34" font-weight="800" fill="var(--ink,#18213a)"><tspan x="48" y="70">Buffer region</tspan></text><text font-size="20" font-weight="500" fill="var(--muted,#606b84)"><tspan x="48" y="128">The base-to-acid ratio steers the pH around</tspan><tspan x="48" y="158">pKa; equal amounts give pH = pKa at</tspan><tspan x="48" y="188">half-equivalence, halfway to the endpoint.</tspan></text><rect x="24" y="296" width="592" height="46" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="324" text-anchor="middle" font-size="19" font-weight="700" fill="var(--indigo,#5545e8)">pH = pKa + log(base/acid)   ·   equal amounts -&gt; pH = pKa</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Specialization raises total oat output, and exporting the extra oats buys flutes at a lower opportunity cost than making them at home.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">WHY IT WORKS</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Specialization raises</tspan><tspan x="24" y="150">total oat output, and</tspan><tspan x="24" y="192">exporting the extra oats</tspan><tspan x="24" y="234">buys flutes at a lower</tspan><tspan x="24" y="276">opportunity cost than</tspan><tspan x="24" y="318">making them at home.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">so after trade Southland uses more oats and the same flutes</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Measure each good's gain by taking the before-trade use away from the after-trade use.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">HOW TO MEASURE IT</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Measure each good's gain</tspan><tspan x="24" y="150">by taking the before-trade</tspan><tspan x="24" y="192">use away from the</tspan><tspan x="24" y="234">after-trade use.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">a gain = more of at least one good, with no less of the other</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Even after exporting oats to get flutes, Southland still ends up with more oats than before, because specialization raised its output.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">EVEN AFTER EXPORTING</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Even after exporting oats</tspan><tspan x="24" y="150">to get flutes, Southland</tspan><tspan x="24" y="192">still ends up with more</tspan><tspan x="24" y="234">oats than before, because</tspan><tspan x="24" y="276">specialization raised its</tspan><tspan x="24" y="318">output.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">the exports are not subtracted from the gain</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Measure gains by comparing the after-trade bundle with the before-trade bundle, not exports with imports.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">THE TRAP</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Measure gains by comparing</tspan><tspan x="24" y="150">the after-trade bundle</tspan><tspan x="24" y="192">with the before-trade</tspan><tspan x="24" y="234">bundle, not exports with</tspan><tspan x="24" y="276">imports.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">Southland's after-trade oats (9) beat its before-trade oats (7.5)</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 statement</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Exports are not losses; they are how you get imports. The gain is the net change in the use bundle.</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text x="24" y="46" font-size="12" font-weight="700" letter-spacing="1" fill="var(--muted,#606b84)">EXPORTS ARE NOT LOSSES</text><text font-size="29" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="108">Exports are not losses;</tspan><tspan x="24" y="150">they are how you get</tspan><tspan x="24" y="192">imports. The gain is the</tspan><tspan x="24" y="234">net change in the use</tspan><tspan x="24" y="276">bundle.</tspan></text><rect x="24" y="286" width="592" height="50" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="316" text-anchor="middle" font-size="16" font-weight="700" fill="var(--indigo,#5545e8)">net change in use, not the gross outflow of exports</text></svg></div><div style="width:430px;display:inline-block;margin:4px"><b>#102 definition</b><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Gains from trade</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><rect x="24" y="36" width="8" height="250" rx="4" fill="var(--indigo,#5545e8)"/><text font-size="34" font-weight="800" fill="var(--ink,#18213a)"><tspan x="48" y="70">Gains from trade</tspan></text><text font-size="20" font-weight="500" fill="var(--muted,#606b84)"><tspan x="48" y="128">Gains from trade = after-trade use minus</tspan><tspan x="48" y="158">before-trade use, good by good. Here: +1.5</tspan><tspan x="48" y="188">tons of oats, flutes unchanged.</tspan></text><rect x="24" y="296" width="592" height="46" rx="12" fill="var(--surface-2,#f7f9fc)" stroke="var(--line,#e5eaf2)"/><text x="320" y="324" text-anchor="middle" font-size="19" font-weight="700" fill="var(--indigo,#5545e8)">after-trade use - before-trade use, good by good</text></svg></div>
