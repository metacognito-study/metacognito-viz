<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Investigating a Real Problem</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student says his phone battery seems to die faster on cold mornings. Can you turn that complaint into a proper investigation?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"242\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Real world investigation</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#3012</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">A student says his phone</tspan><tspan x=\"24\" y=\"190\"><tspan class=\"vocab-term\" data-vocab-key=\"battery\">battery</tspan> seems to die faster on</tspan><tspan x=\"24\" y=\"230\">cold mornings. Can you turn</tspan><tspan x=\"24\" y=\"270\">that complaint into a proper</tspan><tspan x=\"24\" y=\"310\">investigation?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:19</text></svg>"},{"at":19.56,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>First turn it into a testable question: does a lower temperature shorten battery life? Then make it a hypothesis with a clear direction: as the temperature drops, the battery runtime gets shorter. So you go from a vague complaint to a sharp, testable claim.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">QUESTION, THEN <tspan class=\"vocab-term\" data-vocab-key=\"hypothesis\">HYPOTHESIS</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">First turn it into a testable question: does</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">a lower <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan> shorten <tspan class=\"vocab-term\" data-vocab-key=\"battery\">battery</tspan> life?</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then make it a hypothesis with a clear</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">direction: as the temperature drops, the</text><text class=\"ln\" data-g=\"1\" data-w=\"29\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">battery runtime gets shorter.</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So you go from a <tspan class=\"vocab-term\" data-vocab-key=\"vague\">vague</tspan> complaint to a sharp,</text><text class=\"ln\" data-g=\"2\" data-w=\"15\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">testable claim.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Turn it into a testable question, then a directed hypothesis: as the temperature drops, the runtime gets shorter</text></svg>"},{"at":37.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>One Change, One Measure, Rest Fixed</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">One Change, One Measure, Rest Fixed</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='16' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>Change one, measure the response, control the rest</text><rect x='30' y='44' width='185' height='104' rx='12' fill='var(--rose,#f43f61)' fill-opacity='0.12' stroke='var(--rose,#f43f61)' stroke-width='1.6'/><text x='122' y='74' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>independent</text><text x='122' y='102' text-anchor='middle' font-size='12' font-weight='800' fill='var(--rose,#f43f61)'>change the <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan></text><text x='122' y='130' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>0 to 25 &#176;C</text><rect x='225' y='44' width='185' height='104' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><text x='317' y='74' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>dependent</text><text x='317' y='102' text-anchor='middle' font-size='12' font-weight='800' fill='var(--correct,#0e8f86)'>measure the runtime</text><text x='317' y='130' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>in hours</text><rect x='420' y='44' width='185' height='104' rx='12' fill='var(--indigo,#5545e8)' fill-opacity='0.10' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='512' y='74' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>controlled</text><text x='512' y='102' text-anchor='middle' font-size='12' font-weight='800' fill='var(--indigo,#5545e8)'>keep the rest the same</text><text x='512' y='130' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>phone, brightness, charge</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">You change the temperature, the <tspan class=\"vocab-term\" data-vocab-key=\"independent variable\">independent variable</tspan>, and measure the runtime in hours, the <tspan class=\"vocab-term\" data-vocab-key=\"dependent variable\">dependent variable</tspan>. Testing</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">five temperatures from 0 to 25 degrees Celsius, keep the phone, brightness, and starting charge the same.</text></svg>"},{"at":61.76,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>You change the temperature, the independent variable, and measure the runtime in hours, the dependent variable. Testing five temperatures from 0 up to 25 degrees Celsius, you keep everything else constant: the same phone, the same screen brightness, and the same starting charge, the controlled variables.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE CONTROLLED VARIABLES</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">You change the <tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan>, the independent</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">variable, and measure the runtime in hours, the</text><text class=\"ln\" data-g=\"0\" data-w=\"19\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"dependent variable\">dependent variable</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Testing five temperatures from 0 up to 25 degrees</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Celsius, you keep everything else constant: the</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">same phone, the same screen brightness, and the</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">same starting charge, the controlled variables.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Change the temperature (independent), measure runtime (dependent), keep phone, brightness, and charge the same (controlled)</text></svg>"},{"at":73.96,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Investigating a Real Problem</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Investigating a Real</tspan><tspan x=\"48\" y=\"110\">Problem</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">To investigate a real problem, change one thing, measure</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the response, control the rest, and then the data can</text><text class=\"ln\" data-g=\"0\" data-w=\"20\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">answer the question.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The phone <tspan class=\"vocab-term\" data-vocab-key=\"battery\">battery</tspan> complaint becomes a testable question</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">and a directed <tspan class=\"vocab-term\" data-vocab-key=\"hypothesis\">hypothesis</tspan>, then a fair test: change the</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"temperature\">temperature</tspan> (<tspan class=\"vocab-term\" data-vocab-key=\"independent variable\">independent variable</tspan>), measure the runtime</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">in hours (<tspan class=\"vocab-term\" data-vocab-key=\"dependent variable\">dependent variable</tspan>), and hold the phone,</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">brightness, and starting charge the same (controlled</text><text class=\"ln\" data-g=\"1\" data-w=\"11\" x=\"48\" y=\"320\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">variables).</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIMAAADTCAYAAACiE6CRAAAEBElEQVR4nO3cUW/aMBiGUTz1//9lT73gFaqAQmqcL/E5V1u1jjh+cJzQ7XIBAAAAAAAAAAAAAAA4p3ZZWO+93/t6a23J89JWnvR3tZNH0laO4NHk9o3fd3RflwW8O3ltYyRHt0QM10nc+o7uJ49gqRhWm9StTnHte/UavzWG9uL3H30vcbiD3zKhoyap7/jaM5S/TLwyAbM3fO2N1/v5tcpxlI3hiA+E2p1j+zmOv25ml4vh9gRWPGnvuD3+23F9/7ra2MrFUPmdMzqMakH8uxRy5hBG3+EssTJ8G/2OuXfCf/v7+4cnqVIEV22FTWOlD6r6hjBnKXEQ9y4Tn76bmPUAqT8ZR7XLYsnLxLNr6qhIRk9Af3H1qTLxh4rh0cl7dNJHPh3sA6/nlSf/cDF8cgJXnfTTxDBqMp6F0E4wsUvH8K5VJ/wwD51W0gs+ZxADIQZCDIQYCDHcfJx8WfxuRgyEGAgxEGIgxECIgfU+qHrl1rEv/kmmlYH1VoZn7+xqP4u4FysDIQZCDIQYCDEQYiDEwHrPGZ5Z/fnClZWBEAMhBkIMhBh20v3zOiqzMhBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIYadtII/dykGQgw76X64hcqsDIQYCDEQYiDEQIiBEAMhBkIMhBgIMRBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIQZCDIQYCDEQYthJ80/yqczKQIiBEAMhBkIMhBgIMRBiIMRAiIEQAyEGQgyEGAgxEGIgxECIgRADIQZCDIQYCDEQYiDEQIiBEAMhBkIMhBgIMRBiIMRAiIEQw0567/1SjBgIMRBflwWMWJJbwf+qbzQrw4Gv8aMtsTKs8K4ewcpAiGFnrdCq1SpejyudoJXGveueYYVN2ZbzsVcUX1UiuJ6A1QJpd8a9VxSt0rK49ztjtkfj3evyMW0DeTvA78GtMuFb/Dw/s1bLf3uEMOM1q+svTPDsIKbeWv4Wwor7hvbiOZlyLJ9+gS37gDOvJH3j2Gbsp0o+jv4e8HXwZwijP7l7qqRkDL/dct37c1X0Xy5x1Y53l8vEiBPx7l7iUye+Tz6OWavj1BhGD6bqRrN9cIyniOF2H3D9/azXHq1NPvbbc3eaDeS9jeFHSy98fa744dXX3hvDM9wtfGoFO+VnE89WgSonYrZ3xj3rM5upMfw2oCPflo189Pzoe08Rw5Zr4TubvyqR9IHHvMfeYfpJ3DrIT9wZvPJuHGXrOE/12cQ9o58kVnne0AaP4ZQbyGf23ECu+tplYzj75vFI49v9AP669Fc4iWc47m/lDmjGvmDrz1b8RcXJ/6n8AR5l83ikSX/ksAc+M5524AkGAAAAAAAAAAAAAIDLuv4D0oAhg/y+2NsAAAAASUVORK5CYII=\" x=\"522.5\" y=\"157.0\" width=\"86.9\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"522.5\" y=\"157.0\" width=\"86.9\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Fair test: change one (independent) -&gt; measure the response (dependent) -&gt; hold the rest (controlled) -&gt; data answers the question</text></svg>"}];            // [{svg, at}]  at = start time in seconds

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"battery":{"t":"Battery","ar":"البطارية (تطبيق عملي للخلية الجلفانية تُخزِّن الطاقة الكيميائية وتطلقها على شكل طاقة كهربائية عند الاستخدام)","def":"A portable electrochemical device that converts stored chemical energy into electrical energy via spontaneous redox reactions. A battery consists of one or more galvanic cells connected in series or parallel."},"hypothesis":{"t":"Hypothesis","ar":"فرضية","def":"A tentative, testable explanation for an observation, stated in a form that can be supported or refuted by experiment. A good hypothesis is specific, falsifiable, and based on prior observations. It forms the starting point of the scientific method."},"temperature":{"t":"Temperature","ar":"درجة الحرارة","def":"A measure of the average kinetic energy of the particles in a substance. Higher temperature = more particle motion. Measured in Celsius (°C) or Kelvin (K) in chemistry. Temperature determines the direction of heat flow (heat flows from high T to low T)."},"vague":{"t":"Vague","ar":"غامض","def":"not clear or exact"},"independent variable":{"t":"Independent Variable","ar":"المتغير المستقل","def":"The variable that the experimenter deliberately changes in an experiment to observe its effect on the dependent variable. Plotted on the x-axis of a graph. Also called the manipulated variable."},"dependent variable":{"t":"Dependent Variable","ar":"المتغير التابع","def":"The variable measured or observed in an experiment; its value depends on (responds to) changes in the independent variable. Plotted on the y-axis of a graph. Also called the response variable."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
</body>
</html>
