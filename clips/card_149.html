  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */

 stroke='var(--ink,#18213a)' stroke-width='2'/><text x='60' y='174' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>2</text><line x1='250' y1='146' x2='250' y2='158' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='250' y='174' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>3</text><line x1='155' y1='146' x2='155' y2='158' stroke='var(--rose,#f43f61)' stroke-width='2.2'/><text x='155' y='174' text-anchor='middle' font-size='10' font-weight='800' fill='var(--rose,#f43f61)'>midpoint 2.5</text><path d='M74,136 Q155,118 236,136' fill='none' stroke='var(--rose,#f43f61)' stroke-width='1.8'/><polygon points='240,138 228,136 236,126' fill='var(--rose,#f43f61)'/><text x='155' y='114' text-anchor='middle' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>change: +1</text><line x1='262' y1='152' x2='296' y2='152' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='304,152 296,148 296,156' fill='var(--muted,#606b84)'/><rect x='312' y='137' width='150' height='28' rx='8' fill='var(--rose,#f43f61)' fill-opacity='0.10' stroke='var(--rose,#f43f61)' stroke-width='1.4'/><text x='387' y='156' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--rose,#f43f61)'>+1 / 2.5 = +40%</text><text x='505' y='66' text-anchor='middle' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)'>18.2%</text><line x1='473' y1='78' x2='537' y2='78' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='505' y='98' text-anchor='middle' font-size='14' font-weight='800' fill='var(--rose,#f43f61)'>40%</text><text x='550' y='86' text-anchor='middle' font-size='14' font-weight='800' fill='var(--muted,#606b84)'>=</text><text x='586' y='88' text-anchor='middle' font-size='17' font-weight='800' fill='var(--ink,#18213a)'>0.45</text><rect x='468' y='118' width='128' height='30' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.16' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='532' y='138' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>below 1 &#8594; inelastic</text><text x='532' y='178' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>each change over its own midpoint</text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The quantity supplied rises 18.2 percent while price rises 40 percent, so</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan> is about 0.45, below 1, which makes supply inelastic.</text></svg>"},{"at":74.36,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Price elasticity of supply equals the percentage change in quantity supplied divided by the percentage change in price. A value of 0.45 means a 1 percent rise in price causes only a 0.45 percent rise in quantity supplied. Sellers could not expand output in proportion, probably because storage was limited.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHAT THE NUMBER MEANS</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"price elasticity of supply\">Price elasticity of supply</tspan> equals the percentage</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"change in quantity supplied\">change in quantity supplied</tspan> divi "ln\" data-g=\"3\" data-w=\"21\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"elasticity of demand\">elasticity of demand</tspan>.</text><text class=\"ln\" data-g=\"4\" data-w=\"53\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Identify which side is responding before you pick the</text><text class=\"ln\" data-g=\"4\" data-w=\"8\" x=\"24\" y=\"264\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">formula.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Sellers respond means <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan>; buyers respond means <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan></text></svg>"},{"at":132.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Another student wrote the value as 5 because quantity rose by 5 million units. The two missing steps are changing both numbers to percentages using the midpoint averages. Raw unit changes are not percentages, and the units differ between the top and the bottom of the ratio. The midpoint method turns each raw number into a percentage by dividing by the average of the two values, and that step is not optional.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: TURN UNITS INTO PERCENTAGES</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Another student wrote the value as 5 because quantity</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">rose by 5 million units.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The two missing steps are changing both numbers to</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percentages using the midpoint averages.</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Raw unit changes are not percentages, and the units</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">differ between the top and the bottom of the ratio.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"midpoint method\">midpoint method</tspan> turns each raw number into a</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percentage by dividing by the average of the two values,</text><text class=\"ln\" data-g=\"3\" data-w=\"30\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and that step is not optional.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Convert both raw changes to percentages first; the units must match</text></svg>"},{"at":161.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Price Elasticity of Supply</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Price <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">Elasticity</tspan> of</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"supply\">Supply</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"price elasticity of supply\">Price elasticity of supply</tspan> uses the same midpoint</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">formula as <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan>, but the top of the ratio is always</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the percentage <tspan class=\"vocab-term\" data-vocab-key=\"change in quantity supplied\">change in quantity supplied</tspan>, never</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Supply is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan> if the value is above 1 and inelastic</text><text class=\"ln\" data-g=\"1\" data-w=\"17\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">if it is below 1.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Unlike demand, the supply value is positive, because</text><text class=\"ln\" data-g=\"2\" data-w=\"27\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">supply curves slope upward.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHMAAADDCAYAAACxiS6TAAADh0lEQVR4nO3d266bMBBGYSbq+7+yq1xsCaEkm7CZwaxZ302lJg2HnzG2OXRZJEmSJEmSJEmSJEmSJEmSJL5YwMYYY/t3EYHd5ugUJD3Ux9IwyL3fuRtcmKNZ04oO812Qzz+3odKqExXm2ITTpSKRYe5Brk5smNGsKtFhdoQJc3zRXFKrFhOmDBPFylw4PVrDBDFMEMMEMcyFM1QxTBDDBMGEGZCm8i8wYXYcV7YJc0ADaxlmR4YJggozDnSCSB0nVJh7zpvkcyk6zG4ME+TR+e67AJ0vkWF+Qj5ftguTDhlmwJrP1mF2fZioRZgdzpfoMANYeW3D7Agb5mjQrLYIc/gYvO5u2k7C7M1kTNjBmrKZnT3IWdcxZt5Jfzn6R+IE+1nreLZpVmS9k87YQaPgpU5nri+qmZ2x2brbuk8RZnWzFSctY/07MwR6eZiznn/uGOjlYWYEOX7Zqc/Pz9zxsxyEl4aZ0YEYX4SUEeiV1fmgBhkffjerabw60EvCzO7SR0R82qHPzzKX/bOMhR5m1kaO1QGyd6I9e8dXB/roMASJjarlVgf6oA9B4qKe5hWBloR597HkUdXbWtrMdgryig5RephXjrvGZE+BZS87vVIqryyML3q06+9Urxt+Ou9M45dx5N7hy938W0BiFdKnQKkdMlSYrwJdPiAFiQxzTw+SFiI6THpo00znETses0D2ZrsyTJDSc2a3c1g1KxPEMEEME8ShCYiVCWKYIIYJ4jgTxMoEMUwQwwRxnAm65GdlghgmSPltI50ug4WPJ+gom1kQwwQxTBDHmSBWJohhgmaAvAQGYmWCoB8cuhp6BsiHhnJh3tAlz5kodoBAHJqAWJmJvG1Eh1mZIF41AXEGKBF6Bki5DBPEcSaIlQlimCCGmQg9A+SLEHNZmSCGmchJA5gonAVynAliMwtimCAOTZJhx5ndDPJ/hqpc9mZBvNMgkZMGOszeLIgdIBDDBDHMZL7TAGI4aaCjbGZBnDRIhJ408IauXDazIIYJYpggj+oOQad3tD95p4EOsZkFMUwQx5nJKvsIViaIYYJ4dx6IlZkI/eR0R9GhA+Qboc8XlcGtj9J1mK+O3lf/Zs9nM6pa39Iw3wW63cht1b47CL75bO939v7+3gPzt4P2TGVHduVGzaJ6m0t3atfzZBQdvJdUSJdQo0kLJEmSJEmSJEmSJEmSJEmStMzvP+7NJQjSxP9oAAAAAElFTkSuQmCC\" x=\"524.7\" y=\"157.0\" width=\"82.6\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"524.7\" y=\"157.0\" width=\"82.6\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">elasticity of supply = %ΔQ supplied ÷ %ΔP    (positive value)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"elasticity":{"t":"Elasticity","ar":"المرونة: مدى استجابة الكمية للتغيرات في السعر أو الدخل.","def":"A measure of how much one economic variable responds to a change in another economic variable."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"midpoint method":{"t":"Midpoint method","ar":"طريقة نقطة المنتصف: طريقة لحساب المرونة بدقة بين نقطتين.","def":"A method for calculating elasticity that uses the average of the initial and final values for quantity and price."},"quantity supplied":{"t":"Quantity supplied","ar":"الكمية المعروضة: مقدار ما يبيعه المنتجون بسعر معين","def":"The specific amount of a good that producers are willing and able to sell at a particular price."},"price elasticity of supply":{"t":"Price elasticity of supply","ar":"مرونة العرض السعرية: كيف تتغير الكمية المعروضة بتغير السعر","def":"Price elasticity of supply measures how much the quantity supplied of a good changes when its price changes."},"change in quantity supplied":{"t":"Change in quantity supplied","ar":"تغير الكمية المعروضة: تحرك على منحنى العرض بسبب تغير السعر.","def":"A change in quantity supplied is a movement along the supply curve caused only by a change in the price of the good itself."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"demand elasticity":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"elasticity of demand":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"quantity demanded":{"t":"Quantity demanded","ar":"الكمية المطلوبة: مقدار ما يشتريه المستهلكون بسعر معين","def":"The specific amount of a good that consumers are willing and able to buy at a particular price."},"elastic":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
