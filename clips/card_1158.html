<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Finding Coefficients from Concentration Changes</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A concentration time graph shows A turning into B over time. Can you read how much each one changed and use that to find the coefficients of the balanced reaction?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"251\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Coefficients from changes</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1158</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">A <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> time graph</tspan><tspan x=\"24\" y=\"190\">shows A turning into B over</tspan><tspan x=\"24\" y=\"230\">time. Can you read how much</tspan><tspan x=\"24\" y=\"270\">each one changed and use that</tspan><tspan x=\"24\" y=\"310\">to find the coefficients of</tspan><tspan x=\"24\" y=\"350\">the balanced reaction?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:31</text></svg>"},{"at":23.14,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Find the change in each species from start to equilibrium. Then the ratio of those changes gives the ratio of the coefficients. The faster a species changes, the larger its coefficient must be.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE METHOD</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Find the change in each species from</text><text class=\"ln\" data-g=\"0\" data-w=\"21\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">start to equilibrium.</text><text class=\"ln\" data-g=\"1\" data-w=\"31\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then the ratio of those changes</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">gives the ratio of the coefficients.</text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The faster a species changes, the</text><text class=\"ln\" data-g=\"2\" data-w=\"31\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">larger its <tspan class=\"vocab-term\" data-vocab-key=\"coefficient\">coefficient</tspan> must be.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Ratio of the <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> changes = ratio of the coefficients</text></svg>"},{"at":33.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Read Changes, Form the Ratio</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Read Changes, Form the Ratio</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='80' y1='150' x2='80' y2='44' stroke='var(--ink,#18213a)' stroke-width='1.8'/><line x1='80' y1='150' x2='300' y2='150' stroke='var(--ink,#18213a)' stroke-width='1.8'/><text x='72' y='40' text-anchor='start' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>mol/L</text><text x='300' y='164' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>time</text><path d='M80,82 Q150,112.6 205,121.44 L290,122.8' fill='none' stroke='var(--rose,#f43f61)' stroke-width='2.4'/><text x='292' y='126.8' text-anchor='start' font-size='10' font-weight='800' fill='var(--rose,#f43f61)'>A</text><path d='M80,150 Q150,88.8 205,71.12 L290,68.4' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='2.4'/><text x='292' y='72.4' text-anchor='start' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'>B</text><line x1='76' y1='82' x2='80' y2='82' stroke='var(--ink,#18213a)' stroke-width='1.6'/><text x='72' y='85' text-anchor='end' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>1</text><line x1='76' y1='122.8' x2='80' y2='122.8' stroke='var(--ink,#18213a)' stroke-width='1.6'/><text x='72' y='125.8' text-anchor='end' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>0.4</text><line x1='76' y1='68.4' x2='80' y2='68.4' stroke='var(--ink,#18213a)' stroke-width='1.6'/><text x='72' y='71.4' text-anchor='end' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>1.2</text><line x1='318' y1='82' x2='318' y2='122.8' stroke='var(--rose,#f43f61)' stroke-width='2'/><line x1='313' y1='82' x2='318' y2='82' stroke='var(--rose,#f43f61)' stroke-width='2'/><line x1='313' y1='122.8' x2='318' y2='122.8' stroke='var(--rose,#f43f61)' stroke-width='2'/><text x='326' y='105.4' text-anchor='start' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>A fell 0.6</text><line x1='408' y1='68.4' x2='408' y2='150' stroke='var(--correct,#0e8f86)' stroke-width='2'/><line x1='403' y1='68.4' x2='408' y2='68.4' stroke='var(--correct,#0e8f86)' stroke-width='2'/><line x1='403' y1='150' x2='408' y2='150' stroke='var(--correct,#0e8f86)' stroke-width='2'/><text x='416' y='112.2' text-anchor='start' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>B rose 1.2</text><rect x='476' y='84' width='120' height='52' rx='10' fill='var(--amber,#f5b526)' fill-opacity='0.14' stroke='var(--amber,#f5b526)' stroke-width='1.5'/><text x='536' y='104' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>0.6 : 1.2 = 1 : 2</text><text x='536' y='124' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>so A &#8594; 2B</text><text x='320' y='192' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>twice the change carries twice the <tspan class=\"vocab-term\" data-vocab-key=\"coefficient\">coefficient</tspan></text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A drops from 1.0 to 0.4, so A consumed is 0.6. B rises to 1.2 produced. The</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">ratio 0.6 to 1.2 reduces to 1 to 2, so the equation is A ⇌ 2B.</text></svg>"},{"at":62.78,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>So the balanced equation is A reacting to form 2B; the coefficients are 1 and 2. The species that changes twice as fast carries twice the coefficient, which is exactly why B moves faster than A here.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE EQUATION</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"98\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the balanced equation is A reacting</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"129\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to form 2B; the coefficients are 1 and</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"24\" y=\"160\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">2.</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"191\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The species that changes twice as fast</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"222\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">carries twice the <tspan class=\"vocab-term\" data-vocab-key=\"coefficient\">coefficient</tspan>, which is</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"253\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">exactly why B moves faster than A here.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A ⇌ 2B: B changes twice as fast, so it carries twice the coefficient</text></svg>"},{"at":73.7,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The species that changes twice as fast carries twice the coefficient. So if one curve dropped three times as steeply as another, that would point to a coefficient of 3. Steepness scales directly with the coefficient.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE GENERAL RULE</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The species that changes twice as fast</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">carries twice the <tspan class=\"vocab-term\" data-vocab-key=\"coefficient\">coefficient</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So if one curve dropped three times as</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">steeply as another, that would point to a</text><text class=\"ln\" data-g=\"1\" data-w=\"17\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">coefficient of 3.</text><text class=\"ln\" data-g=\"2\" data-w=\"34\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Steepness scales directly with the</text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">coefficient.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Three times as steep would point to a coefficient of 3</text></svg>"},{"at":85.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Coefficients from Changes</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Coefficients from</tspan><tspan x=\"48\" y=\"110\">Changes</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Read each species' change from start to equilibrium;</text><text class=\"ln\" data-g=\"0\" data-w=\"46\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the ratio of those changes is the ratio of the</text><text class=\"ln\" data-g=\"0\" data-w=\"13\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">coefficients.</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">With A consumed 0.6 and B produced 1.2, the ratio</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">0.6 : 1.2 reduces to 1 : 2, so A ⇌ 2B.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A faster change means a larger <tspan class=\"vocab-term\" data-vocab-key=\"coefficient\">coefficient</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAG0AAACTCAYAAACEYJc/AAAC3ElEQVR4nO2d0W7CMBAEnfz/P19VRCVUQRtCnNvdzLyX2BnmZCi0YwAAAAAAAAAAAAAAAAAAAAAAAAAAQCt1J1HDOgKpB1mJ4iKlpRMnrZ6UlVZbnLQrECWt/igqqbYoaY8sd0YgMdJqQ0kptcVIe0VibRHS6ldBf4lKqC1C2n/C0mqzl1Y7ynGvzV7a1qKSarOWVh8U41ybtbR3S0qpzVZaHVCKa2220vYWlFCbpbQ6sBDH2iylfVqOe2120mpCGW61ralvVyXXZiVtJmVU23rFyl49hos4G2lgJm1GZc61WUgDM2kzK3OtTV4amEk7ozLH2qSlgZm0Mytzq01WGphJ66jMqTZJaWAmrbMyl9rkpIGZNIXKHGqTkgZm0pQqU69NRhqYSVOsTLk2CWlgJk25MtXa2qWBmTSHyhRrozRD2qQ5VaZWG6UZIiHNoTKltbZI6z4yu++lvTSFZ67bmk+XllRZ157aSwNxaY7HfMXjP6UZ0ibNubLuPZwmLfEA0rVHxqMhLdISRmPnXlaFsZE0OuuEvawqm0wSFyctaTR27am9tERq8tSYLu0q/5XiTCjNEKQZcqq0xENIx94ozRCkGYI0Q5BmCNIMaf24QRLFxw1Adjwmv26zlvaOmJTxuUx+MnIQMaT9E8YJI7Ku/gnjlBFpLy2hJqW9SnzVSeUblnu45FedXuEkLlbafzU5jtBq2oNUac5j8jK/uX4mxUVcdf6d5SG64S1Cu+ge7VLjcY/IK7KoP1tfiVqaquuu7HbN0cin4s6+aQrCbtcdzRwh7jczbqaKsNu1hwDv3JDaKO/Im6ok7Hb9IcKe02JNHpuqJ9j2BRx1k+rhZ5OFfSOxCKXTYomdVp8hs5Du02KJnFC3ILWYdw8dy4c3c/bjz0JyUbOO+tX8suEoZBfW9RbWIizrB/kFniFwMRD1iNVij5K4mEkCAAAAAAAAAAAAAAAAAAAAAAAAgPHNF5kszJjtkmHeAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"165.0\" width=\"92.0\" height=\"124.1\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"165.0\" width=\"92.0\" height=\"124.1\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A consumed 0.6 : B produced 1.2 = 1 : 2, so A ⇌ 2B</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"concentration":{"t":"Concentration","ar":"التركيز","def":"The amount of solute present in a given quantity of solvent or solution which can be expressed in many units, e.g.  mol/cm³, even g/cm³ or g/kg"},"coefficient":{"t":"Coefficient","ar":"المعامل","def":"A number placed before a chemical formula in a chemical equation to indicate how many molecules or moles of the substance are involved in the reaction."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
