<style>

    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);

  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }

  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you calculate consumer surplus as a triangle area for welfare analysis?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"170\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">Consumer surplus</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#176</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you calculate consumer</tspan><tspan x=\"24\" y=\"190\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> as a triangle area for</tspan><tspan x=\"24\" y=\"230\">welfare analysis?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 3:05</text></svg>"},{"at":29.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Consumer surplus equals one half times base times height. The base is the quantity sold, which is 16. The height is the demand intercept minus the market price, so 28 minus 12 equals 16. Consumer surplus equals one half times 16 times 16, which is 128.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#f system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why Surplus Is a Triangle</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Why <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">Surplus</tspan> Is a Triangle</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='70' y1='28' x2='70' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='70' y1='190' x2='540' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='300' y='208' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>quantity</text><text x='30' y='108' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 30 108)'>price ($)</text><polygon points='70,40 70,126 316,126' fill='var(--indigo,#5545e8)' opacity='0.22'/><line x1='70' y1='40' x2='500' y2='190' stroke='var(--indigo,#5545e8)' stroke-width='2.6'/><text x='430' y='168' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'><tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan></text><line x1='70' y1='126' x2='430' y2='126' stroke='var(--rose,#f43f61)' stroke-width='2' stroke-dasharray='6 4'/><text x='436' y='130' font-size='10' font-weight='800' fill='var(--rose,#f43f61)'>price 12</text><line x1='316' y1='126' x2='316' y2='190' stroke='var(--muted,#606b84)' stroke-width='1.1' stroke-dasharray='4 3'/><circle cx='316' cy='126' r='4' fill='var(--rose,#f43f61)'/><text x='316' y='204' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>16</text><text x='62' y='44' text-anchor='end' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>28</text><text x='150' y='100' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--indigo,#5545e8)'><tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan></text><text x='150' y='114' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>= ½ × 16 × 16 = 128</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Consumer surplus is the shaded triangle below demand and above the 12 price: base 16,</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">height 28 minus 12, so area is half of base times height, which is 128.</text></svg>"},{"at":69.6,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student multiplied base times height, 16 times 16, and got 256, then called it consumer surplus. But that gives the area of a rectangle. The surplus region is a triangle, so you must divide the rectangle area by 2, which gives 128. The rectangle would fit only if every buyer valued the good at the 28 intercept, but buyers value units differently, so the area shrinks toward the right.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: DO NOT FORGET THE HALF</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"24\" y=\"94\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student multiplied base times height, 16 times 16,</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"117\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and got 256, then called it <tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"140\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But that gives the area of a rectangle.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"163\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> region is a triangle, so you must divide</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"24\" y=\"186\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the rectangle area by 2, which gives 128.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"209\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The rectangle would fit only if every buyer valued</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"24\" y=\"232\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the good at the 28 intercept, but <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> value units</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"255\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">differently, so the area shrinks toward the right.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Base × height is the rectangle; surplus is half of it</text></svg>"},{"at":117,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>For the bread market the demand intercept is 14, the equilibrium price is 11, and the equilibrium quantity is 6. The height is 14 minus 11, which is 3, so consumer surplus equals one half times 6 times 3, which is 9. A student used 14 minus 11 times 6 and got 18, but forgot the one half. That 18 is the full rectangle; the correct surplus is half of it, which is 9.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">A SECOND CASE: BREAD</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">For the bread market the <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> intercept is 14, the</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan> is 11, and the <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium quantity\">equilibrium quantity</tspan> is</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">6.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The height is 14 minus 11, which is 3, so consumer</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> equals one half times 6 times 3, which is 9.</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student used 14 minus 11 times 6 and got 18, but</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">forgot the one half.</text><text class=\"ln\" data-g=\"3\" data-w=\"53\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That 18 is the full rectangle; the correct surplus is</text><text class=\"ln\" data-g=\"3\" data-w=\"23\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">half of it, which is 9.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Bread: ½ × 6 × 3 = 9, not the rectangle value of 18</text></svg>"},{"at":177.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Consumer Surplus as Triangle Area</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">Consumer Surplus</tspan> as</tspan><tspan x=\"48\" y=\"110\">Triangle Area</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> triangle formula is always one half times</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">base times height.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The base is the quantity traded and the height is the</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price distance from the <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> down to the price</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">line.</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Missing the one half doubles the answer and counts</text><text class=\"ln\" data-g=\"2\" data-w=\"28\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">surplus that does not exist.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJEAAACTCAYAAACOEPsoAAAD/0lEQVR4nO3d7Y7qIBSF4WLm/m95T8w5ZkyjLbD5WBve59ckYxU2qxRtq8cBAAAAAAAAAAAAAAAAAAAAAAAAAMCf9PY3/jMzuypGSom6vaEYBeE5I0z/EKKK8JylzWemx7G5nEPXXUjMGcLott6Dvg1+bWjSpjPSlp3+FoTSELR4jhX8HAHkHC68g1ez/XMbcx7KRvStN+nG1QxQTsHPz+sdJKt4vl59m0F2YV27h0dY5NpifZNMdslao2aR+75Nq73bMp+ztL0R1l1yM1Fp0b69Bf82WCP2Zit47buPEEr6NotUiD6tLXL3OrW9M0dJ386PVQqSVIi8lAttjRfzSh6rFTnC4KTF+iYTIpRTmWmXD9GMw0gSPqxuE6KR03aLAbbFQxIyRIhFMkS99+yWhxtb+F1X6BC1lDuoNUHK3SYtHiyZEPU4/VD6eiVB8pyOsEYzrUo4ZS8FeRa6d5E+XcpxdQ7savDTgAFVXcBLJLnVGqN221HXWNuEvm11OPMOsKfIJefoWmzn7ZsamTTXXC7R6/DS874zy2zz7ENnCanGtNr71Iq8et/kGuQpuGKBd+ibbMPOWkzvo9cWqUG7lMPzIt/AFmYvTFOAIHhIda71W+3Z4endPpVwTm9Ey4HOfXdzfmxLVvC6vfo+2rQXbj1L5AzO6EJbRjt61mHpEI0O0Oxp327aFD1Iw4vbc5ZQDFDvtinMukNPe9Tcd+WhEqCnnn2cfW/atMtQWxdV+QTlqHbOmonlT8DWUA1Q77bN6vdjxVkoEuu8qB5Rm+EzkfIssYo0uMbdQ6R6vmqmJPJ5VStLrokw1iP6Hhh5PdSzD8t+ToQ1yYRo1JdPvUR+DbVZWCJEr2KoFCUCE6qZRIgQGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyFCrK8gVrj2ZUU2ua7hZ6IId3fcGfF93aFnok9fOL7yXqnalvCHs9eesEtRd5ulh66JSn62u/R5owY0NRjo2Yd02d/2WH22Swus5ZYLUc7gcEt3H+FCdPUrQNFZ0L6FC1HEATGhtvQQ/nOi3kbdzRoZIbrwHh6C9B0hghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshwnohuroM9fy/lS5ZtYK+qfVb8m6PkiKpFXTHvknMRCv+zPdO/ZMIUWkxch+rUOCebVbp30+U++nPBSt5rIqU2eb3vyP0TypEkffGnfsnczgb7W7R+un/NdvsQD7lLfGtIH1sNRONPDSkAIehVrYKUc3gPh9fs82xka06W3p4O4eh9PEAAAAAAAAAAAAAAAAAAAAAAAAAcMTzC+bYiQQP8Gt4AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"180.4\" width=\"92.0\" height=\"93.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"180.4\" width=\"92.0\" height=\"93.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">consumer surplus = ½ × quantity × (<tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> intercept - price)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"consumer surplus":{"t":"Consumer surplus","ar":"فائض المستهلك: توفير المشتري من السعر","def":"The benefit a consumer receives from buying a good, measured as the difference between the maximum price they would pay and the actual price paid."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"equilibrium price":{"t":"Equilibrium price","ar":"سعر التوازن: السعر الذي تتساوى عنده الكمية المطلوبة والمعروضة.","def":"The equilibrium price is the specific price at which the quantity demanded equals the quantity supplied."},"equilibrium quantity":{"t":"Equilibrium quantity","ar":"كمية التوازن: الكمية التي تتساوى عندها الكمية المطلوبة والمعروضة.","def":"The equilibrium quantity is the specific quantity demanded and supplied at the equilibrium price."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
