  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

 x=\"24\" y=\"44\">The <tspan class=\"vocab-term\" data-vocab-key=\"threshold\">Threshold</tspan> Is One</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='60' y1='70' x2='560' y2='70' stroke='var(--ink,#18213a)' stroke-width='2.4'/><line x1='310' y1='52' x2='310' y2='88' stroke='var(--amber,#f5b526)' stroke-width='3'/><text x='310' y='44' text-anchor='middle' font-size='11' font-weight='800' fill='var(--ink,#18213a)'>1</text><text x='310' y='104' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>unit <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan></text><text x='185' y='30' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--correct,#0e8f86)'>inelastic (below 1)</text><text x='435' y='30' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--indigo,#5545e8)'>elastic (above 1)</text><circle cx='185' cy='70' r='6' fill='var(--correct,#0e8f86)'/><text x='185' y='122' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>0.5</text><text x='185' y='138' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>6% ÷ 12%</text><circle cx='460' cy='70' r='6' fill='var(--indigo,#5545e8)'/><text x='460' y='122' text-anchor='middle' font-size='11' font-weight='800' fill='var(--indigo,#5545e8)'>2.5</text><text x='460' y='138' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>20% ÷ 8%</text><rect x='90' y='158' width='420' height='40' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.4'/><text x='300' y='183' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>compare the <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan> value to 1, then classify</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Compare each elasticity to 1: the gym at 2.5 sits in the elastic zone, the second case at</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">0.5 sits in the inelastic zone, and exactly 1 is the unit elastic boundary.</text></svg>"},{"at":42.28,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The rule is simple. When the absolute value is above 1, demand is elastic, meaning quantity demanded reacts more than in proportion to the price change. When it is below 1, demand is inelastic. When it equals exactly 1, demand is unit elastic. The threshold of 1 is the line that separates the three cases.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE BOUNDARY RULE</text><text class=\"ln\" data-g=\"0\" data-w=\"19\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The rule is simple.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When the absolute value is above 1, <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, meaning <tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> reacts more</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">than in proportion to the price change.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When it is below 1, demand is inelastic.</text><text class=\"ln\" data-g=\"3\" data-w=\"49\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When it equals exactly 1, demand is unit elastic.</text><text class=\"ln\" data-g=\"4\" data-w=\"49\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"threshold\">threshold</tspan> of 1 is the line that separates the</text><text class=\"ln\" data-g=\"4\" data-w=\"12\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">three cases.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Above 1 elastic, below 1 inelastic, exactly 1 unit elastic</text></svg>"},{"at":61.68,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Here is a second case. Price rises by 12 percent and quantity demanded falls by 6 percent, so elasticity is 6 divided by 12, which is 0.5. That is below 1, so demand is inelastic. With inelastic demand the quantity response is smaller in percentage terms than the price change, so buyers do not cut back much. With elastic demand they cut back more than in proportion.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE INELASTIC CASE</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"104\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Here is a second case.</text><text class=\"ln\" data-g=\"1\" data-w=\"58\" x=\"24\" y=\"124\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Price rises by 12 percent and <tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> falls by 6</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"24\" y=\"144\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percent, so <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan> is 6 divided by 12, which is 0.5.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"164\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is below 1, so <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is inelastic.</text><text class=\"ln\" data-g=\"3\" data-w=\"57\" x=\"24\" y=\"184\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">With <tspan class=\"vocab-term\" data-vocab-key=\"inelastic demand\">inelastic demand</tspan> the quantity response is smaller in</text><text class=\"ln\" data-g=\"3\" data-w=\"60\" x=\"24\" y=\"204\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percentage terms than the price change, so <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> do not cut</text><text class=\"ln\" data-g=\"3\" data-w=\"10\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">back much.</text><text class=\"ln\" data-g=\"4\" data-w=\"58\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">With <tspan class=\"vocab-term\" data-vocab-key=\"elastic demand\">elastic demand</tspan> they cut back more than in proportion.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Inelastic: the quantity reaction is smaller than the price change</text></svg>"},{"at":95.26,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student said demand must be elastic just because quantity fell when price rose. That tells you nothing about elasticity. Every downward sloping demand curve shows a quantity fall when price rises, whatever the elasticity. What sets the elasticity is the relative size of the percentage changes. Demand is elastic only if the percentage drop in quantity is more than the percentage rise in price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: DIRECTION IS NOT ENOUGH</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student said <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> must be <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan> just because</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity fell when price rose.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That tells you nothing about <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Every downward sloping <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> shows a quantity</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fall when price rises, whatever the elasticity.</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">What sets the elasticity is the relative size of the</text><text class=\"ln\" data-g=\"3\" data-w=\"19\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percentage changes.</text><text class=\"ln\" data-g=\"4\" data-w=\"48\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Demand is elastic only if the percentage drop in</text><text class=\"ln\" data-g=\"4\" data-w=\"51\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity is more than the percentage rise in price.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Every demand curve falls; only the relative size sets elasticity</text></svg>"},{"at":143.4,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Classifying Elasticity</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Classifying <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">Elasticity</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Fix the boundary values in memory.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">An absolute value above 1 is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, below 1 is</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">inelastic, and equal to 1 is unit elastic, where</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"total revenue\">total revenue</tspan> stays the same when price changes.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The gym elasticity is 2.5, so each 1 percent rise in</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the fee causes a 2.5 percent fall in memberships, a</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">quantity response more than twice the price change.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHMAAADDCAYAAACxiS6TAAADh0lEQVR4nO3d266bMBBGYSbq+7+yq1xsCaEkm7CZwaxZ302lJg2HnzG2OXRZJEmSJEmSJEmSJEmSJEmSJL5YwMYYY/t3EYHd5ugUJD3Ux9IwyL3fuRtcmKNZ04oO812Qzz+3odKqExXm2ITTpSKRYe5Brk5smNGsKtFhdoQJc3zRXFKrFhOmDBPFylw4PVrDBDFMEMMEMcyFM1QxTBDDBMGEGZCm8i8wYXYcV7YJc0ADaxlmR4YJggozDnSCSB0nVJh7zpvkcyk6zG4ME+TR+e67AJ0vkWF+Qj5ftguTDhlmwJrP1mF2fZioRZgdzpfoMANYeW3D7Agb5mjQrLYIc/gYvO5u2k7C7M1kTNjBmrKZnT3IWdcxZt5Jfzn6R+IE+1nreLZpVmS9k87YQaPgpU5nri+qmZ2x2brbuk8RZnWzFSctY/07MwR6eZiznn/uGOjlYWYEOX7Zqc/Pz9zxsxyEl4aZ0YEYX4SUEeiV1fmgBhkffjerabw60EvCzO7SR0R82qHPzzKX   var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"elasticity":{"t":"Elasticity","ar":"المرونة: مدى استجابة الكمية للتغيرات في السعر أو الدخل.","def":"A measure of how much one economic variable responds to a change in another economic variable."},"elasticity of demand":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"elastic":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"threshold":{"t":"Threshold","ar":"عتبة","def":"the level at which something starts to happen"},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"quantity demanded":{"t":"Quantity demanded","ar":"الكمية المطلوبة: مقدار ما يشتريه المستهلكون بسعر معين","def":"The specific amount of a good that consumers are willing and able to buy at a particular price."},"inelastic demand":{"t":"Inelastic demand","ar":"الطلب غير المرن: الكمية المطلوبة لا تتغير كثيرًا مع تغير السعر.","def":"A situation where the quantity demanded changes only slightly, or not at all, in response to a change in price."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"elastic demand":{"t":"Elastic demand","ar":"الطلب المرن: الكمية المطلوبة تتغير كثيرًا مع تغير السعر.","def":"A situation where the quantity demanded changes significantly in response to a change in price."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"total revenue":{"t":"Total revenue","ar":"الإيراد الكلي: إجمالي المال الذي يحصل عليه البائع من البيع.","def":"The total amount of money a firm receives from selling its goods or services, calculated as price multiplied by quantity sold."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
</body>
