e-width='1.4'/><text x='465' y='120' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--muted,#606b84)'>so the <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan> is</text><text x='465' y='146' text-anchor='middle' font-size='18' font-weight='800' fill='var(--ink,#18213a)'>acidic</text><rect x='130' y='176' width='380' height='44' rx='10' fill='var(--amber,#f5b526)' fill-opacity='0.18' stroke='var(--amber,#f5b526)' stroke-width='1.6'/><text x='320' y='204' text-anchor='middle' font-size='14.5' font-weight='800' fill='var(--ink,#18213a)'>equivalence pH lands below 7</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">At equivalence only the conjugate acid is left. It reacts with water to</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">release hydronium, so the solution is acidic and the pH sits below 7.</text></svg>"},{"at":44.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Here is the trap. People expect a pH of 7 at equivalence, but that rule only fits two strong partners. With a weak base the conjugate acid tips the mix acidic.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Here is the trap.</text><text class=\"ln\" data-g=\"1\" data-w=\"26\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">People expect a pH of 7 at</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"159\" fon gate acid</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">with its <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan> constant, build a table, and</text><text class=\"ln\" data-g=\"0\" data-w=\"20\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">solve for hydronium.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then convert that hydronium to a pH below</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">7.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the <tspan class=\"vocab-term\" data-vocab-key=\"weak base\">weak base</tspan> leaves behind an acid that</text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">drops the equivalence pH under 7.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Use the conjugate acid and its Ka, solve for hydronium, then convert to a pH below 7</text></svg>"},{"at":78.72,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why Equivalence pH Is Below 7</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Why Equivalence pH Is</tspan><tspan x=\"48\" y=\"110\">Below 7</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">At equivalence in a <tspan class=\"vocab-term\" data-vocab-key=\"weak base\">weak base</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> <tspan class=\"vocab-term\" data-vocab-key=\"titration\">titration</tspan>,</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">all the <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> has become its <tspan class=\"vocab-term\" data-vocab-key=\"conjugate acid\">conjugate acid</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">That conjugate acid hydrolyses, donating a hydrogen to</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">water to make hydronium, so the <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan> is acidic and</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the equivalence pH ends up below 7, not at 7.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHcAAADDCAYAAAC4Yo7pAAADHElEQVR4nO3c4Y6iMBiGUbrx/m+5G5IxMcZxiiJ8fT3n52Z2qDwUKJJZFgAAAAAAAAAAAACAz2rLwXrvfflirbXD9vlhG/r2qGdE/rccQNhz9skhcTnHx+Oateftm8sSflNRydEHutNyMHGDiRtM3GDiBrtUuWtMu4PuBZaAH5+5o9Eq7Iy9jH6WTx/QpU7LCYF7oc9wSNy0U+4eYr44WAl8/L64nPmhKp3CEg/sUtdc9iVuMHGDnfIQY9T9NdlN2TZmbrCp4n7L3fVXxmUbcYOJG0zcYOIGEzeYuMHEDSZuMHGDiRtM3GDiBhM3mLjBxA0mbjBxg4kbTNxg4gYTN1jpl9Krvz7bir8kb+a+8V70+vOV36UW90flSK8Sd5JT7CvEDeaGauPsnen0beYGEzeYuMHEDSZuMHGDWQpNvtx5RtzAqFdOy8HEDSZuMNfcG54tMw1xg4kbTNxg4gYTN5i4waxzJ13DjjBzg4kbTNxgrrk3PFtmGuIGEzeYuMHEDSZuMHGDWedOuoYdYeYGEzeYuMFccx88W16vvffPma//NtN12cwd/AJhxj9lJG4wcYOJG0zcYOIGEzeYde6NmdawI8zcYOIGEzeYuJM/YnzGDdXGwDPddJm5wcQNJm4wcYOJG0zcYJZCky5zRpi5wcQNnbUrcUMfPa7EDQ7shuqOZ8tMQdxg4gYTN5i4wcQNJm4wcYOJG0zcYOIGEzeYuMHEDSZuMHGDTRf3zC/L+0Rf1JePO8NrL63wGMvFHZkdZ8ygXnRcZeOOHPW//cyRO7L/sq13xv+VM3eLIwL3YrNxi9OvF6OzYmQn7zVL+gvbemd2x8bdO/Bv//cv7/zuimGne295yx+z7h86nZ4dbIsyA9169B99LWwbx1HhIChzQ1V557XCY3umxCBGZ+Oznbb3TG5vbEvcD++4vjH2Xr+3SthVmYGcteyZeUx/KTWYo5Y9e4+hWtSrkoPa41raXtjhr2yrathV2YHN8AiwFQ67Kj24qpFb8ahXUwyy8kOMyqYb8CMeNT429eDPWOcCAAAAAAAAAAAAAMtW/wH8qTklmPR+yQAAAABJRU5ErkJggg==\" x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">BH⁺ + H₂O → B + H₃O⁺, so more hydronium means the equivalence pH is below 7</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"weak base":{"t":"Weak base","ar":"قاعدة ضعيفة","def":"A base that partially dissociates into ions in aqueous solution."},"strong acid":{"t":"Strong acid","ar":"حمض قوي","def":"An acid that completely dissociates into ions in aqueous solution."},"conjugate acid":{"t":"Conjugate acid","ar":"الحمض المرافق","def":"The species formed when a proton is added to a base."},"hydronium ion":{"t":"Hydronium ion","ar":"أيون الهيدرونيوم","def":"The ion H₃O⁺, formed when a proton (H⁺) is transferred to a water molecule, representing the presence of acidic properties in a solution."},"acidic solution":{"t":"Acidic solution","ar":"محلول حمضي","def":"A solution with a pH less than 7, where [H⁺] > [OH⁻]."},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"leftover":{"t":"Leftover","ar":"متبقٍّ","def":"the part that is left after the rest is used"},"solution":{"t":"Solution","ar":"محلول","def":"A homogeneous mixture of two or more substances."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"titration":{"t":"Titration","ar":"معايرة","def":"A laboratory technique in which a solution of known concentration (titrant) is added to a solution of unknown concentration (analyte) to determine the latter's concentration."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
