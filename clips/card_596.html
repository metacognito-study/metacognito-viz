<title>Metacognito · Heat Gained by a Solution</title>
<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you calculate the heat gained or lost by a solution using q = mcΔT? A reaction warms a beaker of solution by a few degrees. Find the heat the solution gained.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"233\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Heat gained by <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#596</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you calculate the heat</tspan><tspan x=\"24\" y=\"190\">gained or lost by a solution</tspan><tspan x=\"24\" y=\"230\">using q = mcΔT? A reaction</tspan><tspan x=\"24\" y=\"270\">warms a beaker of solution by</tspan><tspan x=\"24\" y=\"310\">a few degrees. Find the heat</tspan><tspan x=\"24\" y=\"350\">the solution gained.</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:33</text></svg>"},{"at":20,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Use q equals mass times specific heat times the change in temperature. That is the formula for any substance simply changing temperature, ans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Work the Numbers</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Work the Numbers</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>Use the <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan>'s own <tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"specific heat\">specific heat</tspan></text><rect x='40' y='32' width='160' height='52' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='120' y='52' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>mass</text><text x='120' y='72' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>100 g</text><rect x='220' y='32' width='160' height='52' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='300' y='52' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>specific heat</text><text x='300' y='72' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>4.18</text><rect x='400' y='32' width='160' height='52' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='480' y='52' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>change in temp</text><text x='480' y='72' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>7.5 °C</text><rect x='40' y='98' width='520' height='34' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.4'/><text x='300' y='120' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>q = 100 × 4.18 × 7.5</text><rect x='130' y='142' width='340' height='36' rx='10' fill='var(--correct,#16a36a)' fill-opacity='0.13' stroke='var(--correct,#16a36a)' stroke-width='1.5'/><text x='300' y='166' text-anchor='middle' font-size='13.5' font-weight='800' fill='var(--ink,#18213a)'>q = 3,135 J ≈ 3.14 kJ</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">With 100 g, specific heat 4.18, and a 7.5 degree rise, q = 100 × 4.18 × 7.5 = 3,135 J, about 3.14</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">kJ. Use the solution's own mass; if given a <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan>, use volume times <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> first.</text></svg>"},{"at":58.6,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Here is the trap. For a dilute solution close to water, the water density is fine. But a strong solution can be denser, so its mass differs, and you cannot just assume water's density.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Here is the trap.</text><text class=\"ln\" data-g=\"1\" data-w=\"30\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">For a <tspan class=\"vocab-term\" data-vocab-key=\"dilute solution\">dilute solution</tspan> close to</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">water, the water <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> is fine.</text><text class=\"ln\" data-g=\"2\" data-w=\"36\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But a strong <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan> can be denser,</text><text class=\"ln\" data-g=\"2\" data-w=\"35\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">so its <tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan> differs, and you cannot</text><text class=\"ln\" data-g=\"2\" data-w=\"28\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">just assume water's density.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A strong solution is denser, so its mass is not water's</text></svg>"},{"at":73.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>If you are given a volume, not a mass, multiply the volume by the density first to get the mass. Then put that real mass into the heat formula and solve as before.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"volume\">VOLUME</tspan> GIVEN</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"101.5\" font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">If you are given a volume, not a</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"138.5\" font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan>, multiply the volume by the</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"175.5\" font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> first to get the mass.</text><text class=\"ln\" data-g=\"1\" data-w=\"32\" x=\"24\" y=\"212.5\" font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then put that real mass into the</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"249.5\" font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">heat formula and solve as before.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Volume given: mass = volume × density, then use q = mcΔT</text></svg>"},{"at":85.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Heat Gained by a Solution</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Heat Gained by a</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"solution\">Solution</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Find a solution's heat with q = mcΔT, using its own</text><text class=\"ln\" data-g=\"0\" data-w=\"23\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"mass\">mass</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"specific heat\">specific heat</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For 100 g warming 7.5 degrees, q is 3,135 J, about</text><text class=\"ln\" data-g=\"1\" data-w=\"8\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">3.14 kJ.</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">If only a <tspan class=\"vocab-term\" data-vocab-key=\"volume\">volume</tspan> is given, get the mass from volume</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">times <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> first.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKkAAAC4CAYAAACYX8wRAAAFgElEQVR4nO3d2XLcNhBAUcGV///lTsGVh6kJRRJLL+i+59G2NHJy3SRBDOfnBwAAAAAAAAAAAAAAAAAAAAAAAAAAAACAupr3D4AYRES+f621FqKPED8E4oT5G89gibQgGYgzQqhEWohMHNIjnAYQaRHyFdtoaKtfv+KP1QvBj2wI7PtrZk8ZZhBpMW1hAnqdkxJpcvIx8XZE9vk9rKYpkSYmmwPV+F5vEGlSohTo3etoIdKExCBQru4xTQyvuq0wSRNrRueO2v8wiDQRMToPtUakSUjSQDsiTUC+DrfZzkuJNOkElf9Y/Azak5tIkwXaHO+xayHSQ8lNfBahssEEQ4G0i8Ot1US1uEhjkh6u3UTSf09jQ4j1KQSRFlhqahtD9VjqSrWelp0sBrJzdz737qESSFs4T/VcJeBwfwDZOMFmQvV8f1NHpMGJwiF2ZaJ63HIl0sA0D7HtZagR9gRw4RSU5SFWbm6tWrz+EybpAZpyIFdhRgn07+t7vjiueQUiAZ5WcoVJGoznBGtfrxch0I5IA/E+xErQHVNEemCgYrCrKcoU7Yj00EBFcVNzpEA7InW2emtSNoTqfZrxhEgdjRxi5SaklVCjB9oRaRBvA90Z6gmBdkTqZDaQ9vFnVzY1nxJoR6QHXcm3X/7saKgnBdoR6eGBnrQvdBaRHh7ot5GYT5iiHZEeHqgoxBwNkRrQuqARg5gjIFJjGueWLXGgHZEqm734mV3YzxZoR6SKtC9+WoFAOyI9aFeTJF2sf0KkAQN982tt07ntCYh0s12H45Gn5mVYC71DpBut3vn5LVQpsBZ6J8VfIorV25hP9+BbkQulb0zSQEtNn7vtR98UJ0kD7VL9ZU4+D509B80eaMckdbySH92GVzHQjkgDTdBTnhdqjUidAn1zqK+0Fnon7b++yIv1uwNtiadoxyQdtGMX/FPkFddC7xDpgpGNIG/fNMeF0v+l/1cYcdsdgY5hkr60ehW+eoiXIlfyV4g0yKaRXa+fUbm/cLS7SU/fV4oH2jFJje4mzdxRqrQWeodIFXfBP11AsdT0TsnDx5Mdb4q7+h4V35+0A5P0wezh+O6iiUDHEOkXlpriIVLDpSYm6JzS5zqfWGqKi0m6cYLefS1rofPKR6rxQNuReFkLfVY60mgPCKu+1PSb0pF6P3+JtdB3ykY6s+2OQH2UjHR2gt2dHjBB9ZSLdDTQN2ugBKqrVKS7Lmg+v0/VxzFaKvMfalcgPO3OXolJunMtcvZJI7N/FgUi1XiPOg8Ts5U+Uq0JdvUkkiuch65LfdjxDsT79bNIO0m9A/F+/UxSRuodiPfrZ5MyUk/satovXaSeU6za0+6spIs0CgLdJ22knlOUQPdKFanX+SCB6koVqQcC1UekCwjUBpFOIlA7KSPVvnBhLdRWykg1sRZqj0gXsNRkg0gHcB7qI02k2ueJBOonTaSaCNRXukh3nycSqL8UkWod6gk0hn9+Etk1RVlmiuX4SHdN0dmnM0Pf0f8Dnj6me+brZ74PdB07SXd8BOIV4oznyGkxc2hmap7r2Em6GigT8xzHTdKR4Igzh1YlUCbnuY5ZzCfQuo6IdPZBtR0T9Hx/Ml3JE2hOoSNduQvEBM0jdKRX3lwoEWguf7JdKBFoPiEjJVCEjpSPnEHoSFeu5JFXmEhZC0XoSK/WNz+nZ/99NiXXFeLe/d3VOVvs4D5Jn5aPdnwCHc7mGunb9c3RT6BDLm6R8vHbCB0pgSJ0pNzCROhIRxfgCRqu56R8ujHCRcp5KEJHSqA45nDPIR4hI317scSuJoS9LdrxBjq4Rjp6C5Nbngi3TspaKJ6YbdTgkYsIP0lHdjkBAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPBj41/vagVruX8YTgAAAABJRU5ErkJggg==\" x=\"520.0\" y=\"176.9\" width=\"92.0\" height=\"100.2\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"176.9\" width=\"92.0\" height=\"100.2\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">q = mcΔT = 100 × 4.18 × 7.5 = 3,135 J</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"solution":{"t":"Solution","ar":"محلول","def":"A homogeneous mixture of two or more substances."},"mass":{"t":"Mass","ar":"الكتلة","def":"The amount of matter in an object. SI unit: kilogram (kg). Measured with a balance. Mass is a scalar quantity that does not change with location (unlike weight, which depends on gravitational field strength). In chemistry, g and kg are most common."},"specific heat":{"t":"Specific Heat","ar":"الحرارة النوعية","def":"The energy needed to raise the temperature of one gram of a substance by one degree Celsius (J/g.C)."},"temperature":{"t":"Temperature","ar":"درجة الحرارة","def":"A measure of the average kinetic energy of the particles in a substance. Higher temperature = more particle motion. Measured in Celsius (°C) or Kelvin (K) in chemistry. Temperature determines the direction of heat flow (heat flows from high T to low T)."},"volume":{"t":"Volume","ar":"الحجم","def":"The amount of three-dimensional space occupied by a substance. SI unit: cubic metre (m³). Common chemistry units: litre (L), millilitre (mL), cm³. Measured with graduated cylinders, pipettes, burettes, and volumetric flasks."},"density":{"t":"Density","ar":"الكثافة","def":"The mass per unit volume of a substance: ρ = m/V. SI unit: kg/m³; common in chemistry: g/mL or g/cm³. An intensive property - does not depend on sample size. Used to identify substances and convert between mass and volume."},"dilute solution":{"t":"Dilute solution","ar":"محلول مخفف","def":"A solution that contains a relatively small amount of solute in a given amount of solvent."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
