ey=\"world price\">World Price</tspan> Sets the <tspan class=\"vocab-term\" data-vocab-key=\"trade\">Trade</tspan> Direction</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><rect x='36' y='56' width='520' height='70' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.08' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='296' y='84' text-anchor='middle' font-size='17' font-weight='800' fill='var(--correct,#0e8f86)'>World price ABOVE &#8594; EXPORT</text><text x='296' y='106' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Home <tspan class=\"vocab-term\" data-vocab-key=\"firms\">firms</tspan> sell the <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> abroad</text><text x='296' y='122' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>e.g. soybeans: $4 home vs $6 world</text><line x1='36' y1='141' x2='556' y2='141' stroke='var(--muted,#606b84)' stroke-width='1.3' stroke-dasharray='5 4'/><rect x='198' y='129' width='196' height='25' rx='12' fill='var(--surface,#ffffff)' stroke='var(--ink,#18213a)' stroke-width='1.5'/><text x='296' y='146' text-anchor='middle' font-size='13' font-weight='800' fill='var(--ink,#18213a)'>Home no-trade price</text><rect x='36' y='156' width='520' height='70' rx='10' fill='var(--rose,#f43f61)' fill-opacity='0.08' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='296' y='184' text-anchor='middle' font-size='17' font-weight='800' fill='var(--rose,#f43f61)'>World price BELOW &#8594; IMPORT</text><text x='296' y='206' text-anchor='middle' font-size='13' font-weight='700' fill='var(--ink,#18213a)'>Home <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> buy cheaper from abroad</text><text x='296' y='222' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>e.g. shirts: $25 home vs $20 world</text><text x='2 term\" data-vocab-key=\"firms\">firms</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"12\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">will <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Foreign <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> fill the gap, so the</text><text class=\"ln\" data-g=\"1\" data-w=\"16\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">country <tspan class=\"vocab-term\" data-vocab-key=\"imports\">IMPORTS</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Shirts: world $20 below home $25, so Northland imports</text></svg>"},{"at":90.62,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>When the world price is ABOVE the no-trade price, home firms sell abroad at the higher price. At $6 home supply (750) tops home demand (300), so the 450-unit surplus is EXPORTED.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"world price\">WORLD PRICE</tspan> ABOVE: EXPORT</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When the world price is ABOVE the</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">no-<tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> price, home <tspan class=\"vocab-term\" data-vocab-key=\"firms\">firms</tspan> sell</text><text class=\"ln\" data-g=\"0\" data-w=\"27\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">abroad at the higher price.</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">At $6 home <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> (750) tops home</text><text class=\"ln\" data-g=\"1\" data-w=\"29\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> (300), so the 450-unit</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> is EXPORTED.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Soybeans: world $6 above home $4, so Northland <tspan class=\"vocab-term\" data-vocab-key=\"exports\">exports</tspan></text></svg>"},{"at":109.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A country can export even if it is slower at making everything. The low no-trade price signals a COMPARATIVE advantage (lower opportunity cost), and that, not absolute advantage, sets the direction.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">COMPARATIVE, NOT ABSOLUTE</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"98\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A country can export even if it is</text><text class=\"ln\" data-g=\"0\" data-w=\"28\" x=\"24\" y=\"129\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">slower at making everything.</text><text class=\"ln\" data-g=\"1\" data-w=\"32\" x=\"24\" y=\"160\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The low no-<tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> price signals a</text><text class=\"ln\" data-g=\"1\" data-w=\"28\" x=\"24\" y=\"191\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"comparative advantage\">COMPARATIVE advantage</tspan> (lower</text><text class=\"ln\" data-g=\"1\" data-w=\"32\" x=\"24\" y=\"222\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"opportunity cost\">opportunity cost</tspan>), and that, not</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"253\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"absolute advantage\">absolute advantage</tspan>, sets the direction.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The no-trade price reveals comparative advantage</text></svg>"},{"at":144.62,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Direction of trade</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Direction of <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"48\" y=\"128\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Compare the <tspan class=\"vocab-term\" data-vocab-key=\"world price\">world price</tspan> with the home</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"48\" y=\"153\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">no-trade price: a world price ABOVE the</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"178\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">no-trade price means the country <tspan class=\"vocab-term\" data-vocab-key=\"exports\">EXPORTS</tspan>; a</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"48\" y=\"203\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">world price BELOW it means the country</text><text class=\"ln\" data-g=\"0\" data-w=\"8\" x=\"48\" y=\"228\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"imports\">IMPORTS</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"48\" y=\"253\" font-size=\"17\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Those two prices alone fix the direction.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKMAAABpCAYAAABWH5NSAAAC9klEQVR4nO3c626DMAyGYVz1/m85E9UqIcSpkMSfnff516mDkDjOgWzTBAAAAAAAAAAAAAAAAAAAAAAAAAAAAABopvw7+xlyeE2itgKOIMzNJjF3A87M5J4FgTPjk8xH1oxPKhgxtvck6jvsHmW8+TtPM2LPjMpUInBmPAsUhuZcpIMRY0kTjDWGwPU1an9G0Dnj2rJhl8MzDZ5HmGBkfphfmmEa59RfpUoH4zwEMwzXpxqQr2g9meDMFYBLUg27XphEqEBVttFp1Rd+LplRfe6SUQlQ32/lStnrvREqVo0FGGmk54xqm9Y1P1/57uyXz1Nw0vuM6j259fOUjVPuve7tIVVmVOeZvSxA5pTOjHuVGqGXt372cpI1W5x4ah3Q0sEYoTf/ItLZy737t2yTLsG4V4lHletd8WpZvSSsj7XmmWeESsw8epSOG+XSwzTyT13cgrF2RY6Wda1zIPau33fGxmoxtPS6ZtkIgCf3+15veY2tnyl0BNdgPDqRc+W0znpBcGehdEeN662fp+xcs0YgXrnP3e+l2PTutZJWHcqvlMuc5odex/bCv4FZv6PNwCo9095ocvQ7nudHu27t9Hgw1Ux4xgQ6lPdB5lQLGJVGjagInKhPF4z4Te3Vu/Sc8WiFDF9FKBBTLGCQIxBdgnHvCBR86947ED9l6HUjgk+TCQRh98yo9NDQbJPXyA8/MhNsC/fXTYqVklURr3eX1TTbPdjC1s6ATDAryryBITtiRmYcUBHt/G7/+MnjvtAeprsXqsUpaY8y1CiLSjlUuG7tXKnAswa72gg1rtOjLOZUDoVgdi+A5/B+twFaTDPMuSwE401PG6DFX/dFL4sRjH0boGWF1/gnqNnqBAjLrVeoZBKlshSRcngJt7WTcY6lVBZP4YJRZfX5tBxqZVEgv8+4/P4WlWtE26ucsc/4gFImUXl7Uthn9KU0x1IpSxEpx6MyTMFdbYRRVuRKdQIAAAAAAAAAAAAAAAAAAAAAAAAAAABMffwBLx8sn7B4daYAAAAASUVORK5CYII=\" x=\"520.0\" y=\"177.4\" width=\"92.0\" height=\"59.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"177.4\" width=\"92.0\" height=\"59.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">World price &gt; no-trade -&gt; export   ·   world price &lt; no-trade -&gt; import</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"international trade":{"t":"International trade","ar":"التجارة الدولية: تبادل السلع والخدمات بين الدول","def":"International trade is the exchange of goods and services across national borders."},"exports":{"t":"Exports","ar":"الصادرات: سلع وخدمات تبيعها دولة لدول أخرى.","def":"Goods and services sent out of a country to another country."},"imports":{"t":"Imports","ar":"الواردات: سلع وخدمات تشتريها دولة من دول أخرى.","def":"Goods and services brought into a country from another country."},"world price":{"t":"World price","ar":"السعر العالمي: سعر السلعة في السوق الدولية","def":"The world price is the price of a good or service in the global market, outside of any domestic taxes or subsidies."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"firms":{"t":"Firms","ar":"الشركات: المنظمات التي تنتج وتبيع السلع والخدمات.","def":"Firms are organizations that produce and sell goods and services."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"comparative advantage":{"t":"Comparative advantage","ar":"الميزة النسبية: تنتج بتكلفة فرصة أقل من غيرك.","def":"The ability to produce a good at a lower opportunity cost than another producer."},"opportunity cost":{"t":"Opportunity cost","ar":"تكلفة الفرصة البديلة: قيمة أفضل بديل تم التنازل عنه","def":"The value of the best alternative that was not chosen when a decision was made."},"absolute advantage":{"t":"Absolute advantage","ar":"الميزة المطلقة: تنتج أكثر بنفس الموارد أو تنتج نفس الكمية بموارد أقل.","def":"The ability to produce a good using fewer inputs or produce more output with the same inputs than another producer."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
