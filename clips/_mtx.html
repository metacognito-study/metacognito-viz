<!doctype html><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}body{background:#fff;margin:0}svg{width:100%}</style><div style="width:900px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Two tests, four kinds of good</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Two tests, four kinds of good</tspan></text><g transform="translate(24,64)"><text x='215' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>can block non-payers</text><text x='215' y='54' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(excludable)</text><text x='451' y='38' text-anchor='middle' font-size='13' font-weight='700' fill='var(--muted,#606b84)'>cannot block</text><text x='451' y='54' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-excludable)</text><text x='52' y='100' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>gets used up</text><text x='52' y='116' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(rival)</text><text x='52' y='192' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>no using-up</text><text x='52' y='208' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-rival)</text><rect x='100' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Private good</text><text x='215' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a slice of pizza</text><rect x='336' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='451' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Common resource</text><text x='451' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a shared fishing ground</text><rect x='100' y='154' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='192' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Club good</text><text x='215' y='216' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a cable channel</text><rect x='336' y='154' width='230' height='88' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='2'/><text x='451' y='186' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>Public good</text><text x='451' y='207' text-anchor='middle' font-size='12' font-weight='600' fill='var(--ink,#18213a)'>a fireworks show</text><text x='451' y='228' text-anchor='middle' font-size='11' font-weight='700' fill='var(--indigo,#5545e8)'>both tests fail</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">no using-up (rivalry) and no way to block (excludability) are two separate tests; pairing them gives four kinds of good</text></svg></div>
