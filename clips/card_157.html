<title>Metacognito · Is a Price Ceiling Binding?</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

Binding Test for a Ceiling</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><rect x='20' y='26' width='270' height='150' rx='11' fill='var(--rose,#f43f61)'/><text x='155' y='48' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'>Ceiling 800</text><text x='155' y='68' text-anchor='middle' font-size='11' font-weight='700' fill='#fff'>800 is below <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> 1000</text><line x1='40' y1='80' x2='270' y2='80' stroke='#fff' stroke-width='1' opacity='0.5'/><text x='155' y='102' text-anchor='middle' font-size='13' font-weight='800' fill='#fff'>it BINDS</text><text x='155' y='124' text-anchor='middle' font-size='11' font-weight='700' fill='#fff'>Qd 400, Qs 250</text><text x='155' y='145' text-anchor='middle' font-size='12.5' font-weight='800' fill='#fff'><tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan> 150 apartments</text><text x='155' y='166' text-anchor='middle' font-size='10.5' font-weight='700' fill='#fff'>rent stays at 800</text><rect x='310' y='26' width='270' height='150' rx='11' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.6'/><text x='445' y='48' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>Ceiling 1200</text><text x='445' y='68' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>1200 is above equilibrium 1000</text><line x1='330' y1='80' x2='560' y2='80' stroke='var(--line,#e5eaf2)' stroke-width='1'/><text x='445' y='102' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>it does NOT bind</text><text x='445' y='124' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>market still clears</text><text x='445' y='145' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>no shortage</text><text x='445' y='166' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>rent stays at 1000</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Compare the ceiling with the <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>: a ceiling below 1000 binds and leaves a</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">shortage, while a ceiling above 1000 does nothing because trades already happen below it.</text></svg>"},{"at":47.24,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A price ceiling binds when the legal maximum price sits below the equilibrium price. Then the ceiling stops rent from rising to 1000, so the market cannot clear and a shortage of 150 apartments stays. In the binding case the market price becomes the ceiling itself: rent stays at 800 instead of rising to 1000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHEN A CEILING BINDS</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A <tspan class=\"vocab-term\" data-vocab-key=\"price ceiling\">price ceiling</tspan> binds when the legal maximum price</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sits below the <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then the ceiling stops rent from rising to 1000,</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">so the market cannot clear and a <tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan> of 150</text><text class=\"ln\" data-g=\"1\" data-w=\"17\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">apartments stays.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">In the binding case the market price becomes the</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">ceiling itself: rent stays at 800 instead of</text><text class=\"ln\" data-g=\"2\" data-w=\"15\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">rising to 1000.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Ceiling below <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> binds; the price gets stuck at the ceiling</text></svg>"},{"at":80.68,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A non binding price ceiling leaves the market outcome untouched. When the legal maximum price sits above the equilibrium price, trades already happen below the ceiling, so the law never limits them. A ceiling set at 1200 while equilibrium is 1000 does nothing: the market still clears at 1000 and no shortage appears.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHEN A CEILING DOES NOT BIND</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A non binding <tspan class=\"vocab-term\" data-vocab-key=\"price ceiling\">price ceiling</tspan> leaves the market</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">outcome untouched.</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When the legal maximum price sits above the</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>, trades already happen below the</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">ceiling, so the law never limits them.</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A ceiling set at 1200 while <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> is 1000</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">does nothing: the market still clears at 1000 and</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">no <tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan> appears.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Ceiling above equilibrium leaves the market exactly as it was</text></svg>"},{"at":94.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student claimed any legal maximum price changes the market, because the law alone creates worry. But the binding test is purely mechanical. You just compare the ceiling with the equilibrium price. Below equilibrium it binds, above equilibrium it does not. The law existing is not enough; the ceiling level relative to equilibrium is what decides.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: IT IS MECHANICAL</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"97\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student claimed any legal maximum price changes the</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"119\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">market, because the law alone creates worry.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"141\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But the binding test is purely mechanical.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"24\" y=\"163\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">You just compare the ceiling with the <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>.</text><text class=\"ln\" data-g=\"3\" data-w=\"53\" x=\"24\" y=\"185\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Below <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> it binds, above equilibrium it does</text><text class=\"ln\" data-g=\"3\" data-w=\"6\" x=\"24\" y=\"207\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">not.</text><text class=\"ln\" data-g=\"4\" data-w=\"49\" x=\"24\" y=\"229\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The law existing is not enough; the ceiling level</text><text class=\"ln\" data-g=\"4\" data-w=\"40\" x=\"24\" y=\"251\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">relative to equilibrium is what decides.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Compare the ceiling to equilibrium, not whether a law merely exists</text></svg>"},{"at":144.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Binding Price Ceiling</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Binding <tspan class=\"vocab-term\" data-vocab-key=\"price ceiling\">Price Ceiling</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A price ceiling binds only when it sits below the</text><text class=\"ln\" data-g=\"0\" data-w=\"18\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"equilibrium price\">equilibrium price</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Below <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> it binds and a <tspan class=\"vocab-term\" data-vocab-key=\"shortage\">shortage</tspan> results,</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">with the market price stuck at the ceiling.</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Above equilibrium it does not bind and the outcome</text><text class=\"ln\" data-g=\"2\" data-w=\"16\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">does not change.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The comparison is always the ceiling level against</text><text class=\"ln\" data-g=\"3\" data-w=\"34\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the free <tspan class=\"vocab-term\" data-vocab-key=\"market equilibrium\">market equilibrium</tspan> price.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHMAAADDCAYAAACxiS6TAAADh0lEQVR4nO3d266bMBBGYSbq+7+yq1xsCaEkm7CZwaxZ302lJg2HnzG2OXRZJEmSJEmSJEmSJEmSJEmSJL5YwMYYY/t3EYHd5ugUJD3Ux9IwyL3fuRtcmKNZ04oO812Qzz+3odKqExXm2ITTpSKRYe5Brk5smNGsKtFhdoQJc3zRXFKrFhOmDBPFylw4PVrDBDFMEMMEMcyFM1QxTBDDBMGEGZCm8i8wYXYcV7YJc0ADaxlmR4YJggozDnSCSB0nVJh7zpvkcyk6zG4ME+TR+e67AJ0vkWF+Qj5ftguTDhlmwJrP1mF2fZioRZgdzpfoMANYeW3D7Agb5mjQrLYIc/gYvO5u2k7C7M1kTNjBmrKZnT3IWdcxZt5Jfzn6R+IE+1nreLZpVmS9k87YQaPgpU5nri+qmZ2x2brbuk8RZnWzFSctY/07MwR6eZiznn/uGOjlYWYEOX7Zqc/Pz9zxsxyEl4aZ0YEYX4SUEeiV1fmgBhkffjerabw60EvCzO7SR0R82qHPzzKX/bOMhR5m1kaO1QGyd6I9e8dXB/roMASJjarlVgf6oA9B4qKe5hWBloR597HkUdXbWtrMdgryig5RephXjrvGZE+BZS87vVIqryyML3q06+9Urxt+Ou9M45dx5N7hy938W0BiFdKnQKkdMlSYrwJdPiAFiQxzTw+SFiI6THpo00znETses0D2ZrsyTJDSc2a3c1g1KxPEMEEME8ShCYiVCWKYIIYJ4jgTxMoEMUwQwwRxnAm65GdlghgmSPltI50ug4WPJ+gom1kQwwQxTBDHmSBWJohhgmaAvAQGYmWCoB8cuhp6BsiHhnJh3tAlz5kodoBAHJqAWJmJvG1Eh1mZIF41AXEGKBF6Bki5DBPEcSaIlQlimCCGmQg9A+SLEHNZmSCGmchJA5gonAVynAliMwtimCAOTZJhx5ndDPJ/hqpc9mZBvNMgkZMGOszeLIgdIBDDBDHMZL7TAGI4aaCjbGZBnDRIhJ408IauXDazIIYJYpggj+oOQad3tD95p4EOsZkFMUwQx5nJKvsIViaIYYJ4dx6IlZkI/eR0R9GhA+Qboc8XlcGtj9J1mK+O3lf/Zs9nM6pa39Iw3wW63cht1b47CL75bO939v7+3gPzt4P2TGVHduVGzaJ6m0t3atfzZBQdvJdUSJdQo0kLJEmSJEmSJEmSJEmSJEmStMzvP+7NJQjSxP9oAAAAAElFTkSuQmCC\" x=\"524.7\" y=\"137.0\" width=\"82.6\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"524.7\" y=\"137.0\" width=\"82.6\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">ceiling &lt; equilibrium → binds, shortage    ceiling &gt; equilibrium → no effect</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"determine":{"t":"Determine","ar":"يُحدِّد","def":"to find out or decide"},"price ceiling":{"t":"Price ceiling","ar":"سقف سعري: أقصى سعر قانوني يمكن بيع سلعة به","def":"A price ceiling is a legal maximum price at which a good or service can be sold."},"equilibrium":{"t":"Equilibrium","ar":"التوازن: النقطة التي تتساوى فيها الكمية المطلوبة والمعروضة.","def":"Equilibrium is the state where the quantity demanded equals the quantity supplied, with no tendency for change."},"shortage":{"t":"Shortage","ar":"نقص/عجز: الكمية المطلوبة أكثر من المعروضة.","def":"A market situation where the quantity demanded for a good or service is greater than the quantity supplied at a given price."},"equilibrium price":{"t":"Equilibrium price","ar":"سعر التوازن: السعر الذي تتساوى عنده الكمية المطلوبة والمعروضة.","def":"The equilibrium price is the specific price at which the quantity demanded equals the quantity supplied."},"market equilibrium":{"t":"Equilibrium","ar":"","def":"The market condition where quantity supplied equals quantity demanded at a particular price. There is no pressure for the price to change."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
