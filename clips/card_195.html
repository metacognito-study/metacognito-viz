(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you identify the producer surplus loss from a tax?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"143\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"cost\">Cost</tspan> of a <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#195</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you identify the producer</tspan><tspan x=\"24\" y=\"190\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> loss from a tax?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 3:38</text></svg>"},{"at":46.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Producer surplus before the tax is the triangle above supply and below the 8 price out to 8000 units. After the tax sellers keep only 6 and sell only 6000 units, so the lost producer surplus is the trapezoid between the two seller price lines above supply. The loss equals the 2 price drop times one half times 8000 plus 6000, which is 2 times 7000, so 14000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAPEZOID RULE, <tspan class=\"vocab-term\" data-vocab-key=\"supply\">SUPPLY</tspan> SIDE</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"105.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">Producer surplus</tspan> before the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> is the triangle above</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"128.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">supply and below the 8 price out to 8000 units.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"151.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">After the tax <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> keep only 6 and sell only 6000</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"24\" y=\"174.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">units, so the lost producer surplus is the trapezoid</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"197.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">between the two seller price lines above supply.</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"24\" y=\"220.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The loss equals the 2 price drop times one half times</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"24\" y=\"243.5\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">8000 plus 6000, which is 2 times 7000, so 14000.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Trapezoid loss = price drop × average of the two quantities = 14000</text></svg>"},{"at":62.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The PS Loss: Rectangle Plus Triangle</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The PS Loss: Rectangle Plus Triangle</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><line x1='70' y1='30' x2='70' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='70' y1='190' x2='560' y2='190' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='300' y='208' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)'>quantity (bottles)</text><text x='30' y='110' text-anchor='middle' font-size='10.5' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 30 110)'>price ($)</text><rect x='70' y='70' width='263' height='27' fill='var(--indigo,#5545e8)' opacity='0.28'/><polygon points='333,97 420,70 333,70' fill='var(--rose,#f43f61)' opacity='0.36'/><line x1='70' y1='180' x2='420' y2='70' stroke='var(--indigo,#5545e8)' stroke-width='2.6'/><text x='426' y='70' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><line x1='70' y1='70' x2='420' y2='70' stroke='var(--ink,#18213a)' stroke-width='1.4' stroke-dasharray='6 4'/><line x1='70' y1='97' x2='420' y2='97' stroke='var(--muted,#606b84)' stroke-width='1.4' stroke-dasharray='6 4'/><text x='64' y='74' text-anchor='end' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>8</text><text x='64' y='101' text-anchor='end' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>6</text><text x='64' y='184' text-anchor='end' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>0</text><line x1='333' y1='97' x2='333' y2='190' stroke='var(--muted,#606b84)' stroke-width='1.1' stroke-dasharray='4 3'/><line x1='420' y1='70' x2='420' y2='190' stroke='var(--muted,#606b84)' stroke-width='1.1' stroke-dasharray='4 3'/><text x='333' y='204' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>6000</text><text x='420' y='204' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>8000</text><text x='200' y='87' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--ink,#18213a)'>rectangle 12000</text><text x='462' y='52' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>triangle 2000</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The price <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> keep falls from 8 to 6. Sellers who stay lose the rectangle on 6000 units; sellers</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">who leave lose the triangle on the 2000 lost units. Together they make the 14000 loss.</text></svg>"},{"at":87.46,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student measured producer surplus after the tax using the 9 buyer price instead of the 6 seller price. But sellers do not keep the buyer price; they must hand 3 per unit to the government. The right baseline for producer surplus is always the price sellers actually keep, which is 6, no matter which side legally pays the tax.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: USE THE PRICE <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">SELLERS</tspan> KEEP</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student measured <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">producer surplus</tspan> after the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">using the 9 buyer price instead of the 6 seller</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But sellers do not keep the buyer price; they must</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hand 3 per unit to the government.</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The right baseline for producer surplus is always</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the price sellers actually keep, which is 6, no</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">matter which side legally pays the tax.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Baseline for PS is the price sellers keep, 6, never the buyer price 9</text></svg>"},{"at":128.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>There is a neat accounting rule: the combined loss of consumer and producer surplus equals tax revenue plus deadweight loss. Consumer surplus loss is 7000, revenue is 18000, deadweight loss is 3000. So producer surplus loss equals revenue plus deadweight loss minus the consumer surplus loss: 18000 plus 3000 minus 7000, which is 14000. That rule confirms the trapezoid answer.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE ACCOUNTING CHECK</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">There is a neat accounting rule: the combined loss of</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">consumer and <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">producer surplus</tspan> equals <tspan class=\"vocab-term\" data-vocab-key=\"tax revenue\">tax revenue</tspan> plus</text><text class=\"ln\" data-g=\"0\" data-w=\"16\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">Consumer surplus</tspan> loss is 7000, <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan> is 18000,</text><text class=\"ln\" data-g=\"1\" data-w=\"24\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">deadweight loss is 3000.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So producer surplus loss equals revenue plus deadweight</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">loss minus the consumer surplus loss: 18000 plus 3000</text><text class=\"ln\" data-g=\"2\" data-w=\"27\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">minus 7000, which is 14000.</text><text class=\"ln\" data-g=\"3\" data-w=\"40\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That rule confirms the trapezoid answer.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">CS loss + PS loss = revenue + <tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan>; this gives PS loss = 14000</text></svg>"},{"at":200.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Producer Surplus Loss from a Tax</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">Producer Surplus</tspan> Loss</tspan><tspan x=\"48\" y=\"110\">from a <tspan class=\"vocab-term\" data-vocab-key=\"tax\">Tax</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The producer surplus loss from a tax equals the seller</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price drop times the after tax quantity, plus one half</text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">times the seller price drop times the drop in quantity.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">It splits into a rectangle for <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> who stay and a</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">triangle for those who leave, both coming from the lower</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price sellers keep, not from who legally pays.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> starting point sets the level of producer</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> but does not change how much is lost.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEU ght=\"115.7\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"169.2\" width=\"92.0\" height=\"115.7\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">PS loss = seller price drop × after-tax quantity + ½ × seller price drop × drop in quantity</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"producer surplus":{"t":"Producer surplus","ar":"فائض المنتج: ربح البائع فوق تكلفته","def":"The benefit a producer receives from selling a good, measured as the difference between the price received and the minimum price they would have accepted."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"tax revenue":{"t":"Tax revenue","ar":"إيرادات الضرائب: ما تجمعه الحكومة من الضرائب","def":"The total amount of money collected by the government from taxes."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"consumer surplus":{"t":"Consumer surplus","ar":"فائض المستهلك: توفير المشتري من السعر","def":"The benefit a consumer receives from buying a good, measured as the difference between the maximum price they would pay and the actual price paid."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."},"dwl":{"t":"Deadweight loss","ar":"","def":"The loss of economic efficiency when equilibrium is not achieved. The loss in total surplus (consumer + producer) due to market distortions."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
