  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you balance a redox equation by the half-reaction method in acidic or basic solution?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"71\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Redox</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#406</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you balance a redox</tspan><tspan x=\"24\" y=\"190\">equation by the <tspan class=\"vocab-term\" data-vocab-key=\"half-reaction\">half-reaction</tspan></tspan><tspan x=\"24\" y=\"230\">method in acidic or basic</tspan><tspan x=\"24\" y=\"270\"><tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan>?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:54</text></svg>"},{"at":20.56,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Balancing Redox: Half-Reaction Method</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Balancing Redox: <tspan class=\"vocab-term\" data-vocab-key=\"half-reaction\">Half-Reaction</tspan> Method</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='42' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>Split the reaction into two half-reactions</text><rect x='40' y='50' width='250' height='34' rx='9' fill='var(--rose,#f43f61)' fill-opacity='0.13' stroke='var(--rose,#f43f61)' stroke-width='1.4'/><text x='165' y='71' text-anchor='middle' font-size='12' font-weight='800' fill='var(--rose,#f43f61)'><tspan class=\"vocab-term\" data-vocab-key=\"oxidation\">OXIDATION</tspan>: loses e⁻</text><rect x='310' y='50' width='250' height='34' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.13' stroke='var(--correct,#0e8f86)' stroke-width='1.4'/><text x='435' y='71' text-anchor='middle' font-size='12' font-weight='800' fill='var(--correct,#0e8f86)'><tspan class=\"vocab-term\" data-vocab-key=\"reduction\">REDUCTION</tspan>: gains e⁻</text><circle cx='54' cy='102' r='11' fill='var(--indigo,#5545e8)'/><text x='54' y='106' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>1</text><text x='74' y='106' font-size='12' font-weight='700' fill='var(--ink,#18213a)'>Balance the main atoms</text><circle cx='54' cy='130' r='11' fill='var(--indigo,#5545e8)'/><text x='54' y='134' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>2</text><text x='74' y='134' font-size='12' font-weight='700' fill='var(--ink,#18213a)'>Balance O with water (H₂O), then H with H⁺ (in <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>)</text><circle cx='54' cy='158' r='11' fill='var(--indigo,#5545e8)'/><text x='54' y='162' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>3</text><text x='74' y='162' font-size='12' font-weight='700' fill='var(--ink,#18213a)'>Balance charge: add e⁻ to the side that needs them</text><circle cx='54' cy='186' r='11' fill='var(--indigo,#5545e8)'/><text x='54' y='190' text-anchor='middle' font-size='12' font-weight='800' fill='#fff'>4</text><text x='74' y='190' font-size='12' font-weight='700' fill='var(--ink,#18213a)'>Combine the two halves so the electrons cancel</text><rect x='40' y='202' width='520' height='40' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='1.4'/><text x='300' y='219' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"basic solution\">Basic solution</tspan>? Balance as acidic, then add OH⁻ to both sides to cancel H⁺.</text><text x='300' y='235' text-anchor='middle' font-size='10.5' font-weight='600' fill='var(--muted,#606b84)'>H⁺ + OH⁻ → H₂O   (never add OH⁻ in acid)</text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Split the reaction into an oxidation half and a reduction half, balance each with</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">water, hydrogen ions and electrons, then combine so the electrons cancel</text></svg>"},{"at":37.78,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>After balancing the main atoms, fix oxygen by adding water molecules, then balance hydrogen by adding hydrogen ions in acid. Water for oxygen, hydrogen ions for hydrogen.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WATER FOR O, H⁺ FOR H</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">After balancing the main atoms, fix</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">oxygen by adding water molecules,</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">then balance hydrogen by adding</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydrogen ions in <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Water for oxygen, hydrogen ions for</text><text class=\"ln\" data-g=\"1\" data-w=\"9\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydrogen.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Add water to fix oxygen, then hydrogen ions to fix hydrogen</text></svg>"},{"at":55.18,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Then balance the charge in each half by adding electrons to whichever side needs them, so the total charge matches on both sides. Finally, combine the two halves so the electrons cancel.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ELECTRONS BALANCE THE CHARGE</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then balance the charge in each half</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">by adding electrons to whichever</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">side needs them, so the total charge</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">matches on both sides.</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Finally, combine the two halves so</text><text class=\"ln\" data-g=\"1\" data-w=\"21\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the electrons cancel.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Add electrons to balance charge, then combine so they cancel</text></svg>"},{"at":76.52,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>For a basic solution, first balance as if it were acidic, then add hydroxide ions to both sides to cancel the hydrogen ions, since a hydrogen ion plus a hydroxide ion make water. The trap: never add hydroxide in acid, it only comes in for the basic step.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">BASIC: ADD OH⁻ AT THE END</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">For a <tspan class=\"vocab-term\" data-vocab-key=\"basic solution\">basic solution</tspan>, first balance as if</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it were acidic, then add hydroxide ions to</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">both sides to cancel the hydrogen ions,</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">since a hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> plus a <tspan class=\"vocab-term\" data-vocab-key=\"hydroxide ion\">hydroxide ion</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"11\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">make water.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The trap: never add hydroxide in <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan>, it</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">only comes in for the basic step.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">In acid use H⁺; add OH⁻ only for the basic step</text></svg>"},{"at":106.04,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Half-Reaction Method</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"half-reaction\">Half-Reaction</tspan> Method</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"48\" y=\"128\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The half-reaction method: split the reaction</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"48\" y=\"151\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">into halves, balance each with water and</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"48\" y=\"174\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">hydrogen ions, balance the charge with</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"48\" y=\"197\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">electrons, then combine so the electrons</text><text class=\"ln\" data-g=\"0\" data-w=\"7\" x=\"48\" y=\"220\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">cancel.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"48\" y=\"243\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For a <tspan class=\"vocab-term\" data-vocab-key=\"basic solution\">basic solution</tspan>, add hydroxide ions only</text><text class=\"ln\" data-g=\"1\" data-w=\"11\" x=\"48\" y=\"266\" font-size=\"16\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">at the end.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIEAAACvCAYAAADaBr0WAAACJElEQVR4nO3dwY6CMBSGUWp8/1fuxJuYmIkimlB+6jnL2UjLZ7nOhmUBAAAAAAAAAAAAAAB4ri0D9N77iM+ZUWtt93t02fsDBJC/f23UIkYUPXMAbcf92/0k4HujvjiXUQvxWMg19CQQwg9H8HisCWG7UXvVZhx0ZrvRbee9Gvo4cOM/N+2e3er3WMjZi0N/Ih69eA6MwKCY5bCTQAg5Dn0cTDv0nIx/GyMCRIAIEAHFYIgIEAEiQAQUgyEiQASIABFQDIaIABEgAkRAMRgiAkSACBABxWCICBABIkAEFIMhIkAEiAARUAyGiAARIAJEQDEYIgJEgAgQAcVgiAgQASJABJTrEmj2t6S1sNf++HVA5kmQ+o2Z9YSLPglSN222tURHwBgiQASIABEgAorBEBEgAkSACCgGQ0SACBABIqAYDBEBIkAEiIBiMEQEiAARIAKKwRARIAJEgAgoBkNEgAgQASKgGAwRASJABIiAYjBEBIgAESACcgfD2d5zkL62yAj40QhevRQi+WURs6ztkno8Pv49ZbO+8XjtiY+CiAjWnD2EvjGAo+OIiuDZjf4fwlli6G8CSFpHzPF035RX34qkTfvEu/UcfQrEnQRrN/u2WQkbttXa9aYF3c48RMVtZvvsmlOijriI9E2afW0xF7L2DU/asBnXE3UxW2eD5QT6ia4/7oLSn/vfSrz5d7EXNkMQLfjGAwAAAAAAAAAAAADA8t4f0rnM2YEE0XoAAAAASUVORK5CYII=\" x=\"520.0\" y=\"144.6\" width=\"92.0\" height=\"124.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"144.6\" width=\"92.0\" height=\"124.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">split → balance (H₂O, H⁺) → add e⁻ → combine → (basic: add OH⁻)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"half-reaction":{"t":"Half-reaction","ar":"نصف التفاعل","def":"Either the oxidation or reduction component of a redox reaction, showing the transfer of electrons."},"solution":{"t":"Solution","ar":"محلول","def":"A homogeneous mixture of two or more substances."},"oxidation":{"t":"Oxidation","ar":"الأكسدة","def":"The loss of electrons by a substance, increasing its oxidation state."},"reduction":{"t":"Reduction","ar":"الاختزال","def":"The gain of electrons by a substance, decreasing its oxidation state."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"basic solution":{"t":"Basic solution","ar":"محلول قاعدي","def":"A solution with a pH greater than 7, where [OH⁻] > [H⁺]."},"ion":{"t":"Ion","ar":"أيون","def":"An atom or molecule with a net electric charge due to the loss or gain of one or more electrons."},"hydroxide ion":{"t":"Hydroxide ion","ar":"أيون الهيدروكسيد","def":"The OH⁻ ion, which is responsible for the basic properties of a solution."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
