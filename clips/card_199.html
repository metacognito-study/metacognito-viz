  *{ box-sizing:border-box; } html,body{ margin:0; }

  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */

  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }

  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }

  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }

  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }

s</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Same <tspan class=\"vocab-term\" data-vocab-key=\"tax\">Tax</tspan>, Two Elasticities</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='160' y='14' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>Market A: <tspan class=\"vocab-term\" data-vocab-key=\"inelastic demand\">inelastic demand</tspan></text><text x='470' y='14' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>Market B: <tspan class=\"vocab-term\" data-vocab-key=\"elastic demand\">elastic demand</tspan></text><line x1='40' y1='30' x2='40' y2='170' stroke='var(--ink,#18213a)' stroke-width='1.8'/><line x1='40' y1='170' x2='290' y2='170' stroke='var(--ink,#18213a)' stroke-width='1.8'/><line x1='70' y1='40' x2='150' y2='160' stroke='var(--correct,#0e8f86)' stroke-width='2.4'/><text x='154' y='162' font-size='9' font-weight='800' fill='var(--correct,#0e8f86)'>D</text><line x1='55' y1='150' x2='200' y2='52' stroke='var(--indigo,#5545e8)' stroke-width='2.4'/><text x='204' y='52' font-size='9' font-weight='800' fill='var(--indigo,#5545e8)'>S</text><polygon points='112,70 112,106 130,88' fill='var(--rose,#f43f61)' opacity='0.40'/><line x1='40' y1='70' x2='112' y2='70' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='40' y1='106' x2='112' y2='106' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='112' y1='70' x2='112' y2='170' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='130' y1='88' x2='130' y2='170' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><text x='112' y='183' text-anchor='middle' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>after</text><text x='130' y='192' text-anchor='middle' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>before</text><text x='160' y='130' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--rose,#f43f61)'><tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> 300</text><line x1='350' y1='30' x2='350' y2='170' stroke='var(--ink,#18213a)' stroke-width='1.8'/><line x1='350' y1='170' x2='600' y2='170' stroke='var(--ink,#18213a)' stroke-width='1.8'/><line x1='362' y1='44' x2='560' y2='158' stroke='var(--correct,#0e8f86)' stroke-width='2.4'/><text x='564' y='160' font-size='9' font-weight='800' fill='var(--correct,#0e8f86)'>D</text><line x1='366' y1='150' x2='520' y2='50' stroke='var(--indigo,#5545e8)' stroke-width='2.4'/><text x='524' y='50' font-size='9' font-weight='800' fill='var(--indigo,#5545e8)'>S</text><polygon points='420,72 420,108 500,90' fill='var(--rose,#f43f61)' opacity='0.40'/><line x1='350' y1='72' x2='420' y2='72' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='350' y1='108' x2='420' y2='108' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='420' y1='72' x2='420' y2='170' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><line x1='500' y1='90' x2='500' y2='170' stroke='var(--muted,#606b84)' stroke-width='1' stroke-dasharray='3 3'/><text x='420' y='183' text-anchor='middle' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>after</text><text x='500' y='192' text-anchor='middle' font-size='8.5' font-weight='700' fill='var(--muted,#606b84)'>before</text><text x='475' y='130' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--rose,#f43f61)'>DWL 1200</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Same 4 tax gap in both. Market A is inelastic, so quantity falls only 150 and the loss triangle is small</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">(300). Market B is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, so quantity falls 600 and the triangle is four times wider (1200).</text></svg>"},{"at":62.32,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Elasticity is how strongly quantity responds to a price change, and it is the key driver here. When demand is elastic, buyers cut purchases sharply as the tax raises the buyer price, so many trades are lost. When demand is inelastic, buyers barely change quantity, so few trades are lost. Fewer lost trades mean a smaller deadweight loss.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">ELASTICITY</tspan> IS THE KEY DRIVER</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Elasticity is how strongly quantity responds to a</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price change, and it is the key driver here.</text><text class=\"ln\" data-g=\"1\" data-w=\"44\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> cut purchases</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sharply as the <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> raises the buyer price, so many</text><text class=\"ln\" data-g=\"1\" data-w=\"16\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">trades are lost.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When demand is inelastic, buyers barely change</text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity, so few trades are lost.</text><text class=\"ln\" data-g=\"3\" data-w=\"49\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Fewer lost trades mean a smaller <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"elastic demand\">Elastic demand</tspan> loses many trades; <tspan class=\"vocab-term\" data-vocab-key=\"inelastic demand\">inelastic demand</tspan> loses few</text></svg>"},{"at":82.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student argued that taxing a strong daily habit creates more welfare loss than taxing a luxury, because people really want the habit. That gets it backwards. A strong fixed habit means inelastic demand, so buyers cut back very little when the price rises. Inelastic demand means small quantity drops, and so small deadweight losses.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: A STRONG HABIT IS INELASTIC</text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student argued that taxing a strong daily habit</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">creates more welfare loss than taxing a luxury,</text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">because people really want the habit.</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That gets it backwards.</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A strong fixed habit means <tspan class=\"vocab-term\" data-vocab-key=\"inelastic demand\">inelastic demand</tspan>, so</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> cut back very little when the price rises.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Inelastic demand means small quantity drops, and</text><text class=\"ln\" data-g=\"3\" data-w=\"27\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">so small deadweight losses.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A strong habit is inelastic, so its <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> causes a small loss</text></svg>"},{"at":107.42,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The chain runs like this. More elastic demand means a bigger quantity drop for a given tax. A bigger quantity drop means a wider deadweight loss triangle. A wider triangle means a larger deadweight loss. The same logic applies to supply: a more elastic supply curve means sellers cut quantity more when the price they keep falls, so both the quantity drop and the deadweight loss grow.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE CHAIN OF LOGIC</text><text class=\"ln\" data-g=\"0\" data-w=\"25\" x=\"24\" y=\"84\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The chain runs like this.</text><text class=\"ln\" data-g=\"1\" data-w=\"60\" x=\"24\" y=\"104\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">More <tspan class=\"vocab-term\" data-vocab-key=\"elastic demand\">elastic demand</tspan> means a bigger quantity drop for a given</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"124\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"52\" x=\"24\" y=\"144\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A bigger quantity drop means a wider <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan></text><text class=\"ln\" data-g=\"2\" data-w=\"9\" x=\"24\" y=\"164\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">triangle.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"24\" y=\"184\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A wider triangle means a larger deadweight loss.</text><text class=\"ln\" data-g=\"4\" data-w=\"55\" x=\"24\" y=\"204\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The same logic applies to <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan>: a more <tspan class=\"vocab-term\" data-vocab-key=\"elastic supply\">elastic supply</tspan></text><text class=\"ln\" data-g=\"4\" data-w=\"57\" x=\"24\" y=\"224\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">curve means <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> cut quantity more when the price they</text><text class=\"ln\" data-g=\"4\" data-w=\"56\" x=\"24\" y=\"244\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">keep falls, so both the quantity drop and the deadweight</text><text class=\"ln\" data-g=\"4\" data-w=\"10\" x=\"24\" y=\"264\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">loss grow.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">More elastic supply or <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> → bigger quantity drop → bigger loss</text></svg>"},{"at":149.22,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Deadweight Loss and Elasticity</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">Deadweight Loss</tspan> and</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">Elasticity</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Deadweight loss is larger when <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> or <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is more</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, because a more elastic market responds with a</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">bigger quantity drop to a given <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> gap, and more lost</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">trades mean a wider loss triangle.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">A policymaker who wants to raise <tspan class=\"vocab-term\" data-vocab-key=\"revenue\">revenue</tspan> with the least</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">welfare loss should tax the inelastic market, where the</text><text class=\"ln\" data-g=\"1\" data-w=\"46\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">quantity drop for the revenue raised is small.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIgAAACrCAYAAAC9gtTKAAAFkUlEQVR4nO2c65LbMAiFTWff/5XpZKdp02wS2zKXA5zvd2wDPpElBNo2QgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYQQQuoh2zBUVa/eQ0TGxK2VoxYv3wppIqKSTiAJobtwShhbWRDVBQNrXKQoPr0kBbEjCyiDOkwg1UhQ2X7cgTBiNajWQXy0w/PelYRS5t/mFagjNkjis71t2H1uxkOPBsYzKGj/aAWIycvnbcHsBcI7AFfnCBLwgrJj9MivLZBPjt+czv7eoiA7sQhdWUU96J1TkaJYsUGfrskQcWbsZIo4kOyoZHuaQLJeCupkEDWOX1sCiMFH/LQ8c7Mhetvh17R9lNUXrX/YhhG6ikFbJayIRcFE4m1PyicGiVciQRNBpl1pSR+Eb3qlSbbu5JDajSB3hxECjZKUQrQhPW0cKZKKW/GaHD+IOUjUaJKxTFwByUaIEWT6Ti6yXSkCWfknT68H+RS3lp+Yu1NHg+SV2Xy8j2dFGeoIAT8HOSsUz+Wz5YvQBvW13zZEPOTsvz9qknb2BWiAXWdjM343F2lG78WVWLQVyPfDG+yFrGDpdwuBRDiIKhwx8G9sRVmFHAO6zS1GkAr9H0goULxgM6nTxKKgOZLxmdRqI4Uyk1qnRrTLKDEqk/p4zyzUqayAFWU710xA3sQl6w+RPklFSbtnIQdebmavbrpAUPdEvBAHX9sLxMJRRNFIkD9jBIJeUYZWQNRWIGfzINmrEk/OxoF5kBd4V3pFogujBPMgFxJmz/dBQkE/ZaUEcjVhlr0U1ORd4vJ7MVfS5IgrE7R8SMvzQW6OHnEMIdXsBcLnY0RFWQXRiJOPYyrKKs0P0HxoOQepPux6g5QjGplJRUUBcyTMpCajzKTaZlIfr62IAo4S0ImylQRZhWyqOvTmsqJs5xorkMsKZCEu7XZzLaupOiAXq+raCmTFwQ6CEWN/2wvkqqPIopEAn8YIBPF0n2hbUeL1994beB4EaWXixZlYjMqDTMuB3KnUdvrVIQeCLBot3ryenij7dNJglTZMNZ7fsKKMFWU/WI1JS4FM66bzPKesrUCmVJNVryqDKBiqlPdA82OEQJBm7SgoSMwgZ/hThaKAsYLPpN5/vzVFWVH2GlaUHSfTX5iCoQ59rM9Y+8SCIefVh2UgNdhOnlG2cG0n5EIcWgtkavmhGPo7QiCdU/Di7NMogVg7HiEgSbaznUBW6kAQVylXWfF/TB7kbMKsei5Ei/Yof1UtFkLurlOHrrqxArE8p2z12ncvQ4MnwCuiaLkXM7FZ6h0WcWg3Se3cKLWHh89tBVIp/X2WSL9aCyR6UlZpAqkAsYMRCNrsPRMFihnUKuY5OJPEokCfR2iBdEqOVRQEhEDOlhx2EIwazX2ihQXfvI3ccln1iIlSezFega0yhO+RPUq2aN7uhgA1b7sL5EqLwySxCOh8is3biYhBDMpv1t1g8/bm4mvEqAORMkY4CM4KCfal9QhS5TucAUrM4PZipgtFgfZhvu+/OcNjMPfhMZgv4DGY58jyG6LksFKNxhms/cooOWyTSe10zJUEN7V/tMX7AWzePgabtz8ZMfDcVDH0ub1ArM8ORUPYvI3ZchgpHkm0t51AeIjdP3iI3Rt4iN1xxlaUrVaVZe1snqFLbiddIFblh5GpewU6aK/8XszVT0SFVUrmkrelQDovaY9g6XsLgXg7iCwccfSvTUVZZg9LlUPsUPt+QmfJ2WnjKmhymeF/z9oSoFB+glpAlfYSkPYbstACMUgPOuL+gxda0FeYIFtNJhGEo418STegwi6sgtkTCZQx1XIcXUXxCKxhnQUjwIJ4poyhFYUjhYTwjvIOZIlIGrx8QgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYSQrS6/AWx7eTb+IAM2AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"169.2\" width=\"92.0\" height=\"115.7\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"169.2\" width=\"92.0\" height=\"115.7\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">more elastic → bigger quantity drop → larger deadweight loss</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"elasticity":{"t":"Elasticity","ar":"المرونة: مدى استجابة الكمية للتغيرات في السعر أو الدخل.","def":"A measure of how much one economic variable responds to a change in another economic variable."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"inelastic demand":{"t":"Inelastic demand","ar":"الطلب غير المرن: الكمية المطلوبة لا تتغير كثيرًا مع تغير السعر.","def":"A situation where the quantity demanded changes only slightly, or not at all, in response to a change in price."},"elastic demand":{"t":"Elastic demand","ar":"الطلب المرن: الكمية المطلوبة تتغير كثيرًا مع تغير السعر.","def":"A situation where the quantity demanded changes significantly in response to a change in price."},"dwl":{"t":"Deadweight loss","ar":"","def":"The loss of economic efficiency when equilibrium is not achieved. The loss in total surplus (consumer + producer) due to market distortions."},"elastic":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"elastic supply":{"t":"Elastic supply","ar":"عرض مرن: تتغير الكمية المعروضة كثيراً مع تغير السعر","def":"Elastic supply occurs when the quantity supplied changes significantly in response to a price change."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"revenue":{"t":"Revenue","ar":"","def":"The total income from selling goods or services."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
</body>
</html>
