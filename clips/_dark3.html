<!doctype html><html data-theme=dark><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}[data-theme=dark]{--ink:#edf0f5;--muted:#aab2c0;--surface:#1d212a;--surface-2:#272c36;--line:#343a45;--indigo:#8f84ff;--indigo-soft:#262a52;--correct:#22b3a6}body{background:#15181f;font-family:Inter;display:flex;flex-wrap:wrap}svg{width:100%;background:var(--surface);border-radius:12px}</style><div style="width:440px;margin:5px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Deadweight loss: the lost-trade triangle</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Deadweight loss: the lost-trade triangle</tspan></text><polygon points='127.2,199.2 127.2,88.2 393.2,125.2' fill='var(--rose,#f43f61)' fill-opacity='0.22'/><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Quantity</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Price ($)</text><polyline points='74.0,80.8 606.0,154.8' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='602.0' y='146.8' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>D</text><polyline points='74.0,214.0 552.8,80.8' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='3.5'/><text x='548.8' y='72.8' text-anchor='end' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>S</text><polyline points='74.0,199.2 393.2,199.2' fill='none' stroke='var(--rose,#f43f61)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='127.2,199.2 127.2,88.2' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='393.2' cy='125.2' r='6' fill='var(--ink,#18213a)'/><text x='401.2' y='119.2' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>eq</text><circle cx='127.2' cy='88.2' r='6' fill='var(--indigo,#5545e8)'/><circle cx='127.2' cy='199.2' r='6' fill='var(--correct,#0e8f86)'/><text x='244.2' y='134.1' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>DWL = $18.75</text><text x='207.0' y='212.5' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>ceiling $6</text><text x='127.2' y='239.2' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Q1</text><text x='393.2' y='239.2' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Q*6</text><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">the triangle covers the trades blocked (Q1 to Q6) between demand and supply: area = 1/2 x 5 x $7.50 = $18.75</text></svg></div><div style="width:440px;margin:5px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Total surplus: between demand and supply</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Total surplus: between demand and supply</tspan></text><polygon points='74.0,80.8 74.0,199.2 499.6,199.2' fill='var(--indigo,#5545e8)' fill-opacity='0.17'/><polygon points='74.0,199.2 74.0,258.4 499.6,199.2' fill='var(--correct,#0e8f86)' fill-opacity='0.17'/><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Quantity</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Price ($)</text><polyline points='74.0,80.8 606.0,228.8' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='602.0' y='220.8' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>D</text><polyline points='74.0,258.4 606.0,184.4' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='3.5'/><text x='602.0' y='176.4' text-anchor='end' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>S</text><polyline points='74.0,199.2 499.6,199.2' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='499.6,288.0 499.6,199.2' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='499.6' cy='199.2' r='6' fill='var(--ink,#18213a)'/><text x='507.6' y='193.2' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>eq</text><text x='196.4' y='157.8' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>CS = 128</text><text x='196.4' y='225.8' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>PS = 64</text><text x='132.5' y='189.6' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>P=12</text><text x='499.6' y='273.2' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Q=16</text><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">total surplus is the whole area between demand and supply out to Q=16: CS above the price plus PS below it = 128 + 64 = 192</text></svg></div><div style="width:440px;margin:5px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Why you can't be cheapest at both</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Why you can't be cheapest at both</tspan></text><g transform="translate(24,64)"><text x='296' y='34' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>for one maker, the two opportunity costs are reciprocals (they multiply to 1)</text><rect x='96' y='48' width='400' height='42' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='296' y='75' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>cost of A  x  cost of B  =  1</text><rect x='40' y='112' width='200' height='62' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.1' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='140' y='140' text-anchor='middle' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)'>LOWER cost in A</text><text x='140' y='162' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>you win good A</text><text x='296' y='148' text-anchor='middle' font-size='26' font-weight='800' fill='var(--muted,#606b84)'>&#8594;</text><text x='296' y='168' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>forces</text><rect x='352' y='112' width='200' height='62' rx='10' fill='var(--rose,#f43f61)' fill-opacity='0.1' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='452' y='140' text-anchor='middle' font-size='14' font-weight='800' fill='var(--rose,#f43f61)'>HIGHER cost in B</text><text x='452' y='162' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>you lose good B</text><rect x='46' y='190' width='500' height='44' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='296' y='217' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>advantages SPLIT (one each) or TIE, never both to one maker</text></g><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">for one maker the two opportunity costs are reciprocals, so a low cost in one good forces a high cost in the other: no one is cheapest at both</text></svg></div><div style="width:440px;margin:5px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>A solubility curve</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">A solubility curve</tspan></text><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Temperature (°C)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>g solute / 100 g water</text><path d='M 74.0 273.6 C 91.7 270.2 144.9 263.0 180.4 253.6 C 215.9 244.2 251.3 231.6 286.8 217.0 C 322.3 202.3 357.7 185.5 393.2 165.9 C 428.7 146.3 481.9 110.4 499.6 99.3' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><circle cx='180.4' cy='253.6' r='6' fill='var(--correct,#0e8f86)'/><text x='188.4' y='239.6' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>31 g at 20°C</text><circle cx='499.6' cy='99.3' r='6' fill='var(--correct,#0e8f86)'/><text x='381.6' y='89.3' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>170 g at 80°C</text><text x='329.4' y='181.4' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>KNO₃</text><text x="24" y="342" font-size="8" font-weight="500" fill="var(--muted,#606b84)">a solubility curve plots grams of solute per 100 g of water against temperature; a point on the line is a saturated solution</text></svg></div><div style="width:440px;margin:5px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>An absorption spectrum</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">An absorption spectrum</tspan></text><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Wavelength (nm)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Absorbance</text><path d='M 378.0 265.8 C 385.6 259.6 410.9 247.3 423.6 228.8 C 436.3 210.3 446.4 175.8 454.0 154.8 C 461.6 133.8 463.5
