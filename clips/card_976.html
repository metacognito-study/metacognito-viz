(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Given atomic size data for two alloys, how do you classify each as substitutional or interstitial?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"188\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Classifying <tspan class=\"vocab-term\" data-vocab-key=\"alloys\">alloys</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#976</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Given atomic size data for two</tspan><tspan x=\"24\" y=\"190\">alloys, how do you classify</tspan><tspan x=\"24\" y=\"230\">each as substitutional or</tspan><tspan x=\"24\" y=\"270\">interstitial?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:47</text></svg>"},{"at":31.06,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Similar atom sizes give a substitutional alloy, where the guest swaps in. Very different sizes, with small atoms added, give an interstitial alloy, where the guest fits in the gaps. The size difference is the key clue.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SIZE RULE</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Similar <tspan class=\"vocab-term\" data-vocab-key=\"atom\">atom</tspan> sizes give a substitutional</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">alloy, where the guest swaps in.</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Very different sizes, with small atoms</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">added, give an interstitial alloy, where</text><text class=\"ln\" data-g=\"1\" data-w=\"27\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the guest fits in the gaps.</text><text class=\"ln\" data-g=\"2\" data-w=\"36\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The size difference is the key clue.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Similar sizes: substitutional; a much smaller guest: interstitial</text></svg>"},{"at":42.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Take iron at 126 pm and carbon at 77 pm. The difference is (126 - 77) / 126, which is about 39 percent. That is far too large for a swap, so the carbon fits in the gaps. Iron and carbon make an interstitial alloy.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">IRON AND CARBON</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"102\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Take iron at 126 pm and carbon at 77 pm.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"131\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The difference is (126 - 77) / 126, which</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"24\" y=\"160\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">is about 39 percent.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"189\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is far too large for a swap, so the</text><text class=\"ln\" data-g=\"2\" data-w=\"24\" x=\"24\" y=\"218\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">carbon fits in the gaps.</text><text class=\"ln\" data-g=\"3\" data-w=\"43\" x=\"24\" y=\"247\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Iron and carbon make an interstitial alloy.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Iron 126 pm, carbon 77 pm: ~39 percent difference, so interstitial</text></svg>"},{"at":61.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Now copper at 128 pm and zinc at 134 pm. The difference is (134 - 128) / 128, which is under 5 percent, well below 15. So zinc replaces copper in the lattice. Copper and zinc make a substitutional alloy.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">COPPER AND ZINC</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Now copper at 128 pm and zinc at 134 pm.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The difference is (134 - 128) / 128,</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which is under 5 percent, well below 15.</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So zinc replaces copper in the lattice.</text><text class=\"ln\" data-g=\"3\" data-w=\"37\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Copper and zinc make a substitutional</text><text class=\"ln\" data-g=\"3\" data-w=\"6\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">alloy.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Copper 128 pm, zinc 134 pm: under 5 percent difference, so substitutional</text></svg>"},{"at":81.7,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The 15 Percent Size Test</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The 15 Percent Size Test</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>Compute the percent difference, then let the 15 percent test sort it</text><rect x='28' y='28' width='266' height='150' rx='11' fill='var(--surface-2,#eef1f7)' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><text x='161' y='48' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>iron + carbon</text><text x='161' y='70' text-anchor='middle' font-size='10' font-weight='700' fill='var(--ink,#18213a)'>iron 126 pm, carbon 77 pm</text><text x='161' y='92' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>(126 - 77) / 126</text><text x='161' y='114' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)'>= 49 / 126 = 39 percent</text><text x='161' y='136' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>far above 15 percent</text><rect x='66' y='148' width='190' height='22' rx='6' fill='var(--correct,#0e8f86)'/><text x='161' y='163' text-anchor='middle' font-size='10.5' font-weight='800' fill='#fff'>interstitial</text><rect x='306' y='28' width='266' height='150' rx='11' fill='var(--indigo-soft,#e9e7fd)' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='439' y='48' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>copper + zinc</text><text x='439' y='70' text-anchor='middle' font-size='10' font-weight='700' fill='var(--ink,#18213a)'>copper 128 pm, zinc 134 pm</text><text x='439' y='92' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>(134 - 128) / 128</text><text x='439' y='114' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)'>= 6 / 128 = 5 percent</text><text x='439' y='136' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>well below 15 percent</text><rect x='344' y='148' width='190' height='22' rx='6' fill='var(--indigo,#5545e8)'/><text x='439' y='163' text-anchor='middle' font-size='10.5' font-weight='800' fill='#fff'>substitutional</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Compute the percent size difference, then compare to 15 percent. Iron and carbon differ by</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">about 39 percent: interstitial. Copper and zinc by under 5 percent: substitutional.</text></svg>"},{"at":100.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Classify an Alloy from Size Data</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Classify an Alloy from</tspan><tspan x=\"48\" y=\"110\">Size Data</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Read the size or <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> data, find the percent</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">difference between the two radii, and let a rough 15</text><text class=\"ln\" data-g=\"0\" data-w=\"21\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">percent test sort it.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">If the radii differ by less than about 15 percent the</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">atoms substitute, so it is substitutional.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">If the guest is much smaller, it slots into the gaps, so</text><text class=\"ln\" data-g=\"2\" data-w=\"19\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">it is interstitial.</text><text class=\"ln\" data-g=\"3\" data-w=\"42\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Iron and carbon differ by about 39 percent</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"48\" y=\"320\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">(interstitial); copper and zinc by under 5 percent</text><text class=\"ln\" data-g=\"3\" data-w=\"17\" x=\"48\" y=\"339\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">(substitutional).</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANkAAACsCAYAAAD2UQkEAAAF5UlEQVR4nO3d4Y7CNhBFYYL2/V/Z1bZCQilLEsf23Dtzvl+V2t2G4JOBELKPBwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQE5b9AYAR1pr7fXP27bZrVm7DUa9sPbcQrPaWNSM6hWW60Sz2VDUnlbNNLBfP9EbgDraiWl15b93QWSQiSpTWO+IDLJhbbv3Ya6sXtsiR1RHYWU7w8gkw5KozoaVcaIRmZnXYlt5JI8Iqx28hPzlMs2IzMj7wpu5yO5E9e3nt47tdQnpGyIzNONofvf9z8j3T+3kB9Mu04zIiro7rY5+x4jFvxkEdAaRmbj7xn9EVEe/Z0QU7eTjdJpmRJbYqCAiTqVv4uFcQWRmes7knfnZK78r6oSL6zQjMnOjYxh5ZrDXJhxMDyIzM2PCKITVOt9zOkwzIjOQNSzF//8MRCbqzJF91OdP0Qu73Txzqj7NiEzIUQT7f39mUamG5bJNIxBZsJ4Iji6YdQqrDbrwV3maEVmAuxF8+nmnsJy3swe under 15: substitutional; much smaller guest: interstitial</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"alloys":{"t":"Alloys","ar":"السبائك","def":"An alloy is a mixture of two or more metals, or a metal and a nonmetal. Alloys are created to improve the properties of the base metal, such as strength, hardness, corrosion resistance, or electrical conductivity. Some examples of alloys are brass (copper and zinc), bronze (copper and tin), steel (iron and carbon), and stainless steel (iron, chromium, and nickel)."},"atom":{"t":"Atom","ar":"ذرة","def":"The basic unit of an element."},"density":{"t":"Density","ar":"الكثافة","def":"The mass per unit volume of a substance: ρ = m/V. SI unit: kg/m³; common in chemistry: g/mL or g/cm³. An intensive property - does not depend on sample size. Used to identify substances and convert between mass and volume."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it

})();
