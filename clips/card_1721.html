<style>

    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Take electrolysis making hydrogen gas at 1.00 ampere for 3600 seconds. Can you find the gas volume at standard conditions?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"188\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"volume\">Volume</tspan> of hydrogen</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1721</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Take <tspan class=\"vocab-term\" data-vocab-key=\"electrolysis\">electrolysis</tspan> making</tspan><tspan x=\"24\" y=\"190\">hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> at 1.00 ampere</tspan><tspan x=\"24\" y=\"230\">for 3600 seconds. Can you find</tspan><tspan x=\"24\" y=\"270\">the gas volume at standard</tspan><tspan x=\"24\" y=\"310\">conditions?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:27</text></svg>"},{"at":21.68,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>First the charge: 1.00 times 3600 is 3600 coulombs. Now convert to moles of electrons: 3600 over 96485 is 0.0373 moles of electrons. Making hydrogen takes two electrons per molecule, so 0.0373 over 2 is 0.0187 moles of hydrogen.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">CHARGE TO MOLES OF E-</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">First the charge: 1.00 times 3600 is 3600</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">coulombs.</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Now convert to <tspan class=\"vocab-term\" data-vocab-key=\"moles of electrons\">moles of electrons</tspan>: 3600</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">over 96485 is 0.0373 moles of electrons.</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Making hydrogen takes two electrons per</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan>, so 0.0373 over 2 is 0.0187 moles</text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">of hydrogen.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Q = 1.00 A × 3600 s = 3600 C; moles e- = 3600 / 96485 = 0.0373 mol; 2 e- per H2, so 0.0187 mol H2</text></svg>"},{"at":65.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Hydrogen Volume, Step by Step</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"volume\">Volume</tspan>, Step by Step</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='44' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>the walk with a <tspan class=\"vocab-term\" data-vocab-key=\"gas\">GAS</tspan> at the end (2 e&#8315; per H&#8322; <tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan>)</text><rect x='40' y='84' width='114' height='46' rx='10' fill='var(--indigo,#5545e8)' fill-opacity='0.10' stroke='var(--indigo,#5545e8)' stroke-width='1.5'/><text x='97' y='104' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--indigo,#5545e8)'>1.00 A &#215; 3600 s</text><text x='97' y='121' text-anchor='middle' font-size='8' font-weight='700' fill='var(--muted,#606b84)'>= 3600 C</text><line x1='158' y1='107' x2='180' y2='107' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='186,107 178,103 178,111' fill='var(--muted,#606b84)'/><text x='171' y='76' text-anchor='middle' font-size='8' font-weight='800' fill='var(--amber,#f5b526)'>&#247; 96485</text><rect x='188' y='84' width='114' height='46' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.10' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='245' y='104' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>0.0373 mol e&#8315;</text><text x='245' y='121' text-anchor='middle' font-size='8' font-weight='700' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"moles of electrons\">moles of electrons</tspan></text><line x1='306' y1='107' x2='328' y2='107' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='334,107 326,103 326,111' fill='var(--muted,#606b84)'/><text x='319' y='76' text-anchor='middle' font-size='8' font-weight='800' fill='var(--amber,#f5b526)'>&#247; 2 per H&#8322;</text><rect x='336' y='84' width='114' height='46' rx='10' fill='var(--correct,#0e8f86)' fill-opacity='0.10' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='393' y='104' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>0.0187 mol H&#8322;</text><text x='393' y='121' text-anchor='middle' font-size='8' font-weight='700' fill='var(--muted,#606b84)'>moles of gas</text><line x1='454' y1='107' x2='476' y2='107' stroke='var(--muted,#606b84)' stroke-width='2'/><polygon points='482,107 474,103 474,111' fill='var(--muted,#606b84)'/><text x='467' y='76' text-anchor='middle' font-size='8' font-weight='800' fill='var(--amber,#f5b526)'>&#215; 22.4 L</text><rect x='484' y='84' width='114' height='46' rx='10' fill='var(--amber,#f5b526)' fill-opacity='0.10' stroke='var(--amber,#f5b526)' stroke-width='1.5'/><text x='541' y='104' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--amber,#f5b526)'>0.42 L</text><text x='541' y='121' text-anchor='middle' font-size='8' font-weight='700' fill='var(--muted,#606b84)'>at standard conditions</text><text x='320' y='178' text-anchor='middle' font-size='10' font-weight='800' fill='var(--rose,#f43f61)'>making one H&#8322; molecule swallows TWO electrons: divide, never multiply</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The charge is 3600 C, which is 0.0373 mol of electrons. Two electrons per molecule give 0.0187 mol of</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">hydrogen. At standard conditions 1 mol fills 22.4 L, so 0.0187 times 22.4 is about 0.42 L.</text></svg>"},{"at":70.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At standard conditions one mole of gas fills 22.4 liters, so finish it: 0.0187 times 22.4 is about 0.42 liters of hydrogen. The volume is the moles of gas multiplied by the molar volume. So the cell makes about 0.42 liters.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">MOLES TO <tspan class=\"vocab-term\" data-vocab-key=\"volume\">VOLUME</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">At standard conditions one <tspan class=\"vocab-term\" data-vocab-key=\"mole\">mole</tspan> of <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fills 22.4 liters, so finish it: 0.0187</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">times 22.4 is about 0.42 liters of</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydrogen.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The volume is the moles of gas multiplied</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">by the <tspan class=\"vocab-term\" data-vocab-key=\"molar volume\">molar volume</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"36\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the cell makes about 0.42 liters.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Volume = 0.0187 mol × 22.4 L/mol ≈ 0.42 L of hydrogen</text></svg>"},{"at":82.4,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Volume of Hydrogen Gas Made</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"volume\">Volume</tspan> of Hydrogen <tspan class=\"vocab-term\" data-vocab-key=\"gas\">Gas</tspan></tspan><tspan x=\"48\" y=\"110\">Made</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The method runs charge, then <tspan class=\"vocab-term\" data-vocab-key=\"moles of electrons\">moles of electrons</tspan>, then</text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">moles of gas, then the <tspan class=\"vocab-term\" data-vocab-key=\"molar volume\">molar volume</tspan> for the liters.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The charge is 1.00 A × 3600 s = 3600 C; moles of</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">electrons is 3600 / 96485 = 0.0373 mol; 2 electrons per</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan> give 0.0187 mol of hydrogen; and at standard</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">conditions 22.4 L/mol gives about 0.42 L.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJUAAACtCAYAAAC5iz2PAAAE2klEQVR4nO3d247bMAyEYTPo+78yi71YoEjtxAdKGpL/d1l0dx1pNFYcJ9k2AAAAAAAAAAAAAAAAAAAAAAAAAACgwrbC3N03YWZWcvxfW1HqgcpyjHeUDFWmyfJEx9o6VFjrz9aA2t7FC7bTv2gqhCNUCEeoEK7FnkqBF99HtQvV3oTO2rx7ozD94vSHcCVDpXYJocqxbt1Pf7+TpXr6sYJhKh8q1XBZ4TCVPv1hLUKFcIQK4QgVwhEqhCNUCEeoEI5QDeQi18ZmI1QIR6gQjlANZA1ektlDqAZy9lSIZjQVojlNBcQgVAhHqBCOUA1kbNSBGIQK4QgVwhEqhCNUCFf+fX8jr5J3fXb3DU314GWXri/DfEOoTjoK0KdgedPQESqEI1QnHe2f2Ff9j1A9QKD28ezvAkJ0Dk01kDUNIaFCOE5/B7jIeV+Lprpyvejn/+5d5Iy65uQNrl21CNW7o+b5NuF3AmENW658qBSbwQWPKVL5UD1pjqiWsWZtVTpUTxthZKN44bYqHSqlxrBGbVU2VCM21dHB8KJtVTZUik1hAscwQ8lQPWmAn4l/n/y9f4viBduq5Mp5nyi1hnDx43uq3Ms0M1b+p79hNwLy8/sqBavk6W/l5tpPhLpSgMqHanRLnf39fuM4Ku2tSoVqZCNcnXT/8v8rt1WZPdXslf4eioi/70X2VmWbanZL3fl7ViBAZUNVaT/iBR5LiVBlbgBLdKxtQjVjZZ+Z+Mjj8ORtVWajfmfl703e2Z+PnHgzs+xBKtNUdyfi0z3nUfej28PTWuaQpQ7VyNPUk9fnrPkzwbShWnHV+szdCrbwgquKtKGKmszfoOz9/NGkjro9xoq01atzS+0FIyqQndsqZaiqrvAqjyVdqDKu3G6POVWonlxXysSSP6ZUoXrizEZcuRFc+NjeWaeWujoxqxvDk97L3qapMk1K9rZ6ddtLnf05hQDahWtnSsq9oHxlsrps/GeTH0Amfks3BilOf8hFOlTZVugolmxv1XJPNZrfnPAqC0b2QWRpqZGNYSfeBqY4JiWaamYzzDzteNL3AUoe8JkVGT25nyZv9f7F/jm2DG2VsqlGTPL7h/FH/Q2b/E4cBVIJP7MSFSdgxifLWKK2StlUR2a+vWrkJFryt2zJpHvlCr0ygbMawRO3VeqmGvHh+Vc+1ExlEtXIDIraylRoLxcbk/JNNXrwPt3JMONmOmdP1WNFjrzI6jebUWVs0jfVqkG70l5VWidlU2VpKbXAmPAYpWsqpUCNvjBr4hd9j0i9W0R9Ba780iVPNFapmipToKKPN9NV9mV3fmZ8jU+Nf7kQu2oMpW8nztxSncdgSahoqdptlaKpsqzQGWzyt6emCBUtFS/im71KNVWGlafGxMfs1XlFVeJCY7u0qdRXnDITHrtXx5VUlYuM8bKmUl5pWZjoGE4JFS2kY8ZcLGmq0W8Mxdq2Gh6qUd/qiftGL+LpTUWA5ps95n/UVxMh3Ke8ZZAJ1dH9QsqDp8ZEFuDyl2lQj1SoVFZaNjb4m7xSh0pxgNSZ4FgNPyClG/K78slzMLypVO5G7MoXLOplz/64ZDDWyoU7bUJpJw0zFvG0jTqNtN6sOZj67I9grTNz7OXe9o44LGIAAAAAAAAAAAAAAAAAAAAAAAAA2LL5C+b67Whi54GcAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"173.6\" width=\"92.0\" height=\"106.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"173.6\" width=\"92.0\" height=\"106.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Q = 3600 C -&gt; 0.0373 mol e⁻ -&gt; ÷ 2 = 0.0187 mol H₂ -&gt; × 22.4 L/mol ≈ 0.42 L</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"volume":{"t":"Volume","ar":"الحجم","def":"The amount of three-dimensional space occupied by a substance. SI unit: cubic metre (m³). Common chemistry units: litre (L), millilitre (mL), cm³. Measured with graduated cylinders, pipettes, burettes, and volumetric flasks."},"electrolysis":{"t":"Electrolysis","ar":"التحليل الكهربائي (إجبار تفاعل أكسدة-اختزال غير تلقائي على الحدوث عن طريق إمرار تيار كهربائي خارجي)","def":"The use of an external electrical current to drive a non-spontaneous redox reaction. Electrons are forced to flow from cathode (reduction) to anode (oxidation) against the spontaneous direction. E_cell < 0 for the spontaneous direction, so energy input is required."},"gas":{"t":"Gas","ar":"غاز","def":"A state of matter in which particles are far apart, move rapidly and randomly, and have negligible intermolecular forces compared to their kinetic energy. A gas takes the shape and volume of its container and is highly compressible."},"moles of electrons":{"t":"Moles of Electrons","ar":"مولات الإلكترونات (تُحسب بقسمة الشحنة الكلية على ثابت فاراداي: moles of e⁻ = Q ÷ F)","def":"The amount of electron charge transferred in an electrochemical process. Calculated from stoichiometry of the half-reaction (n electrons per formula unit) or from Faraday's law: moles e⁻ = Q / F."},"molecule":{"t":"Molecule","ar":"جزيء","def":"A group of atoms bonded together, representing the smallest fundamental unit of a chemical compound."},"mole":{"t":"Mole","ar":"المول","def":"The unit of measurement in chemistry that represents a quantity of 6.022 x 10^23 entities (atoms, molecules, ions, etc.), known as Avogadro's number."},"molar volume":{"t":"Molar Volume","ar":"الحجم المولي","def":"The volume that one mole of an ideal gas occupies at STP, approximately 22.4 liters."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
