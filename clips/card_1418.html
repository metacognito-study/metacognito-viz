  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }

  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }

  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }

        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }

  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }

  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Take a weak acid fully neutralised by a strong base. The result is basic, not neutral. Can you say why the equivalence pH is greater than 7?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"224\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equivalence pH above 7</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1418</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Take a <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan> fully</tspan><tspan x=\"24\" y=\"190\">neutralised by a <tspan class=\"vocab-term\" data-vocab-key=\"strong base\">strong base</tspan>.</tspan><tspan x=\"24\" y=\"230\">The result is basic, not</tspan><tspan x=\"24\" y=\"270\">neutral. Can you say why the</tspan><tspan x=\"24\" y=\"310\">equivalence pH is greater than</tspan><tspan x=\"24\" y=\"350\">7?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:23</text></svg>"},{"at":16.94,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At equivalence, all the weak acid has turned into its conjugate base. That conjugate base does something in water: it hydrolyses, pulling a hydrogen from water and releasing hydroxide.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ALL <tspan class=\"vocab-term\" data-vocab-key=\"acid\">ACID</tspan> BECOMES <tspan class=\"vocab-term\" data-vocab-key=\"base\">BASE</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">At equivalence, all the <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">has turned into its <tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That conjugate base does something</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">in water: it hydrolyses, pulling a</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydrogen from water and releasing</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">hydroxide.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">At equivalence the acid is gone, leaving its conjugate base</text></svg>"},{"at":25.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The Conjugate Base Makes It Basic</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The <tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">Conjugate Base</tspan> Makes It Basic</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='14' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>At equivalence, only the conjugate base is left in water</text><rect x='34' y='34' width='532' height='52' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.3'/><text x='300' y='66' text-anchor='middle' font-size='14' font-weight='800' fill='var(--ink,#18213a)'>CH₃COO⁻(aq) + H₂O(l) → CH₃COOH(aq) + OH⁻(aq)</text><rect x='90' y='100' width='200' height='40' rx='9' fill='var(--indigo,#5545e8)' fill-opacity='0.12' stroke='var(--indigo,#5545e8)' stroke-width='1.4'/><text x='190' y='118' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> pulls H from water</text><text x='190' y='133' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>releases OH⁻</text><rect x='310' y='100' width='200' height='40' rx='9' fill='var(--correct,#16a36a)' fill-opacity='0.13' stroke='var(--correct,#16a36a)' stroke-width='1.5'/><text x='410' y='118' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>extra OH⁻ is basic</text><text x='410' y='133' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>so pH above 7</text><rect x='150' y='152' width='300' height='34' rx='9' fill='var(--rose,#e0476b)' fill-opacity='0.12' stroke='var(--rose,#e0476b)' stroke-width='1.4'/><text x='300' y='174' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>trap: pH 7 only fits two strong partners</text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The acetate <tspan class=\"vocab-term\" data-vocab-key=\"ion\">ion</tspan> pulls a hydrogen from water and releases hydroxide. More OH⁻</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">makes the <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan> basic, so the equivalence pH sits above 7, not at 7.</text></svg>"},{"at":42.84,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The trap: people expect a pH of 7 at equivalence, but that 7 rule only fits two strong partners. With a weak acid, the conjugate base tips the mixture basic, so the pH climbs above 7.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The trap: people expect a pH of 7 at</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">equivalence, but that 7 rule only</text><text class=\"ln\" data-g=\"0\" data-w=\"25\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fits two strong partners.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">With a <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan>, the <tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan></text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">tips the <tspan class=\"vocab-term\" data-vocab-key=\"mixture\">mixture</tspan> basic, so the pH</text><text class=\"ln\" data-g=\"1\" data-w=\"15\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">climbs above 7.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The pH 7 rule only fits a <tspan class=\"vocab-term\" data-vocab-key=\"strong acid\">strong acid</tspan> with a <tspan class=\"vocab-term\" data-vocab-key=\"strong base\">strong base</tspan></text></svg>"},{"at":56.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>To find the exact value, treat the conjugate base with its base constant, build a table, and solve for hydroxide. Then convert that hydroxide to a pH above 7.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE EXACT VALUE</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">To find the exact value, treat the</text><text class=\"ln\" data-g=\"0\" data-w=\"28\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan> with its <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">constant, build a table, and solve</text><text class=\"ln\" data-g=\"0\" data-w=\"14\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">for hydroxide.</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Then convert that hydroxide to a pH</text><text class=\"ln\" data-g=\"1\" data-w=\"8\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">above 7.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Use the base constant Kb, solve for OH⁻, then convert to pH</text></svg>"},{"at":76.26,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why the Equivalence pH Is Above 7</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Why the Equivalence pH</tspan><tspan x=\"48\" y=\"110\">Is Above 7</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">At equivalence the <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan> has all become its</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan>, which hydrolyses in water, pulling a</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">hydrogen from water and releasing hydroxide.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The extra hydroxide makes the <tspan class=\"vocab-term\" data-vocab-key=\"solution\">solution</tspan> basic, so the</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">equivalence pH ends up above 7, unlike the pH 7 of</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">two strong partners.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHcAAADDCAYAAAC4Yo7pAAADHElEQVR4nO3c4Y6iMBiGUbrx/m+5G5IxMcZxiiJ8fT3n52Z2qDwUKJJZFgAAAAAAAAAAAACAz2rLwXrvfflirbXD9vlhG/r2qGdE/rccQNhz9skhcTnHx+Oateftm8sSflNRydEHutNyMHGDiRtM3GDiBrtUuWtMu4PuBZaAH5+5o9Eq7Iy9jH6WTx/QpU7LCYF7oc9wSNy0U+4eYr44WAl8/L64nPmhKp3CEg/sUtdc9iVuMHGDnfIQY9T9NdlN2TZmbrCp4n7L3fVXxmUbcYOJG0zcYOIGEzeYuMHEDSZuMHGDiRtM3GDiBhM3mLjBxA0mbjBxg4kbTNxg4gYTN1jpl9Krvz7bir8kb+a+8V70+vOV36UW90flSK8Sd5JT7CvEDeaGauPsnen0beYGEzeYuMHEDSZuMHGDWQpNvtx5RtzAqFdOy8HEDSZuMNfcG54tMw1xg4kbTNxg4gYTN5i4waxzJ13DjjBzg4kbTNxgrrk3PFtmGuIGEzeYuMHEDSZuMHGDWedOuoYdYeYGEzeYuMFccx88W16vvffPma//NtN12cwd/AJhxj9lJG4wcYOJG0zcYOIGEzeYde6NmdawI8zcYOIGEzeYuJM/YnzGDdXGwDPddJm5wcQNJm4wcYOJG0zcYJZCky5zRpi5wcQNnbUrcUMfPa7EDQ7shuqOZ8tMQdxg4gYTN5i4wcQNJm4wcYOJG0zcYOIGEzeYuMHEDSZuMHGDTRf3zC/L+0Rf1JePO8NrL63wGMvFHZkdZ8ygXnRcZeOOHPW//cyRO7L/sq13xv+VM3eLIwL3YrNxi9OvF6OzYmQn7zVL+gvbemd2x8bdO/Bv//cv7/zuimGne295yx+z7h86nZ4dbIsyA9169B99LWwbx1HhIChzQ1V557XCY3umxCBGZ+Oznbb3TG5vbEvcD++4vjH2Xr+3SthVmYGcteyZeUx/KTWYo5Y9e4+hWtSrkoPa41raXtjhr2yrathV2YHN8AiwFQ67Kj24qpFb8ahXUwyy8kOMyqYb8CMeNT429eDPWOcCAAAAAAAAAAAAAMtW/wH8qTklmPR+yQAAAABJRU5ErkJggg==\" x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"523.3\" y=\"157.0\" width=\"85.4\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">CH₃COO⁻ + H₂O → CH₃COOH + OH⁻, so equivalence pH above 7</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"weak acid":{"t":"Weak acid","ar":"حمض ضعيف","def":"An acid that partially dissociates into ions in aqueous solution."},"strong base":{"t":"Strong base","ar":"قاعدة قوية","def":"A base that completely dissociates into ions in aqueous solution."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"conjugate base":{"t":"Conjugate base","ar":"القاعدة المرافقة","def":"What remains of an acid molecule after a proton is lost."},"ion":{"t":"Ion","ar":"أيون","def":"An atom or molecule with a net electric charge due to the loss or gain of one or more electrons."},"solution":{"t":"Solution","ar":"محلول","def":"A homogeneous mixture of two or more substances."},"mixture":{"t":"Mixture","ar":"مخلوط","def":"A combination of two or more substances that are physically combined (not chemically bonded) and can be separated by physical means. The components retain their individual properties. Classified as homogeneous (uniform) or heterogeneous (non-uniform)."},"strong acid":{"t":"Strong acid","ar":"حمض قوي","def":"An acid that completely dissociates into ions in aqueous solution."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
