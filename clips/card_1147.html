<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · ICE Tables with Percent Dissociation</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */
    --label-font:'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>
</head>

  <div class="stage" id="stage"></div>

    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audiochem@main/mp3/1147.mp3"></audio>

    <div class="vocab-term-title"></div><div class="vocab-arabic"></div><div class="vocab-def"></div>
  </div>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A weak acid at 0.100 mol/L has Ka = 1.8 × 10⁻⁵. Can you run the ICE table and report how much of it splits apart as a percent?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"206\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"percent dissociation\">percent dissociation</tspan></text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1147</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">A <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan> at 0.100 mol/L has</tspan><tspan x=\"24\" y=\"190\">Ka = 1.8 × 10⁻⁵. Can you run</tspan><tspan x=\"24\" y=\"230\">the <tspan class=\"vocab-term\" data-vocab-key=\"ice table\">ICE table</tspan> and report how</tspan><tspan x=\"24\" y=\"270\">much of it splits apart as a</tspan><tspan x=\"24\" y=\"310\">percent?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:47</text></svg>"},{"at":39.62,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The equilibrium row is 0.100 minus x for the acid and x for each product. Put it into Ka, approximating the bottom as 0.100, so x squared over 0.100 equals 1.8 × 10⁻⁵. That gives x equal to 1.34 × 10⁻³ mol/L.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">SOLVE FOR X</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The equilibrium row is 0.100 minus x for</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the <tspan class=\"vocab-term\" data-vocab-key=\"acid\">acid</tspan> and x for each product.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Put it into Ka, <tspan class=\"vocab-term\" data-vocab-key=\"approximating\">approximating</tspan> the bottom</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">as 0.100, so x squared over 0.100 equals</text><text class=\"ln\" data-g=\"1\" data-w=\"11\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">1.8 × 10⁻⁵.</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That gives x equal to 1.34 × 10⁻³ mol/L.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">x² / 0.100 = 1.8 × 10⁻⁵ gives x = 1.34 × 10⁻³ mol/L</text></svg>"},{"at":59.14,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Find Percent Dissociated</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Find Percent <tspan class=\"vocab-term\" data-vocab-key=\"dissociated\">Dissociated</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='130' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--ink,#18213a)'>HA: 0.100 &#8722; x</text><text x='320' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>H&#8314;: x</text><text x='450' y='52' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>A&#8315;: x</text><line x1='80' y1='64' x2='560' y2='64' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='320' y='88' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>x&#178; &#247; 0.100 = 1.8 &#215; 10&#8315;&#8309;   (bottom &#8776; 0.100)</text><text x='320' y='114' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--indigo,#5545e8)'>x = 1.34 &#215; 10&#8315;&#179; mol/L reacted</text><rect x='150' y='128' width='340' height='16' rx='5' fill='var(--muted,#606b84)' fill-opacity='0.18'/><rect x='150' y='128' width='5' height='16' rx='2' fill='var(--rose,#f43f61)'/><text x='150' y='158' text-anchor='start' font-size='9' font-weight='800' fill='var(--rose,#f43f61)'>reacted sliver: 1.34 &#215; 10&#8315;&#179;</text><text x='490' y='158' text-anchor='end' font-size='9' font-weight='800' fill='var(--muted,#606b84)'>started: 0.100</text><rect x='210' y='168' width='220' height='26' rx='9' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><text x='320' y='185' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--correct,#0e8f86)'>(0.00134 &#247; 0.100) &#215; 100 = 1.34%</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Divide the amount that reacted, x, by the starting amount, then times 100. So</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">(1.34 × 10⁻³) / 0.100 × 100 = 1.34 percent. The percent is not x; convert it to an amount</text></svg>"},{"at":83.54,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Here is the common slip: setting x equal to the percent itself, like x equal to 20 percent. The percent is not the amount. First convert it: the amount is the percent over 100 times the starting concentration, and that amount becomes x.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE COMMON SLIP</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Here is the common slip: setting x equal to</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the percent itself, like x equal to 20</text><text class=\"ln\" data-g=\"0\" data-w=\"8\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">percent.</text><text class=\"ln\" data-g=\"1\" data-w=\"30\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The percent is not the amount.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">First convert it: the amount is the percent</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">over 100 times the starting <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan>,</text><text class=\"ln\" data-g=\"2\" data-w=\"26\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and that amount becomes x.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">amount = (percent / 100) × starting concentration, then that is x</text></svg>"},{"at":103.46,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>ICE Tables with Percent Dissociation</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">ICE Tables with Percent</tspan><tspan x=\"48\" y=\"110\">Dissociation</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"46\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Solve the <tspan class=\"vocab-term\" data-vocab-key=\"ice table\">ICE table</tspan> for x, then report percent</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"dissociated\">dissociated</tspan> as (x / starting amount) × 100.</text><text class=\"ln\" data-g=\"1\" data-w=\"54\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For a <tspan class=\"vocab-term\" data-vocab-key=\"weak acid\">weak acid</tspan> at 0.100 mol/L with Ka = 1.8 × 10⁻⁵, x</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">= 1.34 × 10⁻³ mol/L, so 1.34 percent <tspan class=\"vocab-term\" data-vocab-key=\"dissociates\">dissociates</tspan>.</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">If a percent is given, convert it to an amount first:</text><text class=\"ln\" data-g=\"2\" data-w=\"50\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">amount = (percent / 100) × starting <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANkAAACsCAYAAAD2UQkEAAAF5UlEQVR4nO3d4Y7CNhBFYYL2/V/Z1bZCQilLEsf23Dtzvl+V2t2G4JOBELKPBwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQE5b9AYAR1pr7fXP27bZrVm7DUa9sPbcQrPaWNSM6hWW60Sz2VDUnlbNNLBfP9EbgDraiWl15b93QWSQiSpTWO+IDLJhbbv3Ya6sXtsiR1RHYWU7w8gkw5KozoaVcaIRmZnXYlt5JI8Iqx28hPzlMs2IzMj7wpu5yO5E9e3nt47tdQnpGyIzNONofvf9z8j3T+3kB9Mu04zIiro7rY5+x4jFvxkEdAaRmbj7xn9EVEe/Z0QU7eTjdJpmRJbYqCAiTqVv4uFcQWRmes7knfnZK78r6oSL6zQjMnOjYxh5ZrDXJhxMDyIzM2PCKITVOt9zOkwzIjOQNSzF//8MRCbqzJF91OdP0Qu73Txzqj7NiEzIUQT7f39mUamG5bJNIxBZsJ4Iji6YdQqrDbrwV3maEVmAuxF8+nmnsJy3sweRLTIrgk+/12XBtsFfX1GdZkQ20crporSoKm37GUQmHNaV6/geZtqkL2EqTjMiMwvr7NfzXWwiIcxEZMFhnY0qQ1Crvt2tNs2IbHFYd+7mpLBgcB2RiYaVVVt0wFCaZkS26HOsnt+DHIhsQFhEdU5b/LJXZZqVjuzO1e0RX2qEp3KR9cahPK2ij9RntKCTNwrTrERkPWEpR/W+DZlO7WeVNrLRYSlE5aoFfwQRPc1SRXY1EodpBX8/lcIiqnpTTGGa/WQ/5U5YiGYX2dH3p4hKh8oUi55mdpFl/mNxn3D2cI6VodlGljmsDNSmWOTHHnaRfdpJak/kDBUeY9Zp9nwkwEsqLapT7GX1dtlFRlBwW092Lxedr9+rtmhnLOBmeBmZ1SRzvv3ZbI6Lr8q+s5xk+5Mf0dem4f8cnoe26L2jzSTjSO27mKuziWzElykxn8vdtdrC7bOI7MwO4YiuRz20X3xONulGNphL/YDXFn+OJz/JrgSj/uRWovqysQVsj3xks+7Mi7Wh/Yre5+/bsPKALB1ZzxOTaZopLMy7NoF79/9beFBg8pHN+uPjbtwPHFtgaPu4IvalbGR3ngz3RZnRtgttdmzR08vqio8Rf4mS6DRPhrTBEXwKV+G5l4xsxFGOexJ6nXlsnd8R/GutKMQlHdnoHVVlmrk9zu3Laf7eA63i45eLbORrdaaZh+3iHca+/awiuchm7Ty3o3zlg8mW7HmSOrs4Y6Fke8LgRyqy2WFkOtrDh0xkMwNgmiGSTGSrgmCaoWRkKxY+0wylI1sdgsM0c9hGmES2cjExzVAysqgAXCYFBwZ/oZFFLHQWLUpOsqiF7zLN4C0sssgFzjRDqUkWveCzTbNsjyeDZ9WFEB33aNkeTyahk0xlYShEj7yelRe0SuTI7Vl9gavehBN5LI2MhYyKnpWn2B4HAVhHpryA1aJX3lcwmGRqC3qPBQ7LyBwWrmL8itsEg7tVjQ5uRsCZ72yFhJPMYYoB1pPs/Z6ADtOBgwLSXSCM8ThQaOHD6DdOE/cT1+3ObklkDk8+R3/YTzKXawQdDgjwsvTlompo7i8Toa3k7Qfet4HAkPKyqveJFhWbyt8TRn4S3ydbGZrSH+xWnfBIevuB2VPt0+9XCww5hf+lzf3JkNFT5lO4DnE5bCNMIvt25rFn8nybhixclI7szGn+npeThIVocpH9FcfZwIgKamQj2yOea/hOnA6uwk+Gg5EeIgMmIzJgMiIDJiMyYDIiAyYjMiFcHJwTkQniNHwuRAZMRmTAZDaXVVXCe7Nc+M5Skah4nxeHyMTCet3W/CiK3jCJbT0iWyzim9rfgp75/8V/2MkLKC1y19sxOGPnFl3QytuWDTu1+AJWmrJZsSMHcr/lnNPBwQk7cIAKn2sRWz+u+LipQmC4hys+Bsl6pOcgch+TDJiMyIDJeLk4CC+r8BcmGQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeCT1D9yIlUiAmsBiAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"190.5\" width=\"92.0\" height=\"72.9\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"190.5\" width=\"92.0\" height=\"72.9\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">x = 1.34 × 10⁻³ ; (x / 0.100) × 100 = 1.34 percent</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"percent dissociation":{"t":"Percent dissociation","ar":"نسبة التفكك المئوية","def":"The fraction of dissolved weak acid or weak base molecules that have dissociated into ions, expressed as a percentage: % dissociation = (amount dissociated / initial concentration) × 100. Percent dissociation of a weak acid increases with dilution and decreases in the presence of a common ion."},"weak acid":{"t":"Weak acid","ar":"حمض ضعيف","def":"An acid that partially dissociates into ions in aqueous solution."},"ice table":{"t":"ICE Table","ar":"طريقة لإيجاد التركيز أو الضغط عند الاتزان","def":"Method for equilibrium calculations using Initial, Change, and Equilibrium concentrations. Helps solve for unknown concentrations or equilibrium constants."},"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"approximating":{"t":"Approximate","ar":"تقريبي","def":"close to the true value but not exact"},"dissociated":{"t":"Dissociate","ar":"يتفكّك إلى أيونات","def":"to split apart into free ions when dissolved in water"},"concentration":{"t":"Concentration","ar":"التركيز","def":"The amount of solute present in a given quantity of solvent or solution which can be expressed in many units, e.g.  mol/cm³, even g/cm³ or g/kg"},"dissociates":{"t":"Dissociate","ar":"يتفكّك إلى أيونات","def":"to split apart into free ions when dissolved in water"}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
