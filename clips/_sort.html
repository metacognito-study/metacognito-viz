<!doctype html><meta charset=utf-8><style>:root{--ink:#18213a;--muted:#606b84;--surface:#fff;--surface-2:#f7f9fc;--line:#e5eaf2;--indigo:#5545e8;--indigo-soft:#eef0ff;--rose:#f43f61;--correct:#0e8f86;--amber:#f5b526}body{background:#fff;margin:0}svg{width:100%}</style><div style="width:900px"><svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)" role="img" preserveAspectRatio="xMidYMid meet"><title>Positive or normative? Sort by the test</title><rect x="1" y="1" width="638" height="358" rx="18" fill="var(--surface,#ffffff)" stroke="var(--line,#e5eaf2)"/><text font-size="24" font-weight="800" fill="var(--ink,#18213a)"><tspan x="24" y="44">Positive or normative? Sort by the test</tspan></text><g transform="translate(24,64)"><text x='296' y='30' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>sorting test: can evidence settle it, or does it need a value judgment?</text><rect x='12' y='46' width='280' height='206' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.06' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='152' y='76' text-anchor='middle' font-size='18' font-weight='800' fill='var(--correct,#0e8f86)'>POSITIVE</text><text x='152' y='98' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>only needs evidence</text><rect x='28' y='114' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='152' y='138' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>a rent ceiling lowers</text><text x='152' y='156' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>rental housing on offer</text><rect x='28' y='180' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='152' y='204' text-anchor='middle' font-size='13' font-wei
