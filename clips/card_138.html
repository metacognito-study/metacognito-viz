  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }

stroke-width='1.5'/><text x='532' y='138' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>above 1 &#8594; <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan></text><text x='532' y='178' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>each change over its own midpoint</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Divide each change by its midpoint average, then divide the percentage change in quantity by</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the percentage change in price; the result, 1.22, is above 1, so <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is elastic.</text></svg>"},{"at":73.64,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Price elasticity of demand measures how much quantity demanded responds to a change in the good's own price. A value of 1.22 means a 1 percent price rise causes a 1.22 percent fall in quantity demanded. The quantity reaction is larger than the price change that triggered it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHAT THE NUMBER MEANS</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"103\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"price elasticity of demand\">Price elasticity of demand</tspan> measures how much</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"127\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> responds to a change in the</text><text class=\"ln\" data-g=\"0\" data-w=\"17\" x=\"24\" y=\"151\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">good's own price.</text><text class=\"ln\" data-g=\"1\" data-w=\"44\" x=\"24\" y=\"175\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A value of 1.22 means a 1 percent price rise</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"24\" y=\"199\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">causes a 1.22 percent fall in quantity demanded.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"223\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The quantity reaction is larger than the price</text><text class=\"ln\" data-g=\"2\" data-w=\"25\" x=\"24\" y=\"247\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">change that triggered it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">Elasticity</tspan> = the size of the quantity reaction to a price change</text></svg>"},{"at":89.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A classmate worked out cross price elasticity instead. When the streaming price rose, the number of people buying a rival service also rose, but that is a different elasticity. Cross price elasticity measures how quantity demanded of one good responds to the price of a different good. Our idea here uses the same good's own price, which always sits on the bottom of the ratio.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: NOT CROSS PRICE</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"24\" y=\"97\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A classmate worked out cross price <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan> instead.</text><text class=\"ln\" data-g=\"1\" data-w=\"51\" x=\"24\" y=\"119\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">When the streaming price rose, the number of people</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"141\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">buying a rival service also rose, but that is a</text><text class=\"ln\" data-g=\"1\" data-w=\"21\" x=\"24\" y=\"163\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">different elasticity.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"24\" y=\"185\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Cross price elasticity measures how <tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> of</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"24\" y=\"207\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">one good responds to the price of a different good.</text><text class=\"ln\" data-g=\"3\" data-w=\"51\" x=\"24\" y=\"229\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Our idea here uses the same good's own price, which</text><text class=\"ln\" data-g=\"3\" data-w=\"39\" x=\"24\" y=\"251\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">always sits on the bottom of the ratio.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The bottom of the ratio is always the good's own price</text></svg>"},{"at":121.94,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Another student got negative 1.22 and concluded demand is inelastic because the value is negative. Price elasticity of demand is almost always negative, because demand curves slope downward. Economists use the absolute value to classify elasticity. The absolute value of 1.22 is above 1, so demand is elastic. The negative sign just confirms the inverse relationship.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: READ THE ABSOLUTE VALUE</text><text class=\"ln\" data-g=\"0\" data-w=\"57\" x=\"24\" y=\"114\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Another student got negative 1.22 and concluded <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> is</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"134\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">inelastic because the value is negative.</text><text class=\"ln\" data-g=\"1\" data-w=\"53\" x=\"24\" y=\"154\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"price elasticity of demand\">Price elasticity of demand</tspan> is almost always negative,</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"174\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">because demand curves slope downward.</text><text class=\"ln\" data-g=\"2\" data-w=\"57\" x=\"24\" y=\"194\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Economists use the absolute value to classify <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">elasticity</tspan>.</text><text class=\"ln\" data-g=\"3\" data-w=\"60\" x=\"24\" y=\"214\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The absolute value of 1.22 is above 1, so demand is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>.</text><text class=\"ln\" data-g=\"4\" data-w=\"57\" x=\"24\" y=\"234\" font-size=\"15\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The negative sign just confirms the inverse relationship.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Use the absolute value to classify; the sign only confirms the slope</text></svg>"},{"at":169.22,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Price Elasticity of Demand</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Price <tspan class=\"vocab-term\" data-vocab-key=\"elasticity\">Elasticity</tspan> of</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"demand\">Demand</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"price elasticity of demand\">Price elasticity of demand</tspan> always uses the percentage</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">change in the good's own price and the percentage change</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">in <tspan class=\"vocab-term\" data-vocab-key=\"quantity demanded\">quantity demanded</tspan> of that good.</text><text class=\"ln\" data-g=\"1\" data-w=\"48\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">An absolute value above 1 is <tspan class=\"vocab-term\" data-vocab-key=\"elastic\">elastic</tspan>, below 1 is</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">inelastic, and equal to 1 is unit elastic.</text><text class=\"ln\" data-g=\"2\" data-w=\"54\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The <tspan class=\"vocab-term\" data-vocab-key=\"midpoint method\">midpoint method</tspan> divides each change by its average</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">so the answer is the same in either direction.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHMAAADDCAYAAACxiS6TAAADh0lEQVR4nO3d266bMBBGYSbq+7+yq1xsCaEkm7CZwaxZ302lJg2HnzG2OXRZJEmSJEmSJEmSJEmSJEmSJL5YwMYYY/t3EYHd5ugUJD3Ux9IwyL3fuRtcmKNZ04oO812Qzz+3odKqExXm2ITTpSKRYe5Brk5smNGsKtFhdoQJc3zRXFKrFhOmDBPFylw4PVrDBDFMEMMEMcyFM1QxTBDDBMGEGZCm8i8wYXYcV7YJc0ADaxlmR4YJggozDnSCSB0nVJh7zpvkcyk6zG4ME+TR+e67AJ0vkWF+Qj5ftguTDhlmwJrP1mF2fZioRZgdzpfoMANYeW3D7Agb5mjQrLYIc/gYvO5u2k7C7M1kTNjBmrKZnT3IWdcxZt5Jfzn6R+IE+1nreLZpVmS9k87YQaPgpU5nri+qmZ2x2brbuk8RZnWzFSctY/07MwR6eZiznn/uGOjlYWYEOX7Zqc/Pz9zxsxyEl4aZ0YEYX4SUEeiV1fmgBhkffjerabw60EvCzO7SR0R82qHPzzKX/bOMhR5m1kaO1QGyd6I9e8dXB/roMASJjarlVgf6oA9B4qKe5hWBloR597HkUdXbWtrMdgryig5RephXjrvGZE+BZS87vVIqryyML3q06+9Urxt+Ou9M45dx5N7hy938W0BiFdKnQKkdMlSYrwJdPiAFiQxzTw+SFiI6THpo00znETses0D2ZrsyTJDSc2a3c1g1KxPEMEEME8ShCYiVCWKYIIYJ4jgTxMoEMUwQwwRxnAm65GdlghgmSPltI50ug4WPJ+gom1kQwwQxTBDHmSBWJohhgmaAvAQGYmWCoB8cuhp6BsiHhnJh3tAlz5kodoBAHJqAWJmJvG1Eh1mZIF41AXEGKBF6Bki5DBPEcSaIlQlimCCGmQg9A+SLEHNZmSCGmchJA5gonAVynAliMwtimCAOTZJhx5ndDPJ/hqpc9mZBvNMgkZMGOszeLIgdIBDDBDHMZL7TAGI4aaCjbGZBnDRIhJ408IauXDazIIYJYpggj+oOQad3tD95p4EOsZkFMUwQx5nJKvsIViaIYYJ4dx6IlZkI/eR0R9GhA+Qboc8XlcGtj9J1mK+O3lf/Zs9nM6pa39Iw3wW63cht1b47CL75bO939v7+3gPzt4P2TGVHduVGzaJ6m0t3atfzZBQdvJdUSJdQo0kLJEmSJEmSJEmSJEmSJEmStMzvP+7NJQjSxP9oAAAAAElFTkSuQmCC\" x=\"524.7\" y=\"157.0\" width=\"82.6\" height=\"140.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"524.7\" y=\"157.0\" width=\"82.6\" height=\"140.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">|elasticity| = %ΔQ ÷ %ΔP    above 1 elastic, below 1 inelastic</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"elasticity":{"t":"Elasticity","ar":"المرونة: مدى استجابة الكمية للتغيرات في السعر أو الدخل.","def":"A measure of how much one economic variable responds to a change in another economic variable."},"elasticity of demand":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"midpoint method":{"t":"Midpoint method","ar":"طريقة نقطة المنتصف: طريقة لحساب المرونة بدقة بين نقطتين.","def":"A method for calculating elasticity that uses the average of the initial and final values for quantity and price."},"elastic":{"t":"Price elasticity of demand","ar":"","def":"A measure of the responsiveness of quantity demanded to a change in price. Calculated as the percentage change in quantity demanded divided by the percentage change in price."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"price elasticity of demand":{"t":"Price elasticity of demand","ar":"مرونة الطلب السعرية: مدى استجابة الكمية المطلوبة لتغير السعر.","def":"A measure of how much the quantity demanded of a good responds to a change in its price."},"quantity demanded":{"t":"Quantity demanded","ar":"الكمية المطلوبة: مقدار ما يشتريه المستهلكون بسعر معين","def":"The specific amount of a good that consumers are willing and able to buy at a particular price."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
</body>
</html>
