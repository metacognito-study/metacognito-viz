<title>Metacognito · Winners and Losers from Trade</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }

  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

off overall, even while</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it creates clear winners and clear losers inside it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Importing: buyers win, producers lose, total national surplus rises</text></svg>"},{"at":57.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student said free trade always helps both home buyers and home sellers, since competition sharpens everyone. That claims too much. Home producers who face foreign rivals get a lower price and lose surplus. Trade hurts them even as it helps the economy overall. The nation gains, but the gains and losses fall on different groups inside it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: IT DOES NOT HELP EVERYONE</text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"24\" y=\"97\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student said <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan> always helps both home <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"24\" y=\"119\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and home <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan>, since competition sharpens everyone.</text><text class=\"ln\" data-g=\"1\" data-w=\"21\" x=\"24\" y=\"141\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That claims too much.</text><text class=\"ln\" data-g=\"2\" data-w=\"56\" x=\"24\" y=\"163\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Home <tspan class=\"vocab-term\" data-vocab-key=\"producers\">producers</tspan> who face foreign rivals get a lower price</text><text class=\"ln\" data-g=\"2\" data-w=\"17\" x=\"24\" y=\"185\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">and lose <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan>.</text><text class=\"ln\" data-g=\"3\" data-w=\"54\" x=\"24\" y=\"207\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"trade\">Trade</tspan> hurts them even as it helps the economy overall.</text><text class=\"ln\" data-g=\"4\" data-w=\"50\" x=\"24\" y=\"229\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The nation gains, but the gains and losses fall on</text><text class=\"ln\" data-g=\"4\" data-w=\"27\" x=\"24\" y=\"251\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">different groups inside it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Free trade helps the nation overall but still hurts home producers</text></svg>"},{"at":107.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>National Surplus Tally</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">National <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">Surplus</tspan> Tally</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='305' y='34' text-anchor='middle' font-size='12' font-weight='800' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">Total surplus</tspan> in the hammer market</text><rect x='110' y='58' width='150' height='96' rx='6' fill='var(--surface-2,#eef1f7)' stroke='var(--line,#c9d2e3)' stroke-width='1.5'/><text x='185' y='82' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"no trade\">no trade</tspan></text><text x='185' y='120' text-anchor='middle' font-size='22' font-weight='800' fill='var(--ink,#18213a)'>765</text><rect x='350' y='58' width='150' height='96' rx='6' fill='var(--correct,#0e8f86)' opacity='0.18' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='425' y='82' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'><tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan></text><text x='425' y='120' text-anchor='middle' font-size='22' font-weight='800' fill='var(--correct,#0e8f86)'>935</text><text x='305' y='110' text-anchor='middle' font-size='15' font-weight='800' fill='var(--muted,#606b84)'>→</text><rect x='200' y='168' width='210' height='30' rx='6' fill='var(--amber,#f5b526)'/><text x='305' y='188' text-anchor='middle' font-size='12' font-weight='800' fill='#18213a'>net gain = 170</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">In the hammer market, no trade total surplus is 765 and free trade total surplus is 935. The net gain</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">from opening up is 935 minus 765, which is 170: the winners gain more than the losers lose.</text></svg>"},{"at":129.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Home steel makers who lobby to block imports are simply acting in their own interest. They lose producer surplus under free trade, so their lobbying is no surprise. But the national tally still shows the buyers' gain from lower prices beats the producers' loss. The losing group fights hardest, yet the country as a whole comes out ahead.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">LOBBYING IS NO SURPRISE</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Home steel makers who lobby to block <tspan class=\"vocab-term\" data-vocab-key=\"imports\">imports</tspan> are</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">simply acting in their own interest.</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">They lose <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">producer surplus</tspan> under <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan>, so</text><text class=\"ln\" data-g=\"1\" data-w=\"30\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">their lobbying is no surprise.</text><text class=\"ln\" data-g=\"2\" data-w=\"46\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">But the national tally still shows the <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>'</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">gain from lower prices beats the <tspan class=\"vocab-term\" data-vocab-key=\"producers\">producers</tspan>' loss.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The losing group fights hardest, yet the country</text><text class=\"ln\" data-g=\"3\" data-w=\"27\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">as a whole comes out ahead.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Producers lobby because they lose, yet the nation still gains overall</text></svg>"},{"at":147.6,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Gains from Trade</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"gains from trade\">Gains from Trade</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Opening to <tspan class=\"vocab-term\" data-vocab-key=\"trade\">trade</tspan> always lifts total national</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan>, yet the gains and losses spread unevenly.</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">When a country <tspan class=\"vocab-term\" data-vocab-key=\"imports\">imports</tspan>, <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> gain and <tspan class=\"vocab-term\" data-vocab-key=\"producers\">producers</tspan></text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">lose.</text><text class=\"ln\" data-g=\"2\" data-w=\"48\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">When it <tspan class=\"vocab-term\" data-vocab-key=\"exports\">exports</tspan>, producers gain and buyers lose.</text><text class=\"ln\" data-g=\"3\" data-w=\"48\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Either way the winners gain more than the losers</text><text class=\"ln\" data-g=\"3\" data-w=\"51\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">lose, so the nation is better off overall even with</text><text class=\"ln\" data-g=\"3\" data-w=\"35\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">clear winners and losers inside it.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALkAAACvCAYAAAChIn/aAAAEZklEQVR4nO3d227bOhRFUTPo//8yiwAtahSJY1sX7r00xtMBTsxY1BTN+NbbDQAAAAAAAAAAAAAAAAAAAADgWsatoTnn/PvfY4yWx8B5RufAWWc0Wlw+bo0IvI7Z6Fy0ibzTpF7FbHJO2kQO7xpdV4xn9oRdbneVY1yl/Ere5SGRuspH/pWzV5zqK9VexzSfWFDevd1KpSNfMXnVT1jV6GbheSsd+VdS943dV/PKykYu1NpGkUeQtpFXmiwXVn8lI//K0U/FfXfbsy6QLRfTllV1LLrtpSOvOEn0PoflIl+1il/Z2Hk1r6ZU5NUi7XACKxjFty2lIl95gWw9KatP6tbQRvFQIyKvtopX0CmyUfgiKRF5lckg89yWiPwrW7caWx8FOj6KHHHMc+OWp4LlkVfYplRYbVKObRTctiyPPOEiSTIKRto6coFmGsUulGWR73HQR10knS+0o45/HnS+LrddWRFX94fiqsc4Ci0USyK/wjblneO5whzMBRfc6ZHvdZBXuFBSA50nh15iu1Ipzkr3JeEYRoH78nHlVfwK+/Etx5qymi9fyStc6Vtd6WLpeI5Pi/zI1Xf1JCZfQGOn1XzlH6EfVzhR1HVGG6esgCLnkaMfiQ9fyQXOasv/8IR58EIocuL96rQH2/OZFWPVGutIVnLiiZx4IieeyIkncuKJnHgiJ97hkSe/Q5B9tH/vytEvBnhvTK85nlf4jGfliX7nd1Qd69XfkbzAnBL51jfM//Szxnr/Z1ePdcZ2ttw3aL3zM8Z6/WcqjnWUMl+s+f8VvWVSjNVjrHHSkxJlIn/F5+QY6/yxxp8o97xfe4zz4++5nWzrBN1PjLGeH6fyWEdb9hz2q5P0aGKMtWasudOn9o+29IWaZydpz39s9uyxKt6nymMdYfmrkf9PkFdIM8xC57XNi0HwLpETT+TEEznxRE48kRNvyZcLcY6fnr8eF3m6VuRhXnkVct79bHLwLSNf+bbNPRwR1NY5mX9unxh7uz1598D3PoZn38+9arwK2kXOP0fGOINCb7ldYb8/KueDcT7/X8L2JSLy6idi71Vxz0/bjB8+CJEQuu1KM9/F+BnilhjHg9t337qIPCTwvX7HCAxd5E2cEXhq6CL/5im0Dif0yL3yaL4PvyfyO1XD/up+rYpwFp2jR0RO/Gou8obOjG8EhC7y4ipuD2bB+/SIyIkncuKJvJkl30A1eu/LRU48kRNP5MQTOfFETjyRE0/kxBM58UROPJETT+TEEznxRE68iC8XurKrfDPtFlbyIN0+sXMWkTcm6ufYrtzxcJ/JSk48kRNP5MSL2JP7A4xHrOTEE3ljng0KjTzhxB51DAlzc4SWe3In8x9zEbiSw6tETjyRE0/kxBM58UROPJETT+TEEznxRE48kRNP5MQTOfFETjyRE0/kxBM58UROPJET77TPB/puFFZ9RvWUlVzgrGzDdoV4Iifeqd/ZYdvCPd8ZAwAAAAAAAAAAAAAAAAAAAMBtjd+3mWRiDkARHwAAAABJRU5ErkJggg==\" x=\"520.0\" y=\"163.5\" width=\"92.0\" height=\"87.0\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"163.5\" width=\"92.0\" height=\"87.0\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">net gain = <tspan class=\"vocab-term\" data-vocab-key=\"free trade\">free trade</tspan> <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan> minus <tspan class=\"vocab-term\" data-vocab-key=\"no trade\">no trade</tspan> total surplus</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"international trade":{"t":"International trade","ar":"التجارة الدولية: تبادل السلع والخدمات بين الدول","def":"International trade is the exchange of goods and services across national borders."},"trade":{"t":"Trade","ar":"التجارة: تبادل السلع والخدمات بين الأفراد أو الدول.","def":"Trade is the exchange of goods and services between individuals or countries."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"producers":{"t":"Producers","ar":"المنتجون: الشركات التي تصنع وتبيع السلع والخدمات.","def":"Individuals or firms that create and supply goods and services."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"free trade":{"t":"Free trade","ar":"التجارة الحرة: تبادل السلع بدون قيود حكومية","def":"Free trade is an international trade policy that allows goods and services to be bought and sold across national borders without tariffs or other barriers."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"total surplus":{"t":"Total surplus","ar":"إجمالي الفائض: مكاسب المشترين والبائعين معًا","def":"The sum of consumer surplus and producer surplus, representing the total benefits to buyers and sellers from a market."},"no trade":{"t":"Autarky","ar":"الاكتفاء الذاتي: عدم التجارة مع أي دولة أخرى.","def":"A situation where a country does not engage in international trade and produces everything it consumes."},"imports":{"t":"Imports","ar":"الواردات: سلع وخدمات تشتريها دولة من دول أخرى.","def":"Goods and services brought into a country from another country."},"producer surplus":{"t":"Producer surplus","ar":"فائض المنتج: ربح البائع فوق تكلفته","def":"The benefit a producer receives from selling a good, measured as the difference between the price received and the minimum price they would have accepted."},"gains from trade":{"t":"Gains from trade","ar":"مكاسب التجارة: زيادة الإنتاج والاستهلاك بسبب التجارة.","def":"The benefits that result from trade, allowing countries to consume more than they could produce alone."},"exports":{"t":"Exports","ar":"الصادرات: سلع وخدمات تبيعها دولة لدول أخرى.","def":"Goods and services sent out of a country to another country."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
