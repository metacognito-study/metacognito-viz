<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At the same conditions, which strays further from ideal gas behavior, hydrogen chloride or helium, and why?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"116\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Real gases</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#923</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">At the same conditions, which</tspan><tspan x=\"24\" y=\"190\">strays further from ideal <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan></tspan><tspan x=\"24\" y=\"230\">behavior, hydrogen chloride or</tspan><tspan x=\"24\" y=\"270\">helium, and why?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:44</text></svg>"},{"at":14.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>An ideal gas would ignore all attractions between its particles. Hydrogen chloride has stronger forces, so it should behave less like the ideal. Stronger forces between molecules cause greater deviation from ideal behavior.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHAT IDEAL MEANS</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">An ideal <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> would ignore all attractions</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">between its particles.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Hydrogen chloride has stronger forces, so</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it should behave less like the ideal.</text><text class=\"ln\" data-g=\"2\" data-w=\"39\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Stronger forces between molecules cause</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">greater <tspan class=\"vocab-term\" data-vocab-key=\"deviation from ideal behavior\">deviation from ideal behavior</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">An ideal gas ignores attractions; stronger forces cause greater deviation</text></svg>"},{"at":37.36,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Hydrogen chloride is polar, with dispersion plus dipole dipole, while helium has only a tiny dispersion force. Those attractions pull the HCl molecules toward each other, and that gentle inward pull lowers the real pressure below the ideal value.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY HCL PULLS INWARD</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Hydrogen chloride is polar, with dispersion</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">plus dipole dipole, while helium has only a</text><text class=\"ln\" data-g=\"0\" data-w=\"22\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">tiny dispersion force.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Those attractions pull the HCl molecules</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">toward each other, and that gentle inward</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pull lowers the real pressure below the</text><text class=\"ln\" data-g=\"1\" data-w=\"12\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">ideal value.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"12\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">HCl: dispersion plus dipole dipole, so the inward pull lowers real pressure</text></svg>"},{"at":63.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The real pressure drops below the ideal pressure, a clear sign of deviation, so the compression factor Z falls below 1. Helium stays close to ideal because its attractions are almost nothing, so its Z stays near 1.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TELLTALE SIGN</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"98\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The real pressure drops below the ideal</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"129\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pressure, a clear sign of deviation, so</text><text class=\"ln\" data-g=\"0\" data-w=\"39\" x=\"24\" y=\"160\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the compression factor Z falls below 1.</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"191\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Helium stays close to ideal because its</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"222\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">attractions are almost nothing, so its</text><text class=\"ln\" data-g=\"1\" data-w=\"15\" x=\"24\" y=\"253\" font-size=\"23\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Z stays near 1.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">HCl: Z falls below 1. Helium: weak forces, so Z stays near 1</text></svg>"},{"at":86.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Compression Factor Z</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Compression Factor Z</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='15' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>Stronger forces drag the compression factor Z below 1</text><line x1='90' y1='176' x2='540' y2='176' stroke='var(--line,#e5eaf2)' stroke-width='1.6'/><line x1='90' y1='52' x2='540' y2='52' stroke='var(--correct,#0e8f86)' stroke-width='1.6' stroke-dasharray='6 4'/><text x='540' y='48' text-anchor='end' font-size='9.5' font-weight='800' fill='var(--correct,#0e8f86)'>ideal, Z = 1</text><rect x='150' y='58' width='110' height='118' rx='4' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><text x='205' y='80' text-anchor='middle' font-size='11' font-weight='800' fill='#fff'>Z near 1</text><text x='205' y='194' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>helium</text><text x='205' y='40' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>tiny dispersion</text><rect x='370' y='112' width='110' height='64' rx='4' fill='var(--indigo,#5545e8)'/><text x='425' y='134' text-anchor='middle' font-size='11' font-weight='800' fill='#fff'>Z below 1</text><text x='425' y='194' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>HCl</text><text x='425' y='40' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--rose,#e0476b)'>dipole dipole, big deviation</text></g><text x=\"24\" y=\"334\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">An ideal <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan> sits at Z equals 1. Helium's tiny forces keep it near 1, while HCl's stronger</text><text x=\"24\" y=\"348\" font-size=\"10\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">dispersion plus dipole dipole pulls its molecules inward, dropping Z well below 1.</text></svg>"},{"at":101.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Stronger Forces, Bigger Gas Deviation</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Stronger Forces, Bigger</tspan><tspan x=\"48\" y=\"110\"><tspan class=\"vocab-term\" data-vocab-key=\"gas\">Gas</tspan> Deviation</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The more the molecules feel each other, the less the gas</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">obeys the ideal gas <tspan class=\"vocab-term\" data-vocab-key=\"law\">law</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">An ideal gas ignores all attractions.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Hydrogen chloride is polar, with dispersion plus dipole</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">dipole, so its molecules pull inward, the real pressure</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">drops below ideal, and the compression factor Z falls</text><text class=\"ln\" data-g=\"2\" data-w=\"8\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">below 1.</text><text class=\"ln\" data-g=\"3\" data-w=\"52\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Helium has only a tiny dispersion force, so it stays</text><text class=\"ln\" data-g=\"3\" data-w=\"27\" x=\"48\" y=\"320\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">nearly ideal with Z near 1.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJUAAACtCAYAAAC5iz2PAAAE2klEQVR4nO3d247bMAyEYTPo+78yi71YoEjtxAdKGpL/d1l0dx1pNFYcJ9k2AAAAAAAAAAAAAAAAAAAAAAAAAACgwrbC3N03YWZWcvxfW1HqgcpyjHeUDFWmyfJEx9o6VFjrz9aA2t7FC7bTv2gqhCNUCEeoEK7FnkqBF99HtQvV3oTO2rx7ozD94vSHcCVDpXYJocqxbt1Pf7+TpXr6sYJhKh8q1XBZ4TCVPv1hLUKFcIQK4QgVwhEqhCNUCEeoEI5QDeQi18ZmI1QIR6gQjlANZA1ektlDqAZy9lSIZjQVojlNBcQgVAhHqBCOUA1kbNSBGIQK4QgVwhEqhCNUCFf+fX8jr5J3fXb3DU314GWXri/DfEOoTjoK0KdgedPQESqEI1QnHe2f2Ff9j1A9QKD28ezvAkJ0Dk01kDUNIaFCOE5/B7jIeV+Lprpyvejn/+5d5Iy65uQNrl21CNW7o+b5NuF3AmENW658qBSbwQWPKVL5UD1pjqiWsWZtVTpUTxthZKN44bYqHSqlxrBGbVU2VCM21dHB8KJtVTZUik1hAscwQ8lQPWmAn4l/n/y9f4viBduq5Mp5nyi1hnDx43uq3Ms0M1b+p79hNwLy8/sqBavk6W/l5tpPhLpSgMqHanRLnf39fuM4Ku2tSoVqZCNcnXT/8v8rt1WZPdXslf4eioi/70X2VmWbanZL3fl7ViBAZUNVaT/iBR5LiVBlbgBLdKxtQjVjZZ+Z+Mjj8ORtVWajfmfl703e2Z+PnHgzs+xBKtNUdyfi0z3nUfej28PTWuaQpQ7VyNPUk9fnrPkzwbShWnHV+szdCrbwgquKtKGKmszfoOz9/NGkjro9xoq01atzS+0FIyqQndsqZaiqrvAqjyVdqDKu3G6POVWonlxXysSSP6ZUoXrizEZcuRFc+NjeWaeWujoxqxvDk97L3qapMk1K9rZ6ddtLnf05hQDahWtnSsq9oHxlsrps/GeTH0Amfks3BilOf8hFOlTZVugolmxv1XJPNZrfnPAqC0b2QWRpqZGNYSfeBqY4JiWaamYzzDzteNL3AUoe8JkVGT25nyZv9f7F/jm2DG2VsqlGTPL7h/FH/Q2b/E4cBVIJP7MSFSdgxifLWKK2StlUR2a+vWrkJFryt2zJpHvlCr0ygbMawRO3VeqmGvHh+Vc+1ExlEtXIDIraylRoLxcbk/JNNXrwPt3JMONmOmdP1WNFjrzI6jebUWVs0jfVqkG70l5VWidlU2VpKbXAmPAYpWsqpUCNvjBr4hd9j0i9W0R9Ba780iVPNFapmipToKKPN9NV9mV3fmZ8jU+Nf7kQu2oMpW8nztxSncdgSahoqdptlaKpsqzQGWzyt6emCBUtFS/im71KNVWGlafGxMfs1XlFVeJCY7u0qdRXnDITHrtXx5VUlYuM8bKmUl5pWZjoGE4JFS2kY8ZcLGmq0W8Mxdq2Gh6qUd/qiftGL+LpTUWA5ps95n/UVxMh3Ke8ZZAJ1dH9QsqDp8ZEFuDyl2lQj1SoVFZaNjb4m7xSh0pxgNSZ4FgNPyClG/K78slzMLypVO5G7MoXLOplz/64ZDDWyoU7bUJpJw0zFvG0jTqNtN6sOZj67I9grTNz7OXe9o44LGIAAAAAAAAAAAAAAAAAAAAAAAAA2LL5C+b67Whi54GcAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"173.6\" width=\"92.0\" height=\"106.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"173.6\" width=\"92.0\" height=\"106.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">strong attractions: big deviation, Z below 1; weak attractions: nearly ideal, Z near 1</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"gas":{"t":"Gas","ar":"غاز","def":"A state of matter in which particles are far apart, move rapidly and randomly, and have negligible intermolecular forces compared to their kinetic energy. A gas takes the shape and volume of its container and is highly compressible."},"deviation from ideal behavior":{"t":"Deviation from Ideal Behavior","ar":"انحرافات عن سلوك الغاز المثالي","def":"Differences seen in real gases, where assumptions like no particle volume or attractions are not fully accurate, causing variations from ideal gas predictions."},"law":{"t":"Law","ar":"القانون","def":"A concise statement or mathematical equation that summarises a pattern observed repeatedly in nature. A scientific law describes what happens but does not explain why. Example: the Law of Conservation of Mass. Established by extensive experimental evidence."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
