  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

he bonds, which weakens the bond to the acidic hydrogen, so the proton leaves more easily. They do not need to touch the hydrogen to loosen it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">PULLING FROM A DISTANCE</text><text class=\"ln\" data-g=\"0\" data-w=\"42\" x=\"24\" y=\"102\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Electronegative atoms nearby pull <tspan class=\"vocab-term\" data-vocab-key=\"electron\">electron</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"24\" y=\"131\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> away through the bonds, which</text><text class=\"ln\" data-g=\"0\" data-w=\"43\" x=\"24\" y=\"160\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">weakens the bond to the <tspan class=\"vocab-term\" data-vocab-key=\"acidic hydrogen\">acidic hydrogen</tspan>, so</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"189\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the <tspan class=\"vocab-term\" data-vocab-key=\"proton\">proton</tspan> leaves more easily.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"218\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">They do not need to touch the hydrogen to</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"247\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">loosen it.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Nearby electron pulling atoms weaken the bond through the bonds in between</text></svg>"},{"at":38.7,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Trichloroacetic vs Acetic Acid</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Trichloroacetic vs Acetic <tspan class=\"vocab-term\" data-vocab-key=\"acid\">Acid</tspan></tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='170' y='44' text-anchor='middle' font-size='11' font-weight='800' fill='var(--correct,#0e8f86)'>trichloroacetic acid</text><text x='96' y='86' text-anchor='middle' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>Cl</text><text x='96' y='110' text-anchor='middle' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>Cl</text><text x='96' y='134' text-anchor='middle' font-size='11' font-weight='800' fill='var(--rose,#f43f61)'>Cl</text><text x='150' y='110' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>C</text><text x='206' y='110' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>C</text><text x='258' y='88' text-anchor='middle' font-size='11' font-weight='800' fill='var(--muted,#606b84)'>O</text><text x='258' y='132' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>O&#8211;H</text><line x1='160' y1='110' x2='196' y2='110' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='213' y1='102' x2='247' y2='88' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='216' y1='107' x2='250' y2='93' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='214' y1='116' x2='244' y2='130' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='140' y1='102' x2='108' y2='88' stroke='var(--rose,#f43f61)' stroke-width='1.6'/><line x1='140' y1='110' x2='108' y2='110' stroke='var(--rose,#f43f61)' stroke-width='1.6'/><line x1='140' y1='118' x2='108' y2='132' stroke='var(--rose,#f43f61)' stroke-width='1.6'/><path d='M232,100 Q180,86 122,92' fill='none' stroke='var(--rose,#f43f61)' stroke-width='1.6' stroke-dasharray='4 3'/><polygon points='118,92 128,89 126,97' fill='var(--rose,#f43f61)'/><path d='M232,112 Q180,98 122,112' fill='none' stroke='var(--rose,#f43f61)' stroke-width='1.6' stroke-dasharray='4 3'/><polygon points='118,112 128,109 126,117' fill='var(--rose,#f43f61)'/><path d='M232,124 Q180,110 122,130' fill='none' stroke='var(--rose,#f43f61)' stroke-width='1.6' stroke-dasharray='4 3'/><polygon points='118,130 128,127 126,135' fill='var(--rose,#f43f61)'/><text x='170' y='168' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>three Cl atoms drag <tspan class=\"vocab-term\" data-vocab-key=\"electron\">electron</tspan> <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> away,</text><text x='170' y='181' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>loosening the O&#8211;H grip: Ka = 0.23</text><text x='470' y='44' text-anchor='middle' font-size='11' font-weight='800' fill='var(--muted,#606b84)'>acetic acid</text><text x='396' y='110' text-anchor='middle' font-size='12' font-weight='800' fill='var(--ink,#18213a)'>H&#8323;C</text><text x='470' y='110' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>C</text><text x='522' y='88' text-anchor='middle' font-size='11' font-weight='800' fill='var(--muted,#606b84)'>O</text><text x='522' y='132' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>O&#8211;H</text><line x1='416' y1='110' x2='460' y2='110' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='477' y1='102' x2='511' y2='88' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='480' y1='107' x2='514' y2='93' stroke='var(--ink,#18213a)' stroke-width='2'/><line x1='478' y1='116' x2='508' y2='130' stroke='var(--ink,#18213a)' stroke-width='2'/><text x='470' y='168' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>no extra pull, the O&#8211;H holds on:</text><text x='470' y='181' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>Ka = 1.8 &#215; 10&#8315;&#8309;, far weaker acid</text><line x1='320' y1='60' x2='320' y2='180' stroke='var(--line,#e5eaf2)' stroke-width='1.2'/><text x='320' y='198' text-anchor='middle' font-size='10' font-weight='800' fill='var(--ink,#18213a)'>the stronger the pull on the O&#8211;H electrons, the more easily H&#8314; leaves</text></g><text x=\"24\" y=\"332\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Three chlorine atoms pull electron density from the carboxyl group, so</text><text x=\"24\" y=\"348\" font-size=\"12\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">trichloroacetic acid is far stronger, with an acid constant thousands of times</text></svg>"},{"at":50.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The chlorine atoms also spread the negative charge of the conjugate base, making it more stable. So the nearby pullers help twice: they weaken the bond and they steady the charge left behind.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TWO EFFECTS AT ONCE</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The chlorine atoms also spread the</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">negative charge of the conjugate</text><text class=\"ln\" data-g=\"0\" data-w=\"28\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan>, making it more stable.</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the nearby pullers help twice:</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">they weaken the bond and they steady</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the charge left behind.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Nearby pullers both weaken the bond and stabilize the <tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan></text></svg>"},{"at":80.2,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Nearby Atoms and Acid Strength</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Nearby Atoms and <tspan class=\"vocab-term\" data-vocab-key=\"acid\">Acid</tspan></tspan><tspan x=\"48\" y=\"110\">Strength</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"51\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Electronegative atoms near the <tspan class=\"vocab-term\" data-vocab-key=\"acidic hydrogen\">acidic hydrogen</tspan> pull</text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"electron\">electron</tspan> <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> away through the bonds, the inductive</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">effect, weakening the bond so the <tspan class=\"vocab-term\" data-vocab-key=\"proton\">proton</tspan> leaves more</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">easily and also stabilizing the <tspan class=\"vocab-term\" data-vocab-key=\"conjugate base\">conjugate base</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"52\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Trichloroacetic acid, with three chlorine atoms, has</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Ka = 0.23, far above acetic acid's 1.8 × 10⁻⁵, so it is</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">much the stronger acid.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKUAAACtCAYAAADReL+3AAAG+UlEQVR4nO2dWZLjOAwFRUfd/8qccHc7SuPQwgUEnsjMv+mxKQlMg7tq2wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACCSFHr1Scg55/1/p5SIawcEz0jEMxC0HgI2SMY9iFkHwRos5B7kLONV+Lnl6RXSqowV4JfbKdNZ9mv5DvyF4NxwJleJWIjZBs33ICE/n0O+epCykh kDsiVZ8hqkBDmQ0jlbkiXvQUqQAykdsyVZsgykrKBHTIQsBykd3rLLWnodSDlYTIUXMTwNAjNIrOgD/U+G4Cx2KOsJ0HwXovj3vmcFKQX/3vfqEKhGlN69MxsErBNG1wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAsPXxH7P89TL+rIj5AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"178.8\" width=\"92.0\" height=\"96.5\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"178.8\" width=\"92.0\" height=\"96.5\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">nearby electron pulling atoms mean a weaker bond and a stronger acid</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"acid":{"t":"Acid","ar":"حمض","def":"A substance that produces hydrogen ions in solution; a proton donor."},"electron":{"t":"Electron","ar":"الإلكترون","def":"A negatively charged subatomic particle which moves around the nucleus of the atom."},"density":{"t":"Density","ar":"الكثافة","def":"The mass per unit volume of a substance: ρ = m/V. SI unit: kg/m³; common in chemistry: g/mL or g/cm³. An intensive property - does not depend on sample size. Used to identify substances and convert between mass and volume."},"acidic hydrogen":{"t":"Acidic hydrogen","ar":"الهيدروجين الحمضي","def":"The hydrogen atom in a molecule that is easily donated as a proton (H⁺), especially in an acid."},"proton":{"t":"Proton","ar":"البروتون","def":"A positive nuclide in the nucleus of an atom."},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"conjugate base":{"t":"Conjugate base","ar":"القاعدة المرافقة","def":"What remains of an acid molecule after a proton is lost."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
