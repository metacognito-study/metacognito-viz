<style>

  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; cursor:grab; touch-action:none; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; touch-action:pan-y; }   /* allow scrolling a long def while the box stays draggable, mirrors the main app's .vocab-popup.draggable .vocab-def rule */
</style>

r(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE FOUR CORE GROUPS</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"91\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The standard list of <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> shifters is input</text><text class=\"ln\" data-g=\"0\" data-w=\"46\" x=\"24\" y=\"115\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">prices, <tspan class=\"vocab-term\" data-vocab-key=\"technology\">technology</tspan>, the <tspan class=\"vocab-term\" data-vocab-key=\"number of sellers\">number of sellers</tspan>, and</text><text class=\"ln\" data-g=\"0\" data-w=\"13\" x=\"24\" y=\"139\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">expectations.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"163\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Some textbooks add natural conditions or</text><text class=\"ln\" data-g=\"1\" data-w=\"49\" x=\"24\" y=\"187\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">government rules, but for the exam focus on those</text><text class=\"ln\" data-g=\"1\" data-w=\"17\" x=\"24\" y=\"211\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">four core groups.</text><text class=\"ln\" data-g=\"2\" data-w=\"49\" x=\"24\" y=\"235\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Anything that changes what <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> can or want to</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"259\" font-size=\"18\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">make at every price sits on this list.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\"><tspan class=\"vocab-term\" data-vocab-key=\"input prices\">Input prices</tspan>, technology, number of sellers, expectations</text></svg>"},{"at":62.56,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student lists buyer income and the price of tea as supply shifters. Both are out of place. Buyer income belongs on the demand side: it is a demand shifter. The price of tea is the good's own price, which makes a movement along the supply curve, not a shift. Only factors that change what sellers can or want to make at every price are supply shifters.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP: TWO IMPOSTORS</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student lists buyer income and the price of tea as</text><text class=\"ln\" data-g=\"0\" data-w=\"16\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> shifters.</text><text class=\"ln\" data-g=\"1\" data-w=\"22\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Both are out of place.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Buyer income belongs on the <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> side: it is a demand</text><text class=\"ln\" data-g=\"2\" data-w=\"8\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">shifter.</text><text class=\"ln\" data-g=\"3\" data-w=\"55\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The price of tea is the good's own price, which makes a</text><text class=\"ln\" data-g=\"3\" data-w=\"45\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"movement along the supply curve\">movement along the supply curve</tspan>, not a shift.</text><text class=\"ln\" data-g=\"4\" data-w=\"52\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Only factors that change what <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> can or want to</text><text class=\"ln\" data-g=\"4\" data-w=\"40\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">make at every price are supply shifters.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Buyer income is a demand shifter; own price moves along, never shifts</text></svg>"},{"at":92.14,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>After input costs fall, quantity supplied at price 4 rises from 20 units to 25 units. The sideways supply shift at that price is 25 minus 20, which equals 5 units to the right. Because cheaper inputs lift supply at every price, the same rightward jump shows up all along the schedule, not just at price 4.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">A SHIFTER MOVES THE WHOLE SCHEDULE</text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">After input costs fall, <tspan class=\"vocab-term\" data-vocab-key=\"quantity supplied\">quantity supplied</tspan> at</text><text class=\"ln\" data-g=\"0\" data-w=\"40\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price 4 rises from 20 units to 25 units.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The sideways <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> shift at that price is 25</text><text class=\"ln\" data-g=\"1\" data-w=\"44\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">minus 20, which equals 5 units to the right.</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Because cheaper inputs lift supply at every</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price, the same rightward jump shows up all</text><text class=\"ln\" data-g=\"2\" data-w=\"40\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">along the schedule, not just at price 4.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Cheaper inputs lift quantity supplied at every price, here by 5 units</text></svg>"},{"at":116,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>An exam option claims that buyer tastes shift the supply curve rightward when buyers like the good more. Buyer tastes are a demand shifter, not a supply shifter. Tastes change how much buyers want; they do not change what sellers are willing to make at each price. The supply curve would not move; the demand curve would shift right.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EVALUATE THE EXAM CLAIM</text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">An exam option claims that buyer <tspan class=\"vocab-term\" data-vocab-key=\"tastes\">tastes</tspan> shift the <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">curve rightward when <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> like the good more.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Buyer tastes are a <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> shifter, not a supply shifter.</text><text class=\"ln\" data-g=\"2\" data-w=\"54\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Tastes change how much buyers want; they do not change</text><text class=\"ln\" data-g=\"2\" data-w=\"47\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">what <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> are willing to make at each price.</text><text class=\"ln\" data-g=\"3\" data-w=\"55\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The <tspan class=\"vocab-term\" data-vocab-key=\"supply curve\">supply curve</tspan> would not move; the <tspan class=\"vocab-term\" data-vocab-key=\"demand curve\">demand curve</tspan> would</text><text class=\"ln\" data-g=\"3\" data-w=\"12\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">shift right.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Tastes move demand, not supply: sellers' willingness is unchanged</text></svg>"},{"at":130.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Determinants of Supply</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"determinants of supply\">Determinants of Supply</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"55\" x=\"48\" y=\"128\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Keeping the <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> lists apart is essential.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"147\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Supply shifters are all about the production side: input</text><text class=\"ln\" data-g=\"1\" data-w=\"51\" x=\"48\" y=\"166\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">prices, <tspan class=\"vocab-term\" data-vocab-key=\"technology\">technology</tspan>, the number of <tspan class=\"vocab-term\" data-vocab-key=\"firms\">firms</tspan>, and seller</text><text class=\"ln\" data-g=\"1\" data-w=\"13\" x=\"48\" y=\"185\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">expectations.</text><text class=\"ln\" data-g=\"2\" data-w=\"53\" x=\"48\" y=\"204\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Demand shifters are all about the buyer side: income,</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"48\" y=\"223\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"tastes\">tastes</tspan>, related goods, buyer count, and buyer</text><text class=\"ln\" data-g=\"2\" data-w=\"13\" x=\"48\" y=\"242\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">expectations.</text><text class=\"ln\" data-g=\"3\" data-w=\"56\" x=\"48\" y=\"261\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Match each change to the right side before you predict a</text><text class=\"ln\" data-g=\"3\" data-w=\"6\" x=\"48\" y=\"280\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">shift.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIwAAAChCAYAAAAV8lfWAAACuklEQVR4nO3dUW7bMBBFUbPw/rfMwkANtEGT6DkSOaTP+epHKwXhxYiS0vh2AwAAAAAAAAAAAAAAAMi08O9TRO+9P//cWhu2jr9GnYg9CIaIYIgIZqP9S//jynMLZjH94iC+c595cn4Wyci7oyfBLDpB2odYRk0ewRTSDyz6jKnyz/lnnpyvYzkax8iHeCZMwVjagUWftfkVTDHtP7G8uq+5gkvSZP2Ly0mlUJ5MmKL6F7HM3PgKZgFt8p3R3zzpLahP+tGFIwQDq+sDXiK+yoQBrlNqQ/VO+ouXnNmbYJekCXrR/ckRgiHiwd1k7YU30jOZMIvpk8MRDBHBEBEMEZveN9+TpEwYIoIh4pI0UQse81e5dJkwg/UiC/8qwSyiFfnJO8EQEcyC+sTLmmCICIaIYIgIhohgiAjmzZ+rpARDRDBEBDNQX/w90oNgFtIK7HsEQ0Qwi+qTLm+CISIYIoIhIhgigmH//zXwvEM447nE2b+xsh84XoXnKW8xYT7+ssCf3lp+/PdnH29HS0yYsxdixvH6JjGVnzA7xLKT+4qfH/TKIlU/3lGPc8yM9L775xuOOF5beBO7dDBnL0b14/3U4+sZff4SwVRf2GqhzDQ9mDMXo/rlbAfTgqk+BUyVIsFU3oR+dgfyzhNlajAjFsNU2SCY6qGMON4u0+ryYFaLZfUF3erVwGMxzliQ5zGuON7tAn2j1wfl3yV9pvKUutrMr7W98yekXqVPmigjvr/LThjmhCoY1no1sKM2+NI78hJowhARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBsNbnJbEWEwYAAAAAAAAAAAAAAAC4hX4DChhI83mK//oAAAAASUVORK5CYII=\" x=\"520.0\" y=\"154.1\" width=\"92.0\" height=\"105.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"154.1\" width=\"92.0\" height=\"105.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">supply side: inputs · technology · <tspan class=\"vocab-term\" data-vocab-key=\"sellers\">sellers</tspan> · expectations</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"input prices":{"t":"Input prices","ar":"أسعار المدخلات: تكلفة المواد والأيدي العاملة للمنتج.","def":"Input prices are the costs of resources used to produce a good or service, such as labor and raw materials."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"cost":{"t":"Cost","ar":"تكلفة البائع: أقل سعر يقبل البائع البيع به","def":"The minimum price a seller is willing to accept for a good or service, which often reflects their cost."},"technology":{"t":"Technology","ar":"التقنية: المعرفة والأساليب المستخدمة لإنتاج السلع.","def":"Technology refers to the methods and processes used to produce goods and services, affecting efficiency and cost."},"production cost":{"t":"Production cost","ar":"","def":"The total expenditure required to produce a given level of output, including fixed costs and variable costs."},"number of sellers":{"t":"Number of sellers","ar":"عدد البائعين: يؤثر على إجمالي العرض في السوق.","def":"The number of sellers refers to the total count of producers in a market, which affects overall market supply."},"sellers":{"t":"Sellers","ar":"البائعون: الناس أو الشركات التي تبيع السلع والخدمات.","def":"Individuals or entities who offer goods and services for sale in a market."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"movement along the supply curve":{"t":"Change in quantity supplied","ar":"تغير الكمية المعروضة: تحرك على منحنى العرض بسبب تغير السعر.","def":"A change in quantity supplied is a movement along the supply curve caused only by a change in the price of the good itself."},"quantity supplied":{"t":"Quantity supplied","ar":"الكمية المعروضة: مقدار ما يبيعه المنتجون بسعر معين","def":"The specific amount of a good that producers are willing and able to sell at a particular price."},"tastes":{"t":"Tastes","ar":"الأذواق: تفضيلات المستهلكين للمنتجات.","def":"Tastes refer to the personal preferences of consumers for certain goods or services."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"supply curve":{"t":"Supply curve","ar":"منحنى العرض: رسم بياني للسعر والكمية المعروضة","def":"A graph showing the relationship between the price of a good and the quantity producers are willing and able to sell."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"determinants of supply":{"t":"Determinants of supply","ar":"محددات العرض: العوامل التي تغير العرض (تنقل المنحنى).","def":"Determinants of supply are the non-price factors that cause the entire supply curve to shift."},"firms":{"t":"Firms","ar":"الشركات: المنظمات التي تنتج وتبيع السلع والخدمات.","def":"Firms are organizations that produce and sell goods and services."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);

  // ── Draggable popup (mirrors the main app's vocab popup - pointerdown/move/up + a moved-threshold
  // that tells a TAP from a DRAG apart). The outside-close listener above deliberately exempts a click
  // on .vocab-popup (so it never fights a drag-in-progress); this is what makes a plain TAP on the
  // popup close it instead - the "was not a drag" branch of pointerup below. A real drag (moved past
  // the threshold) repositions the box and leaves it open. ──
  var vDrag = { down:false, moved:false, sx:0, sy:0, sl:0, st:0 };
  vpop.addEventListener('pointerdown', function(e){
    vDrag.down = true; vDrag.moved = false;
    vDrag.sx = e.clientX; vDrag.sy = e.clientY;
    vDrag.sl = parseFloat(vpop.style.left) || 0; vDrag.st = parseFloat(vpop.style.top) || 0;
    try{ vpop.setPointerCapture(e.pointerId); }catch(err){}
  });
  document.addEventListener('pointermove', function(e){
    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
