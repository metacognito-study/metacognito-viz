<!DOCTYPE html>

<head>

<title>Metacognito · Dispersion Is the Floor Every Substance Stands on</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */

    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Which substances show each force: London dispersion, dipole dipole, and hydrogen bonding?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"215\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Intermolecular forces</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#914</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Which substances show each</tspan><tspan x=\"24\" y=\"190\">force: <tspan class=\"vocab-term\" data-vocab-key=\"london dispersion\">London dispersion</tspan>,</tspan><tspan x=\"24\" y=\"230\">dipole dipole, and hydrogen</tspan><tspan x=\"24\" y=\"270\">bonding?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:00</text></svg>"},{"at":25.1,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Dispersion is in all substances, polar or not. In a balanced non polar molecule it is the only force present. Nitrogen gas, methane, and iodine are non polar, so dispersion alone holds them.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE COMMON ONE</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"100\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Dispersion is in all substances, polar or</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"24\" y=\"130\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">not.</text><text class=\"ln\" data-g=\"1\" data-w=\"38\" x=\"24\" y=\"160\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">In a balanced non <tspan class=\"vocab-term\" data-vocab-key=\"polar molecule\">polar molecule</tspan> it is</text><text class=\"ln\" data-g=\"1\" data-w=\"23\" x=\"24\" y=\"190\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the only force present.</text><text class=\"ln\" data-g=\"2\" data-w=\"41\" x=\"24\" y=\"220\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Nitrogen <tspan class=\"vocab-term\" data-vocab-key=\"gas\">gas</tspan>, methane, and iodine are non</text><text class=\"ln\" data-g=\"2\" data-w=\"38\" x=\"24\" y=\"250\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">polar, so dispersion alone holds them.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Dispersion is in every <tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan>; in non polar ones it is the only force</text></svg>"},{"at":39.86,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Dipole dipole appears only in polar molecules, the ones with a permanent charge split. Hydrogen bonding is rarest of all: it shows up only when hydrogen is bonded to fluorine, oxygen, or nitrogen.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE NARROWER ONES</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"93\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Dipole dipole appears only in polar</text><text class=\"ln\" data-g=\"0\" data-w=\"36\" x=\"24\" y=\"126\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">molecules, the ones with a permanent</text><text class=\"ln\" data-g=\"0\" data-w=\"13\" x=\"24\" y=\"159\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">charge split.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"192\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"hydrogen bonding\">Hydrogen bonding</tspan> is rarest of all: it</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"225\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">shows up only when hydrogen is bonded</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"258\" font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to fluorine, oxygen, or nitrogen.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Dipole dipole: polar only. Hydrogen bonding: H bonded to F, O, or N only</text></svg>"},{"at":92.28,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Dispersion can be the bigger force even in a polar comparison. Iodine is large with many electrons, so its dispersion is strong. Iodine boils higher than HCl even though HCl is polar.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SURPRISE</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Dispersion can be the bigger force</text><text class=\"ln\" data-g=\"0\" data-w=\"27\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">even in a polar comparison.</text><text class=\"ln\" data-g=\"1\" data-w=\"36\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Iodine is large with many electrons,</text><text class=\"ln\" data-g=\"1\" data-w=\"28\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">so its dispersion is strong.</text><text class=\"ln\" data-g=\"2\" data-w=\"33\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Iodine boils higher than HCl even</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">though HCl is polar.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">I₂ boils higher than HCl: big molecules feel strong dispersion</text></svg>"},{"at":110.69,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The Floor and the Extras</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The Floor and the Extras</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='300' y='15' text-anchor='middle' font-size='11' font-weight='700' fill='var(--muted,#606b84)'>Dispersion holds every <tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan>; the other two are extras</text><rect x='70' y='150' width='460' height='30' rx='6' fill='var(--surface-2,#eef1f7)' stroke='var(--line,#e5eaf2)' stroke-width='1.4'/><text x='300' y='170' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'><tspan class=\"vocab-term\" data-vocab-key=\"london dispersion\">London dispersion</tspan>: the floor under every substance</text><rect x='90' y='40' width='130' height='100' rx='10' fill='var(--surface-2,#eef1f7)' stroke='var(--line,#e5eaf2)' stroke-width='1.6'/><text x='155' y='64' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>non polar</text><text x='155' y='86' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>N₂, CH₄, I₂</text><text x='155' y='112' text-anchor='middle' font-size='10' font-weight='800' fill='var(--muted,#606b84)'>dispersion</text><text x='155' y='128' text-anchor='middle' font-size='9.5' font-weight='700' fill='var(--muted,#606b84)'>only</text><rect x='235' y='40' width='130' height='100' rx='10' fill='var(--indigo-soft,#e9e7fd)' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='300' y='64' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>polar</text><text x='300' y='86' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>HCl</text><text x='300' y='112' text-anchor='middle' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'>dispersion +</text><text x='300' y='128' text-anchor='middle' font-size='10' font-weight='800' fill='var(--indigo,#5545e8)'>dipole dipole</text><rect x='380' y='40' width='130' height='100' rx='10' fill='var(--surface-2,#eef1f7)' stroke='var(--correct,#0e8f86)' stroke-width='1.8'/><text x='445' y='64' text-anchor='middle' font-size='11.5' font-weight='800' fill='var(--ink,#18213a)'>H on F, O, N</text><text x='445' y='86' text-anchor='middle' font-size='10' font-weight='700' fill='var(--muted,#606b84)'>H₂O, NH₃, HF</text><text x='445' y='112' text-anchor='middle' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'>dispersion +</text><text x='445' y='128' text-anchor='middle' font-size='10' font-weight='800' fill='var(--correct,#0e8f86)'><tspan class=\"vocab-term\" data-vocab-key=\"hydrogen bonding\">hydrogen bonding</tspan></text></g><text x=\"24\" y=\"333\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Dispersion is the floor every substance stands on, and it grows with size. Dipole</text><text x=\"24\" y=\"348\" font-size=\"11\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">dipole and hydrogen bonding are extras that only some molecules add on top.</text></svg>"},{"at":116.78,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Dispersion Is Universal, the Others Are Extras</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Dispersion Is Universal,</tspan><tspan x=\"48\" y=\"110\">the Others Are Extras</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"54\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Dispersion is in every <tspan class=\"vocab-term\" data-vocab-key=\"molecule\">molecule</tspan> and is the floor every</text><text class=\"ln\" data-g=\"0\" data-w=\"48\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">substance stands on, growing stronger with size.</text><text class=\"ln\" data-g=\"1\" data-w=\"56\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Dipole dipole is an extra that only polar molecules add.</text><text class=\"ln\" data-g=\"2\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"hydrogen bonding\">Hydrogen bonding</tspan> is an extra that only molecules with H</text><text class=\"ln\" data-g=\"2\" data-w=\"25\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">bonded to F, O, or N add.</text><text class=\"ln\" data-g=\"3\" data-w=\"55\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Because dispersion grows with size, iodine boils higher</text><text class=\"ln\" data-g=\"3\" data-w=\"15\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">than polar HCl.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJ8AAAB3CAYAAAAdDJIPAAADD0lEQVR4nO3d0U7DMAyF4QXx/q9sNAECJmBJk9iOz//dcDOtiXvmtFtpbzcAAAAAAAAAAAAAAAAAAAAAAAAAAAAAs9r0OwgxM+t5XWuNunagSAvC9gxh/B1F2Ri6R4TwJ4rhELpHhPDdy8dfeV7B895WZoQvKAxGAFl2d53Bcmb8nOzEewMyGw6PbZxKctI9oVgdCO/tnUDymG9lEFYtryZ4DCj3aftvJ686rpsJWhPqgDIT9Qpe73saAdRcdr3cA6a4nPaSCV9kp/lt2+1iV6xEJnyrg7dimW4iy6t0+HZeKPBp9ThMoPtJhO8vKzvPSAh3jeE00uHb4VkIFTpaL9nw7e44I+/fRLtf+fBFdpq/QtU7JiveJcuHD3kRPoQhfAFLr+ox3iPC53wGTPC+ED5HBO8nwocwhA9hCB/CED6EIXyJteInKOXDN/sTlwdLNBZP5cOHvKTDl6HjWIIxRJEI34nHTu3AMY+SCF/WzmPCXU8qfNmuLjb+b1cnfMhHJnzPulumm0OayHJcvr1f2ZG7lr1MY8mgdOe72kF2dJ5MY8mi7Kcqy2MMsowjo3ITGr3/Xpbb4prgHUxLTebqjR+jlrZ2YSyVAlhmIjvvl7dDmxxLhRCWOOFYsbM8d+aKsViBE5HjPz07ukSWx19Z8Q547MA9dk6GM1UrHMA0g159984dOyTywS42Md+sN6YMHcBIZ1H+SuLTyNyv1NZbyEZ3HixXDV6249El2/TeIMGbZ0Vq6PpVS5WiRWsb5+r5FY7bDqu0XGRiB9f19ZaE+k9NV91rcNJPit+1Ey4Z55LzmrUN/Xmtd3LqAata2+3hu/pkxt7XZ1g+otii2o6+/yolLizAnKjuR/gQhvAhDOFDGMKHMIQPeuEbPY1X/kqlam1flJ7uWE07vLahyy5PX9ynp2b314Q+ldNrQ6NXICtfsaxS2zRXtdzR4fbJeFm927K7ekJ0vfNrceRl9KcWO3ttm3Ndw3Yi96rb55Tahu/MLAe/FRm1BQAAAAAAAAAAAAAAAAAAAAAAAAAAuDl5A2sq7IozZLBeAAAAAElFTkSuQmCC\" x=\"520.0\" y=\"192.6\" width=\"92.0\" height=\"68.9\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"192.6\" width=\"92.0\" height=\"68.9\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">dispersion: all; dipole dipole: polar only; hydrogen bonding: H on F, O, N only</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"london dispersion":{"t":"London Dispersion","ar":"قوى لندن للتشتت","def":"The weakest intermolecular force, caused by temporary (instantaneous) dipoles from electron motion; present in all molecules and stronger for larger, more polarizable ones."},"polar molecule":{"t":"Polar Molecule","ar":"جزيء قطبي","def":"A polar molecule has an asymmetrical electron distribution, leading to a net dipole moment that is not zero. This means the molecule has a separation of positive and negative charge centres. The presence of polar bonds and an overall molecular shape that doesn't allow for dipole cancellation contribute to molecular polarity. Examples include H₂O and CH₃Cl."},"gas":{"t":"Gas","ar":"غاز","def":"A state of matter in which particles are far apart, move rapidly and randomly, and have negligible intermolecular forces compared to their kinetic energy. A gas takes the shape and volume of its container and is highly compressible."},"molecule":{"t":"Molecule","ar":"جزيء","def":"A group of atoms bonded together, representing the smallest fundamental unit of a chemical compound."},"hydrogen bonding":{"t":"Hydrogen Bonding","ar":"الرابطة الهيدروجينية","def":"Hydrogen bonding is a special type of dipole-dipole interaction that is stronger than typical dipole-dipole forces. It occurs when a hydrogen atom is bonded to a highly electronegative atom, such as oxygen, nitrogen, or fluorine. The hydrogen atom has a partial positive charge, which is attracted to the partial negative charge on the electronegative atom of a neighbouring molecule."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
