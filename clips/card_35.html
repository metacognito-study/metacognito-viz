<title>Metacognito · Micro or Macro: The Level Test</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.

    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');

  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    /* designed, FIXED diagram-label font (axis labels, figure/curve/molecule labels) - NOT user-toggled. See PRD_FONTS.md */

    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }

  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Can you classify an economic question as microeconomic or macroeconomic?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"152\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Micro vs macro</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#35</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Can you classify an economic</tspan><tspan x=\"24\" y=\"190\">question as microeconomic or</tspan><tspan x=\"24\" y=\"230\">macroeconomic?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:18</text></svg>"},{"at":28.9,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Sorting by the Level Test</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Sorting by the Level Test</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><rect x='80' y='60' width='170' height='100' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.08' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><circle cx='165' cy='100' r='10' fill='var(--correct,#0e8f86)' fill-opacity='0.75'/><text x='165' y='132' text-anchor='middle' font-size='8.5' font-weight='800' fill='var(--correct,#0e8f86)'>ONE market or decision maker</text><text x='165' y='180' text-anchor='middle' font-size='9' font-weight='800' fill='var(--correct,#0e8f86)'>MICRO: the oil-and-cars question</text><rect x='330' y='52' width='230' height='116' rx='12' fill='var(--indigo,#5545e8)' fill-opacity='0.07' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><circle cx='370' cy='80' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='410' cy='96' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='450' cy='82' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='490' cy='102' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='390' cy='124' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='435' cy='118' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='480' cy='136' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='520' cy='122' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='375' cy='144' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><circle cx='465' cy='150' r='6' fill='var(--indigo,#5545e8)' fill-opacity='0.55'/><text x='445' y='180' text-anchor='middle' font-size='8.5' font-weight='800' fill='var(--indigo,#5545e8)'>MACRO: everything added up (war and the national <tspan class=\"vocab-term\" data-vocab-key=\"inflation\">inflation</tspan> rate)</text><text x='320' y='40' text-anchor='middle' font-size='10.5' font-weight='800' fill='var(--ink,#18213a)'>the level test: WHO is acting, one player or the whole economy?</text><text x='320' y='200' text-anchor='middle' font-size='9.5' font-weight='800' fill='var(--rose,#f43f61)'>size, reach, and importance do NOT decide the label; the level does</text></g><text x=\"24\" y=\"331\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Micro looks at one market or one decision maker; macro adds the whole</text><text x=\"24\" y=\"348\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">economy up. Size, reach, and who acts do not decide the label.</text></svg>"},{"at":47.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The test is the level you look at. Microeconomics studies single markets and individual decision makers. Macroeconomics studies economy-wide outcomes like total output, average prices, and total employment. Pick the label by the level, not by the topic.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE RULE: WHICH LEVEL</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"97\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The test is the level you look at.</text><text class=\"ln\" data-g=\"1\" data-w=\"41\" x=\"24\" y=\"123\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"microeconomics\">Microeconomics</tspan> studies single markets and</text><text class=\"ln\" data-g=\"1\" data-w=\"27\" x=\"24\" y=\"149\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">individual decision makers.</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"175\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"macroeconomics\">Macroeconomics</tspan> studies economy-wide outcomes</text><text class=\"ln\" data-g=\"2\" data-w=\"44\" x=\"24\" y=\"201\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">like <tspan class=\"vocab-term\" data-vocab-key=\"total output\">total output</tspan>, average prices, and total</text><text class=\"ln\" data-g=\"2\" data-w=\"11\" x=\"24\" y=\"227\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">employment.</text><text class=\"ln\" data-g=\"3\" data-w=\"46\" x=\"24\" y=\"253\" font-size=\"19\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Pick the label by the level, not by the topic.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Micro is one market or one chooser; macro is the whole economy</text></svg>"},{"at":62.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>A student labeled the cable television industry macro because cable is large and reaches many people. Size and reach do not decide the label. The cable industry is one market, so its prices and output are a micro question however many viewers it serves. The unit you study is one market, not the whole economy.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TRAP: SIZE IS NOT THE TEST</text><text class=\"ln\" data-g=\"0\" data-w=\"53\" x=\"24\" y=\"94\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student labeled the cable television industry macro</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"24\" y=\"117\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">because cable is large and reaches many people.</text><text class=\"ln\" data-g=\"1\" data-w=\"39\" x=\"24\" y=\"140\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Size and reach do not decide the label.</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"24\" y=\"163\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The cable industry is one market, so its prices and</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"24\" y=\"186\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">output are a micro question however many viewers it</text><text class=\"ln\" data-g=\"2\" data-w=\"7\" x=\"24\" y=\"209\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">serves.</text><text class=\"ln\" data-g=\"3\" data-w=\"47\" x=\"24\" y=\"232\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The unit you study is one market, not the whole</text><text class=\"ln\" data-g=\"3\" data-w=\"8\" x=\"24\" y=\"255\" font-size=\"17\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">economy.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">A big or popular market is still one market, so still micro</text></svg>"},{"at":89.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Take a government that puts a pollution tax on one industry. A student calls it macro because the government did it. It is micro. Government action does not make something macro by itself. A pollution tax on one industry hits one market. It turns macro only when the policy moves economy-wide totals like total employment or the general price level.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TRAP: WHO ACTS IS NOT THE TEST</text><text class=\"ln\" data-g=\"0\" data-w=\"50\" x=\"24\" y=\"86\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Take a government that puts a pollution <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> on one</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"24\" y=\"108\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">industry.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"24\" y=\"130\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A student calls it macro because the government did it.</text><text class=\"ln\" data-g=\"2\" data-w=\"12\" x=\"24\" y=\"152\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">It is micro.</text><text class=\"ln\" data-g=\"3\" data-w=\"50\" x=\"24\" y=\"174\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Government action does not make something macro by</text><text class=\"ln\" data-g=\"3\" data-w=\"7\" x=\"24\" y=\"196\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">itself.</text><text class=\"ln\" data-g=\"4\" data-w=\"48\" x=\"24\" y=\"218\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">A pollution tax on one industry hits one market.</text><text class=\"ln\" data-g=\"5\" data-w=\"54\" x=\"24\" y=\"240\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">It turns macro only when the policy moves economy-wide</text><text class=\"ln\" data-g=\"5\" data-w=\"56\" x=\"24\" y=\"262\" font-size=\"16\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">totals like total employment or the general <tspan class=\"vocab-term\" data-vocab-key=\"price level\">price level</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Government action alone does not make a question macro</text></svg>"},{"at":118.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Micro or Macro</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Micro or Macro</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"49\" x=\"48\" y=\"128\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"microeconomics\">Microeconomics</tspan> studies one market or one decision</text><text class=\"ln\" data-g=\"0\" data-w=\"47\" x=\"48\" y=\"148\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">maker; <tspan class=\"vocab-term\" data-vocab-key=\"macroeconomics\">macroeconomics</tspan> studies the whole economy</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">added up.</text><text class=\"ln\" data-g=\"1\" data-w=\"50\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">To classify any question, ask whether the analysis</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">looks at a single market and its people or at</text><text class=\"ln\" data-g=\"1\" data-w=\"20\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">economy-wide totals.</text><text class=\"ln\" data-g=\"2\" data-w=\"45\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">One market or one firm means micro; the whole</text><text class=\"ln\" data-g=\"2\" data-w=\"29\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">economy added up means macro.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANMAAADTCAYAAAAbBybZAAAJpklEQVR4nO2d23LDNgxEzUz//5fZcdtM3TSWKYkkdoFzXuPIuC1AURc/HgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAALq0aAPg8ei99xnHaa2Rz0AIvplgroLQ1kOAk4rnE4hrPgS0iHg+gbjuQwANBPRd6Lu/D85B0E4yo6B3FauTrRkgUJsKM7oo3e13gAAV2rJmUq2FwEwouqNzGrXie+fb086rfsPfEIwXzhTTz0JyENIZW0djoepjBARiQvEcdfuHIGfsRVTjlA/AChG9+7wSZ21HVJ8p6/gqEZ05zk5m2Yyo3lPO4ZGCeFcIMy+ari621baOHL8VE1QpZ68WwI47D+4WXpSNiOpfSjh5dRpF3W83WnxK9vWL0z4T6R2MOtlesczadRG56qbMXVI7d7Zbrj65VpokI1yNRy86pVI6tWoazS6CVeKKsLMxpXKK6UwSlU6gr4pLyb52Ir7ZBJXKmdlCikx2Jtt6EUGlcWTmsk4pwT/tVLFt5u5oE/HpLimcyDKNnMQ0e0o1Mb+u8PUwJ7OQHDi7zd423F0ShXXxzBKSsojUJ1O1fKScTNUTp0g7cRE7Y9xtxfQOhOQvqG665LMU0+hJ7NHnENI62kF8Mwvqq6KQVtkG/6WaoKzEhJD8aIUEZSMmhORLKyIoCzEhJH9aAUFZiOk3EFI9QakjL6ZP73h7/h0h5RDUk6PPvf5dEWkxHQXvr8iLBxfO8ymvyjmXFdPM1/iCH7337nb+JCum30BItegHglJEUkzvBIOQ6tGNakFOTFeC5NS9YF4O1QT1x8MYRJSLtvnnRlNPptEgcqNqLtqPXJ7JrZLwpMQ0wrtAI65cNMOGKSOmkQ7jFtwVMVHqxDtoAzlXiYnEOdOnYCCi3/9eJS5t4FxKYRtdZjK9IzpAuznTZVU68i6aeC2Ei+moINSDN5Ort0dVu62qbfqxBEsxwdgyd9YvV0BSMVWfSp+myk8RfRJVlSnVRKcTk8lw08V5SnVh21KKadZUUkzc2Wl09XOKvs9EceUSJqbsyd51CYBl3/+J8llyMmVkxjQ6+v+r3+1ME5tOIWKqtPEwsqyb8T1sTvyXCF+ZTMnu7Kg6pRSQElOWqTRrk+EqlTYnmlDNbDdk9ZLnzGMcd7/ryvfvTn6UPX1jHlROG1KJ6W7HXfn90R2UuBcSU3RCV56HRAtpZtGtinNblP+0YlrVQSLOAUYfsVYR0jej9kbG1HU62YtptCPtLg41Ef0kOh598iRBTIs6UvQ7BNSFpOJ7v5m7kePdPabkk7YrEjfjmL8F+s5xXYT0bauar13gidmrbDN69hje3YUyv6Mi0rc+MY/RSz2Jd0A4jPPoc7DdbDvPaL9PR8cJFX4HxMx702Yc5873OQps9nlLpRqQE5Nj8mEP3aw5fTkFxS24MM67huhUO3aTSWkquS/11KZ8M19h2IhJLfGwhmbcoELFFH0/GPg0px78NECqya \"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">one market or one firm → micro · whole economy added up → macro</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"inflation":{"t":"Inflation","ar":"التضخم: ارتفاع مستمر في الأسعار، قيمة النقود تقل","def":"A general and sustained increase in the overall price level of goods and services."},"microeconomics":{"t":"Microeconomics","ar":"الاقتصاد الجزئي: دراسة قرارات الأفراد والشركات والأسواق.","def":"Microeconomics is the study of how households and firms make decisions and how they interact in specific markets."},"macroeconomics":{"t":"Macroeconomics","ar":"الاقتصاد الكلي: دراسة الاقتصاد ككل (تضخم، بطالة، نمو).","def":"Macroeconomics is the study of economy-wide phenomena, including inflation, unemployment, and economic growth."},"total output":{"t":"GDP","ar":"","def":"The total market value of all final goods and services produced within a country during a specific period, regardless of who owns the resources."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"price level":{"t":"Price level","ar":"","def":"The average of all prices in an economy."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
