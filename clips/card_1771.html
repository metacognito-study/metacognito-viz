<title>Metacognito · What the Reaction Order Means</title>
<style>
  /* SELF-HOSTED Space Grotesk (the diagram-label font) - no external dependency, no CSP allowlist, works offline.
     One variable woff2 (latin subset, weights 300-700) at out/fonts/, referenced relative to the card HTML. */
  @font-face{ font-family:'Space Grotesk'; font-style:normal; font-weight:300 700; font-display:swap;
    src:url('fonts/SpaceGrotesk-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }

  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }

  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Consider doubling the concentration of one reactant and watching what the rate does. Can you explain what the order in that reactant tells you?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"152\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Reaction order</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#1771</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Consider doubling the</tspan><tspan x=\"24\" y=\"190\"><tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> of one reactant</tspan><tspan x=\"24\" y=\"230\">and watching what the rate</tspan><tspan x=\"24\" y=\"270\">does. Can you explain what the</tspan><tspan x=\"24\" y=\"310\">order in that reactant tells</tspan><tspan x=\"24\" y=\"350\">you?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 1:18</text></svg>"},{"at":20.36,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The order tells you how the rate responds to a change in that reactant's concentration. It is the power that concentration is raised to. So the size of the order sets how strongly the rate reacts when you change the amount.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE POWER ON <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">CONCENTRATION</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"87.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The order tells you how the rate responds</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"116.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">to a change in that reactant's</text><text class=\"ln\" data-g=\"0\" data-w=\"14\" x=\"24\" y=\"145.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">concentration.</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"174.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">It is the power that concentration is</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"203.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">raised to.</text><text class=\"ln\" data-g=\"2\" data-w=\"42\" x=\"24\" y=\"232.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the size of the order sets how strongly</text><text class=\"ln\" data-g=\"2\" data-w=\"43\" x=\"24\" y=\"261.5\" font-size=\"21\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the rate reacts when you change the amount.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The order tells how the rate responds to a concentration change; it is the power that concentration is raised to</text></svg>"},{"at":42.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The Power Sets the Jump</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The Power Sets the Jump</tspan></text><g transform=\"translate(24,64)\" font-family=\"var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)\"><text x='320' y='16' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>The order is the exponent on the <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan> ratio</text><rect x='40' y='44' width='270' height='104' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.12' stroke='var(--correct,#0e8f86)' stroke-width='1.6'/><text x='175' y='74' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>second order, double it</text><text x='175' y='102' text-anchor='middle' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)'>2&#178; = 4 times the rate</text><text x='175' y='130' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>not just doubled</text><rect x='330' y='44' width='270' height='104' rx='12' fill='var(--indigo,#5545e8)' fill-opacity='0.10' stroke='var(--indigo,#5545e8)' stroke-width='1.6'/><text x='465' y='74' text-anchor='middle' font-size='12.5' font-weight='800' fill='var(--ink,#18213a)'>third order, triple it</text><text x='465' y='102' text-anchor='middle' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)'>3&#179; = 27 times the rate</text><text x='465' y='130' text-anchor='middle' font-size='11.5' font-weight='700' fill='var(--muted,#606b84)'>steeper still</text></g><text x=\"24\" y=\"335\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Second order is not a doubling: doubling the concentration quadruples the rate, since 2 squared is 4. Third</text><text x=\"24\" y=\"348\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">order is steeper still: tripling the concentration raises the rate by 3 cubed, which is 27 times.</text></svg>"},{"at":50.24,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Second order means doubling the concentration quadruples the rate, because 2 squared is 4. If it were third order and you tripled the concentration, the rate goes up by 3 cubed, which is 27 times. So the order is the exponent on the concentration ratio.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">DOUBLE GIVES FOUR TIMES</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"24\" y=\"93.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Second order means doubling the <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"44\" x=\"24\" y=\"120.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quadruples the rate, because 2 squared is 4.</text><text class=\"ln\" data-g=\"1\" data-w=\"42\" x=\"24\" y=\"147.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">If it were third order and you tripled the</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"24\" y=\"174.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">concentration, the rate goes up by 3 cubed,</text><text class=\"ln\" data-g=\"1\" data-w=\"18\" x=\"24\" y=\"201.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">which is 27 times.</text><text class=\"ln\" data-g=\"2\" data-w=\"35\" x=\"24\" y=\"228.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">So the order is the exponent on the</text><text class=\"ln\" data-g=\"2\" data-w=\"20\" x=\"24\" y=\"255.5\" font-size=\"20\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">concentration ratio.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Second order: doubling gives 2² = 4 times the rate; third order: tripling gives 3³ = 27 times the rate</text></svg>"},{"at":73.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>What the Reaction Order Means</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">What the Reaction Order</tspan><tspan x=\"48\" y=\"110\">Means</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"168\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The order tells how the rate responds to a <tspan class=\"vocab-term\" data-vocab-key=\"concentration\">concentration</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"56\" x=\"48\" y=\"187\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">change, and it is the power applied to the concentration</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"48\" y=\"206\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">ratio.</text><text class=\"ln\" data-g=\"1\" data-w=\"55\" x=\"48\" y=\"225\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For a second-order reactant, doubling the concentration</text><text class=\"ln\" data-g=\"1\" data-w=\"43\" x=\"48\" y=\"244\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">gives 2 squared, which is 4 times the rate.</text><text class=\"ln\" data-g=\"2\" data-w=\"51\" x=\"48\" y=\"263\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">For a third-order reactant, tripling gives 3 cubed,</text><text class=\"ln\" data-g=\"2\" data-w=\"18\" x=\"48\" y=\"282\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">which is 27 times.</text><text class=\"ln\" data-g=\"3\" data-w=\"53\" x=\"48\" y=\"301\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The order is the exponent, so it sets how steeply the</text><text class=\"ln\" data-g=\"3\" data-w=\"11\" x=\"48\" y=\"320\" font-size=\"13\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">rate jumps.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAG0AAACTCAYAAACEYJc/AAAC3ElEQVR4nO2d0W7CMBAEnfz/P19VRCVUQRtCnNvdzLyX2BnmZCi0YwAAAAAAAAAAAAAAAAAAAAAAAAAAQCt1J1HDOgKpB1mJ4iKlpRMnrZ6UlVZbnLQrECWt/igqqbYoaY8sd0YgMdJqQ0kptcVIe0VibRHS6ldBf4lKqC1C2n/C0mqzl1Y7ynGvzV7a1qKSarOWVh8U41ybtbR3S0qpzVZaHVCKa2220vYWlFCbpbQ6sBDH2iylfVqOe2120mpCGW61ralvVyXXZiVtJmVU23rFyl49hos4G2lgJm1GZc61WUgDM2kzK3OtTV4amEk7ozLH2qSlgZm0Mytzq01WGphJ66jMqTZJaWAmrbMyl9rkpIGZNIXKHGqTkgZm0pQqU69NRhqYSVOsTLk2CWlgJk25MtXa2qWBmTSHyhRrozRD2qQ5VaZWG6UZIiHNoTKltbZI6z4yu++lvTSFZ67bmk+XllRZ157aSwNxaY7HfMXjP6UZ0ibNubLuPZwmLfEA0rVHxqMhLdISRmPnXlaFsZE0OuuEvawqm0wSFyctaTR27am9tERq8tSYLu0q/5XiTCjNEKQZcqq0xENIx94ozRCkGYI0Q5BmCNIMaf24QRLFxw1Adjwmv26zlvaOmJTxuUx+MnIQMaT9E8YJI7Ku/gnjlBFpLy2hJqW9SnzVSeUblnu45FedXuEkLlbafzU5jtBq2oNUac5j8jK/uX4mxUVcdf6d5SG64S1Cu+ge7VLjcY/IK7KoP1tfiVqaquuu7HbN0cin4s6+aQrCbtcdzRwh7jczbqaKsNu1hwDv3   // render slides stacked; index each slide's reveal units. One unit = one SENTENCE

    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"concentration":{"t":"Concentration","ar":"التركيز","def":"The amount of solute present in a given quantity of solvent or solution which can be expressed in many units, e.g.  mol/cm³, even g/cm³ or g/kg"}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
</body>
</html>
