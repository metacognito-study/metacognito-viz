  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  /* line-by-line reveal: each sentence fades + slides in from the left as the voice reaches it */
  .slide .ln{ opacity:0; transform:translateX(-16px); transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
  .slide .ln.show{ opacity:1; transform:translateX(0); }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } .slide .ln{ opacity:1; transform:none; transition:none; } }
  /* clickable keyword glossary - dotted underline + tap popup, mirroring the flashcards */
  .vocab-term{ text-decoration:underline dotted; text-decoration-color:color-mix(in srgb, var(--indigo) 55%, var(--muted)); text-decoration-thickness:1.4px; text-underline-offset:2px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .vocab-popup{ position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px; box-shadow:0 8px 28px rgba(0,0,0,.24); max-width:260px; min-width:150px; max-height:72vh; overflow-y:auto; overscroll-behavior:contain; }
  .vocab-popup.hidden{ display:none; }
  .vocab-term-title{ font-weight:800; font-size:14px; color:var(--ink); margin-bottom:5px; }
  .vocab-arabic{ font-size:19px; color:var(--indigo); direction:rtl; text-align:right; margin-bottom:5px; font-weight:600; line-height:1.5; }
  .vocab-def{ font-size:12.5px; color:var(--muted); line-height:1.45; overflow-wrap:break-word; }
</style>

text><text class=\"ln\" data-g=\"0\" data-w=\"28\" x=\"24\" y=\"176.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price), PS is the lower part</text><text class=\"ln\" data-g=\"0\" data-w=\"23\" x=\"24\" y=\"215.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">(below the price, above</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"24\" y=\"254.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan>). 128 + 64 = 192.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">CS from price up to <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan>; PS from price down to supply</text></svg>"},{"at":82.9,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Shading only the triangle ABOVE the price is consumer surplus alone, not total surplus. You must also shade producer surplus below the price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"98.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Shading only the triangle ABOVE</text><text class=\"ln\" data-g=\"0\" data-w=\"29\" x=\"24\" y=\"137.5\" font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">the price is <tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan></text><text class=\"ln\" dat ght=\"800\" fill=\"var(--ink,#18213a)\">PS = $20, so <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan> = $24,</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"210.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">down from $27 at <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> - a</text><text class=\"ln\" data-g=\"0\" data-w=\"19\" x=\"24\" y=\"245.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">$3 <tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">deadweight loss</tspan>.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The missing $3 is <tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> no longer captured</text></svg>"},{"at":146.54,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Deadweight loss shows up as the triangle between demand and supply over the units NO LONGER traded: surplus that is gone because those trades do not happen.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"dwl\">DWL</tspan> ON THE DIAGRAM</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"105.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"deadweight loss\">Deadweight loss</tspan> shows up as the</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"140.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">triangle between <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> and <tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"175.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">over the units NO LONGER traded:</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"210.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> that is gone because those</text><text class=\"ln\" data-g=\"0\" data-w=\"21\" x=\"24\" y=\"245.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">trades do not happen.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Lost trades that used to be part of <tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">total surplus</tspan></text></svg>"},{"at":163.46,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At competitive equilibrium the total-surplus region is as large as it can be. Any tax or price control cuts the quantity and carves out deadweight loss.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY IT MATTERS</text><text class=\"ln\" data-g=\"0\" data-w=\"30\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">At competitive <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan> the</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">total-<tspan class=\"vocab-term\" data-vocab-key=\"surplus\">surplus</tspan> region is as large as</text><text class=\"ln\" data-g=\"0\" data-w=\"10\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">it can be.</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Any <tspan class=\"vocab-term\" data-vocab-key=\"tax\">tax</tspan> or <tspan class=\"vocab-term\" data-vocab-key=\"price control\">price control</tspan> cuts the</text><text class=\"ln\" data-g=\"1\" data-w=\"34\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">quantity and carves out deadweight</text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">loss.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Equilibrium is the largest the triangle can get</text></svg>"},{"at":190.94,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Total Surplus</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"total surplus\">Total Surplus</tspan></tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"37\" x=\"48\" y=\"128\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">The whole area between the <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan> and</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"48\" y=\"156\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"supply\">supply</tspan> curves out to the quantity</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"48\" y=\"184\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">traded: <tspan class=\"vocab-term\" data-vocab-key=\"consumer surplus\">consumer surplus</tspan> (above the</text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"48\" y=\"212\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price) plus <tspan class=\"vocab-term\" data-vocab-key=\"producer surplus\">producer surplus</tspan> (below</text><text class=\"ln\" data-g=\"0\" data-w=\"6\" x=\"48\" y=\"240\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">it).</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"48\" y=\"268\" font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Largest at competitive <tspan class=\"vocab-term\" data-vocab-key=\"equilibrium\">equilibrium</tspan>.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIwAAAChCAYAAAAV8lfWAAACuklEQVR4nO3dUW7bMBBFUbPw/rfMwkANtEGT6DkSOaTP+epHKwXhxYiS0vh2AwAAAAAAAAAAAAAAAMi08O9TRO+9P//cWhu2jr9GnYg9CIaIYIgIZqP9S//jynMLZjH94iC+c595cn4Wyci7oyfBLDpB2odYRk0ewRTSDyz6jKnyz/lnnpyvYzkax8iHeCZMwVjagUWftfkVTDHtP7G8uq+5gkvSZP2Ly0mlUJ5MmKL6F7HM3PgKZgFt8p3R3zzpLahP+tGFIwQDq+sDXiK+yoQBrlNqQ/VO+ouXnNmbYJekCXrR/ckRgiHiwd1k7YU30jOZMIvpk8MRDBHBEBEMEZveN9+TpEwYIoIh4pI0UQse81e5dJkwg/UiC/8qwSyiFfnJO8EQEcyC+sTLmmCICIaIYIgIhohgiAjmzZ+rpARDRDBEBDNQX/w90oNgFtIK7HsEQ0Qwi+qTLm+CISIYIoIhIhgigmH//zXwvEM447nE2b+xsh84XoXnKW8xYT7+ssCf3lp+/PdnH29HS0yYsxdixvH6JjGVnzA7xLKT+4qfH/TKIlU/3lGPc8yM9L775xuOOF5beBO7dDBnL0b14/3U4+sZff4SwVRf2GqhzDQ9mDMXo/rlbAfTgqk+BUyVIsFU3oR+dgfyzhNlajAjFsNU2SCY6qGMON4u0+ryYFaLZfUF3erVwGMxzliQ5zGuON7tAn2j1wfl3yV9pvKUutrMr7W98yekXqVPmigjvr/LThjmhCoY1no1sKM2+NI78hJowhARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBEBEMEcEQEQwRwRARDBHBsNbnJbEWEwYAAAAAAAAAAAAAAAC4hX4DChhI83mK//oAAAAASUVORK5CYII=\" x=\"520.0\" y=\"154.1\" width=\"92.0\" height=\"105.8\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"154.1\" width=\"92.0\" height=\"105.8\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Total surplus = CS (above price) + PS (below price)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"total surplus":{"t":"Total surplus","ar":"إجمالي الفائض: مكاسب المشترين والبائعين معًا","def":"The sum of consumer surplus and producer surplus, representing the total benefits to buyers and sellers from a market."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"supply curve":{"t":"Supply curve","ar":"منحنى العرض: رسم بياني للسعر والكمية المعروضة","def":"A graph showing the relationship between the price of a good and the quantity producers are willing and able to sell."},"surplus":{"t":"Surplus","ar":"فائض / عرض زائد: الكمية المعروضة أكبر من المطلوبة.","def":"A surplus, or excess supply, occurs when the quantity supplied is greater than the quantity demanded at a given price."},"consumer surplus":{"t":"Consumer surplus","ar":"فائض المستهلك: توفير المشتري من السعر","def":"The benefit a consumer receives from buying a good, measured as the difference between the maximum price they would pay and the actual price paid."},"equilibrium":{"t":"Equilibrium","ar":"التوازن: النقطة التي تتساوى فيها الكمية المطلوبة والمعروضة.","def":"Equilibrium is the state where the quantity demanded equals the quantity supplied, with no tendency for change."},"deadweight loss":{"t":"Deadweight loss","ar":"الخسارة الكلية: فائض يضيع على المجتمع بسبب تشوه السوق","def":"The reduction in total surplus (consumer and producer surplus) that results from a market distortion, such as a tax."},"dwl":{"t":"Deadweight loss","ar":"","def":"The loss of economic efficiency when equilibrium is not achieved. The loss in total surplus (consumer + producer) due to market distortions."},"tax":{"t":"Tax","ar":"","def":"A mandatory payment to the government."},"price control":{"t":"Price control","ar":"ضبط الأسعار: تحديد الحكومة لسعر أعلى أو أقل من سعر السوق","def":"A government-imposed limit on how high or low a price can be charged for a product or service."},"producer surplus":{"t":"Producer surplus","ar":"فائض المنتج: ربح البائع فوق تكلفته","def":"The benefit a producer receives from selling a good, measured as the difference between the price received and the minimum price they would have accepted."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
