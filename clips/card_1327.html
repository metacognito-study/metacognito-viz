        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }

igo,#5545e8)\">Raising the lone pair's density strengthens the base</text></svg>"},{"at":44.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Methyl groups on nitrogen donate electron density to the nitrogen, so its lone pair becomes more available for the proton. That extra density on the accepting lone pair is what makes the base stronger.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE EXAMPLE</text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"115\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Methyl groups on nitrogen donate <tspan class=\"vocab-term\" data-vocab-key=\"electron\">electron</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"41\" x=\"24\" y=\"145\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan> to the nitrogen, so its lone pair</text><text class=\"ln\" data-g=\"0\" data-w=\"38\" x=\"24\" y=\"175\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">becomes more available for the <tspan class=\"vocab-term\" data-vocab-key=\"proton\">proton</tspan>.</text><text class=\"ln\" data-g=\"1\" data-w=\"40\" x=\"24\" y=\"205\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That extra density on the accepting lone</text><text class=\"ln\" data-g=\"1\" data-w=\"37\" x=\"24\" y=\"235\" font-size=\"22\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">pair is what makes the <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> stronger.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9f )\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Donors feed the lone pair, so the base is stronger</text></svg>"},{"at":78.88,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Electron Donors Feed the Accepting Lone Pair</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\"><tspan class=\"vocab-term\" data-vocab-key=\"electron\">Electron</tspan> Donors Feed the</tspan><tspan x=\"48\" y=\"110\">Accepting Lone Pair</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"46\" x=\"48\" y=\"168\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Electropositive groups near the lone pair that</text><text class=\"ln\" data-g=\"0\" data-w=\"52\" x=\"48\" y=\"188\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">accepts the <tspan class=\"vocab-term\" data-vocab-key=\"proton\">proton</tspan> raise its electron <tspan class=\"vocab-term\" data-vocab-key=\"density\">density</tspan>, so it</text><text class=\"ln\" data-g=\"0\" data-w=\"45\" x=\"48\" y=\"208\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">grabs the proton more readily and the <tspan class=\"vocab-term\" data-vocab-key=\"base\">base</tspan> is</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"48\" y=\"228\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">stronger.</text><text class=\"ln\" data-g=\"1\" data-w=\"45\" x=\"48\" y=\"248\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Methyl groups feed the nitrogen lone pair, so</text><text class=\"ln\" data-g=\"1\" data-w=\"47\" x=\"48\" y=\"268\" font-size=\"14\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">trimethylamine is a stronger base than ammonia.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKUAAACtCAYAAADReL+3AAAG+UlEQVR4nO2dWZLjOAwFRUfd/8qccHc7SuPQwgUEnsjMv+mxKQlMg7tq2wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACCSFHr1Scg55/1/p5SIawcEz0jEMxC0HgI2SMY9iFkHwRos5B7kLONV+Lnl6RXSqowV4JfbKdNZ9mv5DvyF4NxwJleJWIjZBs33ICE/n0O+epCykhbJjr5D//IcfsUnHEnTk/XuJCSj/kKmPGBEFruT7n1NsudfkLIQi0zWOzhaBaQc3Gzfld3zuVlBSidqRcsLi/kTfQOrZMkj9mWvLOE3ZMogvmVn9P0LUgZlyRLyotkTKYWFS4tmT6QMFOIjJnOU/wcpnZrJlt1Eq4KUoqRFm+43yz541MEvz75k7tzlFIX0zc086h65QSM//FAbzXcQn72WkWJk0f4sUn4RIYnlNbOoaI9dZvQ+vqpcgTnnbCXrp5yj593/m0pzHi5lrxhP7cxH9E1TSunq8yqChkjpkaFaBjCRFXEnjHdmjxTUXcrIJlO5uVa+32zYlZAb6KgEeSXyLuY98fesOzf7PQ5OWQXOu7myvO9cWdb3syoccHMJfuRgRPX9PyPvKxtNnkfVW5iUUYOKVhm8z+n0Xt9qOTOi7kIyVfR0jXf2jMrW2SjTeb8UNnyeUoWa/tjnc63Nn8U9RHc9RoqJlIUrH6Vzeb0DDUDK20Nco85qn8mYjLPlE0FKx2OwZMUyltsl1CNW61az3i1qebHMuZyUvbQIsppU8lLO0mT1njic6cRiYkooltrVkdKdPk/5seaAH1JI862UMa6OvpauinzvWSxdKVl9L+gZZMpB68azZs5pMuUT3vndmhmtPq/Y58xBS8RLjb7PKn2EjK3fzx33OAvh+wY9my3vg2lPuRe1ugrPlKoZYPSZ7Ogz38p14iqlaiVEyqIs5x7XmGwBRDQNo97hYzmt4/meIdUu1p/rbQF4z89ZnzsZvT0tB52TUZk3lXuPjWUAomXsuV52zpoqQoYOdBSaa+/yaspIjn8ISklIidH3iNe4KAo5oqyRI+XIwVf4qM97oFB7jasye87ojMiEKXigNk2mvNoQUVPOnQDWFVZS3tXnWifP35z9f6uYXV1jCSmvgmBxPsY6wC3led5D7oxZtJAyUraKedd/7Amw9Xzd0Xd7j2ZsjXFRFlJKyloxRzTXTyPdPGdN3JTiJSVlqZijm+tRqxrW2fJDqZhPEFJSyjsxW4WM3mQwmtTYnKsJKStlbbBWaa7vqI2BasxkpSwNmkdgLa9hPfhq/YGqCikvJYwRSVlIeSlLMoNHX1F5mfGI0sNqqshKWRM49SB7kge9kGtbXcqWEXbUHkQVcsMIW/EEpaSUJUKODrKnwKPmVUtjto+biqSvp2ZI7zlJ7/2U3jH7LjNSUCkpzzgL5pPEHLGP8o1lzM6us60q5dnD3wWxZ2NCS7kt5bU+2xl3MvbErPZ600rZW2ktGxNKy+0tz1vIbQLCH8Kz0lquUVLedzl336np222F1MTrqNy7Z/AU/mcmIT/ftWxuSsobJU8JXrK8n9HrWq+ZhNyXYb1ePWrrmkJ5as2+RJ8yqtJqM6r1zvOeAVpyPB/vjcwbMkb/Wq0rubQirctNAyfbr7oqrgsKmzORD90yaPHC+96yYyvxyOZbqU8T0ZSpNZ/RvGZvtlvomXRXvM7TJtB5EX9BRVj/cFQyY/r3XCr38yGtlCWv7sGjT1dzjRw4eR1dZxJ9Si+uAlq6utO69q08yFLjtUqWtJwkL5WsRkbVeGxfeDT19CkPKG3Sz/qcvXOYWayP502IlEpZ4WpNt1bOJz6/914CieZ7hl+95dr3k4SMqlOab4cplBlE9GSp0bcFljvPS0mLSb1cpmzpI1k0V/syVpOsluWkVOg7Xa0U5Qn64L0g5dcI3Kq/WDqPeVfOiiDlP6wHL7WSkyF/cTvf8f1vkZnB+nSj+nWfVndhUnoHuycTKe0SSgIxm0JK7we0aAo9Twn2fD85x88jLuFSWp9f7iF6sBH5PHnQmaMWwvczKjGblE+Nz89qO533gX2KBDn4Pr1/rGG7hLwCHZ39RvXj8sTxk6gwqwBbHIZSOmKbgg53Rf+QJSbPo4MwC2mSOC69S0i5EpPwvY1maSmP4GUE8SAlyLG8lNHNpNJgS4XlpTyC5jQWpAQ5kDJwcpqm+xikBDmQMihbkiXPQUqQAykDsiVZ8hqkBDmQ0jlbkiXvQUqQAykdsyVZsgykrKBHTIQsBykd3rLLWnodSDlYTIUXMTwNAjNIrOgD/U+G4Cx2KOsJ0HwXovj3vmcFKQX/3vfqEKhGlN69MxsErBNG1wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAsPXxH7P89TL+rIj5AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"178.8\" width=\"92.0\" height=\"96.5\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"178.8\" width=\"92.0\" height=\"96.5\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">donors feed the accepting lone pair, so the base is stronger</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  var FONTS={ inter:"Inter,ui-sans-serif,system-ui,sans-serif",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif", mono:"ui-monospace,Menlo,monospace",
    rounded:"'Nunito','Quicksand',ui-rounded,sans-serif", manrope:"Manrope,sans-serif",
    poppins:"Poppins,sans-serif", lexend:"Lexend,sans-serif" };
  function applyTheme(t,f,s,bg){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"proton":{"t":"Proton","ar":"البروتون","def":"A positive nuclide in the nucleus of an atom."},"atom":{"t":"Atom","ar":"ذرة","def":"The basic unit of an element."},"electron":{"t":"Electron","ar":"الإلكترون","def":"A negatively charged subatomic particle which moves around the nucleus of the atom."},"base":{"t":"Base","ar":"قاعدة","def":"A substance that accepts protons (H⁺ ions) in a chemical reaction, often increasing the concentration of hydroxide ions in solution."},"density":{"t":"Density","ar":"الكثافة","def":"The mass per unit volume of a substance: ρ = m/V. SI unit: kg/m³; common in chemistry: g/mL or g/cm³. An intensive property - does not depend on sample size. Used to identify substances and convert between mass and volume."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ vpop.classList.add('hidden'); vKey=''; }
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=e.ar||''; ar.style.display=e.ar?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
</script>
