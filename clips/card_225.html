  var VOCAB = {"international trade":{"t":"International trade","ar":"التجارة الدولية: تبادل السلع والخدمات بين الدول","def":"International trade is the exchange of goods and services across national borders."},"import quota":{"t":"Import quota","ar":"حصة الاستيراد: تحديد كمية السلع المستوردة","def":"An import quota is a government limit on the quantity of a specific good that can be imported into a country."},"supply":{"t":"Supply","ar":"العرض: كمية المنتجات التي يرغب ويقدر المنتجون على بيعها.","def":"Supply is the quantity of a good or service that producers are willing and able to offer for sale at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."},"quota":{"t":"Import quota","ar":"حصة الاستيراد: تحديد كمية السلع المستوردة","def":"An import quota is a government limit on the quantity of a specific good that can be imported into a country."},"equilibrium":{"t":"Equilibrium","ar":"التوازن: النقطة التي تتساوى فيها الكمية المطلوبة والمعروضة.","def":"Equilibrium is the state where the quantity demanded equals the quantity supplied, with no tendency for change."},"world price":{"t":"World price","ar":"السعر العالمي: سعر السلعة في السوق الدولية","def":"The world price is the price of a good or service in the global market, outside of any domestic taxes or subsidies."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"excess demand":{"t":"Shortage","ar":"نقص/عجز: الكمية المطلوبة أكثر من المعروضة.","def":"A market situation where the quantity demanded for a good or service is greater than the quantity supplied at a given price."},"tax wedge":{"t":"Tax wedge","ar":"الفجوة الضريبية: الفرق بين ما يدفعه المشتري وما يقبضه البائع","def":"The difference between the price buyers pay and the price sellers receive, caused by a tax."},"supply curve":{"t":"Supply curve","ar":"منحنى العرض: رسم بياني للسعر والكمية المعروضة","def":"A graph showing the relationship between the price of a good and the quantity producers are willing and able to sell."},"price level":{"t":"Price level","ar":"","def":"The average of all prices in an economy."},"free trade":{"t":"Free trade","ar":"التجارة الحرة: تبادل السلع بدون قيود حكومية","def":"Free trade is an international trade policy that allows goods and services to be bought and sold across national borders without tariffs or other barriers."},"imports":{"t":"Imports","ar":"الواردات: سلع وخدمات تشتريها دولة من دول أخرى.","def":"Goods and services brought into a country from another country."},"leftover":{"t":"Leftover","ar":"متبقٍّ","def":"the part that is left after the rest is used"}};

    if(!vDrag.down) return;
    var dx=e.clientX-vDrag.sx, dy=e.clientY-vDrag.sy;
    if(!vDrag.moved && Math.hypot(dx,dy)>5) vDrag.moved=true;
    if(!vDrag.moved) return;
    e.preventDefault();                                        // dragging: don't let the page scroll under the finger
    var pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(vDrag.sl+dx, window.innerWidth-pw-8));
    var top=Math.max(8, Math.min(vDrag.st+dy, window.innerHeight-ph-8));
    vpop.style.left=left+'px'; vpop.style.top=top+'px';
  }, { passive:false });
  function vDragEnd(){ if(!vDrag.down) return; vDrag.down=false;
    if(!vDrag.moved) hideVocab(); }                              // a tap (no drag) on the popup closes it
  document.addEventListener('pointerup', vDragEnd);
  document.addEventListener('pointercancel', vDragEnd);
})();
</script>
