<title>Metacognito · Total revenue is a rectangle</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audioecon@main/mp3/146.mp3"></audio>

  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>How do you find total revenue, and what does it look like on a graph?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"143\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">total revenue</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#146</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">How do you find total revenue,</tspan><tspan x=\"24\" y=\"190\">and what does it look like on</tspan><tspan x=\"24\" y=\"230\">a graph?</tspan></text></svg>"},{"at":28.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Total revenue is a rectangle</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Total revenue is a rectangle</tspan></text><polygon points='74.0,288.0 457.0,288.0 457.0,177.0 74.0,177.0' fill='var(--correct,#0e8f86)' fill-opacity='0.16'/><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Quantity (thousands)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Price ($)</text><polyline points='116.6,88.2 542.2,199.2' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='538.2' y='191.2' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>D</text><polyline points='457.0,288.0 457.0,177.0' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='74.0,177.0 457.0,177.0' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='457.0' cy='177.0' r='6' fill='var(--ink,#18213a)'/><text x='466.0' y='171.0' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>$25, 36k</text><text x='265.5' y='223.6' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>TR = $900,000</text><text x='265.5' y='250.3' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>= P x Q</text><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">total revenue is the rectangle under a demand point: height = price, width = quantity, so area = P x Q = $25 x 36,000 = $900,000</text></svg>"},{"at":58.72,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Total revenue = price x quantity sold. Here: $25 x 36,000 subscribers = $900,000. That is the whole formula.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE FORMULA</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Total revenue = price x quantity</tspan><tspan x=\"24\" y=\"138\">sold.</tspan><tspan x=\"24\" y=\"176\">Here: $25 x 36,000</tspan><tspan x=\"24\" y=\"214\">subscribers = $900,000. That is</tspan><tspan x=\"24\" y=\"252\">the whole formula.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">dollars per unit times units gives dollars</text></svg>"},{"at":70.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Raise to $30 x 28,000 = $840,000: revenue FELL even though price rose. The quantity drop outweighed the price gain, a sign of elastic demand.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">RAISE THE PRICE</text><text font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"108\">Raise to $30 x 28,000 = $840,000:</tspan><tspan x=\"24\" y=\"142\">revenue FELL even though price rose.</tspan><tspan x=\"24\" y=\"176\">The quantity drop outweighed the</tspan><tspan x=\"24\" y=\"210\">price gain, a sign of elastic</tspan><tspan x=\"24\" y=\"244\">demand.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">taller rectangle, but it lost more width than it gained height</text></svg>"},{"at":76.62,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>On a price-quantity diagram, total revenue is the area of a RECTANGLE: height = the price, width = the quantity, from the origin.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ON THE GRAPH</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">On a price-quantity diagram,</tspan><tspan x=\"24\" y=\"137.5\">total revenue is the area of a</tspan><tspan x=\"24\" y=\"176.5\">RECTANGLE: height = the price,</tspan><tspan x=\"24\" y=\"215.5\">width = the quantity, from the</tspan><tspan x=\"24\" y=\"254.5\">origin.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">a taller-or-wider box means more revenue</text></svg>"},{"at":120.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Do NOT add price and quantity: they have different units. It is MULTIPLICATION: 36,000 subscribers each paying $25, not $25 plus 36,000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Do NOT add price and quantity:</tspan><tspan x=\"24\" y=\"137.5\">they have different units.</tspan><tspan x=\"24\" y=\"176.5\">It is MULTIPLICATION: 36,000</tspan><tspan x=\"24\" y=\"215.5\">subscribers each paying $25,</tspan><tspan x=\"24\" y=\"254.5\">not $25 plus 36,000.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">revenue is a flow of dollars, not a sum of price and count</text></svg>"},{"at":162.72,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Total revenue</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Total revenue</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Price times quantity sold (dollars per unit</tspan><tspan x=\"48\" y=\"157\">times units = dollars); on a graph it is the</tspan><tspan x=\"48\" y=\"186\">rectangle under a demand point.</tspan><tspan x=\"48\" y=\"215\">Compare before and after a price change to see</tspan><tspan x=\"48\" y=\"244\">the direction.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">TR = P x Q</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');

    if(s) d.style.setProperty('--fz', s); }

  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }

  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', tick);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  post({ type:'ready' }); rep();
})();
</script>
