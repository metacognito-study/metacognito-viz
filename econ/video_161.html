<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>

  <div class="stage" id="stage"></div>

    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>How does a binding rent ceiling create a shortage, and why does it widen over time?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"152\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">price controls</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#161</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">How does a binding rent</tspan><tspan x=\"24\" y=\"190\">ceiling create a shortage, and</tspan><tspan x=\"24\" y=\"230\">why does it widen over time?</tspan></text></svg>"},{"at":8.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Rent ceiling: a binding shortage</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Rent ceiling: a binding shortage</tspan></text><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Apartments</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Rent ($)</text><polyline points='74.0,161.1 574.1,161.1' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='340.0,66.0 446.4,129.4 499.6,161.1 584.7,221.4' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='580.7' y='213.4' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>D</text><polyline points='286.8,184.9 340.0,161.1 446.4,129.4 552.8,89.8' fill='none' stroke='var(--rose,#f43f61)' stroke-width='3.5'/><text x='548.8' y='81.8' text-anchor='end' font-size='14' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>S</text><circle cx='446.4' cy='129.4' r='6' fill='var(--ink,#18213a)'/><text x='454.4' y='121.4' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>eq $1000</text><circle cx='340.0' cy='161.1' r='6' fill='var(--rose,#f43f61)'/><text x='310.0' y='165.1' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Qs</text><circle cx='499.6' cy='161.1' r='6' fill='var(--indigo,#5545e8)'/><text x='509.6' y='165.1' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Qd</text><text x='169.8' y='150.0' text-anchor='middle' font-size='13' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>ceiling $800</text><text x='419.8' y='178.6' text-anchor='middle' font-size='13' font-weight='800' fill='var(--amber,#f5b526)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>shortage = 150</text><text x=\"24\" y=\"342\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">a ceiling below the equilibrium rent makes quantity demanded exceed quantity supplied: a shortage</text></svg>"},{"at":47.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Quantity demanded climbs (more people seek cheap housing); quantity supplied falls (landlords cut upkeep or stop building).</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TWO MOVES</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Quantity demanded climbs (more</tspan><tspan x=\"24\" y=\"137.5\">people seek cheap housing);</tspan><tspan x=\"24\" y=\"176.5\">quantity supplied falls</tspan><tspan x=\"24\" y=\"215.5\">(landlords cut upkeep or stop</tspan><tspan x=\"24\" y=\"254.5\">building).</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the two sides move in opposite directions under the cap</text></svg>"},{"at":91.18,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Cheap rent drawing more renters is a rise in quantity demanded, NOT a rise in supply.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE CLASSIC MIX-UP</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"137.5\">Cheap rent drawing more renters</tspan><tspan x=\"24\" y=\"176.5\">is a rise in quantity demanded,</tspan><tspan x=\"24\" y=\"215.5\">NOT a rise in supply.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">supply follows landlord incentives, not renter demand</text></svg>"},{"at":123.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Landlords have less reason to keep quality up or to build new units; both shrink the housing available.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">SIDE EFFECTS</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Landlords have less reason to</tspan><tspan x=\"24\" y=\"157\">keep quality up or to build new</tspan><tspan x=\"24\" y=\"196\">units; both shrink the housing</tspan><tspan x=\"24\" y=\"235\">available.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">lower quality and fewer new units over time</text></svg>"},{"at":136.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Binding price ceiling</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Binding price ceiling</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">A ceiling below equilibrium makes a shortage</tspan><tspan x=\"48\" y=\"157\">(Qd above Qs) that widens as both sides grow</tspan><tspan x=\"48\" y=\"186\">more elastic over time.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">ceiling below equilibrium = shortage, growing in the long run</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale + postMessage
  function applyTheme(t,f,s){ var d=document.documentElement;
    if(t) d.dataset.theme=t; if(f) d.dataset.font=f;
    if(s) d.style.setProperty('--fz', s); }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  // render slides stacked
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d); });
  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); cur=idx; } }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });

  track.onclick=function(e){ var r=track.getBoundingClientRect();

<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  post({ type:'ready' }); rep();
})();
</script>
