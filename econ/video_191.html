ext x='133' y='126' text-anchor='middle' font-size='12' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#fff)' stroke-width='3' stroke-linejoin='round'>CS down 5</text><text x='323' y='61' text-anchor='middle' font-size='12' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#fff)' stroke-width='3' stroke-linejoin='round'>PS up 2 (equity)</text><text x='513' y='18' text-anchor='middle' font-size='12' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#fff)' stroke-width='3' stroke-linejoin='round'>DWL 3</text></g><text x=\"24\" y=\"342\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">efficiency is the TOTAL surplus (it fell 27 to 24, a DWL of 3); equity is how the surplus is shared</text></svg>"},{"at":36.26,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Efficiency is about the SIZE of the total-surplus pie; it is highest when total surplus is greatest.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EFFICIENCY</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Efficiency is about the SIZE of</tspan><tspan x=\"24\" y=\"157\">the total-surplus pie; it is</tspan><tspan x=\"24\" y=\"196\">highest when total surplus is</tspan><tspan x=\"24\" y=\"235\">greatest.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">total surplus fell 27 to 24, so the floor is inefficient (DWL 3)</text></svg>"},{"at":69.34,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Equity is about how the pie is SHARED. The floor shifted surplus to producers (PS up 2), even as buyers lost 5.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EQUITY</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Equity is about how the pie is</tspan><tspan x=\"24\" y=\"137.5\">SHARED.</tspan><tspan x=\"24\" y=\"176.5\">The floor shifted surplus to</tspan><tspan x=\"24\" y=\"215.5\">producers (PS up 2), even as</tspan><tspan x=\"24\" y=\"254.5\">buyers lost 5.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">a policy can improve one while it harms the other</text></svg>"},{"at":109.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Calling the floor efficient because producers gain ignores the lost surplus; it mixes up a sharing gain with efficiency.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE MISTAKE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Calling the floor efficient</tspan><tspan x=\"24\" y=\"157\">because producers gain ignores</tspan><tspan x=\"24\" y=\"196\">the lost surplus; it mixes up a</tspan><tspan x=\"24\" y=\"235\">sharing gain with efficiency.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the DWL is surplus that neither buyers nor sellers get</text></svg>"},{"at":143.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Answer both separately: on efficiency, total surplus fell (DWL 3, inefficient); on equity, producer surplus rose.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ADDRESS BOTH PARTS</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Answer both separately: on</tspan><tspan x=\"24\" y=\"157\">efficiency, total surplus fell</tspan><tspan x=\"24\" y=\"196\">(DWL 3, inefficient); on</tspan><tspan x=\"24\" y=\"235\">equity, producer surplus rose.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">do not let a sharing gain hide the efficiency loss</text></svg>"},{"at":164.96,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Equality is a third, different idea: whether surplus is shared EVENLY across people, not just fairly.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EQUALITY IS A THIRD IDEA</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Equality is a third, different</tspan><tspan x=\"24\" y=\"157\">idea: whether surplus is shared</tspan><tspan x=\"24\" y=\"196\">EVENLY across people, not just</tspan><tspan x=\"24\" y=\"235\">fairly.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">a policy can improve equity without reaching equality</text></svg>"},{"at":183.96,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Efficiency vs equity</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Efficiency vs equity</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Efficiency is the total size of the surplus;</tspan><tspan x=\"48\" y=\"157\">equity is the fairness of its sharing.</tspan><tspan x=\"48\" y=\"186\">A market can be efficient but unfair, or fairer</tspa
