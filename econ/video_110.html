<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metacognito · Market demand: horizontal summation</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audioecon@main/mp3/110.mp3"></audio>
<script>
(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>How do you build a market demand curve from several buyers' individual demand curves?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"143\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">market demand</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#110</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">How do you build a market</tspan><tspan x=\"24\" y=\"190\">demand curve from several</tspan><tspan x=\"24\" y=\"230\">buyers' individual demand</tspan><tspan x=\"24\" y=\"270\">curves?</tspan></text><rect x=\"24\" y=\"300\" width=\"156\" height=\"38\" rx=\"19\" fill=\"var(--indigo,#5545e8)\"/><path d=\"M44 311 L44 327 L56 319 Z\" fill=\"#fff\"/><text x=\"64\" y=\"324\" font-size=\"15\" font-weight=\"700\" fill=\"#fff\">play · 2:29</text></svg>"},{"at":9.52,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Horizontal summation of demand</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Horizontal summation of demand</tspan></text><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Quantity (coffees)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Price ($)</text><polyline points='74.0,88.2 298.4,288.0' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='294.4' y='280.0' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Amisi</text><polyline points='74.0,77.1 389.9,288.0' fill='none' stroke='var(--amber,#f5b526)' stroke-width='3.5'/><text x='385.9' y='280.0' text-anchor='end' font-size='14' font-weight='800' fill='var(--amber,#f5b526)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Laura</text><polyline points='74.0,66.0 572.8,288.0' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='3.5'/><text x='568.8' y='280.0' text-anchor='end' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Haji</text><polyline points='74.0,74.9 606.0,183.9' fill='none' stroke='var(--rose,#f43f61)' stroke-width='3.5'/><polyline points='74.0,177.0 572.8,177.0' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='173.8' cy='177.0' r='6' fill='var(--indigo,#5545e8)'/><circle cx='223.6' cy='177.0' r='6' fill='var(--amber,#f5b526)'/><circle cx='323.4' cy='177.0' r='6' fill='var(--correct,#0e8f86)'/><circle cx='572.8' cy='177.0' r='6' fill='var(--rose,#f43f61)'/><text x='364.9' y='94.9' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>at $5: 6 + 9 + 15 = 30</text><text x='127.2' y='190.3' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>P = $5</text><text x='414.8' y='134.8' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>market demand</text><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">at each price, add the buyers' quantities sideways: at $5, 6 + 9 + 15 = 30 coffees; the bold rose curve is their horizontal sum</text></svg>"},{"at":43.71,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Add the buyers' quantities at each price: at $5, 6 + 9 + 15 = 30; at $7, 3 + 5 + 9 = 17. Each person is a separate buyer who really buys that amount.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ADD, DO NOT AVERAGE</text><text font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"105.5\">Add the buyers' quantities at each</tspan><tspan x=\"24\" y=\"140.5\">price: at $5, 6 + 9 + 15 = 30; at</tspan><tspan x=\"24\" y=\"175.5\">$7, 3 + 5 + 9 = 17. Each person is</tspan><tspan x=\"24\" y=\"210.5\">a separate buyer who really buys</tspan><tspan x=\"24\" y=\"245.5\">that amount.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">averaging would understate true market demand</text></svg>"},{"at":54.19,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>This is horizontal summation: at each price, add up the quantity demanded by every buyer. The result is the market demand curve.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE METHOD</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">This is horizontal summation: at</tspan><tspan x=\"24\" y=\"138\">each price, add up the quantity</tspan><tspan x=\"24\" y=\"176\">demanded by every buyer.</tspan><tspan x=\"24\" y=\"214\">The result is the market demand</tspan><tspan x=\"24\" y=\"252\">curve.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">how much all buyers together want at each price</text></svg>"},{"at":82.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Quantity sits on the HORIZONTAL axis, so adding quantities at a fixed price means moving across, sideways. That is why it is called horizontal summation.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY SIDEWAYS</text><text font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"91\">Quantity sits on the HORIZONTAL</tspan><tspan x=\"24\" y=\"125\">axis, so adding quantities at a</tspan><tspan x=\"24\" y=\"159\">fixed price means moving across,</tspan><tspan x=\"24\" y=\"193\">sideways.</tspan><tspan x=\"24\" y=\"227\">That is why it is called horizontal</tspan><tspan x=\"24\" y=\"261\">summation.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the same logic holds at every price</text></svg>"},{"at":107.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Do NOT average the three slopes. That treats the market as one stand-in buyer instead of three separate buyers, giving the wrong quantity at every price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Do NOT average the three slopes.</tspan><tspan x=\"24\" y=\"138\">That treats the market as one</tspan><tspan x=\"24\" y=\"176\">stand-in buyer instead of three</tspan><tspan x=\"24\" y=\"214\">separate buyers, giving the</tspan><tspan x=\"24\" y=\"252\">wrong quantity at every price.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">add the quantities; never average the slopes</text></svg>"},{"at":126.3,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Horizontal summation</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Horizontal summation</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Market demand is the horizontal sum of every</tspan><tspan x=\"48\" y=\"157\">buyer's demand: at each price, add all buyers'</tspan><tspan x=\"48\" y=\"186\">quantities.</tspan><tspan x=\"48\" y=\"215\">Adding a buyer shifts market demand right;</tspan><tspan x=\"48\" y=\"244\">losing one shifts it left.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">at each price: Q market = q1 + q2 + q3 + ...</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale + postMessage
  function applyTheme(t,f,s){ var d=document.documentElement;
    if(t) d.dataset.theme=t; if(f) d.dataset.font=f;
    if(s) d.style.setProperty('--fz', s); }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  // render slides stacked
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d); });
  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); cur=idx; } }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', tick);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };
})();
</script>
</body>
</html>
