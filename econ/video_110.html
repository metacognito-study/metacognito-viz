        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }

" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ADD, DO NOT AVERAGE</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"24\" y=\"105.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Add the <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>' quantities at each</text><text class=\"ln\" data-g=\"0\" data-w=\"33\" x=\"24\" y=\"140.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">price: at $5, 6 + 9 + 15 = 30; at</text><text class=\"ln\" data-g=\"0\" data-w=\"19\" x=\"24\" y=\"175.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">$7, 3 + 5 + 9 = 17.</text><text class=\"ln\" data-g=\"1\" data-w=\"31\" x=\"24\" y=\"210.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Each person is a separate buyer</text><text class=\"ln\" data-g=\"1\" data-w=\"28\" x=\"24\" y=\"245.5\" font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">who really buys that amount.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Averaging would understate true <tspan class=\"vocab-term\" data-vocab-key=\"market demand\">market demand</tspan></text></svg>"},{"at":54.19,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>This is horizontal summation: at each price, add up the quantity demanded by every buyer. The result is the market demand curve.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE METHOD</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"100\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">This is horizontal summation: at</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"138\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">each price, add up the quantity</text><text class=\"ln\" data-g=\"0\" data-w=\"24\" x=\"24\" y=\"176\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">demanded by every buyer.</text><text class=\"ln\" data-g=\"1\" data-w=\"31\" x=\"24\" y=\"214\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">The result is the <tspan class=\"vocab-term\" data-vocab-key=\"market demand\">market demand</tspan></text><text class=\"ln\" data-g=\"1\" data-w=\"6\" x=\"24\" y=\"252\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">curve.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">How much all <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan> together want at each price</text></svg>"},{"at":82.98,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Quantity sits on the HORIZONTAL axis, so adding quantities at a fixed price means moving across, sideways. That is why it is called horizontal summation.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY SIDEWAYS</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"91\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Quantity sits on the HORIZONTAL</text><text class=\"ln\" data-g=\"0\" data-w=\"31\" x=\"24\" y=\"125\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">axis, so adding quantities at a</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"159\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">fixed price means moving across,</text><text class=\"ln\" data-g=\"0\" data-w=\"9\" x=\"24\" y=\"193\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">sideways.</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"24\" y=\"227\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That is why it is called horizontal</text><text class=\"ln\" data-g=\"1\" data-w=\"10\" x=\"24\" y=\"261\" font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">summation.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">The same logic holds at every price</text></svg>"},{"at":107.5,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Do NOT average the three slopes. That treats the market as one stand-in buyer instead of three separate buyers, giving the wrong quantity at every price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"24\" y=\"100\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">Do NOT average the three slopes.</text><text class=\"ln\" data-g=\"1\" data-w=\"29\" x=\"24\" y=\"138\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">That treats the market as one</text><text class=\"ln\" data-g=\"1\" data-w=\"31\" x=\"24\" y=\"176\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">stand-in buyer instead of three</text><text class=\"ln\" data-g=\"1\" data-w=\"27\" x=\"24\" y=\"214\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">separate <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>, giving the</text><text class=\"ln\" data-g=\"1\" data-w=\"30\" x=\"24\" y=\"252\" font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\">wrong quantity at every price.</text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Add the quantities; never average the slopes</text></svg>"},{"at":126.3,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Horizontal Summation</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Horizontal Summation</tspan></text><text class=\"ln\" data-g=\"0\" data-w=\"35\" x=\"48\" y=\"128\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan class=\"vocab-term\" data-vocab-key=\"market demand\">Market demand</tspan> is the horizontal sum</text><text class=\"ln\" data-g=\"0\" data-w=\"32\" x=\"48\" y=\"157\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">of every buyer's <tspan class=\"vocab-term\" data-vocab-key=\"demand\">demand</tspan>: at each</text><text class=\"ln\" data-g=\"0\" data-w=\"34\" x=\"48\" y=\"186\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">price, add all <tspan class=\"vocab-term\" data-vocab-key=\"buyers\">buyers</tspan>' quantities.</text><text class=\"ln\" data-g=\"1\" data-w=\"35\" x=\"48\" y=\"215\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">Adding a buyer shifts market demand</text><text class=\"ln\" data-g=\"1\" data-w=\"33\" x=\"48\" y=\"244\" font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">right; losing one shifts it left.</text><mask id=\"dood0\"><image href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJEAAACTCAYAAACOEPsoAAAD/0lEQVR4nO3d7Y7qIBSF4WLm/m95T8w5ZkyjLbD5WBve59ckYxU2qxRtq8cBAAAAAAAAAAAAAAAAAAAAAAAAAMCf9PY3/jMzuypGSom6vaEYBeE5I0z/EKKK8JylzWemx7G5nEPXXUjMGcLott6Dvg1+bWjSpjPSlp3+FoTSELR4jhX8HAHkHC68g1ez/XMbcx7KRvStN+nG1QxQTsHPz+sdJKt4vl59m0F2YV27h0dY5NpifZNMdslao2aR+75Nq73bMp+ztL0R1l1yM1Fp0b69Bf82WCP2Zit47buPEEr6NotUiD6tLXL3OrW9M0dJ386PVQqSVIi8lAttjRfzSh6rFTnC4KTF+iYTIpRTmWmXD9GMw0gSPqxuE6KR03aLAbbFQxIyRIhFMkS99+yWhxtb+F1X6BC1lDuoNUHK3SYtHiyZEPU4/VD6eiVB8pyOsEYzrUo4ZS8FeRa6d5E+XcpxdQ7savDTgAFVXcBLJLnVGqN221HXWNuEvm11OPMOsKfIJefoWmzn7ZsamTTXXC7R6/DS874zy2zz7ENnCanGtNr71Iq8et/kGuQpuGKBd+ibbMPOWkzvo9cWqUG7lMPzIt/AFmYvTFOAIHhIda71W+3Z4endPpVwTm9Ey4HOfXdzfmxLVvC6vfo+2rQXbj1L5AzO6EJbRjt61mHpEI0O0Oxp327aFD1Iw4vbc5ZQDFDvtinMukNPe9Tcd+WhEqCnnn2cfW/atMtQWxdV+QTlqHbOmonlT8DWUA1Q77bN6vdjxVkoEuu8qB5Rm+EzkfIssYo0uMbdQ6R6vmqmJPJ5VStLrokw1iP6Hhh5PdSzD8t+ToQ1yYRo1JdPvUR+DbVZWCJEr2KoFCUCE6qZRIgQGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyGCGyFCrK8gVrj2ZUU2ua7hZ6IId3fcGfF93aFnok9fOL7yXqnalvCHs9eesEtRd5ulh66JSn62u/R5owY0NRjo2Yd02d/2WH22Swus5ZYLUc7gcEt3H+FCdPUrQNFZ0L6FC1HEATGhtvQQ/nOi3kbdzRoZIbrwHh6C9B0hghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshghshwnohuroM9fy/lS5ZtYK+qfVb8m6PkiKpFXTHvknMRCv+zPdO/ZMIUWkxch+rUOCebVbp30+U++nPBSt5rIqU2eb3vyP0TypEkffGnfsnczgb7W7R+un/NdvsQD7lLfGtIH1sNRONPDSkAIehVrYKUc3gPh9fs82xka06W3p4O4eh9PEAAAAAAAAAAAAAAAAAAAAAAAAAcMTzC+bYiQQP8Gt4AAAAAElFTkSuQmCC\" x=\"520.0\" y=\"160.4\" width=\"92.0\" height=\"93.3\" preserveAspectRatio=\"xMidYMid meet\"/></mask><rect x=\"520.0\" y=\"160.4\" width=\"92.0\" height=\"93.3\" fill=\"var(--indigo,#5545e8)\" mask=\"url(#dood0)\"/><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">At each price: Q market = q1 + q2 + q3 + ...</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale/bg + postMessage.
  // The clip wears the host app's colour theme, FONT family, and BACKGROUND so it
  // looks native wherever it is embedded. font can be a known key or any CSS family;
  // bg sets the clip surface to the app's chosen background colour.
  // Keys mirror the app's [data-font] map (Index.core.html) 1:1 so the clip's
  // narrative font follows the user's UI choice. The families are loaded via the
  // Google Fonts <link> in <head>; offline they degrade to the system fallback.
  var FONTS={ lexend:"'Lexend',ui-sans-serif,system-ui,sans-serif",
    inter:"'Inter',ui-sans-serif,system-ui,sans-serif",
    quicksand:"'Quicksand',ui-rounded,system-ui,sans-serif",
    comfortaa:"'Comfortaa',ui-rounded,system-ui,sans-serif",
    lora:"'Lora',Georgia,'Times New Roman',serif",
    shantell:"'Shantell Sans',ui-rounded,system-ui,sans-serif",
    caveat:"'Caveat',ui-rounded,cursive", gaegu:"'Gaegu',ui-rounded,cursive",
    system:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif",
    serif:"Georgia,'Times New Roman',serif" };
  // AR_ON mirrors the host's Arabic-features master toggle (cgArabicOn_), delivered as ?ar=0|1 on
  // first paint and {__viz,arabicOn} live. Default ON so a standalone open still shows Arabic.
  var AR_ON = true;
  function applyTheme(t,f,s,bg,ar){ var d=document.documentElement;
    if(t) d.dataset.theme=t;
    if(f){ d.dataset.font=f; d.style.setProperty('--app-font', FONTS[f.toLowerCase()]||f); }
    if(s) d.style.setProperty('--fz', s);
    if(bg){ d.style.setProperty('--surface', bg); document.body.style.background=bg; }
    if(ar!==undefined && ar!==null && ar!==''){
      AR_ON = !(ar===false || ar==='0' || ar===0 || ar==='false');
      if(!AR_ON && typeof hideVocab==='function') hideVocab();   // don't leave stale Arabic on screen
    } }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale'), q.get('bg'), q.get('ar')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale, m.bg, m.arabicOn); } });

  // render slides stacked; index each slide's reveal units. One unit = one SENTENCE
  // (all of a sentence's wrapped lines share a data-g and reveal together, so a
  // sentence is never shown half-finished). Weight = sentence length.
  var LN=[];                                   // LN[i] = [{els:[...],cum,tot,t}] per sentence
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d);
    var els=[].slice.call(d.querySelectorAll('.ln')), groups=[], by={};
    els.forEach(function(e){ var g=e.getAttribute('data-g')||'0';
      if(!by[g]){ by[g]={els:[],w:0,cum:0,tot:0,t:0}; groups.push(by[g]); }
      by[g].els.push(e); by[g].w+=(+e.getAttribute('data-w')||10); });
    var tot=0; groups.forEach(function(g){ tot+=g.w; });
    var cum=0; groups.forEach(function(g){ g.cum=cum; g.tot=tot; cum+=g.w; });
    LN[i]=groups; });

  // spread each slide's sentences across this fraction of its air-time (start of this
  // slide to start of the next), weighted by sentence length -> longer sentences hold longer.
  var REVEAL=0.78;
  function computeLineTimes(){ var dur=au.duration||0;
    for(var i=0;i<SLIDES.length;i++){ var span=(i+1<SLIDES.length?SLIDES[i+1].at:dur)-SLIDES[i].at;
      if(!(span>0)) span=3;
      LN[i].forEach(function(g){ g.t=SLIDES[i].at+(g.tot? g.cum/g.tot:0)*REVEAL*span; }); } }
  function setLines(i,t){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var on=t>=L[k].t, es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.toggle('show', on); } }
  function resetLines(i){ var L=LN[i]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.remove('show'); } }

  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); resetLines(idx); cur=idx; }
    setLines(idx,t); }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', function(){ computeLineTimes(); tick(); });
  au.addEventListener('durationchange', computeLineTimes);
  // FALLBACK so text is never blank: the lines reveal on audio time, so a failed or
  // stalled <audio> would otherwise leave a slide with no visible text (a regression
  // vs the old static build). If the audio errors, or after 3s nothing has loaded,
  // reveal the current slide's lines outright.
  function revealAllCurrent(){ var L=LN[cur]; if(!L) return;
    for(var k=0;k<L.length;k++){ var es=L[k].els; for(var j=0;j<es.length;j++) es[j].classList.add('show'); } }
  au.addEventListener('error', revealAllCurrent);
  setTimeout(function(){ if(au.error || au.readyState===0) revealAllCurrent(); }, 3000);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); resetLines(i); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };

  // ── A<->B segment repeater bridge (the host app drives this via postMessage). The PARENT app owns the
  // A/B button + the painted band/markers; this page owns its inner <audio>: it captures currentTime on
  // setA/setB, LOOPS (seek to A when t >= B), clears, and REPORTS {t,d,a,b,state} back so the parent can
  // paint. Same A/B model as the app's audio player. Fully back-compatible: a host that never posts __abv
  // and never listens leaves this inert, and we only report UP when actually embedded (parent != self). ──
  var AB_PARENT = (window.parent && window.parent !== window) ? window.parent : null;
  var abA=null, abB=null, abState=0;   // 0 idle · 1 A set, awaiting B · 2 looping A<->B
  function abReport(type){ if(!AB_PARENT) return; try{ AB_PARENT.postMessage({ __abv:true, type:(type||'time'),
    t:au.currentTime||0, d:au.duration||0, a:abA, b:abB, state:abState }, '*'); }catch(e){} }
  function abHandle(cmd){
    var c=au.currentTime||0;
    if(cmd==='setA'){ abA=c; abB=null; abState=1; }
    else if(cmd==='setB'){
      if(abA==null || c<=abA+0.25){ abA=c; abB=null; abState=1; }                 // B must be after A, else re-set A
      else { abB=c; abState=2; try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); }
    } else if(cmd==='clear'){ abA=null; abB=null; abState=0; }
    abReport('state');                                                            // reconcile the parent immediately
  }
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__abv===true){ if(m.cmd){ abHandle(m.cmd); } else if(m.type==='ping'){ abReport('ready'); } } });
  au.addEventListener('timeupdate', function(){
    if(abState===2 && abA!=null && abB!=null && (au.currentTime||0) >= abB-0.04){ try{ au.currentTime=abA; }catch(e){} }
    abReport('time'); });
  // B near the very end: if 'ended' fires before the loop-check catches B, replay from A (never stop on a loop)
  au.addEventListener('ended', function(){ if(abState===2 && abA!=null){ try{ au.currentTime=abA; }catch(e){} var p=au.play(); if(p&&p.catch) p.catch(function(){}); } }, true);
  au.addEventListener('loadedmetadata', function(){ abReport('ready'); });        // announce support once timing is known
  abReport('ready');                                                              // and immediately, for a parent already listening

  // ── Clickable keyword glossary (mirrors the flashcards). build.mjs underlines
  // glossary terms in the slide SVG as <tspan class="vocab-term" data-vocab-key>;
  // tapping one pops up its Arabic + brief English gloss. Tap again / tap away closes. ──
  var VOCAB = {"market demand":{"t":"Market demand","ar":"طلب السوق: إجمالي طلب جميع المشترين","def":"The sum of all individual demands for a particular good or service in a market."},"demand curve":{"t":"Demand curve","ar":"منحنى الطلب: رسم بياني للسعر والكمية المطلوبة","def":"A graph showing the relationship between the price of a good and the quantity consumers are willing and able to buy."},"buyers":{"t":"Buyers","ar":"المشترون: الناس أو الشركات التي تشتري السلع والخدمات.","def":"Individuals or entities who purchase goods and services in a market."},"individual demand":{"t":"Individual demand","ar":"الطلب الفردي: كمية يطلبها مستهلك واحد بسعر معين","def":"The quantity of a good that a single consumer is willing and able to buy at various prices."},"demand":{"t":"Demand","ar":"الطلب: رغبة المستهلك وقدرته على الشراء","def":"The willingness and ability of consumers to purchase a good or service at various prices during a specific period."}};
  var vpop = document.getElementById('vocabPopup'), vKey = '';
  function hideVocab(){ if(!vpop) return; vpop.classList.add('hidden'); vKey=''; }   // null-safe: applyTheme(?ar=0) can fire before vpop is assigned
  function showVocab(el){ var key=el.getAttribute('data-vocab-key'), e=VOCAB[key];
    if(!e){ return; }
    if(!vpop.classList.contains('hidden') && vKey===key){ hideVocab(); return; }  // tap same term toggles off
    vKey=key;
    vpop.querySelector('.vocab-term-title').textContent=e.t||key;                 // exact term casing (pH, pOH, NaCl)
    // AR_ON mirrors the host app's Arabic-features master toggle (?ar= / {__viz,arabicOn}):
    // a student who switched Arabic OFF must not see Arabic here either.
    var ar=vpop.querySelector('.vocab-arabic'); ar.textContent=(e.ar&&AR_ON)?e.ar:''; ar.style.display=(e.ar&&AR_ON)?'':'none';
    vpop.querySelector('.vocab-def').textContent=e.def||'';
    // report the tap up so the host feeds its Encountered Vocab self-test (parity with a flashcard tap)
    if(AR_ON && e.ar && window.parent && window.parent!==window){
      try{ window.parent.postMessage({ __vocabTap:true, key:key, term:e.t||key, ar:e.ar }, '*'); }catch(err){} }
    vpop.classList.remove('hidden'); vpop.style.visibility='hidden';              // measure off-screen, then place
    var r=el.getBoundingClientRect(), pw=vpop.offsetWidth, ph=vpop.offsetHeight;
    var left=Math.max(8, Math.min(r.left+r.width/2-pw/2, window.innerWidth-pw-8));
    var top=r.bottom+8; if(top+ph>window.innerHeight-8) top=r.top-ph-8; if(top<8) top=8;
    vpop.style.left=left+'px'; vpop.style.top=top+'px'; vpop.style.visibility=''; }
  stage.addEventListener('click', function(e){ var t=e.target.closest && e.target.closest('.vocab-term');
    if(t){ e.stopPropagation(); showVocab(t); } });
  document.addEventListener('click', function(e){ if(vpop.classList.contains('hidden')) return;
    if(e.target.closest && (e.target.closest('.vocab-term') || e.target.closest('.vocab-popup'))) return; hideVocab(); });
  window.addEventListener('resize', hideVocab);
})();
