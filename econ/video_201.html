<title>Metacognito · The Laffer curve</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>

    <div class="time" id="time">0:00</div>
  </div>

<script>
(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Why does tax revenue rise, then fall, as the tax rate climbs?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"134\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">Laffer curve</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#201</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">Why does tax revenue rise,</tspan><tspan x=\"24\" y=\"190\">then fall, as the tax rate</tspan><tspan x=\"24\" y=\"230\">climbs?</tspan></text></svg>"},{"at":21.4,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The Laffer curve</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">The Laffer curve</tspan></text><line x1='74' y1='58' x2='74' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='74' y1='288' x2='614' y2='288' stroke='var(--muted,#606b84)' stroke-width='2'/><text x='340' y='320' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Tax rate (%)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Tax revenue</text><path d='M 74.0 288.0 C 118.3 237.5 158.1 170.6 207.0 136.6 C 248.1 108.1 295.7 86.2 340.0 86.2 C 384.3 86.2 431.9 108.1 473.0 136.6 C 521.9 170.6 561.7 237.5 606.0 288.0' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><polyline points='340.0,288.0 340.0,86.2' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='340.0' cy='86.2' r='6' fill='var(--rose,#f43f61)'/><text x='288.0' y='72.2' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>revenue-max rate</text><text x='201.7' y='104.3' text-anchor='middle' font-size='13' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>revenue rises</text><text x='483.6' y='104.3' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>revenue falls</text><text x='121.9' y='273.9' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>$0</text><text x='558.1' y='273.9' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>$0</text><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">revenue is zero at a 0% and a 100% rate and peaks in between; past the peak, a higher rate shrinks the tax base so much that revenue falls</text></svg>"},{"at":48.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>At a 0% and a 100% rate, revenue is ZERO. It climbs to a peak in between, the revenue-maximizing rate, then falls beyond it.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SHAPE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">At a 0% and a 100% rate,</tspan><tspan x=\"24\" y=\"137.5\">revenue is ZERO.</tspan><tspan x=\"24\" y=\"176.5\">It climbs to a peak in between,</tspan><tspan x=\"24\" y=\"215.5\">the revenue-maximizing rate,</tspan><tspan x=\"24\" y=\"254.5\">then falls beyond it.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">at 100% no one works or trades, so revenue is zero</text></svg>"},{"at":64.76,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Two opposing forces: a higher rate collects more PER unit (pushes revenue up), but shrinks the activity it taxes (pushes revenue down).</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY UPSIDE-DOWN-U</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Two opposing forces: a higher</tspan><tspan x=\"24\" y=\"137.5\">rate collects more PER unit</tspan><tspan x=\"24\" y=\"176.5\">(pushes revenue up), but</tspan><tspan x=\"24\" y=\"215.5\">shrinks the activity it taxes</tspan><tspan x=\"24\" y=\"254.5\">(pushes revenue down).</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">at low rates the first wins; at high rates the second wins</text></svg>"},{"at":113.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>20% x $900M = $180M; 60% x $250M = $150M. The higher rate brings in LESS revenue, because the taxed base shrank so much.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">A WORKED EXAMPLE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">20% x $900M = $180M;</tspan><tspan x=\"24\" y=\"137.5\">60% x $250M = $150M. The higher</tspan><tspan x=\"24\" y=\"176.5\">rate brings in LESS revenue,</tspan><tspan x=\"24\" y=\"215.5\">because the taxed base shrank</tspan><tspan x=\"24\" y=\"254.5\">so much.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">more rate, but far less activity left to tax</text></svg>"},{"at":126.04,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The base shrinks through LEGAL responses, not only cheating: workers cut hours, owners delay investment, firms move to lower-tax places.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">NOT JUST CHEATING</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">The base shrinks through LEGAL</tspan><tspan x=\"24\" y=\"137.5\">responses, not only cheating:</tspan><tspan x=\"24\" y=\"176.5\">workers cut hours, owners delay</tspan><tspan x=\"24\" y=\"215.5\">investment, firms move to</tspan><tspan x=\"24\" y=\"254.5\">lower-tax places.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">none of that needs any tax evasion</text></svg>"},{"at":153.7,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>On the downward side, cutting a 75% rate to 55% can RAISE revenue: the wider base more than makes up for the lower rate.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SUPPLY-SIDE CLAIM</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">On the downward side, cutting a</tspan><tspan x=\"24\" y=\"137.5\">75% rate to 55% can RAISE</tspan><tspan x=\"24\" y=\"176.5\">revenue: the wider base more</tspan><tspan x=\"24\" y=\"215.5\">than makes up for the lower</tspan><tspan x=\"24\" y=\"254.5\">rate.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">this is the supply-side argument for cutting high rates</text></svg>"},{"at":177.28,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>But this only works on the DOWNWARD part of the curve. Whether a given rate sits there is a question for the EVIDENCE, not theory alone.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">ONLY ONE SIDE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">But this only works on the</tspan><tspan x=\"24\" y=\"137.5\">DOWNWARD part of the curve.</tspan><tspan x=\"24\" y=\"176.5\">Whether a given rate sits there</tspan><tspan x=\"24\" y=\"215.5\">is a question for the EVIDENCE,</tspan><tspan x=\"24\" y=\"254.5\">not theory alone.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">saying a rate is too high does not prove a cut raises revenue</text></svg>"},{"at":200.6,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Laffer curve</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Laffer curve</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Tax revenue against the tax rate: zero at 0%</tspan><tspan x=\"48\" y=\"157\">and 100%, peaking in between.</tspan><tspan x=\"48\" y=\"186\">The peak is the revenue-maximizing rate; past</tspan><tspan x=\"48\" y=\"215\">it, higher rates shrink the base and cut</tspan><tspan x=\"48\" y=\"244\">revenue.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">revenue = rate x base, and the base shrinks as the rate rises</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale + postMessage
  function applyTheme(t,f,s){ var d=document.documentElement;
    if(t) d.dataset.theme=t; if(f) d.dataset.font=f;
    if(s) d.style.setProperty('--fz', s); }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  // render slides stacked
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d); });
  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); cur=idx; } }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', tick);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };
})();
</script>
<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    else if (m.cmd === 'setRate') { try { au.playbackRate = Number(m.v) || 1; } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  au.addEventListener('ratechange', function(){ post({ type:'rate', v: au.playbackRate }); });
  post({ type:'ready' }); rep();
})();
</script>
