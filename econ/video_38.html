<!DOCTYPE html>
<html lang="en">

<meta charset="utf-8">

<title>Metacognito · Sorting positive vs normative</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audioecon@main/mp3/38.mp3"></audio>

font-size='18' font-weight='800' fill='var(--correct,#0e8f86)'>POSITIVE</text><text x='152' y='98' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>only needs evidence</text><rect x='28' y='114' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='152' y='138' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>a rent ceiling lowers</text><text x='152' y='156' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>rental housing on offer</text><rect x='28' y='180' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='152' y='204' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>a higher minimum wage</text><text x='152' y='222' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>raises teen unemployment</text><rect x='300' y='46' width='280' height='206' rx='12' fill='var(--rose,#f43f61)' fill-opacity='0.06' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='440' y='76' text-anchor='middle' font-size='18' font-weight='800' fill='var(--rose,#f43f61)'>NORMATIVE</text><text x='440' y='98' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>needs a should or a fairness call</text><rect x='316' y='114' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='440' y='138' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>rent ceilings are <tspan font-weight='800' fill='var(--rose,#f43f61)'>unfair</tspan></text><text x='440' y='156' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>to landlords</text><rect x='316' y='180' width='248' height='56' rx='8' fill='var(--surface,#ffffff)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='440' y='204' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>the minimum wage</text><text x='440' y='222' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'><tspan font-weight='800' fill='var(--rose,#f43f61)'>SHOULD</tspan> be raised</text></g><text x=\"24\" y=\"342\" font-size=\"9\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">can evidence settle it -&gt; positive (what is); does it need a value judgment -&gt; normative (what should be)</text></svg>"},{"at":52.32,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The test: can evidence back the claim up or knock it down? If yes it is positive; if it needs fairness or a should, it is normative.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE SORTING TEST</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">The test: can evidence back the</tspan><tspan x=\"24\" y=\"137.5\">claim up or knock it down?</tspan><tspan x=\"24\" y=\"176.5\">If yes it is positive; if it</tspan><tspan x=\"24\" y=\"215.5\">needs fairness or a should, it</tspan><tspan x=\"24\" y=\"254.5\">is normative.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">amounts and prices are testable; should and fair are not</text></svg>"},{"at":75.44,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Political heat does NOT decide the label. A heated topic is still positive if it makes a testable prediction about jobs or prices.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TRAP ONE</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Political heat does NOT decide</tspan><tspan x=\"24\" y=\"138\">the label.</tspan><tspan x=\"24\" y=\"176\">A heated topic is still positive</tspan><tspan x=\"24\" y=\"214\">if it makes a testable</tspan><tspan x=\"24\" y=\"252\">prediction about jobs or prices.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">arguing what to do with a fact does not make the fact a value</text></svg>"},{"at":114.76,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Naming a harm does NOT make a claim normative. A cigarette tax cuts smoking, lowering cancer: it names a harm yet every part is testable.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TRAP TWO</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Naming a harm does NOT make a</tspan><tspan x=\"24\" y=\"138\">claim normative.</tspan><tspan x=\"24\" y=\"176\">A cigarette tax cuts smoking,</tspan><tspan x=\"24\" y=\"214\">lowering cancer: it names a harm</tspan><tspan x=\"24\" y=\"252\">yet every part is testable.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">words like bad or harmful do not flip a testable claim</text></svg>"},{"at":129.9,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Positive vs normative</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Positive vs normative</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Positive statements can be settled by evidence</tspan><tspan x=\"48\" y=\"157\">alone (what is); normative statements carry a</tspan><tspan x=\"48\" y=\"186\">value or fairness standard that evidence cannot</tspan><tspan x=\"48\" y=\"215\">settle (what should be).</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">positive = testable   ·   normative = value judgment</text></svg>"}];            // [{svg, at}]  at = start time in seconds

    if(s) d.style.setProperty('--fz', s); }

<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    else if (m.cmd === 'setRate') { try { au.playbackRate = Number(m.v) || 1; } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  au.addEventListener('ratechange', function(){ post({ type:'rate', v: au.playbackRate }); });
  post({ type:'ready' }); rep();
})();
</script>
