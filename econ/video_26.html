<!DOCTYPE html>

<head>

<title>Metacognito · Efficiency vs equity trade-off</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audioecon@main/mp3/26.mp3"></audio>

(function(){
  var SLIDES = [{"at":0,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>How can one policy bring an equity gain and an efficiency cost at the same time?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"26\" width=\"107\" height=\"34\" rx=\"17\" fill=\"var(--indigo-soft,#eef0ff)\"/><text x=\"42\" y=\"49\" font-size=\"15\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">trade-off</text><text x=\"612\" y=\"49\" text-anchor=\"end\" font-size=\"16\" font-weight=\"700\" fill=\"var(--muted,#606b84)\">#26</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"150\">How can one policy bring an</tspan><tspan x=\"24\" y=\"190\">equity gain and an efficiency</tspan><tspan x=\"24\" y=\"230\">cost at the same time?</tspan></text></svg>"},{"at":12.22,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Efficiency vs equity: weigh both</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text font-size=\"24\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"44\">Efficiency vs equity: weigh both</tspan></text><g transform=\"translate(24,64)\"><text x='296' y='44' text-anchor='middle' font-size='13' font-weight='700' fill='var(--indigo,#5545e8)'>a real trade-off: weigh both goals</text><line x1='70' y1='96' x2='522' y2='96' stroke='var(--ink,#18213a)' stroke-width='5' stroke-linecap='round'/><circle cx='296' cy='96' r='5' fill='var(--ink,#18213a)'/><polygon points='296,96 278,148 314,148' fill='var(--muted,#606b84)'/><rect x='260' y='148' width='72' height='12' rx='4' fill='var(--muted,#606b84)'/><line x1='120' y1='96' x2='84' y2='150' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='180' y1='96' x2='216' y2='150' stroke='var(--muted,#606b84)' stroke-width='2'/><rect x='70' y='150' width='160' height='72' rx='12' fill='var(--correct,#0e8f86)' fill-opacity='0.1' stroke='var(--correct,#0e8f86)' stroke-width='1.5'/><text x='150' y='181' text-anchor='middle' font-size='16' font-weight='800' fill='var(--correct,#0e8f86)'>Equity gain</text><text x='150' y='205' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>wider sharing</text><line x1='412' y1='96' x2='376' y2='150' stroke='var(--muted,#606b84)' stroke-width='2'/><line x1='472' y1='96' x2='508' y2='150' stroke='var(--muted,#606b84)' stroke-width='2'/><rect x='362' y='150' width='160' height='72' rx='12' fill='var(--rose,#f43f61)' fill-opacity='0.1' stroke='var(--rose,#f43f61)' stroke-width='1.5'/><text x='442' y='181' text-anchor='middle' font-size='16' font-weight='800' fill='var(--rose,#f43f61)'>Efficiency cost</text><text x='442' y='205' text-anchor='middle' font-size='13' font-weight='600' fill='var(--ink,#18213a)'>overproduction</text></g><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">a subsidy widens who can afford pizza (equity) but pushes output past where marginal benefit equals marginal cost (efficiency cost)</text></svg>"},{"at":31.3,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The subsidy lets 300 more low-income students afford pizza, so the sharing is wider.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EQUITY GAIN</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"137.5\">The subsidy lets 300 more</tspan><tspan x=\"24\" y=\"176.5\">low-income students afford</tspan><tspan x=\"24\" y=\"215.5\">pizza, so the sharing is wider.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">equity means how fairly the gains are shared</text></svg>"},{"at":55.38,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Overproduction: the price buyers pay drops below the true cost, so output overshoots the point where marginal benefit equals marginal cost.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">EFFICIENCY COST</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Overproduction: the price</tspan><tspan x=\"24\" y=\"137.5\">buyers pay drops below the true</tspan><tspan x=\"24\" y=\"176.5\">cost, so output overshoots the</tspan><tspan x=\"24\" y=\"215.5\">point where marginal benefit</tspan><tspan x=\"24\" y=\"254.5\">equals marginal cost.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">past that point, each extra pizza costs more than it is worth</text></svg>"},{"at":84.72,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Sharing income also changes incentives: taxed high earners and paid low earners may both work less, so total output shrinks.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">A HIDDEN COST</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Sharing income also changes</tspan><tspan x=\"24\" y=\"137.5\">incentives: taxed high earners</tspan><tspan x=\"24\" y=\"176.5\">and paid low earners may both</tspan><tspan x=\"24\" y=\"215.5\">work less, so total output</tspan><tspan x=\"24\" y=\"254.5\">shrinks.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">even moving money between people has a real efficiency cost</text></svg>"},{"at":114.02,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Equity and efficiency are BOTH real goals. A large equity gain can be worth some efficiency loss; neither goal automatically wins.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE BALANCED VIEW</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Equity and efficiency are BOTH</tspan><tspan x=\"24\" y=\"138\">real goals.</tspan><tspan x=\"24\" y=\"176\">A large equity gain can be worth</tspan><tspan x=\"24\" y=\"214\">some efficiency loss; neither</tspan><tspan x=\"24\" y=\"252\">goal automatically wins.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">weigh both, do not throw one away</text></svg>"},{"at":124.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Efficiency-equity trade-off</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Efficiency-equity</tspan><tspan x=\"48\" y=\"110\">trade-off</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"168\">Getting more of one goal often means giving up</tspan><tspan x=\"48\" y=\"197\">some of the other, so good policy weighs both</tspan><tspan x=\"48\" y=\"226\">instead of maximizing just one.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">equity = fair sharing   ·   efficiency = no waste</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale + postMessage
  function applyTheme(t,f,s){ var d=document.documentElement;
    if(t) d.dataset.theme=t; if(f) d.dataset.font=f;
    if(s) d.style.setProperty('--fz', s); }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  // render slides stacked
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d); });
  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); cur=idx; } }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', tick);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };
})();

<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  post({ type:'ready' }); rep();
})();
</script>
