<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */

  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }

  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>

'middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Quantity (thousands)</text><text x='26' y='177' text-anchor='middle' font-size='15' font-weight='700' fill='var(--muted,#606b84)' transform='rotate(-90 26 177)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>Price ($)</text><polyline points='74.0,97.7 606.0,192.9' fill='none' stroke='var(--indigo,#5545e8)' stroke-width='3.5'/><text x='602.0' y='184.9' text-anchor='end' font-size='14' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>D</text><polyline points='74.0,288.0 561.7,113.6' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='3.5'/><text x='557.7' y='105.6' text-anchor='end' font-size='14' font-weight='800' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>S</text><polyline points='74.0,145.3 340.0,145.3' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='74.0,192.9 340.0,192.9' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='340.0,288.0 340.0,145.3' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><polyline points='428.7,288.0 428.7,161.1' fill='none' stroke='var(--muted,#606b84)' stroke-width='3.5' stroke-dasharray='6 5'/><circle cx='340.0' cy='145.3' r='6' fill='var(--indigo,#5545e8)'/><text x='349.0' y='139.3' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>buyer $9</text><circle cx='340.0' cy='192.9' r='6' fill='var(--correct,#0e8f86)'/><text x='349.0' y='208.9' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>seller $6</text><circle cx='428.7' cy='161.1' r='6' fill='var(--ink,#18213a)'/><text x='436.7' y='155.1' font-size='14' font-weight='800' fill='var(--ink,#18213a)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>eq $8</text><text x='207.0' y='169.1' text-anchor='middle' font-size='13' font-weight='800' fill='var(--indigo,#5545e8)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>revenue $18k</text><text x='437.5' y='119.9' text-anchor='middle' font-size='13' font-weight='800' fill='var(--rose,#f43f61)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>DWL $3k</text><text x='340.0' y='269.0' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>6k</text><text x='428.7' y='269.0' text-anchor='middle' font-size='13' font-weight='800' fill='var(--muted,#606b84)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>8k</text><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">the rectangle between the two prices (0 to 6k) is tax revenue $18k; the triangle past 6k between D and S is deadweight loss $3k</text></svg>"},{"at":34.24,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Tax revenue is the RECTANGLE between the $9 buyer price and the $6 seller price, from 0 to 6,000 units: $3 x 6,000 = $18,000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TAX REVENUE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Tax revenue is the RECTANGLE</tspan><tspan x=\"24\" y=\"137.5\">between the $9 buyer price and</tspan><tspan x=\"24\" y=\"176.5\">the $6 seller price, from 0 to</tspan><tspan x=\"24\" y=\"215.5\">6,000 units:</tspan><tspan x=\"24\" y=\"254.5\">$3 x 6,000 = $18,000.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the tax gap times the quantity still traded</text></svg>"},{"at":49.48,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Deadweight loss is the TRIANGLE between demand and supply over the 2,000 lost units: 1/2 x $3 x 2,000 = $3,000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">DEADWEIGHT LOSS</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Deadweight loss is the TRIANGLE</tspan><tspan x=\"24\" y=\"157\">between demand and supply over</tspan><tspan x=\"24\" y=\"196\">the 2,000 lost units:</tspan><tspan x=\"24\" y=\"235\">1/2 x $3 x 2,000 = $3,000.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the trades that no longer happen, from 6k out to 8k</text></svg>"},{"at":82.82,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Check: CS falls $7k and PS falls $14k, a $21k private loss. Revenue $18k + DWL $3k = $21k. The accounting holds.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE ACCOUNTING</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Check: CS falls $7k and PS</tspan><tspan x=\"24\" y=\"137.5\">falls $14k, a $21k private</tspan><tspan x=\"24\" y=\"176.5\">loss.</tspan><tspan x=\"24\" y=\"215.5\">Revenue $18k + DWL $3k = $21k.</tspan><tspan x=\"24\" y=\"254.5\">The accounting holds.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">lost CS and PS go partly to revenue, partly to DWL</text></svg>"},{"at":107.96,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Do NOT call the whole wedge deadweight loss. The rectangle is tax REVENUE, a transfer to government; only the triangle past 6,000 is the DWL.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE TRAP</text><text font-size=\"28\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"100\">Do NOT call the whole wedge</tspan><tspan x=\"24\" y=\"138\">deadweight loss.</tspan><tspan x=\"24\" y=\"176\">The rectangle is tax REVENUE, a</tspan><tspan x=\"24\" y=\"214\">transfer to government; only the</tspan><tspan x=\"24\" y=\"252\">triangle past 6,000 is the DWL.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">revenue is moved, not destroyed; the triangle is destroyed</text></svg>"},{"at":118.58,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The revenue rectangle runs 0 to 6,000 between the two prices; the DWL triangle sits to the RIGHT of 6,000, ending at the old equilibrium of 8,000.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHERE EACH SITS</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">The revenue rectangle runs 0 to</tspan><tspan x=\"24\" y=\"137.5\">6,000 between the two prices;</tspan><tspan x=\"24\" y=\"176.5\">the DWL triangle sits to the</tspan><tspan x=\"24\" y=\"215.5\">RIGHT of 6,000, ending at the</tspan><tspan x=\"24\" y=\"254.5\">old equilibrium of 8,000.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">rectangle on the left, triangle on the right</text></svg>"},{"at":167.28,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The $18k revenue is a transfer back to society, not new surplus. Only the $3,000 DWL is a real drop in total surplus, with no gain anywhere.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE REAL COST</text><text font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"101.5\">The $18k revenue is a transfer</tspan><tspan x=\"24\" y=\"138.5\">back to society, not new surplus.</tspan><tspan x=\"24\" y=\"175.5\">Only the $3,000 DWL is a real</tspan><tspan x=\"24\" y=\"212.5\">drop in total surplus, with no</tspan><tspan x=\"24\" y=\"249.5\">gain anywhere.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">taxing always costs at least the deadweight-loss triangle</text></svg>"},{"at":184.74,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The tax is efficient only if the government spends the $18k on benefits worth more than its value. The act of taxing itself still costs the $3,000 DWL for certain.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">IS IT EFFICIENT</text><text font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"108\">The tax is efficient only if the</tspan><tspan x=\"24\" y=\"142\">government spends the $18k on</tspan><tspan x=\"24\" y=\"176\">benefits worth more than its value.</tspan><tspan x=\"24\" y=\"210\">The act of taxing itself still costs</tspan><tspan x=\"24\" y=\"244\">the $3,000 DWL for certain.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">how the revenue is spent is a separate argument</text></svg>"},{"at":223.52,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Tax revenue vs deadweight loss</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Tax revenue</tspan><tspan x=\"48\" y=\"110\">vs deadweight loss</tspan></text><text font-size=\"19\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"168\">Tax revenue is the wedge rectangle (tax times</tspan><tspan x=\"48\" y=\"196\">quantity traded), a transfer; deadweight loss is</tspan><tspan x=\"48\" y=\"224\">the triangle past the new quantity (half times</tspan><tspan x=\"48\" y=\"252\">tax times quantity lost), a real surplus loss.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">revenue = tax x Q   ·   DWL = 1/2 x tax x (lost Q)</text></svg>"}];            // [{svg, at}]  at = start time in seconds

    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };
})();
</script>
<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    else if (m.cmd === 'setRate') { try { au.playbackRate = Number(m.v) || 1; } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  au.addEventListener('ratechange', function(){ post({ type:'rate', v: au.playbackRate }); });
  post({ type:'ready' }); rep();
})();
</script>
