<style>

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>

t-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-excludable)</text><text x='52' y='100' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>gets used up</text><text x='52' y='116' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(rival)</text><text x='52' y='192' text-anchor='middle' font-size='12' font-weight='700' fill='var(--muted,#606b84)'>no using-up</text><text x='52' y='208' text-anchor='middle' font-size='11' font-weight='600' fill='var(--muted,#606b84)'>(non-rival)</text><rect x='100' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Private good</text><text x='215' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a slice of pizza</text><rect x='336' y='62' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='451' y='100' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Common resource</text><text x='451' y='124' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a shared fishing ground</text><rect x='100' y='154' width='230' height='88' rx='10' fill='var(--surface-2,#f7f9fc)' stroke='var(--line,#e5eaf2)' stroke-width='1.5'/><text x='215' y='192' text-anchor='middle' font-size='16' font-weight='800' fill='var(--ink,#18213a)'>Club good</text><text x='215' y='216' text-anchor='middle' font-size='12' font-weight='600' fill='var(--muted,#606b84)'>a cable channel</text><rect x='336' y='154' width='230' height='88' rx='10' fill='var(--indigo-soft,#eef0ff)' stroke='var(--indigo,#5545e8)' stroke-width='2'/><text x='451' y='186' text-anchor='middle' font-size='16' font-weight='800' fill='var(--indigo,#5545e8)'>Public good</text><text x='451' y='207' text-anchor='middle' font-size='12' font-weight='600' fill='var(--ink,#18213a)'>a fireworks show</text><text x='451' y='228' text-anchor='middle' font-size='11' font-weight='700' fill='var(--indigo,#5545e8)'>both tests fail</text></g><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">no using-up (rivalry) and no way to block (excludability) are two separate tests; pairing them gives four kinds of good</text></svg>"},{"at":39.16,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The fireworks show cannot block anyone and is not used up, so it is a public good; the pizza blocks others and gets used up, so it is private.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">SORT EACH GOOD TWICE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">The fireworks show cannot block</tspan><tspan x=\"24\" y=\"137.5\">anyone and is not used up, so</tspan><tspan x=\"24\" y=\"176.5\">it is a public good; the pizza</tspan><tspan x=\"24\" y=\"215.5\">blocks others and gets used up,</tspan><tspan x=\"24\" y=\"254.5\">so it is private.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">two answers per good, then read off the box</text></svg>"},{"at":85.26,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>No using-up is about USE: does one person's use shrink what is left? No way to block is about PAYMENT: can non-payers be kept out?</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TWO SEPARATE TESTS</text><text font-size=\"27\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"101.5\">No using-up is about USE: does</tspan><tspan x=\"24\" y=\"138.5\">one person's use shrink what is</tspan><tspan x=\"24\" y=\"175.5\">left?</tspan><tspan x=\"24\" y=\"212.5\">No way to block is about PAYMENT:</tspan><tspan x=\"24\" y=\"249.5\">can non-payers be kept out?</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">run the two tests apart, not as one</text></svg>"},{"at":112,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The traits move on their own: a cable channel has no using-up yet blocks people; a crowded park cannot block yet gets used up.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THEY ARE INDEPENDENT</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">The traits move on their own: a</tspan><tspan x=\"24\" y=\"137.5\">cable channel has no using-up</tspan><tspan x=\"24\" y=\"176.5\">yet blocks people; a crowded</tspan><tspan x=\"24\" y=\"215.5\">park cannot block yet gets used</tspan><tspan x=\"24\" y=\"254.5\">up.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">one trait can hold without the other</text></svg>"},{"at":118.08,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Pair the two tests: private (used up, can block), club (no using-up, can block), common resource (used up, cannot block), public (no using-up, cannot block).</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">FOUR KINDS</text><text font-size=\"26\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"105.5\">Pair the two tests: private (used</tspan><tspan x=\"24\" y=\"140.5\">up, can block), club (no using-up,</tspan><tspan x=\"24\" y=\"175.5\">can block), common resource (used</tspan><tspan x=\"24\" y=\"210.5\">up, cannot block), public (no</tspan><tspan x=\"24\" y=\"245.5\">using-up, cannot block).</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the two answers together fix the category</text></svg>"},{"at":152.66,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Public goods are the hardest: BOTH tests fail. You cannot charge people you cannot block, and no user uses it up to force a price.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY MARKETS STRUGGLE</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"98.5\">Public goods are the hardest:</tspan><tspan x=\"24\" y=\"137.5\">BOTH tests fail.</tspan><tspan x=\"24\" y=\"176.5\">You cannot charge people you</tspan><tspan x=\"24\" y=\"215.5\">cannot block, and no user uses</tspan><tspan x=\"24\" y=\"254.5\">it up to force a price.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">that double failure is the free-rider problem</text></svg>"},{"at":160.52,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Two tests for goods</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">Two tests for goods</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">No using-up (non-rivalry): one person's use</tspan><tspan x=\"48\" y=\"157\">does not shrink what is left for others.</tspan><tspan x=\"48\" y=\"186\">No way to block (non-excludability): non-payers</tspan><tspan x=\"48\" y=\"215\">cannot be kept out.</tspan><tspan x=\"48\" y=\"244\">Run both, apart.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">no using-up = rivalry test   ·   no way to block = excludability test</text></svg>"}];            // [{svg, at}]  at = start time in seconds

<script>
(function(){

  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;

    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }

    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    else if (m.cmd === 'setRate') { try { au.playbackRate = Number(m.v) || 1; } catch(e2){} }

  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
