<!DOCTYPE html>
<html lang="en">

<title>Metacognito · Real flow and money flow</title>
<style>
  /* ===== app token system (verbatim from Index.html :root + [data-theme]) so the clip is app-native ===== */
  :root{
    --app-font:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --ink:#18213a; --muted:#606b84; --surface:#ffffff; --surface-2:#f7f9fc; --page:#f6f8fc;
    --line:#e5eaf2; --indigo:#5545e8; --indigo-soft:#eef0ff; --amber:#f5b526; --rose:#f43f61;
    --correct:#0e8f86; --shadow:0 10px 30px rgba(33,48,86,0.08);
  }
  [data-theme="dark"]{ --ink:#edf0f5; --muted:#aab2c0; --surface:#1d212a; --surface-2:#272c36; --page:#0d0f13; --line:#343a45; --indigo:#8f84ff; --indigo-soft:#262a52; --correct:#22b3a6; --shadow:0 12px 30px rgba(0,0,0,.45); }
  [data-theme="pink"]{ --page:#fdf2f8; --surface-2:#fbeaf2; --indigo:#db2777; --indigo-soft:#fce7f3; }
  [data-theme="blue"]{ --page:#eef6ff; --surface-2:#e6f1ff; --indigo:#2563eb; --indigo-soft:#dbeafe; }
  [data-theme="mint"]{ --page:#eafaf3; --surface-2:#dcf5ea; --indigo:#0e9e76; --indigo-soft:#d3f3e6; }
  [data-theme="purple"]{ --page:#f7f1ff; --surface-2:#efe6ff; --indigo:#7c3aed; --indigo-soft:#ece2ff; }
  [data-theme="mango"]{ --page:#fff6e9; --surface-2:#ffedd6; --indigo:#e2690f; --indigo-soft:#ffe3c4; }
  [data-theme="metallic"]{ --ink:#eef1f8; --muted:#a7b0c5; --surface:#161a26; --surface-2:#1e2435; --page:#0a0e1a; --line:#2c3346; --indigo:#7a68ee; --indigo-soft:#241f47; --correct:#22b3a6; --shadow:0 16px 40px rgba(0,0,0,.55); }

  *{ box-sizing:border-box; } html,body{ margin:0; }
  body{ font-family:var(--app-font); background:var(--surface); color:var(--ink); padding:12px; -webkit-text-size-adjust:100%; }
  .stage{ position:relative; width:100%; aspect-ratio:16/9; background:var(--surface); border-radius:18px; overflow:hidden; }
  .slide{ position:absolute; inset:0; opacity:0; transition:opacity .28s ease; }
  .slide.on{ opacity:1; }
  .slide svg{ width:100%; height:100%; display:block; }
  .bar{ display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pp{ flex:none; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; color:#fff;
       background:color-mix(in srgb, var(--indigo) 82%, #0a0e1a); font-size:18px; box-shadow:var(--shadow); }
  .pp:active{ transform:scale(.93); }
  .track{ flex:1; height:6px; border-radius:3px; background:color-mix(in srgb, var(--indigo) 18%, var(--line)); cursor:pointer; position:relative; }
  .fill{ height:100%; border-radius:3px; background:var(--indigo); width:0%; }
  .time{ flex:none; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:74px; text-align:right; }
  .spd{ flex:none; font:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        color:var(--ink); background:var(--surface-2); border:1px solid var(--line); }
  @media (prefers-reduced-motion: reduce){ .slide{ transition:none; } .pp:active{ transform:none; } }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="pp" id="pp" aria-label="Play">▶</button>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <button class="spd" id="spd" aria-label="Playback speed">1×</button>
    <div class="time" id="time">0:00</div>
  </div>
  <audio id="au" preload="metadata" src="https://cdn.jsdelivr.net/gh/metacognito-study/metacognito-audioecon@main/mp3/68.mp3"></audio>

path d='M 190 180 Q 320.0 160.0 450 180' fill='none' stroke='var(--amber,#f5b526)' stroke-width='2.5'/><polygon points='450,180 438.3,183.8 440.0,172.9' fill='var(--amber,#f5b526)'/><text x='320.0' y='174.0' text-anchor='middle' font-size='12.5' font-weight='700' fill='var(--amber,#f5b526)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>spending $3000</text><path d='M 450 210 Q 320.0 230.0 190 210' fill='none' stroke='var(--amber,#f5b526)' stroke-width='2.5'/><polygon points='190,210 201.7,206.2 200.0,217.1' fill='var(--amber,#f5b526)'/><text x='320.0' y='224.0' text-anchor='middle' font-size='12.5' font-weight='700' fill='var(--amber,#f5b526)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>wages $5000</text><path d='M 190 228 Q 320.0 290.0 450 228' fill='none' stroke='var(--correct,#0e8f86)' stroke-width='2.5'/><polygon points='450,228 442.4,237.7 437.7,227.8' fill='var(--correct,#0e8f86)'/><text x='320.0' y='263.0' text-anchor='middle' font-size='12.5' font-weight='700' fill='var(--correct,#0e8f86)' paint-order='stroke' stroke='var(--surface,#ffffff)' stroke-width='4.5' stroke-linejoin='round'>labor (real)</text><rect x='40' y='150' width='150' height='90' rx='12' fill='var(--surface-2,#f7f9fc)' stroke='var(--indigo,#5545e8)' stroke-width='2'/><text x='115' y='192' text-anchor='middle' font-size='17' font-weight='800' fill='var(--ink,#18213a)'>Households</text><text x='115' y='210' text-anchor='middle' font-size='12' font-weight='500' fill='var(--muted,#606b84)'>Sami</text><rect x='450' y='150' width='150' height='90' rx='12' fill='var(--surface-2,#f7f9fc)' stroke='var(--indigo,#5545e8)' stroke-width='2'/><text x='525' y='192' text-anchor='middle' font-size='17' font-weight='800' fill='var(--ink,#18213a)'>Firms</text><text x='525' y='210' text-anchor='middle' font-size='12' font-weight='500' fill='var(--muted,#606b84)'>car maker, shop</text><text x=\"24\" y=\"342\" font-size=\"8\" font-weight=\"500\" fill=\"var(--muted,#606b84)\">product market (top) and factor market (bottom): the real flow goes one way (teal), the money flow the opposite way (amber)</text></svg>"},{"at":32,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Labor (factor market): real flow household to firm, wage the opposite way. Appliance (product market): real flow firm to household, spending the opposite way.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">TRACE EACH DEAL</text><text font-size=\"25\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"91\">Labor (factor market): real flow</tspan><tspan x=\"24\" y=\"125\">household to firm, wage the opposite</tspan><tspan x=\"24\" y=\"159\">way.</tspan><tspan x=\"24\" y=\"193\">Appliance (product market): real</tspan><tspan x=\"24\" y=\"227\">flow firm to household, spending the</tspan><tspan x=\"24\" y=\"261\">opposite way.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the money flow always moves opposite to the real flow</text></svg>"},{"at":79.68,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The $2000 Sami does not spend is a leakage (savings), which the pure two-sector model leaves out.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE GAP</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">The $2000 Sami does not spend</tspan><tspan x=\"24\" y=\"157\">is a leakage (savings), which</tspan><tspan x=\"24\" y=\"196\">the pure two-sector model</tspan><tspan x=\"24\" y=\"235\">leaves out.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the model assumes all income returns to firms as spending</text></svg>"},{"at":93.66,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>In the pure two-sector model, all factor income returns as product-market spending, so income equals spending.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">WHY THE LOOP BALANCES</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">In the pure two-sector model,</tspan><tspan x=\"24\" y=\"157\">all factor income returns as</tspan><tspan x=\"24\" y=\"196\">product-market spending, so</tspan><tspan x=\"24\" y=\"235\">income equals spending.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">leakages appear only with banks, government, and foreign sectors</text></svg>"},{"at":124.6,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>Households SELL factors; firms BUY them. And wages are the money flow, not the real flow.</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"24\" y=\"46\" font-size=\"12\" font-weight=\"700\" letter-spacing=\"1\" fill=\"var(--muted,#606b84)\">THE CLASSIC TRAP</text><text font-size=\"29\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"24\" y=\"118\">Households SELL factors; firms</tspan><tspan x=\"24\" y=\"157\">BUY them.</tspan><tspan x=\"24\" y=\"196\">And wages are the money flow,</tspan><tspan x=\"24\" y=\"235\">not the real flow.</tspan></text><rect x=\"24\" y=\"286\" width=\"592\" height=\"50\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"316\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">the real flow is the labor itself, moving from household to firm</text></svg>"},{"at":140,"svg":"<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"var(--app-font,Inter,ui-sans-serif,-apple-system,system-ui,sans-serif)\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><title>The three-part trace</title><rect x=\"1\" y=\"1\" width=\"638\" height=\"358\" rx=\"18\" fill=\"var(--surface,#ffffff)\" stroke=\"var(--line,#e5eaf2)\"/><rect x=\"24\" y=\"36\" width=\"8\" height=\"250\" rx=\"4\" fill=\"var(--indigo,#5545e8)\"/><text font-size=\"34\" font-weight=\"800\" fill=\"var(--ink,#18213a)\"><tspan x=\"48\" y=\"70\">The three-part trace</tspan></text><text font-size=\"20\" font-weight=\"500\" fill=\"var(--muted,#606b84)\"><tspan x=\"48\" y=\"128\">Name the market, then the real flow and its</tspan><tspan x=\"48\" y=\"157\">direction, then the money flow moving the</tspan><tspan x=\"48\" y=\"186\">opposite way.</tspan></text><rect x=\"24\" y=\"296\" width=\"592\" height=\"46\" rx=\"12\" fill=\"var(--surface-2,#f7f9fc)\" stroke=\"var(--line,#e5eaf2)\"/><text x=\"320\" y=\"324\" text-anchor=\"middle\" font-size=\"19\" font-weight=\"700\" fill=\"var(--indigo,#5545e8)\">market   ·   real flow (one way)   ·   money flow (the opposite way)</text></svg>"}];            // [{svg, at}]  at = start time in seconds
  var au = document.getElementById('au'), stage = document.getElementById('stage');
  var pp = document.getElementById('pp'), fill = document.getElementById('fill');
  var track = document.getElementById('track'), timeEl = document.getElementById('time');
  var spd = document.getElementById('spd');

  // theme handoff (mirrors the econ visualizers): ?theme/font/scale + postMessage
  function applyTheme(t,f,s){ var d=document.documentElement;
    if(t) d.dataset.theme=t; if(f) d.dataset.font=f;
    if(s) d.style.setProperty('--fz', s); }
  (function(){ var q=new URLSearchParams(location.search);
    applyTheme(q.get('theme'), q.get('font'), q.get('scale')); })();
  window.addEventListener('message', function(e){ var m=e.data||{};
    if(m && m.__viz){ applyTheme(m.theme, m.font, m.scale); } });

  // render slides stacked
  SLIDES.forEach(function(sl,i){ var d=document.createElement('div');
    d.className='slide'+(i===0?' on':''); d.id='sl'+i; d.innerHTML=sl.svg; stage.appendChild(d); });
  var cur=0;
  function showFor(t){ var idx=0;
    for(var i=0;i<SLIDES.length;i++){ if(t>=SLIDES[i].at) idx=i; }
    if(idx!==cur){ var a=document.getElementById('sl'+cur), b=document.getElementById('sl'+idx);
      if(a)a.classList.remove('on'); if(b)b.classList.add('on'); cur=idx; } }

  function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+('0'+(s%60)).slice(-2); }
  function tick(){ var d=au.duration||0, t=au.currentTime||0;
    fill.style.width=(d? (t/d*100):0)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(d); showFor(t); }

  pp.onclick=function(){ if(au.paused){ au.play(); } else { au.pause(); } };
  au.addEventListener('play', function(){ pp.textContent='⏸'; pp.setAttribute('aria-label','Pause'); });
  au.addEventListener('pause', function(){ pp.textContent='▶'; pp.setAttribute('aria-label','Play'); });
  au.addEventListener('timeupdate', tick);
  au.addEventListener('loadedmetadata', tick);
  au.addEventListener('ended', function(){ cur=0; SLIDES.forEach(function(_,i){
    document.getElementById('sl'+i).classList.toggle('on', i===0); }); });
  track.onclick=function(e){ var r=track.getBoundingClientRect();
    if(au.duration) au.currentTime=(e.clientX-r.left)/r.width*au.duration; };
  var speeds=[1,1.25,1.5,0.85], si=0;
  spd.onclick=function(){ si=(si+1)%speeds.length; au.playbackRate=speeds[si]; spd.textContent=speeds[si]+'×'; };
})();
</script>
<script>
(function(){
  if (window.self === window.top) return;
  var au = document.getElementById('au'); if (!au) return;
  var A = null, B = null, st = 0;
  function post(m){ m.__abv = true; try { parent.postMessage(m, '*'); } catch(e){} }
  function rep(){ post({ type:'time', t: au.currentTime||0, d: au.duration||0, a: A, b: B, state: st }); }
  window.addEventListener('message', function(e){
    var m = e.data; if (!m || m.__abv !== true || !m.cmd) return;
    var t = au.currentTime||0;
    if (m.cmd === 'setA') { A = t; B = null; st = 1; }
    else if (m.cmd === 'setB') { if (A != null && t > A + 0.25) { B = t; st = 2; } }
    else if (m.cmd === 'clear') { A = null; B = null; st = 0; }
    else if (m.cmd === 'play') { try { au.play(); } catch(e2){} }
    else if (m.cmd === 'pause') { try { au.pause(); } catch(e2){} }
    rep();
  });
  setInterval(function(){ if (st === 2 && A != null && B != null && (au.currentTime||0) >= B) { try { au.currentTime = A; } catch(e){} } rep(); }, 250);
  au.addEventListener('ended', function(){ post({ type:'ended' }); });
  post({ type:'ready' }); rep();
})();
</script>
