<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)">
<!-- u_54_e4 blank number line | econ rows 54/105/106/107 (cue col M) | 7 unlabeled ticks, arrowheads both ends; values differ per cue (80->65 change, 0.75-0.80 terms-of-trade) so ticks stay blank -->
<defs><marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--muted,#606b84)"/></marker></defs>
<line x1="130" y1="160" x2="670" y2="160" stroke="var(--ink,#18213a)" stroke-width="2.5" marker-start="url(#ax)" marker-end="url(#ax)"/>
<line x1="180" y1="150" x2="180" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="253" y1="150" x2="253" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="326" y1="150" x2="326" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="399" y1="150" x2="399" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="472" y1="150" x2="472" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="545" y1="150" x2="545" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="618" y1="150" x2="618" y2="170" stroke="var(--ink,#18213a)" stroke-width="2"/>
<text x="400" y="230" font-size="14" fill="var(--muted,#606b84)" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >label the ticks with your own scale</text>
