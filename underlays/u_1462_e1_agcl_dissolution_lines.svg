<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="var(--label-font,'Space Grotesk','IBM Plex Sans',ui-sans-serif,sans-serif)">
<!-- u_1462_e1 AgCl dissolution shown-state | chem row 1462 | [Ag+] and [Cl-] rise together from 0 and level at 1.34e-5 M (drawn overlapping: equal is the point); endpoint meaning NOT annotated -->
<defs><marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--muted,#606b84)"/></marker></defs>
<line x1="140" y1="420" x2="700" y2="420" stroke="var(--ink,#18213a)" stroke-width="2.5" marker-end="url(#ax)"/><line x1="140" y1="420" x2="140" y2="100" stroke="var(--ink,#18213a)" stroke-width="2.5" marker-end="url(#ax)"/>
<line x1="134" y1="220" x2="140" y2="220" stroke="var(--ink,#18213a)" stroke-width="2"/>
<line x1="140" y1="220" x2="690" y2="220" stroke="var(--line,#e5eaf2)" stroke-width="1"/>
<text x="126" y="225" font-size="13" fill="var(--muted,#606b84)" text-anchor="end" font-weight="500" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >1.34×10⁻⁵</text>
<polyline points="140,420 430,220 660,220" fill="none" stroke="var(--indigo,#5545e8)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
<polyline points="140,420 430,220 660,220" fill="none" stroke="var(--amber,#f5b526)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="10 8"/>
<text x="612" y="200" font-size="14" fill="var(--indigo,#5545e8)" text-anchor="middle" font-weight="700" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >[Ag⁺]</text>
<text x="612" y="246" font-size="14" fill="var(--amber,#f5b526)" text-anchor="middle" font-weight="700" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >[Cl⁻]</text>
<text x="470" y="468" font-size="15" fill="var(--ink,#18213a)" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >amount of AgCl dissolved</text>
<text x="60" y="260" font-size="15" fill="var(--ink,#18213a)" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" transform="rotate(-90 60 260)">ion concentration (M)</text>
<text x="400" y="130" font-size="14" fill="var(--muted,#606b84)" text-anchor="middle" font-weight="500" paint-order="stroke" stroke="var(--surface,#ffffff)" stroke-width="4" stroke-linejoin="round" >the two lines lie exactly on top of each other</text>
</svg>
